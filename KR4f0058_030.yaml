body:
  text: 東里盧文弨紹弓傳五浙江紹興府知府朱公涵齋家傳壬子公諱煦字育資別號涵齋系出新安朱氏明初安五公為吏部左侍郎寄籍江南揚州之泰興時守常郡者與安五公有舊其屬縣江陰江中有新漲沙名馬馱沙人不利有之守因以歸於公蓋揚與常雖隔郡而由泰興至馬馱沙道甚近公於是闢草萊治溝塍招貧民給籽種歲餘得腴田八百畞生聚因以益盛至成化七年遂建為靖江縣仍屬常州故少宰之子孫世為常之靖江人其顯名者甚衆具載邑乘中公祖諱沐廩貢生候選儒學訓導未仕所著有竹窗詩集行世考諱懋德歷知直隸完縣山東夏津長淸以公貴並封贈中憲大夫公幼誠篤不苟言笑以國子生就順天試見器於諸老前輩旋丁母聞太恭人憂居喪哀毀致疾踰年始獲痊時長淸公以疾辭官家居有三子公居長年幾壯矣長淸公欲其展力國家以補生平未酬之志入資如例乾隆二十年選授刑部貴州司員外郎無錫秦尚書綜部事留意人材以公為能凡有現審案件率以委公公詳愼研鞫悉得其情先是凡旗主以家人酗酒滋事送部者準例概行發遣公視其所下狀質之於庭不能指實因稟堂官拘集録供乃其主私僕婦欲遠其夫故以此坐之事遂不行而舊例亦重定在刑部三年轉戶部江西司郎中兼現審處又兼督催所二十六年京察一等記名以道府用值浙江巡撫番禺莊公入奏以紹興郡大事劇急須幹員為請遂特授紹興府知府是年九月至任越地多姦民其俗習於刀筆以健訟為能每駕詞以聳聽逢放告期多至二三百紙狀內多引條例以為言謂如是可以挾制也公一一閲之情偽畢露擇其尢不合於理者即子杖懲又少年無賴者擾害里閭且詭立名字以自標異如九尾狐小羅成賽秦瓊之類俗所謂綽號是也其所到人皆畏之或雖被害亦不敢言蓋其結為死黨者衆也亦有身列襟士而結交吏胥以誣詐傾陷人者公皆廉得其實案名捕治於是受其害者咸得以狀上訴擇其為惡甚者流之遠方餘亦議罪有差地方為之一淸士民咸額手稱慶曰今而後得以安枕矣乃以驅惡綏良四字扁聽事以頌公德其於審􅍘命案少有疑竇不肯即據縣申完結屬邑諸暨有賈人陳姓者其父夜出以其子守店晨歸則店中之銀一空尋其子巳死於宅東之隙地身負刃傷者三縣方懸緝有鄰人駱文達者曰殺人者某某等也指證似實縣已成招解犯過府公覩其狀類冤抑且思殺人為下旬五日之夜於時月色甚微去死所約六丈有餘駱文達登樓遠望其行凶先後並各人所著衣色焉能了了至此於是亦如其期夜中令駱文達立舊處擇其鄉鄰素所習者三四人立死所令駱辨其某色衣者為誰某竟語塞加以嚴訊始得其􅝘嫌妄攀之實而負冤者卒得昭雪郡中蕺山書院為教養英俊之地非明師不足以造士公訪得烏程孫太史名人龍者品端而學優即以幣禮延至向諸生中亦有一二不馴謹者及孫至士皆帖服無異論是年登賢書者五人明年中進士者二人公既歸而後政尚挽留孫不令去後竟卒於越其子遂入籍山陰此固見衆士事師之誼而公之為士求師與父兄之為其子弟何以異宜乎至今而不忘也二十七年翠華南巡凡所承辦敬謹無誤蒙賜賚甚優五月差竣即派同杭台寧波三府修建海寧塘工又因塘石俱出紹興之羊大兩山撫軍令三府應採買者俱解銀交紹興代辦公於尺寸一稟成規日往監採絶需索之弊凡在工之宕戶石匠等無不踴躍急公塘工自始事以至告竣不朴一人而事集明年秋大雨越地四面環山外為大江內多巨湖雨大宣泄不及泛溢成災八邑中諸暨尢甚公親往察勘近江者導之入江近湖者導之入湖又確核成災戶口應振恤者乘小艇以胥吏各一自隨其淺灘難達處坐大木盆四五人扶曳而行村民往往竊指曰此太守活我命也亦間有不火食之時唯食果餅充飢而已勘定後詳請賑濟大吏入奏奉旨如所請皇仁浩蕩使數十萬生靈不致填於溝壑而公之盡瘁奉職亦可謂無絲豪遺憾矣是冬念長淸公年及七旬唯季子依膝下不可不急歸養然非獨子於終養例尚不合遂以疾請告時公年三十有九大府不聽其去公陳􅝴甚至乃許去之日郡民涕泣攀追者以萬數歸及一載遂丁外艱向使稍濡滯不去官其抱終天之恨者將無窮矣三年中哀傷慘瘁幾至骨立自是遂無意仕宦既而患怔忡因以四十二年四月終於家年五十有三公自出仕以來謹持廉隅公事方急至自出家財以佐之未嘗少有科率公考嘗捐田七百餘畞以贍族人公謹遵其制而復推廣之家居十餘年無一字入公門人亦敬公長者亦不敢以無禮忤公律身勤儉以是率其子孫士大夫稱有家法者莫先焉娶陳恭人後公十六年卒子五人長垣見署四川靑堤渡鹽大使次基綸方略館謄録候補州同知次基縉附貢生次基繹基綬皆太學生孫十二人曾孫三人論曰余祖貫餘姚為公所隸之邑明之季年始遷於杭又早年服官居日下是以不獲以部民晉謁於後讀禮南還一謁孫端人先生於蕺山是日適課士見諸生皆彬彬守禮法無妄言笑者即知公之造士有方與孫先生之盛德感人其美交相成也鄉人之頌公者如一辭今撮其大者著於此亦足以見公政事之才矣公之子基繹與余有姻連故又以知孝弟睦姻之媺行然則循吏之名猶不足以盡公矣廣德州學正孚堂朱君家傳壬子君姓朱氏諱裕觀字顒若號孚堂先世陜西鳳翔人元末徒家江南之當塗世系始可考有諱鐸者眀永樂時官南京江西道御史立朝有直聲嗣是數世濳德未彰曾祖爾昌人稱長者祖念山嫺文章能詩善書畫以貧跳身從軍以征兀魯特功敘授江西瑞州府經歷旋換武資補山東濟寧衛守僃考蘭谷甘肅高臺縣知縣生三子季即君也少而力學日有定程不中程輒引夏楚自責且跪誦必精熟後已體素弱年十六病中猶手不釋卷高臺公以為非攝生之宜緘書禁勿使觀君即專精八法入歐褚兩家閫奧晚歲風致直逼晉人性至孝母病有人能從乩請方其所書必以沙盤顧無所得沙何君即往河畔取沙時正廩冬五指為之裂既而所書非佳語君一見悶絶逮居喪哀毁骨立以名諸生入國子監乾隆庚午應順天鄉試中副榜考取八旗教習充武英殿校對繼考職在一等當得州同知癸酉中式舉人適教習期滿引見以教職用君先往西陲省親而高臺公巳丁繼母憂旋亦身故君在途聞耗幾不欲生及抵喪次困頓已甚高臺距當塗五千餘里扶櫬費重宦橐無餘資正日夜焦慮會大吏助之行乃成行時制府吳公留君辦奏牘固辭不得遂命子廷芝等扶柩歸有煙家卒於皋蘭者君計費尚有餘即為經紀同返君於次年亦遄歸營葬畢地方大吏俱知君有經濟才多延致幕中無虛歲逮庚寅銓授廣德州學正地居萬山中俗質而少文諸生有不衣冠而來謁者君雖盛暑必冠服見之俗漸知禮節有某生素自愛為訟者妄相牽長吏欲褫之君審其無辜為力請乃免學宮傾頽甚為營葺之丁祭樂舞久廢請於學使朱公録取佾生若干名又捐置樂器延善音律者為教師一年後聲容燦然可觀人士咸欣欣然以為盛事君中年以上體氣漸強近年偶患寒疾繼以瘧遽至不諱病中念長子廷芝下血甚劇諭季子廷葵謹視兄疾勿少離以故屬纊時皆不在側廣德諸生感君德化不召而至者十餘人治木製衣衾一切如禮哭皆盡哀嗚呼此可以驗君之教澤入人深也君卒以乾隆四十八年正月初二日享年六十有八娶沈氏其扶舅櫬先歸也見兄公在袁江貧至不能舉火乃約計歸費外餘盡歸之繼復僦屋同居並婚嫁其子女族黨稱其賢子五人廷芝廷芾皆國學生廷葵邑諸生廷薇廷萐廷芾早卒廷萐殤孫五人長珏亦邑庠生餘皆詳譜中論曰君儒者而通達世務佐大吏皆有聲使寄以民社亦必有所報效乃為文學官克自振作不隨俗委靡局於卑仕故其所表見僅此然觀諸生之能敦古道非恩誼素結於其心能然哉如使之治民則民之所以報君亦必視此矣李蠡塘先生家傳壬子詞館前輩中余獨與蠡塘李先生親也率月一會聚焉倣溫公真率之約而為之先生之為人外聲華樂間靜相見絶無世俗談每就之令人之意也消方冀奉教有日乃曾未三年而翩然賦歸矣文弨自官罷後鹿獨無寧居久未悉先生近狀年來濫席毗陵之龍城講舍實先生之鄉而先生巳不可再見矣為悼歎者久之歲辛亥始識先生之嗣子慶來庶幾能繼先生之志業者以先生之素不棄文弨也因出其詩集見示並志狀等而以傳見屬追思平生交誼之厚焉可以不文辭先生諱英字御左晚乃號蠡塘李氏系出宋丞相忠定公中間自晉陵徙宜興放先生仍以宜興通籍而所居則在武進之鄉云幼聰穎師友又皆一時勝流早年文章即巳成就於書隸真行草靡不以古人為師法出遊淮陰諸名士一見傾倒乾隆甲子乙丑聯捷成進士入詞林即乞假省親歸父止齋公有疾一切起居服食必身親之更善於養志有來告貸者得止齋公一諾即如數以應未嘗以貧故稍有難色止齋公病瘖凡所指示唯先生無一齟齬他人則不能盡喻也彌留之際執先生手喃喃不置更聞笑聲而沒先生之於子道可謂盡矣將營葬人謂祖塋上有吉穴先生以先人有禁碑終別求地以窆焉還朝授職檢討充鄉會試同考官纂修三禮續文獻通考等書咸安宮官學總裁教習丁丑科庶吉士恩賜稠疊贈封上兩世如其官先生自童子試以來凡遇合之文無不以淸見賞及在館閣所作詩賦一主淸新如藐姑射之仙不藉鉛華薌澤而始見妍地臨池之學久而益工求者率滿戶外應之無倦容人人各愜其意以去歸而家徒四壁主講海州六安得稍稍資給於從兄姊之無以為家者猶為一一撫恤使不失所有私鬻其餘屋者亦不少芥蒂於懷生平無疾言遽色即之藹然而干以非義則毅然不可奪娶黃孺人先卒一女適吳方慶無子以弟之子慶來為後謹守先生遺集將有待於表章云盧文弨曰先生孝悌人也內行不彰於外故人但以淸許之夫榮名膴仕人競趨焉顧翛然若深山之老衲何哉意其充於中而無慕於外者歟其立品淸其吐辭焉得而不淸言固心聲之所流也然貞介自守而未嘗絶俗人是以樂得而親之嗚呼九原如可作也舍先生將安歸朝議大夫學南瞿公家傳壬子大凡豪傑之士承先世所詒之業未有不欲堂構無虧弓裘善繼者也而厄難或出於不虞至於窮約困頓艱難勞苦之僃嘗而能強敏有為黽勉樹立使緒將墜而復完基欲壞而重固且更廓而大之益為前人光古今來國固有之家亦宜然此豈不由乎幹裕之才哉然所重尢在乎其德昔子張問行而聖人教之以忠信篤敬又問達而教之以質直好義數言夫唯如是斯其所以攸往無不利而困者於以亨約者於以泰固必然之理也余往來吳中每聞人稱道瞿大夫之賢而未之識也今殁已七年矣得錢詹事曉徵所為志墓之文始知大夫之果賢也會令嗣太守君欲傳大夫之行事以書來請文弨為文以繫諸譜牒因不辭而為之次敘之大夫諱連璧字璞存號學南先世居松江之上海曾祖諱穎隆力敦善行設黃浦北義渡至今行者稱便祖諱有恆貢生任江南直隸和州學正始遷太倉州之嘉定所居在學宮之南故大夫之號取諸此父克振公諱大定先以子貴敕贈儒林郎後以孫貴誥贈朝議大夫學南公之封亦由此大夫生九歲而孤事大母孝出遇所嗜物必攜歸以獻大母嘗之而後快瞿氏素以本富聞逮祖若父相繼去世兩叔父皆不善持家同産兄兩人又皆早逝子然孤露生計漸不支雍正三年江南彙徵錢糧積欠之案起邑向以瞿氏任排年儒甲總户往常催繳率如例繼而經理無人為姦胥所侵蝕令顧考成唯責成總户於是變産彌補家遂因之而毀大夫年方弱冠謂徒忍飢誦經其若堂上何且祖宗數百年之基構一旦陵夷衰微必非僅守章句之所能驟復昔人言儒者以治生為急度事勢亦不得不爾思廢著之術亦多方唯布之與粟其重相埒其資於人也廣於是始創布業往來吳下倍極勤苦幾二十餘年得漸有贏餘舊居之損敗者重葺之旁屋之出售者贖歸之遠近祖塋之祭田墓田為族人因貧質於人者一一為出資淸釐以歸其主顧故里雖可懷而一區之門里已在吳兼顧弗便乃復卜宅於吳之閶門而盡室遷焉同業者或有利不利而大夫獨隆隆日起者則以其性行誠實動皆合宜所謂德孚於人而人信之大夫之謂矣其事大母與母生則盡敬沒則盡哀葬則營高敞地樹松楸皆成行翠華間數歲一南巡大夫隨守土諸臣後遵循迎鑾成例而敬謹倍加焉率常往來靈巖山麓供頓悉中程又嘗以私財佐公家之急廣振施之惠未易一二數也嘉定地不産米舊苦漕運前明族祖仲仁公倡議折漕請於邑令朱公廷益因得改折民受其惠立祠以祀仲仁公在附祀之列久而漸湮大夫倡興復之至今得以不廢大夫以乾隆五十一年九月二十五日無疾考終年七十有一娶汪恭人家正當中落時執勤食淡以養姑教子不得寧息其卒也亦於是年之六月年七十生三子長兆騤國學生候選知府次塘廩貢生敕授修職郎歷任府縣學學官最後得碭山縣學教諭次兆麟國學生河南南陽府同知署陳州府知府大夫始以困厄故舍百年詩書之澤以治生意常慊慊日望其後人以儒術顯甚切延名師嚴課程無少須臾懈今塘以文學為師儒之官孫中泌又食餼於庠舉優貢成均後起者森森科名直待時耳此殆所謂得則兼得者也女三孫男九孫女八曾孫男二曾孫女一其詳具在譜牒舊史氏曰聖人之言豈不信矣夫觀大夫之行事可知巳孰謂大夫非儒者其所操以應事接物者慮無往而非儒術也事固當審輕重權緩急在水火之中而冀久遠之效其為計也迂而且不可以必得逮至轗軻終身而於後人益不遑恤矣若大夫所為誠明於緩急輕重之數故能復完其先世之舊而子孫乃得從容以向學之秦者先適楚北征者宜向南事固不可執一論也語曰惜財者必重費以大夫之積而能散也豈不更賢於攝緘縢固扃鐍者遠甚如此而不謂之豪傑得乎文學朱梅友家傳辛丑君諱夏字煥文一字梅友姓朱氏先世徽人與文公同祖由始別六傳始遷於處州遂昌縣之奕山至君二十二世矣世以耕且讀為業君後以奕山地瘠更遷居陳村髫年事大父父能順適其意無子弟過大父魯菴府君極愛之令讀儒書出就外孰君雖耽學每念餘力學文之訓時歸家省覲並代諸勞辱事世務益以練習既冠以文受知學使者補縣學博士弟子員遂為經師遠近爭相延聘時父碧泉府君窘於生計屢徙業而貧逾甚貸子母日益多君以所得修脯為償無私用者復念治末終不若務本召佃客講求田園之利家計由是粗足食必具甘旨親未中年已能享優遊之樂矣有母弟四人女弟二人皆以時婚嫁親既沒而兄弟猶同居數十年諸弟皆力農君閔其勞已有五子唯令一子習儒三子皆習農以分其勞一子則尚幼也沒之前一年諸弟以君年屆耆矣而綜理家政勞勞不少休意不安固求分爨君不得已而後聽之猶語其子奎曰異日汝力有餘今雖分猶可挽使合也奎讀書有文名君令之會城就賢師友講習乾隆四十一年舉拔萃科君喜而復悲以若考之愛此孫特甚而曾不及見也其孝友之性始終亡間若此奎言君為人解紛周急之事甚夥然此猶小小者耳娶琴溪王氏有同德舅姑嘉其善事妯娌間咸宜之同居久而無間言以是益成良人之美云先八年卒君後補增廣生卒以乾隆四十二年二月二十八日年五十有九所著詩文藏於家舊史氏日余始識君仲子於逆旅中即以拔萃貢太學者也觀其言語動作類有養者已知其稟承有自居京師數月益與之習一日出所撰府君行述求余文且痛己之事親不及君之事親遠甚余於是竊喜向所揣之果不謬也夫世之讀書號為儒者往往徒墨守章句力不足以服勞智不足以治生若是則其親何賴焉君之命意唯恐其力不為父母兄弟用勞身苦思以安其親為儒者而若斯也其庶幾不為腐儒之歸也夫國子監生洪君家傳癸卯君諱翹字楚珩常州陽湖人國子監生祖諱山西大同府知府父諱公寀字豐旅大同君之卒也官督減城工銀數巨萬豐旅君一不以纍昆弟獨為償又受託趙氏孤耗其家遂為窶人君倜儻尚義有父風娶蔣孺人同邑臨安嶍峨縣知縣諱斆淳之女也有賢德安貧孝於舅姑君不憂內顧常客外謀養江行見溺者亟募人􅶚出之然志節高邁不肯為詬愈態以故遊不得志年三十八竟客死孺人與君同年生忍死代子職撫其二子三女咸成立二子禮吉迪吉也君沒時禮吉方六歲自小學以迄通經皆孺人親教之正句讀審音訓故禮吉學有原本一不染俗師之陋凡行事訓以恪守先世之舊一製衣亦不聽隨俗禮吉既能負米客外久衣或更其式母怒曰兒曹一衣尚隨俗即他事何以自立禮吉學有聞交遊漸廣貴人具禮幣聘為子師孺人必察其人信可者許為朋友賓主否則戒其子亟遠之娣婦余寡無依孺人迎與其寢處以次子迪吉為叔後葬三世七棺咸如禮監生君在日與通州盛聰交最善前所救溺人適聰弟也君喪在殯而里失火聰冒火翼柩出聰有一子年四十貧不能娶孺人約一歲所入舉其半卑之遂克成禮禮吉初試於鄉得乙榜貢太學孺人猶見之卒年六十有五禮吉後中乾隆四十五年順天試貢禮部為舉人易名亮吉舊史氏曰監生君無年而沒故其行事不少概見然其先世富盛時常施德於族姻里黨倘緩急有告宜必有應者而君寧客遊於外以治生又不能骩骳滑稽以取世悅而坐致困窮即此亦足以得其為人矣孺人之亡也賢士大夫為之誄者八祭文及哀辭各一為之志若銘者一為之傳者一盛矣哉非是母則何以有是子非是子則何以使母之賢得大彰顯有聞於時也余重孝廉之為人不容無言而諸君子之為母言者則既詳矣抑聞之夫者妻之綱也母實有賢德而事當繫於其夫故為洪君傳以明夫世德之相承固宜獲此同德之助也梅式堂小傳甲寅君諱鉁字二如一字式堂寧國宣城人姓梅氏徵君定九先生諱文鼎之曾孫左都御史諡文穆諱玨成之第三子也今與其昆季俱定居江寧上元縣余適濫席鍾山書院因得與君昆季時過從君厚重老成言甚簡至見之若無所得也既而思之甚有意乎其為人而樂與之親乾隆丁酉君試於鄉余欲讀君試文來候君閽者以病辭無何遂以不起聞矣視君之言語動作常相期以壽考而竟不然天道之不可問也如是嘗詢君生平行誼於其弟鏐越明年三月鏐始詳録一册以見示會文弨已辭席束裝啓塗不及緝綜藏之笥中有年俗事牽縈筆硯久不理每一念及輒耿耿難為懷今年甲寅理故篋得君之行實因亟托其大略書之君六歲喪母王夫人微好動旋即自懲創少長紀所聞儒先講論同異理道性命之旨為習傳録聞人之善久而不忘且樂傳述於人文穆公告歸後君侍枕履不少離出入或先或後而敬扶持之嘗侍疾數十晝夜親甚安之君猶以納溺器衾中指爪觸親膚為深疚遂終身勤爪翦王夫人既沒而徐夫人攝內主徐後文穆卒所親謂於制本不得持三年服矧覃恩明後年接開科宜急圖顯揚君泣對曰母視鉁鏐不異所生安忍異服於所生乎卒終三年喪君中江南庚午科鄉試乙榜得以貢生就順天試愛君者咸欲為之地君一切謝去於後遂不再就順天試重故交雖其人巳沒言及之輒怦怦然於其筆墨留遺者裝潢而什襲之唯謹樂引進故人子唯恐其遠而漸疏也座右所書皆針砭藥石之言疾革時神明不亂語子準云今歲鈔太公家訓未完汝其足成之太公家訓者徵君示子書也又語某晝價須償其他屬家人語率視此年四十有六妻崔氏先一年卒子二人準為伯父後次曰望孫女五人君長於古文不苟作詩及書法皆遠出輩流然未嘗以此自矜也手所鈔輯者取文獻通考議論之要者為大事論又纂三禮中典制為一書又選古文為內外編其勤勤纂述又如此嗚呼略舉君之大端誠不愧人之師表也巳盧文弨曰君貴公子又才望動一時達官貴人爭欲引君出我門下以為重而君坐紅塵中不異居深山不肯詭其道以求進至歷久而不渝而僅以一貢太學終其身知君者無不為君惜終亦歎介然獨立之能使其身完然而無玷也君弟鏐能詳言君之志事是亦不隨流俗者余悲君之不可見見君弟庶少有以慰余思也夫梁孝廉處素小傳癸丑梁君處素名履繩余益友也善讀書既擷其精並正其誤與其兄曜北相礲錯一時有元方季方之目余老而衰漫思考訂羣書有所遺忘及錯誤處素率為余審定之兩君皆厚余其氣象則曜北侃侃然處素誾誾然和易近人人尤樂親之曜北既棄舉子業專精史記學處素以乾隆戊申科舉浙江鄉試人咸意其發名成業之未有涯也乃再試南宮不遇歸途風日燥烈塵埃漲天熱氣中人毒甚然抵家尚無恙也會葬其先考侍郎公在山閲月餘親程畚杵之勞維謹塋面富春江時當秋末江風射人作寒君自以尚強壯不為意然而君之受病深矣兩害俱發臥牀未幾即失音越日而目已瞑矣余聞而驚訝往覘之信為之失聲長慟悲夫廣我見聞者之少此一益友也嗚呼君生宦家家門鼎盛祖則文莊公父則侍郎公伯祖太史蔎林公伯父侍講山舟公設以常人處此不為裙屐風流則為裘馬淸狂日以酒食遊戲相徵逐為事不復知有文字之樂者比比然矣君獨蕭然若寒士衣不求新出則徒步不以所能病人不以所不知愧人博學而能孱守之以故不涉於愛憎之口自其曾大父溪父先生以來學問文章照曜海內代精八法得其片楮珍同拱璧君克自奮厲繼承家學其於衆經中尢精左氏傳蓋其舅氏元和陳君名樹華著有春秋內外傳考證君復􅡔輯諸家之説而折其衷疏為三編先以其成者示余余讀而善之其續纂者尚未竟也遺草具在檢拾而加以整比焉此則曜北之責巳君詩淸新越俗向與其兄及所親合刻有梅竹聯吟集可見其崖略書法雖不名家然端謹不苟如其為人且通説文故下筆鮮俗字使老其材其成就烏能測其所至乃年僅四十有六而竟夭死乃乾隆之五十八年十一月三日也在梁氏失一佳子弟在宇內少一讀書人豈不哀哉君娶於曲阜孔氏孔氏多學人余友孔君名繼汾者君之外舅也以君處族黨間可以無愧色矣一子曰常孫曰王在長逝者固可無憾而未死者烏能免於憾也余頽唐之筆不足以為君重但為之志其略亦聊以抒余之哀而巳
