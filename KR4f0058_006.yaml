body:
  text: 東里盧文弨紹弓序五先祖春柳堂詩鈔小序丙申此先大父書蒼府君之遺詩也府君生七歲而孤家貧不能從師問業母朱太君自教之年十四豆創新愈即襆被出門為負米計稍暇則讀書書皆借之人遇所愜意作蠅頭字録置行篋中既常客遊遂廢舉子業一意為詩不假繩削而自工所交皆一時名士晚年與同好結為詩社其往來尢密者同里馮公山公景公亭北王公文白郭公庶蕃王公玉樞也詩稿多散失文弨自弱冠之年多方搜録綜為一編於後復請桑韜甫先生為料檢鈔之成四卷即今本也府君詩未嘗規摹一家期於達意而止然古風雅淡近律安和絶遠纖縟佻巧之習讀者當自得之文弨幼年大父親自督課授書之隙時時為説先代立身持家之道及生平所經艱險困苦之狀以相勗厲猶憶府君言少年買絲餘杭山中與館人同行歸晚山路犖確足繭不能亟前抵一空廟館人請府君憩其中己先歸爇松明為鄉導距其家可數里久之不至府君疑之屛隱處自匿既而館人來倉皇號呼府君察其意至誠乃出就之每自恨以孤露不能肆力於學常誦所作願違思道晚泣向邴原初一章聲淚俱下府君言行之詳有先考所述在今因檢點遺編覺音旨宛然在耳故輒以所聞者附贅之昔詩書乃夫子手定而其後人安國穎達為序之文弨是以不避狂簡撰為小序猶前志也獨不能為浣花之宗必簡斜川之繼老泉以是為無窮之愧耳汪津夫先生詩鈔序甲午先生名鑒字惟一一字津夫姓汪氏唐越國公之後也先世自新安徙餘姚當明神廟時有諱秉懿者為宜興之下邾巡檢與二子樹敏樹政領土兵殺賊衆寡不敵死焉二子奮擊殺數賊奪得父尸上官匿其事故不著幾傳而至先生父任雲南晉寧州吏目先生隨之官父卒歸費無從出曩時遠宦不幸而死者率火化之負骸骨以歸先生不忍晝夜悲慟聞者爭相佽助始得奉母挈弟扶柩歸里舟入漢江遇風將覆先生號泣呼天幾同袁昂之誓而竟免廉范之危人咸謂誠孝所感余師桑韜甫先生極重之與同事邑大儒勞餘山先生又因桑以交先君子道誼相孚先君子兄事先生如同氣焉先生間買舟上錢唐就先君子宿余方總角即樂親先生效越語先生不之責每為解顏以英異見賞弱冠後數以事至姚江輒朝夕先生所先生賣藥於城北之周巷門臨小溪屋後小圃植梅花此所謂梅津草堂者也好畫梅乘興揮灑別具生趣善琴作中州雅聲恬淡沖融一洗俗響之陋不樂治舉子業干仕進而獨喜為詩觸事抒情磊落傾寫不屑與文人墨士較正拙於字句之間然真氣旁薄陵轢一切豪邁之性躍然時露於楮墨之表自非曹蜍李志一輩人所得望其項背也自余成進士歸而先生墓草巳宿子孟傳以貧客遊周巷經火後並草堂遺址亦不復可辨為唏噓久之此詩二卷桑先生所定謂足以見其人桑先生於生平交舊或為之志或為之傳皆見本集中晚而序先生詩不及入集余故托其大略以補之先生嘗修家譜辨汪姓非出於汪芒氏援據甚確其先世諸節義事亦賴以表見云戴剡屛定邊雜詩序名元夔乾隆辛巳進士乙未昔唐姚合以武功簿攝縣事詠其風土至三十餘首後歷官雖顯而人猶以姚武功稱之顧武功在唐為近畿地其風俗物産與他郡縣無絶殊而合之詩上之無所歸美於其君下之又不能表彰勳德傳述其邑之舊聞詩雖多奚裨焉今剡屛戴君之宰定邊也甫下車而得絶句百首定邊為延綏門戶自勝國以前皆屬巖疆其外即套夷也明制文有監司武有副戎以共相彈壓其重可知矣我朝大一統之盛奔走臣僕罔有內外鄂爾多斯在套中最為恭順疆圉晏然康熙三十六年聖祖親征厄魯特曾駐蹕斯地眷戀舊勞臣邑人趙良棟遣皇長子弔祭經理其妻子僃至邑故為定邊營世宗時始改為縣兵額視前明減十八九及我皇上深仁厚澤澍濡含育戶口滋息嗚呼盛矣君也瞻行殿而歎儉德之隆覩和耕而識升平之福於篤舊旌忠則僃著君臣一體之深恩始終優恤之盛典更鑒於前明之寇患而益慶幸於百年休養之深其頌揚有體如此訪邑中節義之事奮筆為闡幽以及隱者藝之工者方外之勤於其教者咸甄録不遺焉至鳥獸草木之異可以廣見聞者亦以餘力及之邑故無志是詩也非即是邑之志乎此固非武功之所得而媲美者也君在縣僅四閲月以憂去官踰年卒於長安君室姚夫人理遺篋得完篇僅九十四首鈔之以傳餘尚改竄未定噫明之大盜張獻忠實生斯地流毒天下宜有歎恨而懲戒者君詩中顧不之及此豈即在所逸篇中邪雖然彼獻忠何足道而邑之大事實賴是詩以傳使後人稱君為戴定邊以配姚武功有過之無不及也靜志居詩話序丙申秀水朱竹垞氏輯明詩綜百卷剃前人之叢猥而正其訛者也其載諸家論説詳矣至其所自為説則目曰靜志居詩話意其必有成書然未之見也余謂古今詩人小傳嘗有鈔出別行者朱氏詩話似亦當爾但載在詩綜內則其所稱引舉目可尋其所增成辨析亦參互易見今鈔出自為一書則於辭義間有不得不少加增損者乃以餘間就為整理録成二十二卷導高楊張徐之源疏李何王李之派杜公安竟陵之濫其持論視前之人為近正焉余是以樂為著之乾隆四十一年嘉平月四日東里後生盧文弨序江愼修河洛精藴序乙巳道在天地間始也惟聖人能通之故圖書啓而卦象生於以開物成務冒天下之道以為創也其實因也孔子贊易知卦象之本於圖書故於大傳具明之劉歆始以為河圖授羲義因之而畫卦洛書錫禹禹因之而演範歧而二之其説顯背於聖人孟堅則知其相為經緯表裏矣然亦不能言其詳中間失傳至趙宋諸儒出而後大著後來儒者漸推漸擴或縱或橫因其體以究其用而圖書之妙作易之旨乃更發前人之所未發是非前人之智有所不逮識有所不到也而論説或有所未及者蓋當其時理適如是而巳風會日開智慧日出更加以引伸焉參伍而錯綜焉舉天下之事事物物無不有以要其歸於是左之右之皆逢其原一散而為萬萬合而為一其理可不外索而得使天之所以開聖人聖人之所以垂示後人者其道益大彰顯於時是乃聖賢格物致知之學不得視為懸遠者也向者吾友戴東原在京師嘗為余道其師江愼修先生之學而歎其深博無涯涘也無使轍之便竟不及其在日一親炙之其著書甚多流傳於世者尚少近歸安丁子小雅館於新安始攜所著河洛精藴內篇三卷外篇六卷見示受而卒讀凡夫天地鬼神之奧萬事萬物之賾罔不摘抉而呈露之於宋儒邵子朱子之説益加推闡更薈萃明代以及近時諸人之議論而斷其是非如數白黑然洵可謂大而能該雜而不越者也通天地人之謂儒非先生之謂乎余於前人若劉長民胡庭芳黃石齋之書亦嘗咀嚌焉愧未能以竟學吾師桑韜甫先生學於姚江勞麟書先生勞先生之學一本程朱以致知格物為首務故其説河圖洛書也理與數俱昭晰無遺即粗而至羽毛鱗角無不究其形象較其同異推論其所以然之故其以布衣終老於鄉里亦與江先生同異哉天不愛道乃使夫二人者皆有以得聖人之精之藴而道庶幾乎萬古不終晦矣勞先生之書吾師既壽之梨棗矣今江先生之書旌德黃君雲甫復版行之使有志於聖學者得循是而有悟焉是其為賜也大矣豈獨有功於江氏巳乎戴東原注屈原賦序丁丑吾友戴君東原自其少時通聲音文字之學以是而求之遺經遂能探古人之心於千載之上既著詩補傳考工記圖句股割圜記七經小記諸書又以餘力為屈原賦二十五篇作注微言奧指具見疏抉其本顯者不復贅焉指博而辭約義創而理確其釋三后純粹謂指楚之先君夏康娛以自縱謂康娛連文篇中凡三見不應以為夏太康宓妃之所在及有娀有虞皆因其人思其地冀往遇今之淑女用輸寫其哀無賢士與己為侶之意九歌東皇等篇皆就當時祀典賦之非祠神所歌九章無次第不盡作於頃襄王時懷沙一篇則以史記之文相參定薜荔拍兮蕙綢王逸釋拍為搏壁近代多不知此為何物乃引釋名搏壁以席搏著壁增成其義其典確舉類此夫屈子之志昭乎日月而後世讀其辭疑若放恣怪譎不盡軌於正良由炫其文辭而昧其指趣以説之者之過遂謂其辭之未盡善戴君則曰屈子辭無有不醇者此其識不亦遠過於班孟堅顔介劉季和諸人之所云乎余得觀是書欲借鈔既聞將有為之梓者乃歸其書而為序以詒之且慫恿其成云戴氏遺書序戊戌千古之業不為一時之榮而其道有兼得者則以遭際盛時搜羅拔擇不使魁磊宏碩之彥終沈霾於草澤於是出其所學上可以契於君而下亦可以孚於友以視稿項黃馘而一命未沾平生辛苦著述難必後世之有子雲者其幸不幸何如也吾友新安戴東原先生生於顧亭林閻百詩萬季野諸老之後而其學足與之匹精詣深造以求至是之歸胸有真得故能折衷羣言而無徇矯之失其著為説也未嘗使客氣得參其間泠然而入豁然而解理苟明矣未嘗過騁其辨以排擊昔人而求伸其説其為道若未足以變易當世之視聽而實至名歸一二名公卿賢士夫灑然異之聲譽遂隆隆起天子開四庫館以網羅放失讎校之司必得如劉向揚雄者方足以稱上指東原用薦者以鄉貢士起家入館充校理命與會試中式者同赴廷對洊升翰林天下士聞之咸喜以為得發抒所學矣閲四三年而東原以勤於其職致病竟不起此又天下士所為同聲惋痛者也東原在館校定大戴禮記水經注五經算術孫子算經等書既巳官為􅡘行而其遺書尚夥或不免有零墜之患意獨竊竊然慮之今年春得曲阜孔君葓谷書則巳為之開雕以其先成若干種寄余余於是大慰東原於是乎為不亡矣蓋人能為可傳而不能使後世之必傳況乎學朴知希不知則不愛不愛則一聽其紙刓墨敝鼠嚙蠹蝕而無肯為之收拾古今若此者多矣葓谷嗜學若飢渴之於飮食尢好表章古人之遺文墜簡嘗校梓唐人所為五經文字九經字樣訛者正之疑者闕之東原見而喜其精審為之作序固宜其臭味之無差池也今不以死生易慮而亟為版行其遺書以公諸天下之同為是學者使諸老師碩儒一線相延之緒不墜於地而常有人焉踵起代興以益光我朝右文之盛治其功良偉匪特不負良友而巳東原之書出天下後世必有能闡揚之者余是以不為東原惜而且為東原幸轉以惜夫古人有是學而或不遇其時當世又無知己以致灰飛煙滅徒有其目而卒不得見其書者之尢可歎也孔百城補杜氏釋例世族譜序甲辰杜當陽既為春秋左氏經傳集解三十卷又著釋例四十卷其長歷本之劉洪乾象歷地名本之泰始郡國圖世族譜本之古史官世本今惟集解盛行而釋例幾隱隋志僅十五卷疑亦未全之書曲阜孔農部葓谷訪得長歷地名兩種善不先梓以公諸世而世族譜則殘缺特甚長公孝廉百城廣栻有意補之凡二十九國又小國四十四國其末以古人名譜終焉所采輯多據孔氏正義他若馮氏之名號歸一圖並近代馬氏之世系圖名氏譜程氏之春秋分記雖皆不能無所失然亦擇其是者而從之於是此書乃粲然復明於世余惟譜諜之學古人所難三王以前固難考巳若當春秋之時交際往來紛紜錯雜經與傳殊即傳之中或名或字或爵或諡亦無一定使不為之甄綜而薈萃之其能三桓七穆條疏無滯者幾人哉考崇文總目有唐人演左氏諡族圖五卷明焦氏經籍志尚有春秋宗族名氏譜五卷春秋諡族譜一卷春秋名字異同録一卷近亦多未見雖然由唐而來其可訂補者今皆僃於斯矣固亦無籍於諸書之參證也百城索余序諾之有日不果作今忽聞農部君新棄養其志業之未竟者深有賴於後之人此書亦其一也因亟序而歸之余之所望於百城者大蓋不僅以近時虞山毛斧季晉江黃俞邰輩相比擬而即為子道之無忝也重刻何注孔子家語序丁亥孔子家語惟明末虞山毛氏汲古閣本為猶見王肅之舊考之唐人注書所引合者為多然訛舛亦復不少此外刻本皆刪削不完失其本真余試郴州日有明何文簡公後人泰吉以公所注孔子家語來上注簡核明切其徵引諸書同異復極詳備其家欲刻是書然鈔本訛脫至不可句余惜其功力之徒勤也許為校訂至年餘乃粗就緒而官齋所有之書不多其所不知猶闕如也何公此本當亦綴緝而成由其未及見毛氏本故耳然顏師古注漢書藝文志家語二十七卷云非今所有家語也則唐以前其本業巳不同吾又惡知何公所據之本之非古邪公又嘗注大戴禮問其家已失之故不能並梓以行世今泰吉唯恐此書之復失墜也兢兢寶護唯謹又力為之表章於世使為人子孫皆如此則其先世手澤咸可無散佚之患已何公序此書年月不同今從集作宏治但注中載有正德年所上疏故別本有題正德者然固無妨序先出也注所未僃間為補之並偶附管測於後與本書不相淆亂惜乎何公不作不獲一就正之其能無遺憾也哉新雕柳仲塗河東集序乙卯聖賢之所以垂世而立教者莫著於六經後人誦法六經闡發聖賢之微言大義以啓迪夫後知後覺者於是著而為文此文之所以為古而始足重於天下然則所謂古文者非古於辭之謂也言古人之言此文之所以古矣宋興承五季經學廢絶文章骩骳弊極之後有能卓然特立不為風氣所囿奮力直追古之作者以求其所以立言之旨而一本之於經術示天下以正路之當遵而使後來之聞風而興起者益張皇而揚厲之天下事作始也難承藉也易人但見後來之閎肆彪炳浩博無涯涘而因有狹小前人之見以為氣鬱轖不宣通辭艱澀不流暢幾使不得與於立言之數噫此豈可謂善於知人論世者哉吾於宋初柳仲塗先生之文而歎其能近於道也其言曰古文者非在辭澀言苦使人難讀誦之也在於古其理高其意隨言短長應變作制同古人之行事是謂古文吾若從世之文也安可垂教於民哉又曰吾力學十餘年非古聖賢之所為用心者不敢安於是棄俗尚而專古者非樂於人而取其貴者也獨宜其自知而自樂矣又曰吾初名肩愈字紹元既肩且紹矣懼其畫也又欲進其力於道故易名曰開字曰仲塗謂將開古聖賢之道於時也將開今人之耳目使聰且明也必欲開之為其塗矣使古今由於吾也吾欲達於孔子者也其言如是可以觀其志之所蓄而文之有本矣孔子曰狂者進取周子曰賢希聖有志之士自當以聖人為師安得怖其言為河漢也其文集好事者雖相鈔傳而無有任剞􅕻者今蘭溪柳生書旗承其尊人之命得善本而付之梓此非但一家之書也學者觀此可以廣已而造大必先足乎已然後可以及於人而古今聖賢垂世立教之心得以綿綿繩繩相繼於不墜是斯道所重賴者也豈獨以其文哉考宋史本傳其居官也有剛􅍘之才先幾之識治績舉皆有過人者更非徒託空言以自見者矣後有志士讀其文思其人得不激昂而思自奮與吳國山碑考序乙巳吳封禪國山碑孫晧所立在今常州荆溪縣西南五十里其文始著録於雲麓漫抄厥後吳人盧公武考之加詳焉沈敕荆溪外紀及唐鶴徵常州府志亦僃載之然俱不能無訛誤且其文字可讀者尚多而率皆遺脫蓋由其地處僻人罕得至但得椎拓本摹之故不能以細辨也海寧吳槎客客遊宜興好古搜奇不憚危阻嘗再三過焉於其文之摩滅者咸得審其界埓一一而指數之合其有文者共得四十一行凡千有餘言與趙氏金石録所紀數略相等他皆不及也於是為之圖説為之釋文為之考核辨正並薈萃古今人題詠及古迹之與是山鄰近者咸裒為一編名曰國山碑考余觀其首辨陳壽吳志之誤曰是碑天册元年所立吳志書於天璽元年此不辨碑文之過也碑云旃蒙協洽之歲受上天玉璽乃以柔兆涒灘之歲紀號天璽丞相沇等咸以為宜先行禪禮云云則是天璽之前一年也又碑有國史瑩核等名核乃華核考本傳以天册元年免官益知不在天璽明矣其言鑿鑿有證據類如是晧所立碑又有所謂天發神讖者今庋江寧學宮康熙間祥符周雪客嘗為之考矣此在通都大邑得見者多而是碑久隱翳於榛莽虎豹之區微槎客之天機淸妙興寄高遠者為之一抉其祕即今何由得見以證昔人所紀之誤哉雪客所為考秀水朱錫鬯為之序今槎客之書實遠勝於雪客本不待余言而余之視前輩復不逮遠甚聊因相厚之意遂為之引其端寧足為是書增重哉乾隆五十年正月十日盧文弨序居官必閲録序丙子天下有生而嗜殺人者歟無有也至當官每敢為殺人之事刑罰不中此特其一耳水旱之不恤賦役之不均庶事之不理舉皆可以殺人苟非殘酷不仁之極推其本心豈樂於為是者及其為之則又若迫之以不得不然是何也毋亦利害之見殽於中而有重於去官之心也歟古人有言自安之道在人之死斯豈獨治獄為然哉夫為身計即不暇為小民計以為利可苟得而害可苟免也然其實正大不然以豫所見近世行事多矣間歷觀史家所載天人感應之理益彰彰焉每欲輯古今吏事係勸懲者為一書及見葉氏此編乃先我而為之真為治者之龜鑑也因即元本略加校讎重梓之以廣其傳然此豈徒以冥冥決事哉今天子惠鮮懷保唯恐一夫之不得其所仁心仁政駕漢文景而上之凡封疆大吏以及郡縣之長循良者膺顯擢貪酷者被重譴然則擇術者將何從乎夫為循吏者有賢名又法之所賞也而其子孫俱被其澤為酷吏者有惡名又法之所惡也而其甚者身死妻子為戮此雖至愚亦曉然於利害之數不同若是縱不為民計亦當自為計夫利害之説儒者所不道乃臨事而是非熒惑好惡貿亂此其智居何等也夫眩於利害者還以其事明之子故喜斯編之有功於世甚大也若乃徒慕輕刑之美名而適以縱姦養亂此正朱子所謂鄙儒姑息之論異端報應之説俗吏便文自營之計耳豈非殺人之尢者哉豫既推廣斯編之意而又為明其指如此庶讀者可無誤焉杜詩雙聲疊韻譜序壬子雙聲天籟也童兒婦女生無石師而矢口成音無不暗合者古人制物之名制事之名與夫形容倣佛之辭罔或不由於是蓋一本於自然而非強也若其聲之同部連用者謂之疊韻則又顯而易明者矣虞書曰詩言志歌永言聲依永律和聲詩序云情發乎聲聲成文謂之音聲者宮商角徵羽也鄭氏謂宮商上下相應單出為聲雜比為音今取唐虞之詩考之舉未有不然者本自抒其情志而律自隨之耳三百首篇窈窕為疊韻參差為雙聲其他不勝枚舉後人始以字母求之而作詩者初未嘗勞勞於是也唐杜少陵固所稱細於律者故能不失乎和聲成文之遺意後人習其讀而置其律之嚴於不問烏在其深於杜也海昌周君芚兮於是有杜詩雙聲疊韻譜之作舉非余肄業之所嘗留意也蓋自童年就孰以來音沿鄉俗逮長即不能變其所習嘗見何屺瞻先生之評李義山詩凡句中雙聲皆一一標舉之並有隔一字兩字而遙應者友人中如戴東原震段懋堂玉裁吳槎客騫錢學源塘獻之址兄弟錢廣伯馥咸所通曉余雖浸淫涵濡而卒無暇取古人之詩一一辨其離合也今周君之為是譜也浣花之外又傍及諸家其勤勤如是蓋欲明乎詩之本旨由少陵而溯三百以示後人之所當宗庶乎志和音雅而舉合於律將見詩教之益盛也或曰詩以言志達情爾如必拘拘於是得毋舍本而專治其末乎余曰不然彼不能詩而強為詩者即逐字以求其孰平孰側也尚難而能詩者初未聞其如是也彼詩人之以雙聲與雙聲若疊韻之相為配偶也亦如諧平側之一出於自然而巳非強探力索而始得之也又何害乎性情哉蓋上古人人皆明之故不必言至六朝乃始有明言雙聲者南人若劉協北人若楊衒之其書可考也今人苟不知此亦為闕事矣周君此書已有王光祿錢詹事為之序矣余又徇其請而為之將使人謂余強不知以為知也其又奚辭輯盧子幹禮記解詁序庚戌余壯歲見朱子之言曰後漢諸儒説禮甚有功而於吾家子幹且獨舉其名意竊慕之考後漢書本傳載其作禮記解詁而隋唐志皆云禮記注當由後人改易本名其卷則二十諸書略同後人無傳者余思就所見纂輯而服官少暇繼又奔馳道塗終於不果歲月空擲念之未嘗不內熱也武進臧生在東研求遺經志甚鋭力甚勤慨然補余之闕日度不盈六十而所輯巳裒然成卷録以遺余余得之喜甚凡諸經之義疏史籍之所載無不捃拾即衆家相傳文字音讀之異同一字一句罔有遺棄而所可見者乃不及十之一豈不甚可惜哉當日子幹與鄭康成同事馬融今鄭氏三禮注毛詩箋得唐孔賈諸儒為之條疏而書大顯餘若周易尚書及尚書大傳雖巳散失而後人為之掇拾其卷軸猶不甚約乃於子幹後世至不能舉其書之名莫為之後雖美不傳猶幸今有在東其人以英敏之資乘精鋭之力不為則巳為則必成余為盧氏後人乃悠悠忽忽以迄於今而得安享其成幸之甚愧亦甚焉夫子幹有功聖經一生言行無玷大節炳炳著史䇿乃明人張璁輩輒妄為軒輊黜其聖廟從祀而改祀於鄉吾里杭堇浦前輩有請仍從祀議在集中其事不果行然公論自在天壤必有能繼請者豈余小子私以為氏族光哉因讀此書而並附及之爾雅漢注序己酉不識古訓則不能通六藝之文而求其意欲識古訓當於年代相近者求之爾雅一書舊説謂始於周公孔子而子夏暨叔孫通輩續成今臧生在東從揚子雲鄭康成之言􅍘以為孔子門人所作其為注者漢有犍為文學樊光李巡魏有孫炎為反切之學所自始是皆説爾雅者所必宗也今唯晉郭璞注盛行而他皆失傳郭於古文古義不能盡通往往以己意更定考古之士病焉幸李孫諸人説時散見於唐人諸書中其為郭氏所棄而不取者説顧往往勝郭在東篤好古義遍加搜輯􅡔成三卷庶乎遺言之不盡隊也夫時之近遠猶夫州土之各異以吳人解越人之言縱不盡通猶得其六七燕秦之士必不逮焉故吾亦不謂李孫諸人之解之盡得也然其是者必賢於後人所見在東勤勤掇拾能引伸其所長而不曲護其所短由詁訓以通經學斯不難循塗而至矣吾因以知宋人若陸佃鄭樵之更不足尚也與其陸鄭之是從又無寧郭乾隆五十四年陽月既望杭東里人盧某序弟子江寧王德輿求輔校抱經堂文集卷第六終
