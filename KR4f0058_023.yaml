front:
  text: 抱經堂文集卷第二十三
  hash: sha256:0a6d65fbd931fbfbfcee93dc374e7033079b826e7002900ab63a83da9e4192b8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0058_SBCK_023-1a}
body:
  text: 東里盧文弨紹弓䇿問廣東鄉試策問五首乙酉問經學昌明莫盛於我朝欽惟世祖章皇帝御注孝經敦本培風提示親切聖祖仁皇帝御纂周易折中繼有春秋詩書三經傳說彙纂之輯重經世宗憲皇帝正定頒行莫不深醇美僃廣大精微我皇上道協唐虞思通洙嶧欽定三禮義疏探制作之大原正諸家之異說積疑聚訟一旦豁然以解士欲通經其可舍周行而遵曲徑乎今試舉其略用以覘所習焉易更四聖旨何以不盡同辭占象變廢其一豈全易乎舜典合於堯典後人何以析之復增之性道之奧多見於古文乃有疑其文不類者至工魯齊並今文亦疑之得無謬乎六義分三經三緯而或以為南本不繫風又因豳雅豳頌而謂風雅頌亦可隨篇求之然歟否歟春秋魯史不傳於何知聖人所筆削三傳敘事與斷制孰優周禮一壞於歆莽再壞於安石寧可即議本書之失井田溝洫其異安在儀禮為經禮記為傳遷廟釁廟亦皆孔壁之遺禮運明堂或議漢儒之駁楊信齊之圖衛正叔之解學者尚有能參考者歟經之深者非可以約言盡也宜就所問者各條舉件繫以對問大學一書僃天德王道之要盡綱領節目之詳自程朱表章而後西山真氏為衍義一書論議正大條理秩如自來每以之進講顧其書於八條目獨闕治平此瓊山邱氏所以又從而補之也夫德修於身舉而措之天下無難語其功則較易舉其數則綦繁真氏之書主於理理足以兼該而本無疏漏邱氏之書主於事事欲其考鏡而非務鋪張將母所補在治平而所助乃在格致歟真書以崇敬畏戒逸欲二者為誠正之要而邱氏又益之以審幾微則尢為正本淸源之論真書格致之要有曰審治體而邱氏又有正朝廷一門其首總論朝廷之政似若復而非復者何也有明宦寺之禍不減漢唐而書中引古獨未之及僅於正綱紀之常引朱子之言近習者以微見其意豈有所畏避而不敢頌言歟抑當化治兩朝璫焰尚未如前此後此之甚故可略也至其相業亦果能即坐而言起而行歟邱書之後補之者又有湛氏之格物通孰為勝耶我皇上敕幾宥密廣運健行治功之盛亙古未有邱氏所言聖神功化之極者正於今日覩之多士將欲黼黻太平贊襄盛治亦未可以無具應也其必有以為拜獻之先焉問揚粵奧區人文蔚起自漢以來陳元士燮輩闡明經訓啓迪鄉人五嶺之閒彬彬嚮學矣唐韓昌黎氏蓋因文見道者初宰陽山後官潮海此邦人士樂從之遊其時身領學事排異端而宗孔氏者孰為得其傳歟有宋理學昌明濂洛之書傳於嶺表其濳心誦復踐履純熟者何人朱子集諸儒之大成粵人克自樹立聞風景從者約凡幾輩他若服象山之教及南軒之門其行誼皆可得而詳歟明儒推白沙陳氏學有淵源而江門風月自得之趣為多所謂靜中養出端倪者與先儒主靜立極之旨果有合歟湛甘泉為白沙高弟講學之盛與餘姚王氏幾分左右廣一以隨處體認天理豎義一以致良知明宗別戶分門彼此互相排擊而通兩家之郵者又謂說有不同理無二致然歟否歟至如瓊山之朱子學的東莞之學蔀通辨均為有功正學楊起元晚出請業近溪所著天泉會語論者謂近於禪宗然考其行己立朝亦何愧儒門實踐歟我皇上聰明睿智學貫天人重道崇儒表章往哲其於理學真僞判若黑白爾多士務悉去黨同伐異之見盡徵文考獻之長孰正孰歧孰優孰劣素所切究僃著於篇問官先事士先志衡門伏處之日功業尚未見端而規模本可素定故入學離經即觀其辨行義達道必始於求聖人每使羣弟子各言志夫志學志道其所同也而有異焉者將學有淺深而於道固莫之外歟抑士各有志雖同師聖人而不必強為似歟孟子言尚志而大人事僃得志則澤加於民聖賢本懷無不期於用世者春風沂水與老安少懷一也乃或有言志於道德者功名不足纍其心道德功名有異致歟且古所稱志士又何等也所稱肆志又何為也濂溪云志伊尹之所志苟欲以古人為圭臬即三代而下如正誼明道淡泊寧靜先憂後樂若斯之流亦有為生平所嚮往而必欲企及者歟抑將追攀屈宋頡頏淵雲而以為不朽之盛事也聖天子振興士習樂育羣才以為器使之地多士涵濡於教澤深矣豈徒志於溫飽沾沾以決策發科自囿哉其勿夸勿飾各抒所蘊毋隱問從來圖治必首安民安民必先擇吏周官使民興賢出使長之使民興能入使治之凱以強教弟以悅安如此而後可以為民父母子産憂尹何之傷聖人責子路之佞誠愼之也我皇上子惠元元澄淸吏治愼簡於入仕之初考績於既任之後賞不踰時罰必當罪聖天子求寧求莫之至意申命不啻再三所以循名而責實者其可不豫為講求歟嶺南利兼水陸物産多奇仕是邦者故以不貪為寶若孟嘗珠還合浦吳隱之酌飲貪泉李勉盡棄犀珍包拯不持一硯徑節淸風至今彰彰耳目夫猷為必要之以守能善所上者曰廉然民之所望於上者正不止此也漢之循吏宦斯土者則有衛颯許荆其後政績卓越者何人至如羅友之政舉大綱陳堯佐之治稱淸簡其亦撫綏安輯之善道歟是故江海之濱水利宜興也治之不得其道則塞故瀆開新渠荒地未及墾耕而熟田巳憂旱潦山嶺之區樹藝宜亟也勸之不以其漸則督里胥疲父老奉行徒循故事而優纍巳在民閒以至嚴盜賊之課則外洋與內地各異其宜修化導之方則俚猺與齊民各因其俗是皆在良有司隨地變通而不可以膠柱鼓瑟者語曰有治人無治法將何道而使明作不失之擾寧靜不失之弛歟諸生學古入官有社有民匪異人任通達治體方無虞學製之譏況桑梓之邦見聞最悉其以平日之盱衡抵掌者歷陳之湖南科試諸生策問九首丁亥問聖人之道載於六經自漢唐以來代有詮釋於微言大義亦各有所得歟至有宋朱子可謂集諸儒之大成矣其所著如論孟集注大學中庸章句或問易本義詩集傳多不沿用舊人之說而獨闢新義其精粹切當遠勝注疏者何在諸生講求有素盍僃陳之永順問選舉之法代各不同漢制郡國舉士約有三途其猶有古鄉舉里選之遺意否歟魏晉以來名目漸繁至唐有曰生徒曰鄉貢曰制舉其目有秀才明經進士諸號其制科又各因事立名皆可詳述歟漢有對策射策唐初亦用䇿試後來詩賦之試起自何年又有州府試省試館試監試吏部試翰林試名目不一臚舉其源流以對長沙問河圖洛書相為經緯八卦九章相為表裏其說云何十翼孔子所作而或以說卦等傳為經師所為果有證與詩序不可無而書序可不必有其故何也堯典繫以虞書二南兼有平王以後之作頌之取魯與誓之取秦皆有說與三傳經文不同二戴增損各異能臚舉其概與我皇上聖學淵深欽定三禮邇復頒周易詩經春秋於學官大道昭揭洵日月中天之會也多士研習有資其各以所得對寶慶問學校之設所以教育人才使德行可以式鄉閭功業可以經邦國凡皆由此選焉其制昉於何代詩禮左傳王制孟子所言三代學名同異可一一臚舉之與五教四教十二教以及周師氏保氏大司樂之所教詳略各殊何也漢唐以下有盛有衰試言其故州縣有學與教官之命於朝起自何時其教之法以何者為最善我朝德化翔洽文教盛興內外學校既有專官課督而又有書院之設與夫苗猺溪峒之地皆建有義學賜金發帑於古未有倫比爾諸生宜何如鼓舞奮興以稱聖天子作人之雅意與其各言爾志毋隱靖州問制義代聖賢立言其體創自何代有明用以取士初尚簡質自化治以後日趨於文其一代盛衰之變試衡論之王唐瞿薛與夫歸胡金陳諸大家之文其所師法何在自餘諸名家可為之羽翼者何人西江雲閒各樹一幟孰優孰劣我朝文教覃敷儒風丕振百餘年來作者幾於指不勝屈聖天子加意作人多方訓迪以文章關乎運會欽定四書文垂示正鵠猶復誥誡頻頒慮好尚之不一致流弊之復萌特申科場磨勘條例凡字句之不雅馴者分別停罰示警爾多士涵濡聖化更當爭自濯磨使文與行竝軌於正固無患其多而不揚也功夫何在宗仰何人其各舉以對沅州問力役之征自古有之周官小司徒頒比法於六鄉之大夫以行徵令而施舍之仁亦竝著焉其法別其地之美惡遠近校其齒之盛衰均以歲之上下至為詳僃漢有口賦率人出錢而田之租反薄蠲免之典時行唐有租庸調之法役多則免調更或並租俱免其與周官之法同異若何或亦師其意而不襲其迹歟宋時民苦役纍後定為顧役之法又有謂其不便者何也明初輪甲承直後乃行一條鞭法民稱其便乃未幾而里甲之費如舊豈非姦胥蠹吏之為害歟至我國朝丁糧之外竝無雜徭欽遵聖祖仁皇帝諭旨滋生人丁永不加賦我皇上念切閭閻不肯輕用民力計役給直人忘其勞但各直省相沿舊例不能盡同賦輕者差繁賦重者差薄殆亦因地制宜之道歟召之役則往役義也優免之恩出自上而急公之義在乎下乃有嘵曉不平者此豈得其道歟湖南通省歷來役法若何其各以所知對辰州問經以明道傳以翼經孔子作十翼而易道興後人入彖象文言於卦爻中次第果無失歟詩書皆有序後人略書序不道詩小序出於子夏或以為衛宏所作或以為出於國史然歟春秋三傳左氏紀事公穀解義乃習春秋家近宗胡氏而三傳束之高閣何歟禮記有夏殷之制又有秦官刪小正而載月令其何以說周禮致太平之書或云草創未行其官制與他經不同者何在冬官之屬亦尚有可考者否其條舉以對常德問古之所謂士者周禮之上中下士皆有職事者也王制之選士俊士皆次第拔擢而升之者也非此二途有能束身修行誦習詩書者則亦號之曰士其分則未離乎氓也庶人也君知之則宜以道自重君不知則宜以分自安孔子謂貧賤不以其道得之不去也孟子謂往役義也士之自處固當如此聖門諸賢有在縲紲者矣有與卒三百人之列者矣踰溝用矛不避鋒鏑此獨非士之所為哉爾等幸生聖朝享太平之福久矣事三如一為士者正宜率先為四民倡方無忝乎讀書明理之實而乃小有不平動輒告訐深仁厚澤一毫無所報效此則莠民也惡可為士其試陳士之所以為士者若何歷代士習之淳澆士氣之盛衰可以為法戒者何在亦具言之澧州問史之與經異用而同源尚書春秋聖人之史也進乎經矣後世祖之分為二體可得而析言之歟編年可以見歷朝之盛衰紀傳可以綜一人之本末則編年優矣而古今皆以紀傳為正史何歟史漢三國史家之圭臬也乃自范蔚宗後漢書以降名為沿襲實乃變更一人一傳竝無通貫錯綜之法此豈遷固陳壽之舊歟史有成於一家者有成於衆手者其得失若何溫公通鑑朱子綱目年經事緯法戒昭然固當度越諸史而小小舛訛亦多不免將無上下千古固非一人精力所能求其盡善歟我皇上萬幾之暇博覽舊文特命儒臣仿編年之法統加纂輯一事一言悉經睿定此當與六經竝垂不朽雖涑水紫陽咸謝不敏矣又焉論其餘哉爾多士有志欲窺天祿石渠之盛者盍姑就所聞於古者以對嶽州擬策問一首癸酉問書者六藝之一天地閒道器罔不該焉易曰百官以治萬民以察記曰書同文書之為用綦重矣自古文變為大小篆篆又變為隸楷隸楷又變為行草其遷易之故可得言歟秦程邈為隸書而閣帖中乃是小楷衛恆稱上谷王次仲善隸書始為楷法晉書稱王羲之善隸書其子獻之工草隸書將無隸即楷歟歐陽永叔以八分當隸然二王八分不概見而楷書世多有本傳所稱究何指歟我皇上多能天縱道藝兼該八體六書無不洞晰萬幾之暇親灑宸翰神明變化動與古會非㞕㞕臨摹可比頃出內府所藏自鍾王以下諸名家墨蹟鉤勒上石以垂永久名曰三希堂石渠寶笈法帖洵藝苑之大觀也至若睿鑒之精聖􅍘之允尢為亙古未有其視宋人淳化閣帖豈直倍蓰過之夫閣帖之初刻也論者謂當時奉詔集帖之人苟於書成不知研考頗有僞蹟濫廁其閒今能一一辨之否歟觀其首列漢章帝書何以所書者乃梁周興嗣千文也梁武帝評諸家書可能舉其略歟有謂書學盛於魏晋至唐漸衰又有謂唐以書取士故士多工書何其說之異耶少陵論書貴瘦硬東坡不以為然何歟宋以蘇黃米蔡竝稱蔡京書人弗之貴或乃以君謨當之豈非藝亦以人重歟公權筆諫之言朱子作字甚敬之旨可得而闡其義歟多士其勿視為小學也願以通乎大道之指歸焉弟子丹徒趙震楚榮校抱經堂文集卷第二十三
