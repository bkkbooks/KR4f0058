body:
  text: 東里盧文弨紹弓志銘附哀辭祭文贈奉直大夫煥文吉公墓志銘癸未公姓吉氏諱曦曜字煥文鎮江丹陽人也先世自山西徙焉四傳至邵武府同知貴和明初以孝弟徵入官廉惠著聲郡志書之其在嘉靖時有御史棠上疏斥張璁桂萼之議禮為曲學阿世及請召還故相楊一淸事皆見明史是為公五世從祖祖諱象乾有二子伯諱大兆公考也仲諱大祥兄弟白首熙熙無間言仲老無子而公考有子三人遺命以季子為仲後即公也公事所生所後生死咸盡禮伯兄居外久公獨與仲兄偕家貧棄舉子業治生以為養家漸饒撫諸子姪如一同居數十年齒益繁所親數以析産諷公一日與仲兄大治貝召親黨飮宴與者私相語此必議分析事也其目兩老人則見笑談甚洽諸子若孫咸雍雍列侍各以次捧觴為壽語不及家事在坐莫不嗟歎極歡而罷後遂無復言者公性簡重其教子微示喜愠之色諸子莫不肅然敬憚相與砥礪學行顯聞於時子三人長夢賚鄉貢士黟縣教諭次夢熊乾隆十七年恩科進士入翰林改御史次夢蘭乾隆二十二年進士庶吉士夢熊之初授御史也公貽書舉練溪公故事以為勗且曰人臣知無不言之謂直言無不盡之謂忠凡進言務識大體不當毛舉細故其要尢以積誠為本練溪即在前朝疏斥張桂者也乾隆二十四年公喪長孫繼又喪庶常君哀慟遂得病以明年八月五日卒於里居之正寢享年六十有九覃恩封修職郎晉贈奉直大夫妻錢宜人女二人湯登嵩丁翰賓其壻也孫九人禮庭春庭芝庭藝庭昌處士璜士琛士英士琦孫女九人御史君既卜葬公於先人之壠而以銘屬其同年生盧文弨銘曰彼韡者華承以跗有藟者葛綿者瓜和氣所集荆不枯後昆繩繩肥厥家峩峩一豸昌言敷坐見畿甸疲氓蘇翁之教也遺譾拘亦欲侃侃追前模銘幽宮者其人盧以貽來葉辭非誣贈中憲大夫鄉飮大賓作菴劉公墓志銘戊寅乾隆八年豫始晤香山劉舍人於外家張鳳麓先生所先生前以學士典學粵東舍人所首拔士也學士門下士豫不盡識獨識舍人愛其淳厚退讓有古君子風因以知其稟承於家先生作菴公者有素舍人歸里後越十有二年而舍人之子有官比部於京師者相見亟詢其大父父皆無恙為之喜甚是時作菴公年九十有九越明年百歲例得以建坊請大吏以聞朝之貴人重公名德壽考亦相率為詩文以夀而公乃即於是年捐館舍是為乾隆二十有一年二月二十日也舍人將免喪復來京師盡輯諸公前所為壽言什襲之以歸見公之生平可徵信者如此歸即將營葬事求文以納諸幽於是以狀來請豫交公之子又交公之孫雖不文義其可辭案狀公姓劉氏諱淸字泳斯作菴其號先世在宋時從彭城遷香山之德慶鄉傳至公十七世父長祚母方氏生公八歲而孤母守志翼公於成居貧藉女紅以得食及公少長痛其母之劬也乃慨然棄舉子業以治生家漸饒母乃顧公而泣曰而父夙嗜學不幸蚤世不顯余年草八稱未亡人流離荼苦常恨不即從而父於地下不圖及見今日然乃父之志其尚不止於是公聞之長號失聲因是課舍人兄弟頗嚴延名師以教之至今子若孫皆讀書守禮為儒者起而仕宦皆有聲公好行利濟事邑南木橋久不治公易以石西有岐江設義渡便往來者歲飢出私穀千石佐振常為邑人倡有佃死孤弱婺矛牙失田無以活遂弗易佃租入不足一不問其他施濟多類此晚年以家廟未立居常怏怏及告成舉祀事扶杖詣廟肅衣冠載拜乃大喜邑中歲兩舉鄉飮酒禮公常為大賓以子貴敕封修職郎晉文林郎又以孫起鯤貴復貤贈中憲大夫娶徐氏贈恭人先公十年卒子二人長錦金華縣丞次濤辛酉科選拔貢生內府中書科中書舍人誥封中憲大夫女二人李英光鄭燕其壻也孫十人孫女五人曾孫十六人曾孫女十一人元孫二人元孫女一人銘曰既富且壽康寧考終惟德攸好惟福攸崇既醉之章爰僃五福從以孫子克享天祿何嗇於若考豐於厥身匪唯豐身利其後人母節子孝宗緒是延天之報施豈曰偶然鴉鷯之原祖魄所藏後先百歲鬱然相望不崩不陀不震不泄貞珉在中永不磨滅鄉貢士盧府君墓志銘庚辰府君諱國佐字遜及號均疇與余同出自涿世居永定之大塘凹祖諱珏邑諸生父諱某舉丈夫子六人君為長康熙五十六年舉於鄉再上公車不第以乾隆二十年某月某日卒年七十有二娶某氏有子七人其第五曰如纘挾化居術寓揚州乾隆二十四年余往揚州如纘聞之來見余曩與其宗人監利縣丞殿人者敘昆弟之好如纘輩行與之同而齒長於余亦鴈行也謂余曰吾將以明年歸葬吾父以銘丐子不知為狀余謹謝不能他日至越永定族人多有在越者教諭觀源亦適以討偕至與言及之則知府君素為鄉黨所敬服其欲為義而不克者推府君為倡即事無不集事有紛糾不可理者府君發片言人不敢有異議兄弟怡怡如也終身無幾微辭色之忤噫可為有德君子矣乃為之銘曰為善於國不如為善於鄉君有太邱之德不以之自名有彥方之化不以之自功殁巳逾紀而鄉人懷之至今不能忘吾得於君之子者略而得於羣子姓之口者特詳有高者邱魄所寧耶子孫賴之後其有興耶待贈文林郎增廣生毅齋陳府君墓志銘丁亥夫不知其父兄觀其子弟而可矣海陽有陳生雄略者乾隆三十年余奉命主廣東試所貢士也其文閎以肆甚愛之既乃延之湖南學政署中所往必與俱衡校文藝極精敏嘗從永順放舟而下灘流湍悍舟回轉顚簸於洪濤巨浪間幾不測又從辰赴沅適大兵之往滇者亦將至昏夜疾馳雨甚山路犖確澗水奔注砰訇若雷擔夫皆股栗生自若試嶽州日驕陽酷熾通夕汗沾濡蚊虻噆人肌膚交扇揮之不去生於此時秉燭披閲達旦不言勞噫余何以得此於生哉生將辭豫歸豫尚欲生留則以告曰雄略將卜葬吾母也且請曰昔先君子之葬也銘隧之辭尚闕今願並有述也其狀曰府君諱萬盛字君冕海陽縣學增廣生員世居縣之龍津都古樓里考天純文昌縣學訓導有五子府君行第三幼嚴整若成人逮事王父曲盡其歡不妄交遊所與友終身不渝教督子孫一言動皆有規矩子三人長嵩齒以文學與府君同受知於學使者在諸生高等食廩餼蚤世次即生也舉人季曰雄思諸生孫五人本文章程本衮章洛本高章程為諸生曾孫二人府君初娶於李生嵩齒而殁繼娶於王通詩書善視前子舉生及雄思望其為善士不姑息事所生孝父官南澳守僃既老迎養於家生死咸盡禮生平從不佞佛其持家一切具有法度府君卒於乾隆十六年某月某日年六十有七王孺人以乾隆二十六年某月某日卒後府君十年年六十有八府君與元配前巳合葬於縣之曲灣山今以王孺人祔是歲乾隆三十四年十二月某日也噫豫雖未見府君而以生之言行考之固知其來有自為之銘曰昔吳惠公以經學迪海邦孰克應之君父子則同君之學行匪唯文雄顯不於其身在其後人雖弱一個二難譽振仲實贊我忠我實多美哉義方我銘匪夸文林郎錢塘縣知縣魏公墓志銘戊子公諱㟶字陟菴世為南樂著姓明兵部侍郎介肅公諱允貞公高祖也考諱體仁永淸縣學訓導母宋孺人公稟至性三歲祖母谷孺人病公隨司訓公侍側不少離持匕箸勸食飮不嘗不敢退康熙四十一年以縣學生舉於鄉四十五年成進士先以家貧常容外謀養凡十餘年及登第歸二親皆年高遂不出食上必在左右偶近行值風雪家人意未即歸將進饌公巳趨而至矣連丁內外艱服除謁選五十四年授杭州錢塘縣知縣縣附藩事至劇吏易為姦公下車首先潔己罷民一切供應向時相沿如倉胥供署中食米屠儈供肉江步供薪漁戶供魚之類一旦盡革之民大悅晝謁諸上官以晨夜治簿書斷理獄訟無留牘無遁情吏相顧戒曰未見有書生如公者也減正賦耗羡諭輸租者以時輸豫終不鋃鐺女桁楊女女第勿使豫不中程於是當輸者咸相勸輸勿纍公課更最故時徵漕米入倉主倉吏餽官千金公笑曰彼無故而坐捐多金非人情其姦不待問也自止於倉親評米高下令納者目操量畢徵吏無私焉杭有駐防旗丁多不戢市物薄豫之直伺婦女出道上恣笑謔民病之有司以非所隸不詰也外至輒移所司論罪遂相戒勿犯魏錢塘先後中丞徐公元夢朱公軾皆嘉歎以為能瀕海塘歲修費不訾時議欲令民出家財以佐公且謂紳士當為倡者公與海寧陳太史同年上官令往諭意公察不可即往謁陳母不數語馳還白曰豈惟陳氏浙士皆無資也且此例一開貽患無窮事遂寢縣志自明聶公後閲八十年不修公開館延儒士搜輯成書三十六卷所識拔於童子中者如孫灝任應烈汪振甲後皆有盛名分校鄉試亦得人五十七年冬自劾去官時勢豪與民爭塋田公直民上官有右豪者公不自得力丐去無以為辭則以庫貯前政所補金色微惡及民輸錢之當易銀者未盡內二事坐虧空免百姓籲留者數千人或願持金代償上官意亦悔後卒偕中丞疏請還公職公堅不起家居十二年以雍正九年十二月十四日卒年六十有八所著有且齋草四卷娶武孺人崇禎壬午舉人殉難諱緯孫女性淑愼事舅姑孝持家以勤以康熙四十年三月二十五日卒公自有狀繼娶李孺人以乾隆二年七月十五日卒子一則乾貢生孫男二長大名乾隆三年舉人靑縣教諭次大器孫女三長適縣學生王宗曾次適濮州國子生黃檍岸次適淸豐縣學生李遐年曾孫三曾孫女一公子乾隆九年卒公孫大名以乾隆十七年十一月三日始克合葬公暨兩孺人於城東南三里魏家莊之西原未有銘又十四年介大興吳侍讀肇元持其所自為狀來求余文追而納諸幽余生仁和與錢塘同郭公之澤得及焉公去杭時余甫二歲長乃得耳熟公治行又讀公所為邑志文獻賴有所考且與教諭君同年舉順天榜義皆不可以辭適校士湖南卒卒無暇以為又二年官罷乃克踐前諾詮次其事如右而繫以銘銘曰脫穎而出善刀而藏官不為久治則有聲越五十年遺愛未忘昔丱今皤口魏錢塘處膏却潤作法戒涼孰秉史筆登之循良有鬱者阡宰木成行銘公之績繄杭之氓奉直大夫吏部文選司主事汪君墓志銘壬辰君諱孟鋗字康古姓汪氏先世自休寧遷桐鄉至君考又遷秀水遂占籍焉曾祖諱森戶部郎中階中憲大夫富著述世稱碧巢先生者是也以弟內閣中書諱文桂次子為後諱繼燝由鄉舉歷官吏科給事中巡臺灣君祖也考諱上堉大理府知府兩世階皆奉直大夫大理生四子君為長幼穎悟善屬文自其年十五六時從宦至京師先達見其文巳奇之既益好古文辭家有裘杼樓藏書多先代善本歸里盡發篋讀之務為博綜又益購所未僃或鈔寫以足之君之弟仲鈖才名與君相上下好學與君同又得同志友二三人朝夕相與鏃礪所為詩若文駸駸及古作者名譽大起又好訂金石文字得古泉纍纍時復攜行笈中僃考核大理卒於雲南奔往扶櫬歸母祝宜人巳前卒遂合葬焉乾隆十五年與仲弟同舉於鄉人咸以得二俊為主司慶二十七年天子三舉南巡之典君獻詩並所著龍井見聞録十二卷得旨留覽賜緞二匹試入高等特授內閣中書大臣重君凡上有所纂輯輒以君攝其事精核為一館最三十一年中禮部試奉廷對賜進士出身不改官又三年遷典籍以資深旋改授吏部文選司主事精勤能舉其職以君才御史郡守可計日而至乃任吏部未一年年始登五十而遽殞矣其卒之日乾隆三十五年五月二十八日也以修書勞加一級後一年遇覃恩以子官贈奉直大夫所著有厚石齋詩文雜著凡若干卷皆可傳君嘗欲盡梓曾大父碧巢遺書而力不逮仲弟亡不忍其無傳為梓其遺詩數卷又梓亡友萬徵君光泰詩萬垂殁盡以所著託君君亦將為次第刊布而不虞其不及為也然君於兄弟朋友之道則至矣初娶舅氏海寧祝氏今贈宜人生子如藻如徹宜人父維詰內閣典籍繼娶仁和金氏封宜人生如洋治猷三女長字朱某次字錢某其幼未字宜人父甡今禮部左侍郎側室范氏生承澤君仲弟無後命如徹後之年十七殤又命如洋為之後今為縣學生如藻舉人官國子監學正豫與君舅氏同官習君才名久及相見歡甚君中第之歲豫分校禮闈聞唱君名滿堂皆大快朝廷第羣臣所上歌頌凡君代他人作者率在選君卒之前月豫來候君不得見豫無位於朝訃者不及豫不得哭君柩前意常慊慊今孤如藻將以某年某月日子葬君於某縣某鄉之原來請銘其曷可辭銘曰瀛州華選以待俊彥胡獨遺兮材則輪囷而貌逡遁世皆知兮無援於人又厄於天年止斯兮視仲非促視萬有祿又佳兒兮欲乞君文今反銘君詒此辭兮􅏏石深刻藏之不泐期無期兮文學陳少雲墓志銘癸巳余與少雲友也情則兄弟也兩家居相近少雲考曰汭徵府君母謝太君少雲長余三歲方余母馮太恭人免文弨時乞乳於謝太君兩家子在襁褓中姬嫗數提抱往來更相子也既而少雲讀書家孰余往就之同受業於沈武曹先生元斌情彌厚少雲英敏雖習舉子業時時取資治通鑑讀之於歷代興廢離合之故人品邪正之分無不了了時過先贈公所率胸臆劇談先贈公每稱善數試不利星家言當改業不從竟補博士弟子員家貧欲出遊余在京師招之同館於大興金氏其學日益進鑱削刻露鋒凜然不可犯書宗顏平原無論正草大小率懸臂書之嚴整遒徑幾於逼真每據案作書楮幅必正向教弟子亦如是曰此即柳誠懸意也年餘仍歸里課徒盛暑肅衣冠正講童子有治經未畢遽請學弄筆作文者不許束修所入無幾終不肯以貧語人以是常困既而翻然曰奈何以貧纍吾親乎吾父兄皆以理人術佐長吏吾將繼之遂偕其異母兄復之京師遂就幕而南足以衣食家口矣未幾其同産弟在里中以病殁少雲念母老巳又衣食奔走無人侍膝下每將戒行李哽咽不自勝居常謂人曰兄弟如左右手今吾一體亡矣何能獨生在江西德興縣幕病作伏枕蘸筆為書數千言與母訣自恨不能終事語甚淒楚遂以乾隆二十四年九月三十日卒年四十有五姓陳氏一傑名也每服膺裴行險之言自製字曰警唐少雲其號也先世上虞人遷仁和兩世矣娶嚴氏無子後四年卒伯兄亦無子唯季弟先卒者有三子其仲名焵今為後將以某年某月某日葬君於某原余乃泚筆為銘銘曰學則史教則經不一施命所丁嗚呼哀哉豫忍不銘贈中憲大夫豫寧秦公墓志銘癸巳乾陸三十八年秋余同年友江都秦黌以將奉其母趙太君之匶祔葬於其考中憲公之塋使使來告文弨曰卜以今歲十一月十九日吉昔先考之葬銘尚有待也今以吾母祔當合為銘以屬子文弨於是考其家狀因歎中憲公與恭人皆以孝友篤天倫為足以挽薄俗而使之厚也公諱熙字豫寧先世陜西三原人其遷揚州之江都至公考來劬公七世矣康熙十六年舉於鄉授中書舍人生四子公其仲也十歲而孤母鄭安人苦節撫教之公前母兩安人皆王氏後王安人生兄庠生與權公念父兄皆以儒為業亦惟苦志讀書庶可為劬勞報繼而家日以落伯兄與公異居公同母二弟尚幼不能治生大懼甘旨有缺不得巳始棄經生業此公畢生隱憾也繼連居母與兄之喪摧毀欲絶殯葬諸費一皆身任之且撫兄之仲子賓為子賓為郡庠生日望其昌大先人之業愛誨僃至顧又不幸早殁婦俞無子公巳自有子黌謂黌他日生男當後之其訓子也嚴未嘗少有姑息朝夕必垂泣警戒曰先人世業竟忍終墜邪黌以乾隆十二年舉於鄉十七年壬申恩科成進士選入詞館為庶吉士即乞假歸省公率之祭中翰公之墓未至數里即却輿步行及墓展拜且告曰今而後差可對先人於地下矣一慟幾不能起歸而臥病不旬日遂卒乾隆十八年五月初七日也年六十有九娶恭人趙氏同邑歲進士候補訓導諱豫吉之第三女也世居邵伯埭為著姓今其地隸甘泉恭人年十七來歸事姑孝待娣姒如同生念中憲公嗣續未廣為置側室熊生覺撫摩鞠育一日不忍離後就養入都攜以自隨及聞熊病亟命歸視竟賴以廖初賓之為子也恭人撫之如實己出賓亡後三十年黌官湖南始舉次子恩楚恭人諭黌曰以汝子為兄後汝父命也兄本汝世父子世父生時尚有二子今皆巳殁無後大宗不可絶今當以汝新生子後汝兄而仍歸宗於汝世父俟其免乳即歸告於廟而立之亟傳語汝嫂庶使其三十年苦節之貞亦藉以少慰也俞旋沒即命襁褓子成服恭人之明於大義類若此乾隆三十七年七月十三日卒年八十有六嗣子賓巳歸宗其為之後者復殤今舉其見在者子二人黌由翰林院編修歷湖南嶽常澧道覺台州臨海縣丞女三庠生陳詩高成璇庠生潘瑢其壻也孫四恩復恩海恩誥恩蔭孫女一許字程菊生公國學生以子貴敕贈承德郎翰林院編修加二級晉贈中憲大未恭人敕封安人晉贈恭人墓在揚州城北仙源橋祖塋之旁銘曰世澤詩書勿棄我畬精神所馮始鬱終舒庭植嘉樹殊條同根雨露共之靡憂不蕃匪其蒸之後曷克繩之匪其凝之後曷克承之分形同氣牉合異族嘉耦尢難交敦互勗爾子我育我孫爾續於古誰倫諸葛泛育孝友之德德之大者榮生考終天錫純嘏安此幽廬偕返其真我作銘詞用式後人文林郎施秉縣知縣朱君墓志銘壬子君諱履吉字旦銘朱姓松江婁縣人先世故浙産凡三遷至今縣詳具先世志中考諱秀文廣西柳州府通判柳州君早年生兩子皆不育四十外始舉君愛憐倍至幼聰慧好學以父遠宦成童即綜理家政復鋭精學業體素弱嫡母夏安人憂其過勞也令就怡一適所親示以六法間撫七弦以自娛遂兼通藝事年十八省父柳州途次即熟復法家言至則佐幕中畫有老成風柳州君以君之習於為政也年幾強仕遂為援例銓授貴州鎮遠府施秉縣知縣縣居衝途困於供億君籌畫有方剋已奉公一不以纍民革賦外浮派之弊而民皆樂輸恐後其聽訟也剖決如流且化且誘兩造往往各解讎釋忿而去修偏橋使商旅不病涉葺廨舍使官吏不侵民居月兩期課士而士知向方甫二年善政畢舉大府方擬以循良薦忽一夕心動亟陳情歸養未到家一舍聞若考巳先一月捐館即號咷徒跣奔赴慟絶幾不欲生遂得咯血疾踰年少差隨擇地安窆並建祠置田呈縣勒石以垂久遠又推柳州君遺意浙五世以下諸塋及金山縣冉莊祖塋親往封植各製祭器爐瓶鐙檠之屬畢具謹庋以供時祀君之歸也年四十有一以生母孫孺人年高家居侍養者十餘年怡怡然樂也孫孺人疾君侍湯藥月餘目不交睫眥為之爛先是君自祖塋祭掃回遇疾風甚雨得疾至是新愈而孫孺人病卒不起君哀毀骨立沈疴頓發醫者咸謂痛傷五中不靜攝將不治戚友亦引禮五十不毀之文相勸慰君聞言更戚竟於乾隆五十七年正月十二日卒於喪次年五十有五距孫孺人之沒未及一期卒前三日力起端坐書示曰蘧云寡過曾引履冰五十五年勉服於膺春朝撒手去仍作打包僧一片寒松裏慈烏喚我曾蓋君考嘗航海至補陀求子遇老衲以禪語示意後生君故其言有自也又指壁間懸緘曰與我將去及斂取視外裹以麻緘以素紙細書百日髮三字蓋喪滿百日所剃髮也噫此亦全歸之道矣鄉人來會者重君誼皆行哭失聲且為之議曰曾子稱慈愛忘勞盡力而有禮大易云庸行之謹君之敬親潔己宜受此名也私諡曰孝謹先生僉曰然君階文林郎考不以其官封而就君之階新例也初娶於陸繼娶蔡皆前卒又繼娶王子四人光曜子鄂皆諸生光綸光綎一女蘭馨適靑浦學生蔡光治孫二人大源大韶女孫二人今卜於十二月二十一日乙酉奉君匶葬於婁縣北鱗字墟祖塋之次君生前所自定也諸孤介余年家子范公弼來請銘為之銘曰士有百行唯孝莫大愼厥身修唯謹斯最晉有靖節唐有貞曜古道猶行德音孔邵循吏之名不足盡君終焉死孝匪獨生勤婁江之濆幽宮是宅永遂瞻依祥徵舄奕閻考功懷庭哀辭並序戊子乾隆二十二年禮部試天下士余與分校得山東一卷其辭簡淡而醇雅以為非學有元本者不能既呈薦主司嫌其寂寥弗善也甲乙既定諸分校者皆退余獨抱卷上堂與主司言不宜失此士爭之竟不得時分校諸公聞有此卷爭取傳觀咸稱善秀水鄭君炳也任邱李君廉衣武進莊君本淳尢歎息不巳既撤棘言頗傳於外並有傳豫為之出涕者吾鄉陳句山先生深於文者也索此卷閲之謂當冠倫詢邑里姓名則昌樂閻循觀即君也雖不遇而名聞京師來見余果粹然儒者氣度沖夷語不自矜詡君言試前得余所為亡室桑孺人行略讀之惻惻然若有動乎中謂能質言之而情事亦曲盡也君好余文余好君文其相合亦自有不偶然者自後試屢不利君守其道自若至三十一年會試余又與分校之列揭榜日唱名至第九侍郎劉公蔭榆見君名詫於衆曰此即往年盧某所為抱其卷而泣者也今可為之一鼓掌矣滿堂聞之皆大噱是年實出宜興湯君萼南之門云既成進士分部學習得吏部考功司議事持正不苟隨人上下有齮齕之者君卒不少變今年春余失官至京師與君相見才逾月聞君以疾請假余亟謂君盍書數語見貽乎即他年相望數千里外見手迹如見故人君行急不果書既而郵余一緘別無通問語惟手書近日體驗之言見貽踐前諾也方謂君巳復初及秋而凶問至矣嗚呼君內行修學術正教人盡其誠其鄉人多能道之而臨事有執又見於居官之時胡天虐之使病病而至於不永年邪君言行之懿必不終泯泯余雖識君而不能資君為砥礪是余之窮也夫爰為辭以寫余哀云古有特立獨行之士兮不隨俗以變遷余將以求夫今之人兮豈所在而皆然舍吾範以馳驅兮將詭遇而取憐置瑟而操竽兮刓方而為員競追逐以從時兮奚本志之能堅羌始進其若斯兮吾又惡知其終焉懿若人之古處兮豈外物之可鐫吾玉固自若兮甘不字以十年文與行若合符兮今人中而有此賢余不足以得君兮徒兩情之惓惓巧者遇而拙者亦不終棄兮乃今而信夫大圜匪榮名之足珍兮將大任之可肩見正直之道行兮彼遵捷徑者其言旋既觀政於郎署兮繄升降之是權寧使人驚吾之諤諤兮吾終抱吾之專專君以余同草木之臭味兮余亦以君叶宮商之相宣忽長揖以歸去兮霅乎矢之離弦既詒我以話言兮期理道之共研胡即成此永訣兮悵年壽之不少延嗚呼余求友於天下兮落落晨星之在天君今又舍我而去兮不禁淸淚之潺潺惟今之悲其實可悲兮過乎昔者之所傳功業雖未顯融兮遺文有待於為之編我車載脂兮將適吳而辭燕末由過君之里兮一灑涕於重泉嗚乎此特敘余兩人之交情耳余為後死尚思約君行之大者以表於君之阡孔葓谷戶部哀辭並序甲辰嗚呼君蓋天下學士之所以為宗主者也自成進士後嗜學轉篤服官農部恐不能卒所業亟告歸左圖右書日有所采獲得古來遺文墜簡為一一整齊補綴出與友朋相質正海內學者多樂就之見聞益以富其厚於朋友也不以死生易節東原戴君既殁為版行其遺書無有散失士林尢高其義其他所梓復不下數十種扶微振絶厥功茂焉昨歲冬孟文弨自太原南還過魯訪君蓋不相見者星一終矣留余止宿示余以漢隸借我以佳本餉我以新刻微見君容黯黮而多涕勸君宜少近藥餌然亦不圖有朝夕虞也今年仲春初旬忽得君不祿之赴驚噩涕零進使者而問故使者不能言其詳但言君第三郎君新就婚於金陵而歸亦以是月夭亡相去僅三日嗚呼一何酷也以君之淳懿融粹絶無瑕玼宜其享遐年膺厚福余方欲託君以身後事而何意余反為後死者耶既以悲君實亦自悲爰為之詞以寫我哀子聖人之後也仍好古而敏求釋纓紱而反初兮一藏修以息遊物固聚於所好兮祕簡恣其遐搜友朋相與討論兮盡一時之勝流美交道之不渝兮信臭味之相投延陵之不忘故兮我亦遺文之是收既不負此良友兮復表章夫前修文章天下之公器兮應學子之所求繄余得之而暴富兮溢璀璨乎琳璆曩吾黨有端人兮謂余門范嵩君所師也知子維端人之儔溯淵源而我敬兮嗟薄俗其有此不自締交以至今兮剛歲星之一周欺合並之不易兮隔千里而通郵渴思君而一見兮溯洙泗以停輈喜余來而止宿兮盡永夕之綢繆思從容而展意兮奈吾行之甚遒君年少余兩紀兮騁長途其未休猥余珍夫敝帚兮亦將託子以去留久懷兹而未發兮將排比而始謀何意竟不我待兮乃一疾而不瘳余自今無以為質兮淚忽忽其盈眸憶合尊以歡宴分方子獻而我酬曾兩月之為期兮判萬古與千秋重以叔子之不祐兮疑與善之悠悠幸長君之繼志兮文與行其並優興衆可追夫二鄭兮向歆遠軼於二劉少者係踵而接武兮咸不墜夫弓裘有子孫其若此兮宜亦可含笑而無憂獻歲寓書以通問兮神爽豈或間夫明幽兹不能纍君之行兮聊以代夫執紼者之謳嗚呼吾與君之交其盡於此乎猶庶幾夢寐之間神倣佛而來遊公祭汪容甫中文甲寅維年月日同學友盧文弨孫志祖張燕昌梁玉繩等謹以淸酌之奠致祭於拔萃汪君容夫之靈曰吁嗟汪君無怛而化驟聞惡耗舉皆驚詫日者相招促坐談笑曾未浹旬銷聲埋照君實不狂而衆曰狂皮裏春秋涇渭分明彼妄男子號召羣愚如羶集蟻如矢叢蛆世奉尊奢君實唾棄海內正人僃載簡記師門風義不忘久久沈椒園鄭純齋兩先生披榛拜墓遺金恤後同道為朋端臨劉台拱懷祖王念孫秋士江德量先徂金蘭誰補四庫在胸為行祕書大放厥辭佩玉瓊琚文章何師西京鄴下汴都臨安未始嚅炙不恕古人指瑕蹈隙何況今人焉免勒帛衆畏其口誓欲殺之終老田間得與禍辭名園高枕山荼雙植竹閣柏堂風流允嗣不死揚州而死杭州禪智山光終焉首邱吾儕結契無論舊新聞名相思握手情親臭味本同膠投漆中來幸天假去何匆匆一去不返儀觀在目樽酒具陳皋某來復聞君佳兒嶄然頭角庶幾他年父書能讀魂無不之邗江之湄執紼相送涕下漣洏嗚呼哀哉尚饗弟子浦江戴聰惟憲校抱經堂文集卷第三十四終
