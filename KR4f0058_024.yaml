body:
  text: 東里盧文弨紹弓答問答董生教增問問詩之作由來久矣未有知其所自始者也周之盛時有採風之使有太史之官至於天子巡狩又必陳詩以觀其風俗因以行黜陟之典於是詩之為教遂為聖人之大法故朱子詩序中據之而惜其昭穆而後寖以陵夷至於東遷遂廢不講第周之極盛當在何時則成王康王之間非耶説詩者謂文王雖巳稱王教化未洽武王克殷未遑禮樂故頌聲之作􅍘自成王之世夫頌聲之作在成王之世則列國太平之風可以被之管弦達之郊廟亦當此時為多而今十五國風自周南召南豳風而外皆東遷以後之詩何也或者孔子刪之與刪詩之説始自司馬遷其言曰古詩三千孔氏刪之留三百五篇後儒咸尊用之但春秋以前人習於詩士大夫以詩相贈答見於內外傳大抵今經中所有其稱為逸詩如翹翹車乘我無所監之屬十中一二耳以此求之馬遷之説未可信也況孔子刪詩於變風之世政教乖繆男女淫奔一切譏刺怨誹之作皆留不刪而獨全刪周室太平之風殆不然矣又或以為年久失傳其説抑又不通夫周南召南在武王未得天下之先豳風之作在成王蒞政之始今篇章具在何緣在其後者獨先亡耶後閲詩疏孔氏之説則曰太平之世天子有雅則諸矦無風故國風無西周之詩然細思之亦未然何則國風之作非徒文字之謂也先王移風易俗用此以為樞機故太師掌之巡狩陳之今太平之世既已無風則太師之官為穴員巡狩之陳徒具文耳先王何取此有名無實之為哉至於衰亂之世王者之政教不行正朱子所謂東遷而後遂廢不講者又安得而採之安得而陳之此數説者皆所未安蒙之所以反復思之而不知其故者也禮樂本諸天地與生俱生者也自唐虞以後漸文耳上古之世禮質則樂亦質蕢桴土鼓安必無詩文字未興流傳不廣其萬一傳者如古孝子斷竹續竹之歌不得等諸娥皇帝子亦謂出自後人之偽撰也陳詩觀風當與納賈觀好惡一例百貨在市而貴賤殊焉風詩流傳而取舍別焉豈必皆新製哉即當時宴享所賦可知巳聽所賦而知其人聽所陳而知其俗其義一也抑孔子曰先進於禮樂野人也後進於禮樂君子也然則聲音節奏之間亦有古今不同者矣故鄭聲之淫殆非其初而然也末流之失也太師陳詩以觀民風太師掌樂者也以陳詩為采詩是康成之蔽也以無目之人而令其行閭里以採聽歌謠其事之不便至易明矣且閭里之謠徒歌而巳不能皆以入樂假如凡值所採悉播於樂舊者肄在樂官而不去新者被之管弦而日增如太史公所言三千篇之多則太師小師之屬力疲而亦有所不給矣凡人之情順則易忘拂則易感故當堯之時其歌曰帝何力於我哉即周初盛時其言民之情第曰民之質矣日用飮食如斯而巳古者頌施於宗廟非以媚悅在位之君也而魯人乃及僖公在時而頌之其辭浮以夸當時巳備在樂懸矣夫子安得刪從而著之亦因可以觀世變云爾後儒微有見於此而凡若關雎若魚藻之類莫不盡舉而歸之諷刺所謂陳古以切今也此雖未免求之太過然亦足以見朝廷淸明海內治平士安於朝農習於野無有驚喜過望之意而何必相率歸美以為導諛獻佞之具哉其間或歷十數君二十數君而始有一詩非謂此數十君者皆賢也苟無道不至於甚在小民忠厚之意豈微激之而遽怒哉故一切採詩刪詩之説舉不足信春秋時名卿大夫所賦今人多習誦之偶有逸者固亦無幾且有異其名而詩固在者如采薺即楚茨河水即沔水新宮即斯干鳩飛即小宛王伯厚嘗輯詩逸句十不及今之一二凡謂淫奔之辭人喜誦之故傳及與夫年久者多失傳更鄙淺不足破矣問古禮之放軼也久後儒即見在之文尋其蹤迹大率三禮而外徵之三傳以其時猶近古先王之制未盡泯也媵女之制禮無見文左氏言媵者多而不詳其制獨公羊氏有之其言曰諸侯一娶九女二國媵之皆有姪娣其媵女之國説者或以為同姓而考之春秋及左氏往往不然成之九年伯姬歸于宋衛晉齊三國媵之解者以為伯姬賢諸矦爭來媵而齊固非同姓也此異姓之來媵見於經者也至後晉將嫁女于吳齊矦使析歸父媵之以藩載欒盈及其士此時齊莊之志固不在媵女然使古無此禮晉其有以拒之矣此又異姓來媵之見於傳者也此一疑也乃又有大可疑者蓋同姓媵之特諸子之論耳至於姪娣之媵姑姊不獨見於春秋者然其在易曰帝乙歸妹其君之袂不如其娣之袂良彼所據者殷禮也是其由來久矣考之經傳更無以姑姊媵其姪娣之文而邶風泉水之詩首章曰孌彼諸姬聊與之謀集傳曰諸姬謂娣姪也次章曰問我諸姑遂及伯姊集傳曰諸姑伯姊即所謂諸姬也上章以為娣姪下又以姑姊當之於文義微見舛誤然此特其小者或臨筆時少失檢耳至顯然以姑姊媵其娣姪則説有難通矣不知朱子果何所據而云然也諸矦一娶九女娶於一國則同姓二國媵之正夫人自有姪娣兩媵亦各有姪娣故九女也正夫人最尊矣其次兩媵以國之大小為尊卑其姪娣之序亦以此用何休説不從左氏或疑晉齊皆大國而何以不恥為媵且宣薑之女有為許穆夫人者有為宋桓夫人者不適一國安在其為媵也然考之古禮大抵重適而輕庶其為適夫人所生者必歸之他國為夫人其庶生者則往往從其姑姊以適人不足怪也春秋多變古即如左氏開章云惠公元妃孟子孟子卒繼室以聲子此禮也乃宋武公又嫁其女於惠公為魯夫人則非禮也又齊景公使晏嬰請繼室于晉非媵而繼室亦非禮也若據此以疑諸侯不再娶之不足信可乎然則廁同姓以異姓增兩國為三國舉為變禮也若言禮之正則同姓二國媵之異姓則否左氏有明文固確不可易矣晉嫁女于吳此失禮之大者且無辭為之而謂使古無異姓來媵之禮則晉且有辭以拒齊是何異放飯流啜而問無齒決乎賢過信後事反以疑古初之不然此大不可也姑姊之於姪娣有常尊矣桓三年傳云凡公女嫁於敵國姊妹則上卿送之公子則下卿送之其等差秩然如此焉有姪娣為適而以姑娣媵者乎泉水之詩所稱諸姬及諸姑伯姊當依鄭箋以為預擬歸寧後之詞最是蓋女子之所不能忘者其同類耳婉孌然未嫁之諸姬我將與之謀婦人之禮國有變故恐其未得所歸故思為謀之若以為謀歸寧之事此則當就保傅如葛覃言告師氏言告言歸之比保傅皆老成人不得加以孌然之稱如諸姬為共適人者將與之謀歸寧而美以孌彼義無所取不幾為賸文乎凡問之為言問訊也問遺也諸姑伯姊在其父母國者也故君子曰禮謂其姊親而先姑也若偶然咨諏而謂必以其序禮豈如是之譾譾拘拘者哉大儒之説固不可輕輒翻異然當其難通自當準情酌理以求至是之歸乃為善讀書者問詩有美有刺故曰言之者無罪聞之者足以戒衛至惠宣之世變易三綱濁流四海人道盡天理滅矣為之臣民者愴懷疾首欲隱之而不能於是乎詩以刺之此正民彝天理之所以著而集傳於鶉之奔奔之下反以衛詩至此為人道盡天理滅者何也當時有獻議乞經筵不以國風進講者其識誠陋而楊氏之説謂淫亂之君自以為密故特取而著之是聖人亦有時披抉人之閨門以為教也漢治梁王之獄谷永以為閨門之事中冓之言非帝王所宜聽聞況可彰之後世乎故嘗讀而疑之以為楊氏之説甚深然特有似於法家之言恐非聖人忠恕之旨也衛詩至此人道盡天理滅者本非謂作詩之人此不可以辭害意譬之説春秋者謂春秋至此三綱淪九法斁豈得謂其歸咎於孔子哉梁王之獄黤昧未明推親親之誼尚可得而掩也若衛之宣惠其情狀亦巳暴著矣垂之簡編足為懲戒若唐之武后楊妃雖其嗣主亦不得而覆蓋之而謂宣惠之醜其尚可諱哉淫亂之君自以為密云者特欲為後人作戒故推而極之以言事無有隱而不彰者欲禁之於未然也人之情態固不一轍築臺衷衵宣著如此此其人豈尚有廉恥哉匹夫匹婦曾於牆陰明日國中巳有傳播者此則自以為密而卒不可掩楊氏之言固其理也唯詩人刺之夫子從而著之耳左氏傳所載淫亂之事豈惟此數君而不見於詩安得疑披抉人之閨門以為教也以楊氏為有似法家之言不倫之甚問十五國風言王者凡五何彼襛矣言平王之孫或以為平治之王或以為即平王宜臼先儒未有定説今姑可置之不論其在邶風則北門之詩言王事適我衛風伯兮之詩言為王前驅唐風鴇羽之詩言王事靡盬秦風無衣之詩言王于興師此四處詩傳或有講解或並無講解竊意此雖一字之微然名分繫焉蓋有不可忽者集傳於邶風王事剖晰詳明於伯兮鴇羽槩從率略而於秦風獨引蘇氏之言謂秦本周地故其民思周之盛而稱先王其説殆不可訓秦居周地遂可稱王杞宋為王者之後修其禮物以賓王家不愈可以稱王乎果其臣民援引失據孔子刪詩時便應削之無容取草野不稽之言列之於經疑誤後世也詳檢毛鄭之書於伯兮據從王伐鄭之事孔氏於王于興師之下又遍解前經雖時近穿鑿然似有不可巳者意謂治經者於此當博觀而詳為之説不得樂集傳之簡易而遽從之也不聞北山之詩乎溥天之下莫非王土率土之濱莫非王臣諸矦之事皆王事也間王政敵王愾何莫非王即春秋時諸矦之於周亂則定之難則城之戍之若殷之諸矦其民從王所役而有赬尾之詩周之時未之有改也則凡所謂王皆周王也朱子於秦風引蘇氏之言謂秦本周地故其民思周之盛而稱先王云者以傋一説耳其正解固云王于興師以天子之命而興師自無可議為也且即蘇氏之説亦未可厚非謂秦民有懷舊之思如漢之東則西土耆老冀上之眷顧其情一也當其時周王固在也若杞宋為夏殷之後社巳屋矣雖許其得用前朝之禮樂而其臣民安可以王稱之安可冒生今反古之咎而轉思先王此比喻失倫也朱傳與注疏所訓無大異同學者正可以參觀而得之抑古人亦有文可上下相通者如祭王父曰皇祖考父曰皇考夫曰皇辟祭法大夫有王考廟皇考廟適士有王考廟禮曰適爾皇祖某甫適其皇祖某子此當世之所公行者固不可謂之僭也何彼襛矣之稱平王似當屬平王宜臼此東周之詩而繫之召南以見文王后妃之德化雖久遠而肅雍之風未衰也平為平正一説乃毛公創解而或以寧王為例夫武王定天下寧之為義美而顯平之為義泛而晦故愚見以為似不若朱子之後一説可從也問文薑淫于其兄而魯桓被殺其為國之大恥百世不可掩魯于是時未甚衰弱不能聲罪致討僅除彭生以為名後文薑乃數如齊終復如莒以禮義之邦陵夷若此雖天之禍魯亦以莊公之非人故耳集傳于猗嗟之下引趙氏之説言子有可以制母之理其説既美矣而第其所謂哀痛以思父誠敬以事母威刑以馭下猶有不能釋然于懷者春秋書夫人如齊在桓之十八年春書夫人孫于齊在莊之元年三月公羊傳曰夫人巳在齊矣其言孫于齊者何思母也何氏注曰是時莊公小祥憂思少殺思及其母故春秋緣其意而書之其實夫人在齊未歸也其言穿鑿支離故為難信左氏傳無文杜氏注曰文薑與桓公之喪俱歸歸而為魯人所尢故復孫于齊此説雖無所據然以情事論之有當然者今云誠敬以事母為將迎而歸之與夫國君與國為體制喪服者父在則降其母以明尊無二上今迎而歸之是迎其君之仇與其國之賊也傷死父之心絶臣民之望不孝莫大焉且文薑亦無可以歸魯之理河廣之詩宋桓夫人所作也夫人生襄公而出歸于衛襄公即位夫人思之而義不可往故作是詩文薑之罪較之出母孰重孰輕又何以歸哀薑淫于二叔而殺其子罪較減于文薑齊桓殺之以其尸歸公羊以為得伯討之義然則世有明王賢伯所以處文薑者當何如耶朱子於此殆必有至精至大之義惜末學無以知之而願有以窺其狀也父以為妻者子以為母父所不廢子亦不敢廢也文薑淫於其兄桓既知而謫之矣而猶然以受齊襄之享其為隱忍可知巳公薨於車魯人雖知其所由來而不能明言之薑猶然桓之妻也則亦莊之母也趙氏所謂哀痛以思父誠敬以事母威刑以御下此三言者聖人不能易也其謂子可以制母者亦制其從者而巳敝笱之詩云其從如雲其從如水此何人哉文薑必不能以孑身適他國此則莊所能制而不制故魯人嗟而惜之文薑未嘗親剚刃於其夫則其事隱子無讐母之理惡得不迎而奉之人倫不幸之遭莊唯有衋然隱痛而巳其能如母何哉記曰臣弒君凡在官者殺無赦子弒父凡在宮者殺無赦獨不云妻殺夫者當如何假令閭巷之間或有此事有司者治之耳曾謂妻殺夫子亦可殺其母哉至如宋襄之不能返其出母重父命也父不以為妻子亦不敢以為母若文薑則固未得桓之命者兩事正相反何得以此例彼昔齊威王使章子將章子之母為其父殺而埋之馬棧之下威王曰勉之還必更葬將軍之母對曰臣之父未教而死若更葬是欺死父也章子之不更葬母與宋襄之不迎出母皆非魯莊之可得援以為比者也雖有齊桓又何自伸其伯討哉蓋文薑之與哀薑其迹固不相似如欲逆刺隱匿之事離間母子之恩則誣衊之端陵暴之患從此興矣即今官府治不孝者亦必親告乃坐子之生殺繫於父妻之去留繫於夫無古今一也今桓死不及斥其妻莊立不敢廢其母為伯主者固不能妄與人骨肉事矣賢讀書能疑甚善而析義未精且當就古人之論而熟思之毋輕議為也問古人稱謂之間簡質而等級分明天子曰王諸矦曰君卿大夫曰子在春秋時猶未混淆至孟子而稱其門人為子故後人謂世變所趨賢者不免此言雖戲亦紀實辭也無衣之詩首章言不如子之衣安且吉兮次章言不如子之衣安且燠兮集傳謂其倨慢無禮誠有然者夫武公負篡國弒君之罪欲假王靈以為重而言語泄泄若甚不急此者然誠王法所當誅也至首章之下注曰子天子也則武公雖云倨慢而顯然降天子之號而從大夫之稱殆未敢矣若以子為同後世爾女之辭則自春秋之世未嘗有焉小序曰武公之臣請命乎天子之使而作是詩其説至為詳到朱子於此特注此句豈有説乎小序謂請命乎天子之使兹言當矣然章服非使者所得專也探其意而言之則子固謂天子矣文詞所施固當有所避就假如曰不如天子之衣不如王之衣則幾鄰於逼上亡等以王自有王之衣也故因有使者之可藉從而子之此行文之體當爾也古人於所尊皆不敢斥言晉韓起聘周而曰將歸時事於宰旅宰旅冡宰之下士也即列國相交其辭命之間有稱下執事者有稱從者莫不皆然漢制之不斥皇帝而稱陛下亦猶是也故此於嫌疑之際不敢斥王之衣而婉約其辭以為不如子之衣於義固無所失當是時武公方欲得周天子之命以為重而唯恐其不得也焉敢倨慢無禮觀其次章云豈曰無衣六兮降七言六若不敢要王之必遂其所請者六既為謙辭而稱子乃疑於倨慢哉不然明矣弟子上元孫祖瑞嘉五校抱經堂文集卷第二十四終
