body:
  text: 東里盧文弨紹弓跋七書晦菴題跋後癸巳毛氏汲古閣刻朱子題跋三卷以跋東坡與林子中帖為首考朱子文集則其前尚有一卷不知此何以獨遺之書河圖洛書後引大戴明堂篇鄭氏注此誤也明堂在盛德篇中杜氏通典所引但稱盛德在未為後人分析之前可据也注乃北周盧辨著中有引鄭氏語其為非康成注自明矣又踐阼篇作踐祚此在魏晉六朝人書中多如此通用但記朱子嘗與人辨及此謂阼為主位不應作祚今何以亦爾也其書參同契後末署空同道士鄒欣六字此朱子自寓其姓名也鄒本邾也欣當是昕之訛或以欣有喜義古音本與熹通此亦放魏伯陽篇題而為之而毛氏不察妄增一歸字於空同道士之上誤矣其跋周益公楊誠齊送甘叔懷詩文卷一篇竟是禪門上堂參喝語朱子􅍘不為是必妄人竄入無疑也其他如重復改作復傲倪改作睨皆不知古字玉楮詩藁跋丙申秀水曹侍郎溶之圃在郡城中名之曰倦圃蓋宋嶽倦翁金陀園之故地也余嘗至其地林木薈蔚溪流彎環坡陀峭蒨雖結構未必皆如曩時而昔賢遺風猶髣佛遇之其時蓋巳不為曹氏有矣倦翁為武穆王之孫所著有金陀粹編續編今猶傳於世云此玉楮詩藳八卷者當嘉熙時三年閒之所作也其詩刊除浮豓風格峭異驟若不見可喜而咀噍既久亦自有得味於無味中者明嘉靖閒其裔孫尚書元聲刻而傳之今版本不可得矣外閒所傳寫者率訛缺今姑就其本傳之不能細校也集中記為韓正倫因詩致怨欲陷倦翁於死賴廟堂覺之事得白以武穆之精忠所謂思其人猶愛其樹者正倫乃絶不顧而並忘其舉己之恩欲文致之於罪是尚得為人乎倦翁雖未能忘情而深憐其失計詞不憤激有君子之養焉他日讀邵氏聞見録見种詁訟范忠宣而忠宣猶薦之乃為詩有曰丞相襟量滄溟同一眚不捐三世將自言曲直何必言愧死老奴作何樣後又有讀誠齊集詩復及之所謂怨若怨焉者殆終有不能盡化者歟劉後村集跋甲午後村集有百九十六卷今此祗五十卷僅居四之一毛氏津逮祕書中載後村題跋凡四卷此集無其前二卷黃氏千頃堂書目所載後村諸集班班尚多距今未久宜尚在世閒然余求之數年卒不見也此集舊寫本字迹粗殺閲之頗不爽目故别加校正重録如右而以毛氏前二卷之題跋並入焉倘得全集自當各還其舊若不可得則毋寧匯置一處庶不復有放失之患後村劉克莊號也字濳夫莆田人學於真西山以蔭入仕屢廢屢起宋理宗時賜同進士出身官龍圖閣直學士諡文定後村詩詞及各體文皆有法度卓然為南宋一大作手七言古風初喜摹長爪生詩人玉㞕所載三篇酷與之肖而皆不見此集集中此體亦不多見唯有築城開壕運糧朝陵六七篇而已風格蒼老頗近老杜留花門塞蘆子諸章其本意欲息唐律專尚古體以趙南塘言而止今集則律體居多石門吳氏後村詩鈔亦無出此集之外者豈其全者非獨余不及見即前輩亦未之見耶余因其言考其人亦庶幾無愧真氏之門者乃宋史無傳柯氏新編亦不為之補文獻通考於他人之集則嘗采用後村之言而其集亦未著録幾疑於名之暗晦矣雖然唐書不為韋應物傳而蘇州之名常在天壤閒文章自可傳不仗史筆垂後村亦復何憾哉剡源集跋丙申余舊讀蘇伯修所輯元文類劉欽謨所輯中州文表略識元人所為文古辭奧句磊砢斑駁大率取材於先秦兩漢其體裁則昌黎之曹成王碑柳州之晉問庶幾近之當宋之末年其文多流於漫衍荏弱嘽緩骩骳而不振若元閻靜軒王秋㵎姚牧菴許圭塘諸人之文差可矯其弊矣然古於文者不必皆古於辭也如第以辭之古為古文則又恐以形貌求之而非精神命脈之所在是乃贋古非真古也繼得黃梨洲所録剡源文鈔則大好之剡源者奉化戴表元帥初也其文和易而不流謹嚴而不局質直而不俚華腴而不淫此非徒古於字句之末者也明初宋景濂氏重其文在史局為下本路即家謄其集二十卷入祕閣元史列之儒學傳中景濓又為其集作序推崇甚至三百年來唯梨洲遴擇其文以傳之學者而其全集殊不多見金陵陶孝廉衡川以是詢余余愧未能答也南濠朱君文游多蓄古書余因求之乃得明神廟時版本其上有何義門先生評校乃其弟子沈穎谷名巖所傳録者何氏得嘉靖以前舊鈔為文祇六十五篇以校版本改正甚多如唐畫西域圖記脫去後半篇二百六十五字賴以補全其詩亦得舊鈔刊正余見之大喜屬友人為臨一本但此集為卷三十文雖視舊鈔本為多亦有鈔本有而版本無者十有三篇何氏巳為補録而朱君本無有不知又落誰氏矣詩源出江西視山谷為稍渾融余師桑韜甫先生讀之目為狷士云剡源嘗為建康府教授而元史乃作建寧考其自序云為升學教授建康實唐之升州然則元史誤也後來序其文者亦多沿誤當正之穎谷吳人稱剡源文近子厚亦閒似蘇門能從容於窘步萌茁於枯條此數語亦殊有見朱君曰此亦吾鄉之學者也故附著之云仇山村金淵集書後辛丑山村為溧陽教授在元大德九年年五十九矣在任四年官滿受代歸詩作於其時溧陽自唐以來皆屬升州故吾子行為之題詩稱仇仁父解秩建康有新文曰金淵集也其分教京口又在前故其寄京口諸友絶句云郡邑山川我舊遊歸舟千里十年秋相逢若問村翁信貞女江頭狎白鷗貞女江乃指溧陽言也京口今鎮江府本朝雍正年閒始以溧陽隸焉或遂以此集在京口時作誤矣詩淸綺流美有蕭閒之韻而無酸寒之氣五言律中有哀方嚴州五首嚴州乃方虛谷也詩中具有微詞虛谷之為人即不至如周公謹所詆之太甚要其人之不足取固較然也今本乃題為懷方嚴州詳詩意當作於其新殁之日非懷之也七言佳句吾愛其書生愛日唯愁晚稚子敲冰不怕寒無白衣來多釀酒放靑山入別開門冰懸古樹花尤雋雪漲寒江水不渾塵世不知秋過半水鄉但覺月明多情與境俱淸絶其七言一絶云野風吹樹廟門開神象凝塵壁擁苔笑爾不能為禍福村人誰送紙錢來亦有風人之致此集戊戌年閲一過辛丑再閲遂書其後書李空同詩鈔後癸巳乾隆十五年韜甫先生主大梁書院因空同後人請選其祖之詩為檢定十六卷付之裁畢梓即以本寄文弨京師使讀之空同詩當以五言律絶句及七言古詩為最去其摹仿太似者而真氣骨乃見固未易以訾謷也他選本閒有篇刪其句者曩以質之先生先生曰刪則吾不敢無寧仍之而附注以己意耳文弨於此本訛字一一校勘以覆於先生今略著二條於此如河之水歌云河水淲淲舟子搖櫓檢字書淲與滮同則與櫓韻不協意謂作㶁㶁差近之先生曰淲當是韻文弨今思之或當讀如滸滸然未知空同本何書也又有句云毖毖圓波踊殆即用毖彼泉水而㬪其字他人集中亦未見又左袒行云産不信祿不入軍右袒計安出文弨謂別本作寄不信者是易有言不信謂不見信也寄之言不見信於祿祿不入寄之言似當如此解先生曰誠然唯軍右袒不可依明詩綜作軍左袒耳其末又附本朝人劉湛詩有列莊鳴臺使之句文弨謂當是列狀之訛先生曰吾思之不得汝乃得之才相去果三十里耶噫此雖先生戲言而奬誘殷惓不遺纖芥乃如此今整理舊書復見此編追憶往復之言殆將二紀去先生曳杖之辰亦巳再㫷矣把卷憮然因具識之今日即欲就正何可得也乾隆三十八年三月七日書跋西北之文辛丑此皇朝湖廣布政使澤州高平畢振姬亮四所著之論議諸雜文也太原傅山靑主為之序仍以解元稱之其言曰東南之文概主歐曾西北之文不歐曾不歐曾者非過歐曾之言蓋不及歐曾之言也解元為西北之文而卒不得罪於東南者以言之數數於理也山又為解元之西北尚多乎其理者也然終不以其文東南解元也靑主之言如此余東南人也非謂文必東南若特以畢公之學之富而用之於賦頌碑版等作矞皇典麗當推一大作手若論理自當以平正易直為主欲人之易曉也議事自當以明白剴切為主使人皆可以舉而行也今其為言也瀾翻藻耀非有學問人不能究其指歸吾恐讀其文者之不易曉也然其議事之文實非徒託空言可比當以俟知者知耳至論孔子弟子家語有縣亶與史記之鄡單非一人此則失於不考縣乃郻字之誤漢書地理志巨鹿郡有郻縣續漢郡國志作鄡蓋實一字周大王亶父亦作單甫古亶單多通用故鄡單即為郻亶實一人畢公信史記集解之言以為塢單晉人欲祀之於銅鞮豈其然乎景菊公先生詩集跋丙申先大父書蒼公交友中最精風雅同輩所共推服者兩人一為上虞王文白先生名德璘寓杭州先大父割宅以居之其錢塘懷古七言長律凡若干題氣象雄渾音節亮拔不落宋元以後格調余外大父馮山公先生為序之余篋中曾藏一本南北轉徙縑幐書㨭多為他人紛亂近檢之未得其後人不振復相繼以死遺稿不可復問余丱角時巳不及見先生以鄰近故至所居見先生小影四周皆有題詠先生夫人亦尚在計此時訪求尚可得而童年見不及此至今恨之一為同邑景菊公先生先生垂殁盡以平生著述授余師桑韜甫先生先生為版行其詩八卷而為之傳以著其人菊公可無憾於泉壤也巳夫多不如精前明布衣稱詩最富者如沈嘉則王百穀王承父之流今其集流傳蓋寡以云重刊抑更難巳余固知菊公先生之詩之亦不必以多為貴也雖然派別不一嗜好亦殊後之人豈無擩嚌其中而更有得焉者乎矧余先大父情好往來之密咸見是是更不可以廢此集先生手自書古今五七言雖各分體而卷或閒隔余移之使各從其類並即以韜甫先生序傳冠諸首韜甫先生沒時有四孫遺書皆巳分析今一孫又亡余猶覷得菊公文集與說部而讀之而恐其終不獲也無可求者巳矣有可求者更當求之向鈔得菊公詞八卷今又鈔此集五十卷又多乎哉視文白則誠優而以云得先生之全疑尚不止此菊公文集說部在韜甫先生二房長孫濟燾所濟燾殁其妻乃余母舅張端甫先生之孫女余請端甫先生借鈔焉固不出後聞為所親全攜去不知落誰手矣濂洛風雅跋庚子此本相傳以為元金仁山先生所選輯首濂溪周子八傳而至王魯齊皆正傳其餘源流所漸凡三十五人所録皆有韻之作凡針銘祭文咸入焉意主於闡明義理裨益風化初不於字句閒求工也本朝雍正年閒其裔孫律實始版行今相距五十年吾宗東源衍仁欲復為開雕請余為正訛余北上攜之行笈中友人睂菴北方之言學者也就而正焉其意以為題曰風雅即文不當在所録中又劉屛山戲作十二辰屬詩一首亦當去其言良是然出自前哲之手毋寧仍之善戲謔兮亦風人所不禁也仁山録朱子靜江府虞帝廟詩附記其後云廟中舊有有庫君像南軒牧此州舉而投之水文弨竊疑其已甚而睂菴以為不然謂傲即萬惡之根去之不為過且廟制尊一不尊二然余考道州有鼻亭之神道州即有庳地也象必有遺愛於其國故神而祀之靜江去道州不遠祀象不為無因有其舉之非後人所可意為變置也且俑以象人猶不可用像亦象人也而投諸水戮巳太甚視流放又甚焉即操千古賞罰之柄者亦不宜出此余以為蒲坂之舜廟不宜有象而靜江之舜廟實宜有象象蓋從祀也亦猶先主武侯同閟宮之義也非竝尊也聊著不同之見於此以俟後之人論定云乾隆庚子臘月之望盧文弨書題王阮亭先生感舊集後辛未王阮亭先生輯其平生知交之詩為一編曰感舊集凡三百三十有五人此本藏北平黃崑圃先生家先生瓣香阮亭既盡梓其遺書此編以未得校讎尚留篋中不鄙淺學諈諉及之余觀阮亭生平好獎引氣類於同時人士所造有一字之俊一韻之工靡不津津激賞且筆而記之今其書如池北偶談居易録古夫于亭雜録漁洋詩話中所載且至有重見㬪出而不厭者學者因先生豓稱之亦願爭先覩其全為快今是編所載朝廟十一山林十九其人則皆素所稱述之人也然向者第等諸窺豹一斑而今乃得見其全其為快意當更何如哉因亟校歸之冀有好事者付之梓元本分四卷卷袠重大擬每卷分上下二篇又詩之先後與目不相應今定從目序所云以考功終者今乃在第二卷末此則不敢妄易云阮亭自序為康熙十有三年甲寅余今兹始得參校為乾隆十有六年辛未蓋相去七十有七年而先生之書猶有不盡出如斯者也閏五月草四日校竟並識卷後又有補遺此或鈔時偶遺或後時所見非是別有義例今當歸並一處凡是正三百餘字有近人名字難考者此不可以意為定也有詩中下字偶不契勘而誤者如云醉時喜得虎頭筆滿壁烟雲峯削戌今若從漢書司馬相如傳改作戌削則非韻然削戊實無所出又如云始焉弩在機終也刃出鞞上韻用術字下韻用必字此必因鞸字形近鞞遂誤讀鞞為鞸也鞞蒲頂切與術必二韻不協又有一詩序云樂羊以息壤而克中山案息壤是甘茂拔宜陽事若樂羊之克中山則謗篋也唐人詩吾聞中山相乃屬放麑翁事雖誤用終不失為佳詩特學者不可沿習所聞而不考其本也豫是以著之且明豫之所不改者類如此文心雕龍輯注書後辛丑余向有此本粗加讎校寓吳趨時兒輩不謹為何人攜去後遂不更蓄也昨年吳秀才伊仲示余校本無可比對復就長安市覓得此本紙墨俱不精吳所録隱秀篇之缺文及勝國諸人增刪改正之處此本具有之然他人所改俱著其姓唯梅子庚獨不不幾攘其美以為己有耶亦有異同數處其練字篇引尚書大傳別風淮雨於傅毅制誄巳用淮雨下多元長作序亦用別風八字頃無王融集可檢惟憶陸雲九愍有思振袂於別風之句此亦一證也傅毅作北海靖王興誄云白日幽光淮雨杳冥古文苑所載其文不全今見此書誄碑篇者又為後人改去淮雨易以氛霧二字矣鄭康成注大傳云淮急雨之名是不以為字誤而詩正義引大傳竟改作列風淫雨蓋義僻則人多不曉也哀弔篇首云賦憲之諡此出周書諡法解既賦憲受臚於牧之野乃制作諡今所傳周書文多脫誤惟困學紀聞所引尚有此語此於賦憲下引舊人校云當作議德失之不考也至詔䇿篇賜太守陳遂汪本作責博進陳遂正與下故舊之厚句相應然責字亦疑償字之誤其末引詩云有命在天明為重也周禮曰師氏詔王為輕命吳本亦如此余以為當作詩云有命自天明為重也周禮曰師氏詔王明為輕也下衍一命字養氣篇故有錐股自厲和熊以苦之人案下六字吳本無當本脫四字不學者妄增成之而忘其年代之不合也末序志篇云茫茫往代既沈豫聞眇眇來世倘塵彼觀也謝耳伯云沈一作洗余疑皆未是似當作況況與貺古通用又吳本倘字作諒吳本從曲江錢惟善本臨出前有其序余遲暮之年尚為此矻矻不欲虛見示之惠故也凡異同處勝此本者巳具録之為語小兒子輩愼勿再棄也乾隆辛丑七月九日書舟車攜帶此本近又不完全䂬溪詩話跋辛丑此書議論純正凡豓冶之辭概不插齒牙閒其評品李杜優劣後人莫能易也至子美之廣厦與樂天之大裘其意一也其詞則有工拙何必以窮達校其難易急緩與作者之先後以為高下哉義山詩却羡卞和雙刖足一生無復沒階趨此有激之言何嘗如新豐老翁捶折其臂之出於實事者哉乃譏其為子春之罪人毋乃太迂謂子美玩弄嚴武藐視禮法亦但襲前人之言於少陵詩未嘗熟復也東坡詩浮江泝蜀有成言江水在此吾不食於下注云江水在此吾不食言光武語也東坡去一言字殆歇後也案有成言三字巳見上句則但用吾不食意義自足何歇後之云乎常明未必有斯謬必校者之妄加也此書出吾鄉鮑氏所藏黃氏仕履之詳尚可以考見云乾隆辛丑七月十日書逸老堂詩話跋丁酉逸老堂詩話二卷得之江寧嚴侍讀東有所書中不列鄉里姓名然稱魏莊渠馬抑之為同鄉則蘇之崑山人也又稱祝枝山序其父約齊漫録二十卷云俞君寬父吳之耆儒又以知其人姓俞矣其大父醉菊翁亦見書中然皆不知其名崑山之俞唯允文字質甫者最著廣五子之一也考其事蹟又齟齬而不合此書與約齊漫録江南通志及千頃堂書目皆不載雖有詩句又不為明詩綜所録一時無可蹤跡顧其書雖無大過人處而敘述亦班駁可喜其論麓堂詩載同官獻諛之詞未免起後人之議尢確論也為録而傳之至其祖孫三世之名若字俟他日得崑山縣志與祝枝山集再為搜考云
