  text: 抱經堂文集卷第十二
  hash: sha256:948f923f449507d5ed6a0c55dd033158c291a06de3094d0b0a5ec8d64f83bb36
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0058_SBCK_012-1a}
body:
  text: 東里盧文弨紹弓跋五書易史後壬寅易史參録二冊不分卷皇朝康熙時閩葉矯然龍性之所著也易者天人合一之理聖人本天道以正人事順之則吉悖之則凶人事之變至於不可勝窮而括之以象雖質文淳薄之屢易未見其有遺焉者也宋誠齊楊氏著易傳二十卷大抵以史事證合者居多今葉氏之書不盡解經文但觸於前代興亡成敗之跡與三聖人之言冥然合符者類而書之其言曰太史公言易本隱以之顯春秋推見至隱孔子之作春秋也曰吾欲見之空言不如見之行事深切著明史春秋類也善言天者驗於人善言古者驗於今是豫戔戔參録之志也龍性順治十五年進士曾任知縣罷歸遂不出卒年八十餘余同年友鄭明府有章天錦是其鄉後輩得其稿攜之入蜀馬龍李敬躋太原李履謙見之欣然為之開雕是為乾隆十三年距龍性自序此書時七十年矣噫古今之事何可勝言善讀者自為隅反可也書儀禮識誤後壬寅此宋永嘉張淳忠甫之所著也乾道八年溫州守吏部郎贑曾逮仲躬欲鋟儀禮託忠甫為校讎因裒次所校之字為二卷又釋文誤字一卷朱子謂其所校甚子細然亦不能無舛謬今案其所校多從釋文之說釋文與唐開成石經及五經文字九經字樣皆不能盡依說文正體忠甫亦然如以㓨為刺以為宴以策為策以孑焉正為孺之類實自唐巳來相承之舊文非忠甫始易以俗體也其士昏禮捂授捂字從手今案釋文梧字從木既夕篇同當與枝梧字無異又燕禮下賢云延嫁反監本延作回今案易屯卦下賤釋文云遐嫁反他經多同則延字回字皆誤今通志堂本作避亦非也又酏以支反云支當作皮今案周禮酒正禮記內則釋文酏皆作以支反不當改作以皮又聘禮靑犴云五旦反監本旦為但今案大射儀亦是五旦反非誤又有司徹膮云呼報反監本報作雕今案釋文膮許堯反與內則音同呼報呼雕皆非也其所見釋文與今通志堂梓行本多有異同如士昏禮之齊肝今齊字有口旁既夕禮燭用䒱今䒱字下有四點又杖笠䈉今䈉字從羽不從竹又主人諦今諦字從口不從言至此書經轉寫亦疑有誤者如聘禮注嫌擯者一一授之云監杭本以一一為二余謂當是以下一為二古人語常用一二作一一者乃後人所改也又標言隳二字余案下校語則此當作言猶隳脫一猶字又喪服釋文盛米注盛笙同張云注無盛笙字是巳又云有曰殷盛也笙家當也余案笙家當也四字不可曉亦不見注當誤衍耳鄞樓鑰大防為永嘉教官忠甫常貢直言於樓樓更親之嘗問其何以不仕曰今之仕皆非古之道如始至則朝拜遇國忌則引緇黃而薦在天之靈皆古所無也其卒也陳君舉實銘其墓此書自序不知是何年其云乾道七年春今兩浙轉運判官直祕閣曾公來守是邦云云曰今則曾後所遷之官也若其守溫之時則吏部郎耳見樓攻愧集又自序言與謝黔論學戌歲之漂黔不克免案宋史五行志乾道二年溫州海溢是年歲在丙戌忠甫所言正謂黔以是年漂沒而死耳乃轉寫之誤以戌為成說者遂以終年漂流解之何其不能闕疑乃爾春秋長歷書後乙巳此杜元凱所撰春秋長歷也學者不得見久矣曲阜孔君葓谷始梓而傳之殆亦從永樂大典中出也余考唐一行合朔議頗詆諆此書其言曰春秋列國之歷不可以一術齊而長歷日子不在其月則改易閏餘欲以求合故閏月相距近則十餘月遠或七十餘月此杜預所甚繆也今讀杜氏之書始知一行殊未得其意而妄有所譏蓋春秋時史官置閏多有違失預固云未必得天蓋是春秋當時之歷也是則此書非自抒所見盡改前歷之繆第據經傳所載日辰與夫當時議論以相發明云爾一行乃以為杜氏之繆此正如杜之自序所云無異度己之跡而欲削人之足者也且長歷閏月相距遠者亦不過四十餘月未有如一行所云七十餘月之多也襄二十六年閏十二月二十七年十一月又頓置兩閏一行以為近則十餘月論亦疏略夫比年而閏甚且比月而閏即非疇人子弟亦皆知其不可曾謂杜氏而懵然乎蓋凡所次比悉據當時實事非以為是而從之此不可歸過於杜也大抵一行於歷學推算極精而論古往往不得其解其日度議謂漢太初元起丁丑不值甲寅猶以日月五緯復得上元本星度故命曰閼逢攝提格之歲嘉定錢莘􅎝言一行不曉秦漢閒多以歲陰紀歲故為是強作解事之語歲陰與太歲皆百四十四歲而超一辰觀太初詔書明云年逢焉逢攝提格矣安得云實非甲寅乎蓋其疏舛固不獨論此書為然也石臺孝經跋壬寅唐明皇注孝經十八章以隸書之刊石立於石臺天寶四載九月國子祭酒李齊古表上後有大字批答竝行草書又有李林甫等草一人名銜復自韋騰起凡草四人名銜皆正書韋騰下有丁酉歲八月草六日紀九字案丁酉乃肅宗至德之二年也後來所題故與上諸人不相連屬此碑大字損泐者二十有五小字二十有四其完善者光采奕奕動人洵可寶也說者謂古文孝經有閨門章今文無之明皇不注古文而注今文此宮閫之所以多慙德也余謂此蓋書生拘曲之論即今文所云使明皇果皆精思而身體之亦必能正其身以型於家何待誦閨門一章而始瞿然知瀆倫之不可哉後諸人中陳希烈張均達奚珣皆陷賊受僞署者也其於移孝作忠之旨固未有聞焉巳題九經古義刻本後甲辰此書乃益都李才江在粵東時所梓也曲阜孔葓谷以貽余余先巳就惠氏家得其本録之今取以對校鈔本內少一條得刻本補之而刻本內之訛誤余亦因以正之皆成完書惠氏四世傳經其最著者為半農先生紅豆先生乃定宇之祖若父也定宇實克纘承不愧其先世令人企羡不置此本俟余長孫能庸少長授之亦望其母墜前人之業如惠氏可師也釋夢英十八體篆書跋壬寅每體各五字首曰沙門惠休詩後曰乾德五年於長安書宣義大師夢英集中閒乃江淹擬休上人怨別詩也今人輒以碧雲句譽詩僧而不復以為文通所擬作蓋沿誤也久矣每體下注解隸書後有馬去非等十二人贈詩及郭忠恕書尺皆正書乃袁允中所書也又有陶穀等三十二人贈夢英詩乃咸平元年正月所立釋正蒙正書前碑馬去非諸人之作亦在焉米襄陽書史謂夢英諸家篆皆非古失實一時又從而贈詩使人愧笑或云是其徒依託為之以張大其教耳釋夢英篆說文偏㫄字原跋壬寅英書多繆體畢秋帆中丞巳舉其㼱􅡚叀嘼瓦等篆之失正及音切之不合前人者如皀為方木反犛為陌包反災為方九反皆大誤也余謂其以為云乃尢繆之甚者乃到子音突若云乃古文雲字見雲部何可混也英又有篆書千字文其中亦多可指摘云校孫奕示兒編訖因書其後乙卯此書十數年前鮑君以文屬豫校訂豫以此書援引甚繁富而刻本不精其訛字脫句往往而是倘僅叩平生所記憶者略為正之慮所記憶者亦不能無失也且亦有舊校者在其上不知何人不能為之剔蠹屠贅而反益之疻痏若更以我所校益之懼將為之分過故捲書還之其事遂中輟然此書辨書之形聲實可益於初學餘亦以資聞見以文欲得一善本以傳世也固宜今年乃請之孫侍御怡谷怡谷學人也宜其視此無難焉爬梳洗剔視元本不可以道里計乃不自信而重諈諉及豫噫相距十餘年新學未見其長而舊學日巳就荒將何以副二君之雅意哉雖然書實有用之書使得完然以傳自今至於後世先哲之精神藉此以不澌滅亦後死者之責也遂發憤而取家所有四部書有可疑者一一比對具有證佐乃敢為之乙改塗注視向之舛誤者可十去其八九矣幸筋力尚強故能勉而為此庶幾不辜上天所以留我於世之意乎時乙卯中元後一日書吳葵里所藏宋本白虎通後甲辰書所以貴舊本者非謂其概無一訛也近世本有經校讎者頗賢於舊本然專輒妄改者亦復不少即如九經小字本吾見南宋本巳不如北宋本明之錫山秦氏本又不如南宋本今之翻秦本者更不及焉以斯知舊本之為可貴也余頃校白虎通付梓垂竣而吳子葵里示余以此本實北宋時坊閒所行未校本也目録前小序數行其云白虎建德論者開卷即巳錯訛然余取其書字字比對始知此本尚多古字而近世本率多改易至情性篇中有與近本迥異而實勝者即一二誤書尚可循形與聲而得其本字若近世本則不加思索而徑改矣又此本雖分上下兩卷然篇目上作圓圍者十仍不失十卷之舊近世本最後三篇此本在爵號諡之次實第二卷也三篇之序亦復不同後得元大德年本與明傳氏程氏吳氏何氏本不甚異要皆不及此本洵乎舊本之為可貴也吳門朱文游亦有此本上卷係影鈔亦更無他人之序然則非脫去可知巳余取此書之善者具著於校勘補遺中而仍以其本歸吳子吳子其寶之哉題朱文游所藏白虎通小字本後甲辰白虎通以此本為最古唯匡字有減筆若構字敦字皆不避疑當在南宋之前海昌吳葵里曾以全刻本示余但少模糊此本乃吳門朱文翁所藏者上半冊係影鈔然字畫極分明知其所見本更在前也刻本目録中有小圓圍十蓋雖分上下兩冊而猶以此識十卷之舊鈔本遺去余為補之書中大段亦舛訛然情性篇則各本皆失而此獨得並古字亦有未為後人改易者余梓此書時惜見之少晚因別為一卷著其異同庶人人知此本之可貴云題朱文游所藏元大德刻本白虎通後甲辰世所行白虎通咸從元大德年刻本出然元本久訪之未獲今乃從吳門朱文翁借得較小字宋本又多傳録之誤矣然當時梓此書者極矜愼不敢輒有改易如逆子釗為迎子劉亦仍其舊見於跋語中而後來所刻咸不能然既刪去此跋並前數序亦復失其位置余以此書授梓時幾沿其誤今見此始得正之此書余與二三通人校讎幾不遺餘力矣而此本上有惠定宇先生手蹟其正誤不過兩三條乃竟有出於余輩思索之外者相去三十里詎不信然耶對校訖因附識數語而歸之劉子跋癸卯劉子五十五篇南齊時劉晝孔昭撰其文筆豐美頗似劉彥和然此頗有用世之意焉或疑即協所著殆不然也有唐播州録事參軍袁孝政注其云劉晝撰者亦孝政之序云耳宋人黃東發遂疑為孝政所自著余借得道藏本見孝政所為注淺陋紕繆於事之出左氏國語者尚多亂道而謂其能為此文乎余取其本以校世所行名為新論本補脫正訛遂成善本孝政序則兩本皆遺之矣當朝公武陳振孫兩家著録時尚見之也其書首言淸神防欲去情韜光近乎道家所言末敘九流道藏本先道家外閒本先儒家觀其總括之語則道藏本實據其本書次弟如此非由後來黃冠所妄為移易也東發又譏其文類俳此在當時文體自爾中閒亦不全避唐諱安得斷為唐人其惜時云人之短生猶如石火唯立德貽愛為不朽也若生為無聞之人殁成一棺之土亦何殊草木自生自死者哉歲之秋也寒蟬抱樹而長吟哀其時命迫於嚴霜而寄悲於菀柳今日向西峯道業未就亦奚能不霑襟於將來染意於松煙者哉此其所以著書之意也古人留意於身後之名若此讀此能不瞿然有動乎書鐵圍山叢談後壬寅此宋蔡京之子絛謫鬱林博白時所作欲掩其父之惡正所謂雖孝子慈孫百世不能改者況於絛哉中閒有戲乃父之言更不足責鮑氏得嘉靖年雁里草堂所鈔六卷之足本又益以璜川吳氏涉園張氏兩家之本而合校之乃始版行亦勤矣哉鐵圍山者取諸佛家之語華嚴經云四天下共一日月為一世界有千世界有一小鐵圍山繞之名曰小千世界有一千小千世界有中鐵圍山繞之名曰中千世界有一千中千世界有大鐡圍山繞之名曰大千世界又長阿含起世經云海外有山即是大鐵圍山噫即觀其名書之意亦可知其誕也巳書周恭叔浮沚集後壬寅周恭叔名行已永嘉人宋元祐六年進士官至祕書省正字出知樂淸縣鄉人相沿稱其初授之官為周博士云早從伊川程子遊而集中有與釋門往來文字入彼家之言其學似未盡醇若因其推崇睂陽為文伯以為能化去洛蜀門戶之見則於釋氏又若何置論哉其在太學以同學生馮參行至孝而師事之為羣士所怪笑勿恤也其教授於鄉也謂禮義之所始在於正容體齊顔色順辭令學有齊揖弟子每朝必揖其師此愛敬之道也其可廢乎文弨因憶向見明呂叔簡去僞齊集中有捲班說送人之建武學正其略云捲班之禮淸晨魚貫而入鷺序而立贊者曰升階然後折旋而上前後重行南北視之若一東西視之若一既揖升堂分就東西序畫簿不僭後先下管無聲師長有問不躐對弟子有請無儳言不問不言則俯首肅容其在堂也如此畫酉亦然此教學者主敬之道也習而安焉無往而非敬矣盛德大業皆基於此以肅紀綱以辨名分屈伸有度進退有律經文緯武靡不繇之今也大班升散矣凌次而鬬捷語譁而容情坐立出入惟意所適皆苟也苟則肆肆則何所不至哉憂世者於此有深恫焉觀叔簡之言知明之盛時師儒猶能舉其職而今也並大班之制亦亡矣書院所以救學校之衰也然亦相習通侻蕩然無復繩尺若周呂二公之所言非睢目未之見耳亦未之聞也余意欲稍稍導諸學子以禮讓之節故因閲是書而並著之以為同志勸焉乾隆四十七年三月朔日在晉陽書書毗陵集後壬寅毗陵集五十卷宋紹興中參政常州張守子固撰今其全集不傳此十六卷乃從永樂大典中鈔出者其所論奏皆切於事情吾讀其詹抃墓志見回河復禹故道之病民而深幸今日倡此議者之不果行也志云政和某年回河復故道調京東西河北之民三路騷動役至再三而功未就數百縣病之於時憸人欺君幸寵爭立新奇之功以取勝至斷千載不可力制之大河使由山徑之蹊以人勝天逆理咈衆羣小靡靡附和毗陵詹成老知定陶獨憂其病民謝事而去嗚呼賢矣哉昨嵗冬河決曹州大臣御史中有獻議導河北流者天子灼見其非詢之河臣亦以為斷不可行議遂格儻使斯議得行則其為民害也有以異於政和之日乎夫前事之不忘後事之師也吾故録其言以為後來論事者之鑒集中詩風格蒼老源於少陵使事亦復精切其絶句有云元非食肉封侯相合抱遺經老玉川此則若為余贈者然歲壬寅正月二十有七日書高恥堂稿跋辛丑高恥堂名斯得宋史有傳邛州蒲江人以骨鯁敢言稱德祐初參知政事豫祠宋亡隱居苕霅閒以卒世亡其集久矣今此八卷乃從永樂大典中輯録者中有詩三卷多感時傷事之作亦浣花之遺也抑其老而讀書不衰與余性酷相近其詩有云玩物能喪志聖賢言皎如賦受有奇偏誰能為耘鋤又云少時輕寸晷老去惜分陰又云爾來兩目漸眵昏一一手鈔寧敢倦固知衰頽力不勝其奈嗜好頑難變又云但願殘生更幾年了我牀頭二三策此皆吾今日之境意中之言故尢喜之友朋閒有愛我者每數數規我以守約之道而余愛博之性始終不能割也目有眚已近十年幸不至全盲以多看一卷書為此生之幸余少壯時亦未若近年來之尢汲汲也來日苦少雖欲不分陰是惜亦豈可得高公真吾師矣乾隆四十六年十二月十八日六十五歲叟盧某在晉陽書題張氏所刻栲栳山人詩集後甲辰乾隆庚寅見今太史邵二雲於京師訪鄉前輩遺書得元岑靜能先生詩集三卷録而藏之閲一周星而張羅山氏得邵本並汪本岑氏後裔所藏本合校而貞諸梓校余所録本增多七律二十八首然有二首録本有而此本反無者贈危太朴先生詩風格淸徑多見道之言有以自樂不慕榮利有句云靜中有樂我素諳字我靜能斯不愧允哉斯言乃近人顧俠君頗意其有鬱塞之慨殆非知先生之深者先生德高望重官斯土者咸知尊敬之邑中多陰受其芘蓋大凡名門右族後人稍陵夷衰微者每易為暴富有權藝者所侵陵或利其田宅墳墓而强丐奪之今憚先生咸蓄縮不敢肆故宋文憲題先生集云名閥之家雖至凋瘁多藉之以自立崛起寒微之輩雖富埒公侯亦不敢為凌躐之事正謂是也先生既沒趙古則等私諡先生曰貞元亦據諡法淸白守節行義悅民兩言為定論然則先生豈僅獨善之士哉羅山於鄉先哲之遺文咸寶愛而表章之此其一也用意若此不誠可尚也哉題鈔本栲栳山人詩集後甲辰此本余鈔之邵二雲氏久置篋中乾隆甲辰二雲復貽余羅山張氏所刻本因取以校此本補正十數字題目或不同詩分合亦異者張本殆得之張本七律多於此本二十八首此本贈危太朴二首顧缺焉先生古詩格高氣徑多以理勝有益於世教然亦溫潤妍雅與陳腐之言迥別集中獨無五七言絶句蓋本四卷今三卷疑失其末卷故也刻本有像贊及王至所為行狀而無宋濂溪氏所題余將録以寄羅山並正其訛字數處使刊補焉為余鈔此本者江陰陳生于逵也後官廣西奉議州判今無其人故不能寫所缺者以足之容有待於將來題曹荔帷遺詩後乙巳吾姻家曹君義門出其賢叔荔帷先生遺詩墨示余循環諷詠可謂淸無點塵淡餘雋味書法亦不染俗派斯人也而竟以明經終雖抱其才無如命何余居鄉之日少歲在癸巳主鍾山講席荔帷亦適來主余同年袁簡齊所始得會面未暇一叩底蘊即別去今覩遺跡殊恨鄉有名士而不知可愧孰甚焉非義門之勤勤收拾將終於不知矣昔陳之陸從典少為從父瑜賞愛後乃集瑜文為十卷今義門雖常客遊倘歸里中從故交世好訪求亦尚未至失墜庶荔帷厄於生前而不致泯然於身後義門之力也幸勉為之毋讓昔人書張蒙山果葬高氏九棺記後庚子乾隆甲戌余晤蒙山先生於長蘆先生知余歸為葬母也甚慫恿之余因知先生高義事嘗助族親之不能葬者巳百餘棺矣二十年來則又倍之今以大耋之年飢驅出游猶篤於師友之誼若此又得施我真太守童二樹山人以共成之語云德不孤必有鄰信哉此記敘次委曲詳盡讀之可挽澆風而敦薄俗先生曰余第不欲攘人善以自功則其用意為尢深遠矣書顧懷祖秀才所藏先世圖像後甲辰乾隆甲辰長至月海昌吳槎客過余婁東講舍適顧秀才名張思者亦來見吳適攜有顧文康公誥敕遂出共觀明日秀才以家藏先世圖像諸名公贊頌之文共一大軸見示故家喬木令人肅然起敬吳君儻能解所有以贈秀才在顧氏更多一世寶矣行當問之弟子歙縣陳兆麒仰韓校抱經堂文集卷第十二終
