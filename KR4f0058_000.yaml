  text: 助梓姓氏
  hash: sha256:5e410c63f52feca6473ddb94fbea2fde27ceed27630857db67f735bc67a942de
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0058_SBCK_000-1a}
body:
  text: 秦恩復敦夫揚州秦震鈞無錫朱子鄂蒨士松江楊復吉慧樓吳江梁同書山舟錢塘吳騫槎客海寧吳英進階升海寧金泳星涵仁和金棫松崖仁和陳希濂瀫水錢塘嚴樹萼茂先歸安溫純一齊烏程金德輿鄂巖桐鄉張湘補帆嘉興顧修菉崖石門方薰蘭坻石門柳兆勳書旗蘭溪戴殿海朗峯浦江故兩淮都轉鹽運使雅雨盧公墓志銘乙未嗚呼公與先君子篤兄弟之好實以文章行誼相契合文弨始拜公於淮南公㢡借僃至有加禮焉嗣以憂歸又嘗一再見於後以使事竣過公里門見於寢室情話溫款至夜漏下數刻而别噫孰知遂為永決邪聖上以八枋馭羣臣奉三無私臨照天下公既殁之三年返公之子中憲君謙於戍所今見任廣平府同知將葬公以銘幽之文來謁公之仕績綽有可紀重以知己之感其曷敢辭案狀公諱見曾字抱孫號淡園先世在明初由淶水徙德州左衛代有顯者曾祖諱世滋太學生與御史世㴶為同産兄弟祖諱裕庠生考諱道悅康熙九年進士知陜西隴西河南偃師兩縣崇祀鄉賢妣程氏生母王氏公任長蘆鹽運使時三世皆膺贈典公生而穎異年十五補博士弟子員康熙五十年舉於鄉逾十年中禮部試奉廷對賜進士出身是科聖祖仁皇帝詔進士未入館選者咸一體命儒臣教習三年公遂留竟學雍正元年試於廷名列一等時世宗憲皇帝新御極整飭吏治重親民之任凡進士在高等者以知縣即用公念贈公年高欲陳情歸養贈公不許謁選得四川之洪雅縣民困供億久公至悉除之邑多地訟前政以山徑險憚履行公一一親履剖決各還主者山中人數十年不見長官始聞之駭繼乃大服初邑民受採木之纍役甫罷姦人又以開礦呈大府公亟論其害得巳贈公卒於家公聞訃奔喪邑人感其德上司惜其才交相留公謝曰若使某貪榮忘哀何顏過毛君里門毛君者邑孝子也未幾兩母亦皆下世服既除始克營葬事畢復補江南亳州之蒙城縣制府以公協理州務旋授六安州知州時方行􅛮田之令有監生葉乙妄指官塘八十三口為可􅛮前政巳為之申上報可矣公至亟言於上司曰夫水為田之母無水則亦無田以數干百家之世業數千萬畝之上田豈可因姦人一言而廢事竟巳又調亳州開龍鳳等溝使由渦以達於淮州遂無水患報最憲皇帝親擢廬州府知府又奉檄攝鳳陽府事未半載復奉旨調守江寧時潁州新升為府以亳州並所屬之縣隸焉仍命大吏為擇賢守制府遂以公名上恭遇今上登極允行潁屬半舊治聞公來肅然向化時西湖湮塞已久復開濬以還舊觀水有所泄且資以灌田大為民利時官於豫者欲開賈魯河以通渦事成潁且受其患公抗議屈之乃寢擢江西廣饒九南道未久授兩淮鹽運使復護理兩淮鹽政又承中丞檄督理揚州關務公與中丞邵公基同年素友善制府鹽政皆劾公以為黨讞上上薄其罪命往軍臺效力乾隆九年召還以直隸州知州用往保定制府治所待缺值灤州歲荒有聚衆借糧事官為逮千餘人復不即訊託他故離治所制府高公斌慮其有不虞素知公能辦大事使馳往代之時久旱乏食又因株連者衆民情洶洶公至即引逮者詢所借多寡令各自實一切放歸使得耕雨亦隨足歲因以稔各持糧還借者公量懲數人以示警境內帖然州人為建喜雨亭志公德又革地稅之病民者期年遷永平府知府轉長蘆鹽運使以商應完之正課及雜征明注於引而吏胥無所容姦至今遵行之再閲歲復調兩淮公前時嘗取劉晏遺法覘所在鹽價之貴賤而權其緩急江楚官民俱稱便獨商以不得居奇大不悅又往往以峻厲病公及公再至乃不敢有他言公亦濟以平和地方有災倡率商人協力救之全活者衆揚地窪下乃為相水道而開通之民始免昏墊之患有碑紀其事在兩淮任十年以老得請還家修墳墓置祭田恤宗族教後學蓋離家三十年至是始得庀其私也謙由刑部郎中授湖北武漢黃德道歸省公時適聞湖北有水災即趣謙亟往既而任兩淮鹽政者以相沿充公之提引餘銀入告於是歷任鹽政皆得罪公為運使不詳請遂逮公對簿以乾隆三十三年九月二十八日故於蘇年七十有九惟一孫在旁前一日猶從人借書云方伯胡公文伯為殯斂且經紀其喪以歸公之才長於鉏强治劇而尢以興學造士為先在洪雅建雅江書院在六安建賡揚書院在永平建敬勝書院在長蘆建問津書院揚州舊有安定書院更因而廓其規制嚴其教條前後所成就者不可枚數於前賢古蹟缺者補壞者修罔不興舉公之曾叔祖御史君負海內文名世所稱德水先生者也公繼起又嘗親炙王漁洋田山薑兩先生而得其指授以故詩名早著風雅之士宗焉公嘗自號雅雨山人談藝者無不知有雅雨先生也公最篤師友之誼珍其遺文而表章之若虞山汪容齊應銓桐城馬相如朴臣懷寧李嘯村葂全椒郭韻淸肇鐄各家集皆公序而梓之此外補刻朱竹垞經義考成完書又刻尚書大傳大戴禮等書十四種皆善本又惠定宇周易述王漁洋感舊集亦皆梓行其山左詩鈔若干卷則公所選輯也獨己之詩文唯塞外集有板本餘無暇自遴擇家居漸次編定被籍時為有司所毁今公子所掇拾唯古文七十篇詩二百七十首而巳公好汲引後進孜孜如不及其所㢡拔後皆有名於時夫人蕭氏翰林院侍讀惟豫女性安朴素外若無所能而甚得兩姑歡及兩姑相繼卒於細大事又治之罔不中窾以雍正十二年七月二十日卒年四十有四今以乾隆四十一年某月某日葬公於某鄉某原夫人祔焉子四人長即中憲君謙次謹候選主事卒次謨監生次誾女子一人適臨川縣知縣高質敬孫十一人蔭仁監生卒蔭澤增廣生蔭環庠生蔭文監生蔭慈蔭惠庠生蔭溥庠生蔭長蔭復蔭元蔭甲孫女七人曾孫三人松齡柏齡樁齡曾孫女二人銘曰敏於政惠於民篤於交親以泉文人學人不賤賤不貧貧長逝永畢而轉相述者猶齒頰之回津子孫繩繩以亨其迍歸魄吉土千春萬春校訂姓氏孫志祖頤谷仁和徐鯤北溟蕭山鮑廷博以文歙縣胞弟文韶紹音餘姚抱經堂文集目録卷一對策朝考卷散館卷應殿試策誠為幾善惡論擬察茂材異等詔時政疏責難賦卷二序一聖廟樂釋律序丁小匹校本鄭注周易序王厚齊輯鄭氏注尚書序尚書大傳考異補遺序增校王伯厚詩考序王伯厚輯古文春秋左傳序春秋五測序讀大學衍義補膚見序中庸圖說序新刻古文孝經孔氏傳序鄭氏注論語序孟子章指序重雕經典釋文緣起九經古義序卷三序二吳槎客子夏易傳義疏序李既方補李鼎祚周易集解序校本韓詩外傳序春秋內傳古注輯序儀禮注疏詳校自序重校方言序段若膺說文解字讀序聲音發源圖解序雕洪景伯不全隸韻序校刻白虎通序卷四序三皇朝武功紀盛序史記索隱校本序校定熊方後漢書年表序錢晦之後漢書補表序續漢書律歷志補注序翰苑羣書序關帝事蹟徵信編序漢董孝子廟志序續高士傳序新安汪氏增輯列女傳序越女表微録序桐鄉沈氏家乘序三峯盧氏家志序江寧王墅孫氏族譜序蘇州袁氏家譜序甬東盧氏族譜序補元和郡縣志序新定元豐九域志序襄垣縣志序卷五序四新校說苑序惜陰録序遠異録序李東升勸善書序硯北雜録序新刻金薤琳琅序庚子銷夏記序鮑氏知不足齊叢書序卷六序五先祖春柳堂詩鈔小序汪津夫先生詩鈔序戴剡屛定邊雜詩序靜志居詩話序江愼修河洛精藴序戴東原注屈原賦序戴氏遺書序孔百城補杜氏釋例世族譜序重刻何注孔氏家語序新雕柳仲塗河東集序吳國山碑考序居官必閲録序杜詩雙聲疉韻譜序輯盧子幹禮記解詁序爾雅漢注序卷七趙辭重校經史題辭周易注疏輯正題辭七經孟子考文補遺題辭題三立書院所藏通志堂經解卷首題針膏肓起廢疾發墨守重校關中新刻淮南子題辭題張之象注鹽鐵論新雕西京雜記緣起題春渚紀聞三水小牘題辭揮麈録題辭題癸辛雜志對牀夜語題辭碧血題辭史糾題辭題明史藝文志稿莊香塍古文􅡔鈔補題辭羣書拾補小引劉隨州文集題辭題宋板施注蘇詩遺山樂府題辭遺山樂府選題辭米襄陽畫史題辭為桂明經未谷題說文統系圖題桑東愚先生松林采藥圖端題虞山趙氏增置祀田碑記題嚴葆林香照圖後四時尋樂圖題辭四蓮池題額卷八跋一十三經注疏正字跋郭氏傳家易說跋融堂書解跋呂氏讀詩記跋王厚齊詩考跋何楷詩經世本古義書後春秋尊王發微跋張氏春秋集傳跋書春秋繁露目録後惠定宇春秋補注跋不全宋本左傳跋書公羊注疏後方望溪鍾蔗經兩先生刪訂周禮訂義書後魏華父儀禮要義跋書校本儀禮後新刻大戴禮跋夏小正補注書後書楊文定公大學中庸講義後孟子注疏校本書後十一經問對跋五禮通考跋廣韻跋張萱彚雅前編書後卷九跋二竹書紀年統箋跋題越絶後中興館閣録續録跋書釣磯立談後夢粱録跋書歸濳志後兩漢刊誤補遺跋新唐書糾謬跋咸淳臨安志跋嘉泰會稽志跋蠻書跋書西藏見聞録後水道提綱跋書徐霞客遊記後城東雜記跋書録解題跋新訂書録解題跋卷十跋三書荀子後書校本賈誼新書後李軌注揚子法言跋書鶴山雅言後荷亭辨論跋書學蔀通辨後書鶡冠子後書陸農師解鶡冠子後聚珍版本鶡冠子書後鬼谷子跋書韓非子後書呂氏春秋後書子華子後崔豹古今注書後玉照新志跋書東坡志林後湛淵靜語跋書真誥後卷十一跋四書北夢瑣言後侯鯖録跋書麈史後書石林燕語後書泊宅編後游宦紀聞跋輟耕録跋書七修類蒿後書韓門綴學後書楊武屛先生雜諍後再書雜諍後山齊客談跋書鄭芷畦先生傳記後書楊恭士撰先外祖墓表後題劉烈母詩卷後卷十二跋五書易史後書儀禮識誤後春秋長歷書後石臺孝經跋題九經古義刻本後釋夢英十八體篆書跋釋夢英篆說文偏旁字原跋校孫奕示兒編訖因書其後書吳葵里所藏宋本白虎通後題朱文游所藏白虎通小字本後題朱文游所藏元大德刻本白虎通後劉子跋書鐵圍山叢談後書周恭叔浮沚集後書毗陵集後高恥堂稿跋題張氏所刻栲栳山人詩集後題曹荔帷遺詩後書張蒙山葬高氏九棺記後題顧懷祖秀才所藏先世圖像後卷十三跋六書鄭司農集後書毛氏袖珍本陶集後書王右丞集箋注後李元賓文集跋題賈長江詩集後再題賈長江詩集後徐常侍文集跋胡方平文恭集書後尹河南集跋書李泰伯文集後劉公是集跋后山詩注跋樂圃餘稿跋潔齊集書後卷十四跋七書晦菴題跋後玉楮詩稿跋劉後村集跋剡源集跋仇山村金淵集書後書李空同詩鈔後跋西北之文景菊公先生詩集跋濂洛風雅跋題王阮亭先生感舊集後文心雕龍輯注書後䂬溪詩話跋逸老堂詩話跋卷十五跋八漢衛尉衡方碑跋漢蕩陰令張遷表頌碑跋漢博陵太守孔彪碑跋漢倉頡廟碑跋漢孔褎碑跋魏魯郡太守張猛龍碑跋北魏汲縣齊太公廟碑跋唐光祿大夫張琮碑跋唐禮部尚書張碑跋唐汾陰獻公薛收碑跋唐褎國公段志􅏏碑跋唐申文獻公高士廉碑跋唐贈太常卿禇亮碑跋武周夏日遊石淙詩石刻跋武周珍州榮德縣丞梁師亮墓志跋唐紀國先妃陸氏碑跋唐于維則建陀羅尼經幢跋唐濟度寺尼惠源和上神空志銘跋唐王居士磚塔銘跋唐義興周夫人墓志跋唐顏魯公書東方曼倩畫贊跋唐內侍李輔光墓志跋唐淸淨智慧觀身經銘碑跋唐太常丞贈諫議大夫溫佶神道碑跋唐西平郡王李晟神道碑跋宋穆庭秀穆伯初二墓表跋宋龍泉山普濟禪院碑銘跋元重立開化珤巖閣記跋元少中大夫梁天翔碑跋近刻隨姚恭公墓志跋卷