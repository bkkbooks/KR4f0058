body:
  text: 東里盧文弨紹弓序四新校說苑序庚子漢禁中先有說苑一書而子政為之校讐奏上號曰新苑余向閲文獻通考疑新苑為說苑之訛及後得宋本此書前有子政所上奏云臣向所校中書說苑雜事及向書民閒書互校讐分别次序除去與新序復重者更造新事十萬言以上凡二十篇七百八十四章號日新苑皆可觀然後知余向之所疑為妄也宋本自勝近世所行本然亦多錯誤今取他書互證之其灼然斷在不疑者則就改本文而注其先所訛者於下使後來者有所考若疑者兩通者則但注其下而巳此書之言治術略僃矣人主得此亦足以為治矣其中傅會淺陋者誠不能盡無然非有害於治道也宋曾南豐譏其不能擇其所學以盡乎道之精微夫向之所事何主而可以精微語之哉昔郢人有遺燕相書者誤書舉燭燕相得之以為欲其舉賢賢者所以為光明也於是任用賢者而燕國大治以此觀之雖其傅會淺陋者誠善用之安在不可以為治而況其大經大法格言正論之比比而是哉蓋公曰為治不在多言顧力行何如百諒夫若南豐氏者可謂好為高論而不切於事情吾不知此書之外曾之所謂精微者何等也牛溲馬勃良醫兼收而待用焉今必曰空靑鍾乳也不當其疾轉以速死故夫南豐之言不足以病子政也顧西漢之末外戚方盛而宗室疏遠至不合得給事朝省子政慷慨奏陳載在史冊今其書乃云秦信同姓以王其衰也非易同姓也而身死國亡故王者之治天下在于行法不在于信同姓斯言也不幾於以水濟水乎蓋亦先所有者己以同姓之嫌轉不得而私削之削之恐小人益得以行其讒慝也且以秦為信同姓亦未然此書第六卷中有蘧伯玉得罪於衛君一條他本皆脫去唯宋本有之又按禮運正義云說苑凡能字皆為而字余求之殊不多見蓋為後人輒改者多矣校讐既訖略書其所見如此乾隆四十有五年正月十六日書惜陰録序丙申江陰徐靑牧先生篤學力行之君子也生平於易於書於詩於春秋於三禮於四子書皆有注解而皆以惜陰録名之今此惜陰録八卷者乃先生鞭辟進道之語閒亦釋經而不主於一經蓋倣明儒薛敬軒讀書録而為之起於康熙十五年至十八年四年中之日記也觀其提撕警惕一念不敢自恕一刻不敢少墮實有見夫理之不易純而欲之不易淨也故其詞多危余讀之􅋏然蓋常人鮮有能自見其過者日復一日如痿痺之人不復知痛其生也不知其所為生其死也又安知其所為死大數將至奄然盡耳孔子曰朝聞道夕死可矣又曰假我數年以學易可以無大過矣聖人無過惟聖人能自知其過一毫與天地不相似是亦聖人之過也於無過中見有過有過而能復之於無過斯然後可謂之聞道聞道豈易易哉道之難聞也過之不易無也聖人猶憂之況學者乎聖人之假年亦聖人之惜陰也學者苟不求寡過則巳欲求寡過則惡容不惜陰先生常以理欲之消長自體驗功力之進退自程督恐懼懲艾之意畢見於辭而世之泄泄然任歲月之如流而莫之省悟者不亦大可哀乎先生之言視之若無甚深邃而要其克治之嚴良有可警發後人者余是以録之將奉為針石焉先生名世沐字爾瀚鼎革時其父以布衣偕弟兄咸死難先生時年十二作此録時年四十三矣後享年八十餘乃終録當未竟而余之所見則止此豈其後專於釋經而於此遂不復有所庚續歟是書有其友張德生點勘亦能貢直言今采擇一二注其下卷數亦余所分也乾隆三十八年朝廷求訪書籍江寧方伯吳興閔公為鈔其諸經解共四十九大冊進呈始知中有缺卷周易惜陰録缺三十二三十三兩卷又周易家諱義録缺第六一卷詩經惜陰録缺第五六七共三卷問其家不知也是書以未經整比故未及鈔録同進遠異録序己亥道一而巳如射者之有的焉如工師之有規矩準繩焉故人之為學必先志於道志道則不為他岐之所惑望以為趨俯焉日有孳孳死而後已其至焉者聖人也未達一閒者大賢也或資力之所不逮舉之莫能勝行之莫能至而軌徑勿失或遠或近而皆有可造之理高明中正與聖賢共此一途而決不為下流之歸聖人自言十有五而志於學志學正所以志道也志乎此則凡動靜語默酬酢往來縱極境遇之不齊經權常變千形萬狀而皆不離其宗否則學非所學即志非其志而顯然與吾道背馳而不悟或有推援比附似是而非而卒不可與入聖賢之路則終其身與道異趨矣異非獨楊墨也釋老也差之豪氂謬以千里故聖人於古今之判君子小人之殊似是而非之辨往往相衡互校昭昭然如別白黑此其愛人之深指示真切唯恐其或蹈於邪致終身沈溺而不能自反故明乎其異乃益見道之正之所以可貴也顧道者與天無極終古而不變而異者之情狀又往往與時遷轉幾於不可勝窮故三代而上異端惟楊墨三代而下釋老之熾更甚焉至程子則曰古之學者一今之學者三有詞章之學有訓詁之學有儒者之學詞章訓詁則異於儒者矣朱子有雜學辨謂二蘇張呂也其時象山陸氏亦自以其學為學相抗而不下明以來則又有姚江之學江門之學此皆顯託於吾道而實則為聖學之蔀其不惑焉者蓋寡若以近今士習而論又似與古之異者殊焉不詞章不訓詁亦無所專主以求必勝並亦不志於管晏之功利而或泄泄以嬉或僕僕為役此亦主持世教者之所當隱憂也朱子理齊守正之士也示我以所輯遠異録一編條分縷析證之以儒先之言灼然知異之不可為巳夫異者不能禁其無異唯有志聖道者必亟思自遠焉而異者亦將以漸化焉故孟子則曰息曰拒曰放理齊自度其力未可遽及此但曰遠之而巳異者遠則可以踐聖賢之途而莫吾梗者寧患其行而不至邪若夫世之自異者未嘗不欲挽之而不可與之爭勝於口舌之閒正身其本巳由是以為教則惟使人知恥乃可以救之蓋恥可以鼓怠者而使之鋭以進可以消競者而使之縮然卻也禮義廉恥國之四維恥亡則國之一維失矣理齊之遠異豈將獨善其身而巳乎吾故以此質之治人者即其所以自治者也而又何讓之與有李東升勸善書序庚子國老庶老皆有教人之責者也教人則必以善以善欲其從化夫欲使人從化則必取其易知而易由者人之情莫不欲趨利而避害聖人知之故有易以告其吉凶亦因其情而導之而未嘗謂趨避之必不可也善者人所同好而天之所必祐也不善者人所同惡而天之所必殃也以未定之天觀之似亦有不可信者逮其或遲或速而無定者卒歸於有定故何以謂之吉善是也何以謂之凶不善是也較利害而審其趨避時或至于相反就善惡而定其趨避則萬無一之或爽也為士者誦詩讀書必將取堯舜禹湯文武周公孔子孟子之言而精思之以蘄至於無所為而為然非可以此槩之四民也故中古以來勸善之書不一而就其約而易曉者往往能令民鼓舞踊躍震動恪恭而不自知其旨不悖於大道而化民之效或更捷於詩書禮樂之為功是即堯舜禹湯文武周公孔子孟子之撢人象胥也何可廢也吾里有李翁東升者善人也今其年躋大耊矣是古之所謂庶老坐於左孰而以教里中之子弟者以翁當之無愧色矣翁平日既樂於勸人為善茲更擇勸善之言最切者板而行之蓋欲使人人易知而易由也吾知從化者必多矣夫不求一身之適而勤勤􅝴􅝴欲率人而同出於善是即聖賢之所子而亦官師之所宜旌者也使讀是書者而皆若翁也則善之量於是益推衍於無窮也巳因敬書其端如此硯北雜録序辛未晉傅休奕有言年八十而不倦於書籍者吾於胡孔明見之蜀志亦稱向巨達年踰八十手自校書刊定謬誤積聚篇卷於時最多開門接賓誘納後進但講論古義不千時事載籍中如此二人者不恆有吾乃今得見之於崑圃先生先生今年亦當胡孔明向巨達之年矣而其學亦無不相似吾竊於先生之行事而知先生之學非近今之所能及也先生任山東提學時於濳德績學之士亟亟表章之唯恐不至若安􅏀劉直齊源淥之讀書日記濟南張稷若爾岐之儀禮句讀鄒平馬宛斯驌之繹史皆宇宙不可少之書今皆盛行於世而其源則自先生發之又嘗主江南試副者適以憂歸先生一人入闈合通場萬餘卷而遍閲之初得任翊聖啓運卷若不可於意巳從分校者請取而覆閲乃亟稱善卒拔之至今人士以為美談噫此非識之精而中之虛者能然乎夫識不精中不虛則是非鮮當而有固執之患學雖博君子亦奚取焉先生師友皆當世名流然或各持一意格不相入而先生獨能不執一見唯善是從是先生之學之博皆先生之識之精中之虛為之而非夫人之偶有一得沾沾自喜者所得而竝其美也今諸老先後徂謝而先生獨巋然健在優游歲月恆手一編是諸君子之菁英不盡泯滅於斯世者皆於先生是賴然則天之獨昌其年於先生者豈無意哉適先生屬文弨編校硯北雜録竟遂漫綴數語於餘簡云新刻金薤琳琅序戊戌宋考據金石文字者其傳有歐陽氏趙氏洪氏董氏凡數家之所證引其疏密短長今姑無暇衡榷而論其大體要必以番昜為最善蓋三家或偶舉一義或偏撮數言而唯隸釋之作則全寫其文亦悉摹其形闕者具著其所闕多寡之數雖灼然可知其為某字者亦勿之益後之人撫其遺文而讀之則時代之升降文章之淳漓字畫之正變事迹之詳略體式之異同雖去其人千載之遠而其面貌若可倣佛而得但謂可資以質正史傳此猶屬一隅之論也明人南濠都元敬氏亦著一書名日金薤琳琅所録一以洪氏為法而以所及見者為􅍘蓋都氏生後於洪又數百年愈遠則剝泐愈多固其理也嘗見薛尚功鄭漁仲所載石鼓文班班可讀豈當時果能完僃若斯哉又如瘞鶴銘邵興宗張子厚之流亦各以意屬讀故彼此差齵而莫能相一競逞私智妄為附益則何以取信於後識者病焉都氏固無此失所微不足者其點畫不悉依本文而每易以近體且閒有不審致訛者故諸家徵引其書而亦不恕其誤吾鄉汪子荻江家有此書惜其致力之勤而以微眚為纍於是取所藏石刻自獵碣而下字字比校一還其本真亦有洪氏闕而今本有者吾始亦疑之復取其榻本參對果不誣蓋榻本容有精粗之不同而且一經翦裁並先後亦有不能盡合者今則取而悉正之且明著其說甚矣汪子之為功於都氏者非淺淺也世所傳鐵網珊瑚亦云出自元敬近年以來有為之板行者顧謬加改易舛訛顚錯至不可讀於所集趙希鵠何良俊盛世泰諸人之書復一概抹摋而以為都所自著蓋余所見雕本之書無有若此之荒唐者夫同一都氏所著而其謬若彼其精若此殆有幸有不幸焉古云傳之其人信乎傳之不得其人猶弗傳也若汪子者信其人也夫刻既成辨數語於首實為是書慶所遭云庚子銷夏記序辛巳庚子銷夏記者北平孫退谷先生評騭其所見晉唐以來名人書畫之所作也鉤元抉奧題甲署乙足以廣見聞而益神智其鑒裁精審古人當必引為知己余尢愛其有恬曠之懷蕭閒之致雖今昔聚散之慨所不能無而亦不至吝情太甚以視趙德父之欲求適意而反取憀栗者固不同哉曩余於黃崑圃先生家見退谷手書畿輔人物志稿數十幀秀徑可喜此書自云晚得米襄陽墨蹟始悟晉法其書之工宜也退谷萬卷樓藏書今大半在黃氏昆季家而記中所載之縑素卷軸又不知散歸誰氏其所著書如格致録學典崇禎山書天府廣記皆在刊本之外此書余當時未之見或偶遺之未可知也庚子歲為順治十七年退谷是時年幾七十矣既耄猶能以好古著書自娛又歲一周而為王子當康熙之十一年更為尚書作集解隱然以伏生自喻論者雖不之許然與退谷同時人有初亦矯矯自附正人而垂老頽放惑以喪志猶復吁嗟憤懟進退無據徒貽後人之嘲嗤者其賢不肖相去何如也鮑子以文媚學好古汲汲如恐不及其搜集先哲遺文甚富得是記校讐完好鄭子弗人雅有同志讀而愛之相與謀壽諸梓既成請豫辨其端余惟退谷負當世盛名居輦轂之下四方士大夫多樂從之遊故能致天下之奇珍祕寶以供其題品其後吾鄉有高淡人詹事供奉內廷日久得見祕閣之所儲而未及記逮家居以其所寓目者輯為江村消夏録亦此書之類也士之欲網羅舊跡摩娑玩賞以振發其耳目者何限而力不能如二公但據所云云者觀之猶當有所會焉且以金石之堅也有時而刓而泐況於楮墨絹素之戔戔者然則古人之名筆或不盡傳而是書得傳其亦古人之精神所寄矣是二君刻是書之意也夫鮑氏知不足齊叢書序乙未宇內事不勝知也山川都邑不能以盡歷也必身親之而後知則其遺知也多矣是故與委巷之褐夫語所得幾何不若之乎通國大都接搢紳先生之餘論始足資其聞見也與牖下之鯫生語其所知不過閭井之閒一旦見宦遊而至者與夫行賈於四方者奉使於絶域者道其所經風土習俗人民物産纖悉僃具則了了焉與身至其地無異況乎聚千百年之名公卿學士各舉其生平所得力耳目所觸發以相為賜而曾不少靳朝擩暮染左采右獲人之神智有不益濬見識有不益擴學問有不益充實而貫通者乎則昔人叢書之刻為嘉惠於學者至也雖然亦有反以為病者真僞不分雅俗不辨或刪削而非完善或脫誤而鮮校讐就數者之中不完與不校之為弊更甚以余所見論之如風俗通本十卷僅刻四卷華陽國志之第十卷本分上中下今僅刻其下卷而遺其上中方言之前不載子雲與劉子駿之書趙后外傳之末不載伶子于之語拾遺記不載蕭綺之録甚或虛張名目而所載不及本書十之二三或本一書而䤨離之為四五為六七此皆足以疑誤後人後人將何由得覩其全乎至若校讐不精之弊更不可以枚數吾常以謂必得深于書旨而有餘力者始足以任此事擇之必其精如三墳端木詩傳魯詩說素書忠經天祿外史之類勿録也取之必其雅如百川學海百家名書所輯之繁蕪猥雜者勿録也而且勿惜工費一書必使其首尾完善勿加刪節至于校讐之功如去疾焉期于盡而後止如此古人之精神始有所寄而後人之聰明亦有所入則叢書之刻始為有益而無弊或問余日子所屬望者今豈有其人乎余日必吾友鮑君既答或人然未以語鮑也今鮑君果有斯舉先以其目示余凡百有二十種皆善本無僞書俗書得閒廁焉其校讐之精則其曩時嘗刊銷夏記名醫類案等書巳有明徵不待言巳昔宋吳明可嘗言傳書為極難當官事易集而無暇自校子弟方為程文不便以此散其功委之他人孰肯盡力轉以誤人不如其巳觀于斯言益知吾之有取於鮑君者正以其深于書旨年力方富而無他事之纍又不因之以為利其書之成必優于陶九成商濬屠隆吳琯胡文煥諸人所集可知巳噫自唐以來說部之流傳于今者蓋寡矣安得天下多生鮑君其人而使前人之著作有所藉而不至澌滅也與
