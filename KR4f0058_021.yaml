body:
  text: 東里盧文弨紹弓書五答孔葓谷書王寅日望足下惠音久不見到固知中間必有阻滯今八月杪始領手教及佳刻各種如餧人之得食喜極不可言喻鄭氏詩譜及張邱建算經僕有校出兩紙今寄上戴君方言疏證即校於其書上又去年曾與丁小匹書論及此亦附請教惠定宇沈杲堂二家合校五經文字九經字樣云據宋元鈔本校於項氏所梓本上改正字畫極細惠氏無説沈氏僅有一兩條今皆依樣録於尊刻本上寄轉其所據鈔本避宋欽宗桓字嫌諱如欑才丸反作昨官反實下注母公丸反作公歡反完音丸作乎官反貒他丸反作他官反觀此足明所據猶是北宋以來相傳之舊本而非臆撰可知巳然宋人既以避諱之故不難改易本文則安知其中不有以意為增損者如壟壠下注云二音隴方言曰冢界坪壠案其文殊不似此當云二同不當云二音隴其下所引無論刪節不明及埒字作垀之誤即其舍周禮禮記而取方言已開明人王堯惠舍經而泛引他書之謬之先矣馬氏所梓亦似據鈔宋本不全據石經故石經闕處馬本補之計其字數間有不能盡合要石經之脫誤處正復不免今當擇其善者而從之可耳石經之字不盡依説文張氏唐氏之書唯石經是從故校者不當以説文繩之且張參於小學殊不精故於夲本陜陜汜汜等字其説多混至足下所譏夊二字之互訛尚為筆畫微誤可以歸咎於轉寫之失以其下義訓及所從之字固未有誤也馬氏本幸部有脫行項氏本木部有錯簡此特小疵耳其點􅚭太半依石經絶不草草今足下校正此書於馬本所補亦不肯輕徇寧闕所疑愼之至矣然繡梓時一以委之剞劂氏彼俗工但知世俗所行之宋體字耳於草草日曰弓舟月之辨皆不能審古意寖微而於唐時避諱之闕筆僅有一二留者至偏旁則皆寫全矣若明人所補之謬挾欺塞責彼於世人習熟之經文可以一檢而得者尚且以靑易素以鹿為馬憑臆妄竄但求闕處有字便可適觀其於此二書益復何所顧忌今足下固巳灼見其謬不以滓穢本書別為五經文字疑九經字樣疑一卷舉其説一一從而辨之其於馬本所補亦致疑焉愚謂王所補直不足置辨若馬所補可信者多即有一二字數不合如石經本以十字為行亦有縮而為九溢而為十一者政不可執此亦疑其鑿空妄造也石經所注重文或脫或誤足下既補之正之矣唯危部下石經注云一字重文足下以無重文而刪之愚竊疑詭字下當有佹字如春秋書晉侯詭諸卒公穀作詭左氏作佹所謂重文或指此但危部凡陸字增此則多一字或因脫去佹字遂只就現在之字計之耳此雖不敢即以為然要亦可僃一説然則此四字石經所元有者毋寧不刪為是與鮑以文書壬寅熊氏後漢書年表今巳録出淸本可以授梓人矣所以遲至今日者實以此書紕繆極多若徒校訂一二傳寫之訛未便即稱善本仍然留後人指摘何益前與錢宮詹書中巳略道一二今書中凡改正增刪之處俱有校語繫於其下可無庸委悉具述姑撮其大段言之侯表中功狀不明紀事失實或以更始時事入之建武或以主將之官加之偏裨置臨邑侯復於王威之上而其子騊駼之嗣侯反遺之本傳並不言國除故文獻通考載騊駼嗣錫光封鹽水侯而但稱列侯又沒其不從王莽之大節而泛稱曰降征羌侯來歙為光武祖姑之子而以為甥宣城侯孫美襲其兄之封而以為隨父鄧騭諸弟並未受封而書其子皆曰嗣袁逢嗣侯其諡曰宣文而誤以為宣父與鄉亭名一例宜城漢壽皆書叛曹操所殺亦云誅百官表中何苗本不與何進同意而乃以謀誅張讓並歸之虞詡代陳禪為司隸校尉而反謂禪實代詡袁敞代劉愷為司空而敞之拜反在愷未遷官之前又遺漏甚多今於正史所見年代可考者補之其年代疑似與見於劉昭章懷注中者亦於校語內附著之視元本為少詳贍矣范史紀傳互有參差所當擇而從之至如北海哀王基濟南孝王香東平懷王忠諸人之年熊氏實沿本傳之誤今俱加以訂正然而猶有不能盡易者焉如宮詹之所規者但仍之而著其誤則以此固熊氏之書也如欲別加撰造又似不必故未免依違於其間而前後致有未盡畫一之處然猶愈於襲訛沿謬云爾足下其覆審之與翁覃溪論説文繫傳書癸卯説文繫傳一書向無力傳録未得細閲今承以汪氏新雕本見貽乃始受而卒業惜乎殘闕之巳多也此書在宋時固巳推重近閲爾雅疏及項平甫家説亦多引用其語僕何人敢於輕相訾燬惟是粗覽一過意實有不能盡愜者不敢以聞於人而私求正於足下竊以為解説文字惟當約文申義義明而止無取繁稱侈説也楚金所解大致微傷於穴而且隨文變易初無一定之説牽強證引不難改竄經典舊文以從之如掄與棆不同也而兩引周禮掄材一則從手一則改從木釋與釋亦有別也釋本訓漬米而此復贅云猶散也引釋為釋以為從米之證若􅢎柝兩字皆引易之擊柝不引周官之聚柝此固未為甚失也旨字下改內則調以滑甘為滑旨字改國語戎車待遊車之以為移字下則引詩好人袳袳案王伯厚詩考所載異文止有作媞媞或姼姼者今之從衣果何所本乎字下則引晉書郭案晉止有郭黁見藝術傳而非也脟字引子虛賦脟割輪焠則云脟借為臠於膞字下又引此復云脟當為膞是其説無一定也説文無幗字而有簂字簂即幗也乃指槶為巾幗之幗説文有字兼有榛字乃云説文無而指榗為榛栗之榛皆失於不審至於徐則以其得姓所自而張大其辭上泝顓頊以及皋陶伯益後封為徐徐在東海東方為仁方有君子國而且盛推偃王之仁為諸侯所歸周穆王自西荒逃歸王不忍鬬以太王之義而去之使周穆不失國偃王之力也又云徐者舒緩之名也後雖為武未嘗無君子之風徐宣立盆子是也又於稚字下引徐孺子為證案此書本為説文而作而乃侈陳家乘可謂得著書之體乎又其引書多不契勘如引揚雄甘泉賦日月才經於柍桭改桭為宸注宸字下張衡西京賦突荆藩本作棘藩左思吳都賦畛啜無數此三賦皆以為班固之西都甚且人人所誦習者而亦舛互相仍以檀弓仲尼之守狗及其言訥訥然如不出諸其口皆以為論語尚書鯀堙洪水則以為詩左傳敢不承受君之明德則以為書論語奡蕩舟則以為左傳齊侯余姑揃搣則以為楚王又稱巫馬期行不由徑陳仲子捆屨而食且引詩云匪面命之言示之事匪口誨之言提其耳此等乍讀之未有不疑其有所本者而實皆憑臆空造毫無左證深足以疑誤後生許叔重在當時四家之詩具在書有古文今文各家師授又各不同故其稱引時與今所傳不合此豈後代人所可放效也其分疏音義亦有可疑者賈字許氏云覀聲則當以價為本音乃不引聘禮之賈人及納賈待賈而專引公戶反之賈區服賈即云增成其義寧不當少有區分也又賑字本訓殷富乃惑於後人振贍振濟之亦作賑而遂以振起解之農字中從囟囟與囱皆有聰音而乃謂囟當為凶乃得聲􅿘秋田也本見犬部乃於示部增一禰字亦訓秋畋且為之説云獵者所以為宗廟之事也夫一歲三田惟君用鮮何時不為乾豆之用而獨於秋云爾乎考鼎臣本則禰與祧祅祚皆為新附之字今皆收入許氏本部中而又增一􅳊字訓為祝也不知言部中自有詛字許氏訓為酬酬即祝耳何必又贅一􅳊字乎又火部中出一字鼎臣本所無此蓋炙與灸之訛文耳而曾莫之辨也許氏本書各部中元有彼此復見之字若此草部中苗字凡兩見則未之有也至其所引經史亦多失其本意如資字下引史記張釋之以資為郎而為之説云即今州縣吏以身應役是也資錢即今庸直也此説謬甚夫漢時之以資為郎猶近世職財貨者之舉身家殷實耳景帝後二年詔書舊資算十以上乃得官今令訾算四得官訾與資同楚金於此殊憒憒也又衮字下許氏云天子享先王卷龍繡於下幅一龍蟠阿上鄉去聲從衣公聲楚金上鄉作上卿初疑是轉寫之誤及讀其説云春秋傳諸侯死於王事加二等於是有以衮斂謂以上公禮也然則愼所謂上卿即用刻本誤周公禮也據此云云則非鈔胥之過矣此於文理若何可通部敘一卷如易序卦之體亦多有難通而強為之説者鼎臣本采用鍇説俱極純粹或彼有而此反遺之其中脫漏之字甚多並部首亦有脫去者間以鼎臣本攙補一二而不明著其所補其第二十五卷則全用鼎臣本矣至若兩部而並為一部有重文而反無正字亦與夾􅘢與囦注皆互易脫去黚字注而以黔字注注其下若此者頗多許氏一部中字亦皆以類相從此則或前或後參錯不齊並愼元注亦有漏略不全者則此書之紛亂難理世無善本久矣容有為後人所竄易殽亂者不可全歸咎於楚金也初閲此書以為不過字畫間小小訛錯欲並為足下校出一本以答厚意今既不可勝摘則非僕之力所能任矣淺陋之見不敢自隱冀足下恕我之狂也後來聞通人之語云鼎臣於許氏本文有難曉處往往私自改易而楚金本獨否故是書終不可得而廢也此言良是善讀者必能別擇之丙午長至月望前一日文弨記答秦西巗問母在為妻杖否書丙午日前承詢母在為妻制服俗間有杖者有不杖者並有因生母在不制杖者其是非安在文弨案古今禮文夫為妻未有不杖者也父在不杖者唯嫡長子而巳儀禮喪服疏衰裳齊牡麻絰冠布纓削杖布帶疏屨期者條下其一曰妻傳曰為妻何以期也妻至親也又不杖麻屨者條下曰大夫之適子為妻傳云父在則為妻不杖疏云父為適子之婦為喪主故適子不敢伸而杖也禮記喪服小記曰父在庶子為妻以杖即位可也正義云舅不主庶婦所以庶子得杖以此觀之古禮衆子為妻雖父在亦杖矣乃禮記雜記曰為妻父母在不杖不稽顙正義云此謂適子為妻也父殁母在為妻雖得杖而不得稽顙范宣子云在有二義一是生時二是在側謂在母之側為妻不杖此説雖亦有疑之者然竊以父在庶子為妻杖之文推之豈有父殁母在而為嫡子者巳無避喪主之嫌為衆子者又本皆有得杖之理乃於此反羣然去杖者乎又考之通典其載古今喪服之制為妻一條在齊縗杖周下而不杖周則無文其開元禮亦同又考之司馬溫公書儀以至明史禮志亦無不盡同並不著父母在否之異則自當以儀禮所言為􅍘然如古者七十則老而傳傳者傳重也則於父母之喪尚或不盡如禮唯衰麻在身而巳而謂其尚主適子之婦之喪乎竊意此時父雖在不為喪主適子亦自可以杖即位此則古人所未言及文弨竊以意度之而謂其必如此也蓋婦人天夫故移父之斬於其夫夫之於妻義亦不可薄上以承宗廟下以綿嗣續故以為母之服服之不為過厚豈與夫旁期者可相為比例哉雖然上所陳者正禮也而事或不可通於今如世俗父喪稱孤子母喪稱哀子繼母在則不敢遽稱哀子以訃告於人而必標明其上云奉繼母命稱哀否則繼母之黨必有起而成釁者此亦豈古來如此分別乎然而不可違也今父殁母在或生母在如妻死訃於人而書杖期夫吾知必有挾其短長而責其忘母為不孝者則莫若遵乎杖之實將至母側則去之而訃詞則不書杖字此既不背古又不違今則庶乎兩得之道也禮應杖者亦有去杖之時如父之喪以杖即位者適子為後者也庶子則不以杖即位則與喪妻而至母側去杖事正相同況有范氏之説可據乎前答足下書中因涉他事遂爾漏略今輒舉所聞而並附愚見如右惟足下裁之答袁簡齋書乙巳承問宋人集中有婦人無主議此不知何人所作考之於禮婦人之有主明甚喪服小記云士大夫不得祔於諸侯祔於諸祖父之為士大夫者其妻祔於諸祖姑妾袝於妾祖姑亡則中一以上而祔又云妾無妾祖姑者易牲而祔於女君可也又云婦祔於祖姑祖姑有三人則祔於親者其妻為大夫而卒而後其夫不為大夫而袝於其妻則不易牲妻卒而後夫為大夫而袝於其妻則以大夫牲據記所言微獨嫡妻有主繼妻亦有主妾之有子者亦皆有主有主而後可以袝廟安得謂婦人無主也又案穀梁文二年作僖公主疏云糜信引衛次仲云宗廟主皆用栗右主八寸左主七寸廣厚三寸若祭訖則內於西壁坎中去地一尺六寸右主謂父也左主謂母也是以漢世帝后皆有主非創也漢舊儀云皇后主長七尺圍九寸在皇帝主右旁蓋本周制而為之可知矣然則婦人無主之説空撰無實不足信也與謝金圃學使書日來為足下校荀子付梓至王霸篇有云箸之言語箸字從竹宋本實然來教當作著字説文草部無著蓋偶脫耳字林因之玉篇著字注云味荎著似但指為草卉之屬廣韻則釋為明也處也立也補也成也定也陟慮張略長略三切則既有明著之文矣徒以其下箸字注同著此又廣韻之誤説文箸訓飯欹五經四子書中無有以箸為著者唯國語日恪位箸從竹蓋亦刻本之誤今定當從草作著文弨案作著則人人易曉向來拙刻數種書內著字亦並不作箸凡以舊本相傳苟非訛繆大無理之甚者固未嘗輒以説文易之若舊本有合於説文自不當反棄之而用世俗之字如著字説文所無而古書之以箸作著字義用者不第如足下所舉之周語為然列子仲尼篇云形物其箸此則箸明之義當讀中恕切趙䇿智伯曰兵箸晉陽三年矣此則傅箸之義當讀張略切若位箸則陟慮切也六朝人所撰世説新語尚有箸無著如超超􅏏箸世人罔不知之更為明證此蒙之所以從宋本而不疑也蓋説文音訓甚略所賴有假借一門以通其窮若一字必止一義則何以周用如校訓云木囚而亦通於計校比校不必信佩觿之説而别立一挍字也奈訓為果名而亦通於奈何無奈不必信同文舉要甕牖間評而又增一奈字也他如此類正多豈可執一字定為一解乎考説文木部有櫡字石部有躇字皆云箸聲張略切並從竹不從草公羊傳有躇階而走而亦不見於説文其踟躇則作躇無有從著聲者以為偶脫何以他部並遺之邪説文箸只有陟慮遲倨二切而他部之以箸為聲者乃有張略切夫知陟慮遲倨之不足以盡箸之聲則亦知飯欹之不足以盡箸之義矣自有隸楷以來竹草木手往往混用無別此箸之所以有從草者後人又不細考而以為二字之用有異於是箸專為梜而飯欹之外舉皆不可借用若先秦以上古書其作箸字必多當不僅國語國策列子荀子數書為然後人以所習見從而改之今幸而尚留此數字吾願足下之勿改易也足下深於六書之學精研細討欲自成一書而猶多方購求昔人之成書以資別擇文弨是以將近所鈔唐沙門􅏏應一切經音義送閲其中所引小學諸書多有近世所不得見者即所引説文亦間或勝於近世版行之本在彼則自為彼教用而在我亦得取以為吾教用語曰禮失而求諸野孟子大賢乃亦引陽虎之言豈以是損賢哉足下衛道之嚴疑僕莫年頽唐而有棄儒從釋之意不憚大聲疾呼以相振救此誠良友見愛之意不知僕素性與禪門絶不相近今取其書之資小學者耳他何知焉正歲年者不非一行審波磔者不遺智永三十六字母固從西域而來舉世無有欲毀棄之者何獨於此書遂視若毒蟲猛獸而亟遠之也昌黎與大顚往來􅍘不至如後人偽作三書之瀾倒則昌黎之為昌黎自若也吾輩亦未嘗不與緇流狎處豈曰昌黎可吾則不可而惴惴懼為其所染哉深荷見愛之意然區區本懷亦不可以不白冀足下之亮我也與弟文韶書愚碌碌在外不能事二人以與吾弟相聚前以弟年尚幼故未嘗有書與吾弟今弟巳十有五矣離幼志而即成人在此時也吾弟兄只二人比聞吾弟年來多病殊為憂念今年巳長當能自為調攝念吾房恆不利於長子其成立者每在於次今吾年三十三尚無子嗣雖竊祿於朝曾不能僃吾父母一夕之膳深疚隱痛難以言喻又近時頗覺志氣頽靡不能自振鬚髮早巳有數莖白者承先啓後之事茫無端緒且慙且懼吾少時性情直戇不耐委曲又讀書不多益友亦少至今不能研求義理之精微補我之闕繩我之非誠不能無望於吾弟吾意中所欲言者亦不可不為弟盡也吾高曾以上世有隱德年代久遠雖無從詳悉其行事然觀其所以命字者不取美稱而顧以庸以呆自號則其行蓋可想而知矣昔者吾高祖行之第六房無子其妾懼或利其訾財而求為嗣也乃詐取他人子子之後吾宗人知之相率為文以告於祖明其為異姓也不許與吾宗齒懼瀆姓也然聽其妾子之而不更為立後示皆不利其所有也處置如此可不謂仁至而義盡乎吾祖少即喪吾曾祖家徒壁立不忍見寡母之勞瘁獨身走四方辛勤節嗇盡贖歸祖遺之産無所師授而能自力於學精於歌詩所交皆當世知名之士書得鍾王楷法曩家中尚藏有習字紙一大簏朱墨重迭大小交互其勤學如此吾少時無知識以為廢紙無用而焚之使吾弟不及見大恨事也吾祖嘗從人借銀若干其人之出也微執禮於吾祖甚恭後復折劵棄負吾祖既貧不能償感其意署劵尾以示子孫今其人之後亦登甲科而為縣令矣吾雖不與其人深交然未嘗於人前言其所出也欒郤胥原降在皂隸白屋之後多出公卿天下事寧有常哉況有德於吾祖者哉吾鄉一輕薄子在京曾以此事見質吾謝不知此語若出自我家無論非忠厚之道亦甚違吾祖之意也父親績學工文屢困場屋然世間得一仕人易得一通人難彼徒富貴者其奚足羡也吾生時正值家中匱乏之際四五歲時祖父母親撫養之稍長於猥賤之事無所不為嘗糴得官米吾晚從學堂歸恆自舂也薪有數等唯莊柴易斯若松柴刀柴難斯吾為之故知也晨起溫宿粥一甌食之進學堂歸家午飯或值未炊即為佐炊夏間則日昳又歸家飯乞糕鋪湯一盂取餘飯和之以食物有定價者常至市買之此皆吾所甘為獨意有所甚苦者二緩債與取租而巳蓋吾素不工於語言故唯此二事為難能也父親處館於外不能自教子吾時讀書不知門徑所從入好鈔書亦非世間希見之本徒費日力於此而不知務乎其所當務也吾將來雖得富貴亦必念夙昔艱難不敢稍自佚樂況不能養吾父母而吾顧忍持梁而刺肥乎曳絲而履縞乎辛酉來京師行裝蕭然裋褐不完書籍亦不能攜初時借金氏書以讀此時金氏兄弟外任者分攜書卷以出遂無處可借又無錢以買書及今熟讀強記亦恐不能堅牢況並此無之耶吾弟當知得書之難則家中所有零篇斷簡皆當寶之此皆吾祖手所置者好學人不必整齊書方始可看可讀也吾舊時妄自期許若得志必先賙恤宗黨之窮者今即二親尚不能盡菽水之養又何能及他人又何能辦他事諺云樹高千丈葉落歸根吾之在此豈遂為北平始遷之祖乎要必歸于杭州矣吾弟不日即有家室之事住屋本少又棄其半何以相容棄之甚易復之甚難今日欲如吾祖之贖歸祖産豈易言也詩云詒厥孫謀以燕翼子又曰我躬不閲遑恤我後此二言者吾弟奚志哉吾宗衰微巳甚並黃口兒計之亦不過三十餘人其中年而無子嗣及貧不能娶者又往往而是吾力雖不足以振之而愛護之唯恐其有傷固情之不能自巳焉也人安得盡大聖大賢孟子謂不中不才亦宜養之而不宜棄之也人至淸則無徒假如吾家有慶弔大事宗族親黨咸懷嫌怨至者殊寥寥其何以僃禮而達情乎自天子以下皆當合歡心以祀其先寧云愚不肖者其歡心可不必得也則敬宗收族之義乃吾所重望於吾弟者也人不可不自立祖父之賢不可恃也所謂甘棠猶愛之況其子者固由德之入人者深亦當由子弟之不肖未甚或其時世風猶厚故不忍於遽背也吾家宇安族之正人豫舊亦受其飮食教誨之德族子弟有干犯者非不能告官懲治也而不為但擯斥之而巳卒亦未嘗不復之也今宇安死未幾而其子不肖人亦何暇念其父哉天下好者難見而醜者易見亦其勢然也可無懼乎蘇洵作族譜引言其族之俗昔美而今不美也然未嘗斥言其人則言者無傷於忠厚而見者足以為鑑戒至於死者之失既不可以追改而吾明言其人直書其事獨不慮傷孝子慈孫之意耶吾弟異日戒之愼之如近日互爭墳地一事可以見今昔之異矣睿符公能以其地讓人然不與欲得其地者而獨與宇安則非為勢屈可知也今一則不能保其父之所有而轉售一則必欲奪其父之所豫以自利其將謂宋之禍宣公成之乎可慨也巳吾與弟相隔三千里會面不知何時胸中所欲言猶恨其不能盡也意緒雖多總之積德培福為本德者何忠厚是也前人之可法者多矣吾所言十之一二而巳然可類推也吾事多不能常寄信吾於他人固不若是之煩言也弟其思吾意與梁曜北玉繩書甲辰世德相承家聲克紹吾於老世兄不勝企羡之至別幾兩載展轉於懷想近日高明光大更令人不易窺測也向見示漢書古今人表內有未詳所出者二十三人今就所知者言之逢於何事見晏子亦見禮記檀弓上季武子成寢正義中又羊魚即左氏成十七年傳中之夷羊五也晉語但稱羊五今本作陽五五或可為吾吾讀為魚如左傳西鉏吾釋文音魚又如晉語暇豫之吾吾漢溝洫志之吾山皆同故羊五亦聲轉而為魚也又司馬篤即左氏昭草二年傳之司馬督也杜注云司馬烏左氏於昭草八年兩舉司馬烏故杜云然蓋督與篤古亦通用書微子之命曰篤不忘左氏傳王命管仲謂督不忘則表之作篤亦非字誤昨因見繹史作司馬烏不考而遽從之雖篤之與烏實即一人然可不必改也又晉陽罕乃外傳之晉陽畢也見晉語卷八表以晉陽與罕離而置之故不易曉罕之與畢或以形近致誤或當各如本書不能遽定也又燕子干者將母晏子所稱燕之遊士泯子午者即其人耶弟愧少年時見聞甚狹中年雖喜博覽而記性便易遺忘故所能舉者止於是老世兄近所得必多幸以告我僕孑身於此事甚叢猥然一隙之間亦不離卷軸近讀左氏傳得嘉善浦氏鏜之正字日本國山井氏鼎之考文元和陳氏樹華之考正三家本皆有可觀今不勞而坐享其成覺天之豫我亦太優矣令親孫侍御向欲借我左傳本今番乃可信為善本歸來當與共快讀也答臧生在東鏞堂書庚戌疑經自是近世學者之病生於論語謂齊魯不過字句之異非或有或無齊論不及魯論也所言誠是然門弟子各記所言其才質不能無高下其出於有子曾子之徒者固皆醇矣或亦有不盡出於二子之徒者乎論語記曾子啓手足之言則書之成去聖人時已久儒者所稱孔子之言荀卿即巳疑其不實孟子曰盡信書不如無書此亦通人之論也管仲一匡之功舉世所艷稱當孟子時猶有稱道弗絶者記者因夫子有許之之言而遂推崇太過以致辭氣之間抑揚過甚誠難免後人之疑若非有器小一章在前則是聖人於管仲竟無絲毫之訾議矣且即以管仲之事迹論之始也不能擇君而事逮射鉤之後晏然無復他慮使小白得先入國何其見事之遲也子糾之死仲實死之矣江人黃人素屬於楚苟度吾利澤不及焉則不當受其贄乃始也侈服遠之名卒之楚滅黃而不能救天下以之病桓公斯時管仲安在王子帶周之亂臣也召戎伐王王討之奔齊而齊受之且欲言於王而復之管仲能以包茅不貢聲楚罪今戎之罪更浮於楚乃不能致討而平戎於王如敵國然蓋其志滿意得淫三歸之樂侈反坫之制而巳無經略天下之意矣且人臣之忠其主者莫大乎以人事君世不乏才以齊國之大而謂無人焉其誰信之而管仲獨無所舉故孔子稱人臣之賢舉鮑叔而不及管仲以此夫以豎刀易牙開方之倫在桓公左右不於柄政之時早去之何也豈見不及與抑力不足與趙之公仲進牛畜荀欣徐越於烈侯而歌者之田自止此由無人乎桓公之側故邪佞小人得以盤互而不可拔顧於垂沒之際始為君言之庸能必其君之聽乎故孟子直􅍘以功烈之卑非刻論也夫以孟子誦法孔子寧於論語一書有不盡見者而其議論獨與器小之言合則其所棄取亦約略可見矣否則以孔子所甚推崇者而乃貶斥之不遺餘力夫豈苟相反平生又謂子産之才不及管仲亦但以功烈言也不思子産之所相者鄭也鄭之國小不及齊之大又新造之國也其上世未有賜履之命如太公者故不能為管仲之事耳以子産之智識且行事一出於正如使之相齊其所成就當必在管仲之上矣史公之傳管晏於管仲亦未過推許也其論曰將順其美匡救其惡故上下能相親也管仲之隱史公實洞燭之不過將順巳耳匡救巳耳所謂匡救亦止如傳中所言隱伐蔡伐山戎之失而假託之正義巳耳故獨於晏子欣為之執鞭此其衡量不昭然乎子路死出公之難所謂食亂君之祿又焉得治君而死之此但失之於前耳不可謂其死為不義也管仲事糾有年矣視其君與友之死漠然如途人焉喜已之有奧援而欲疾行以至齊為御者歌使之忘倦其嗜利無恥一至於此曾少有須臾之愛於其故主乎聖人立言為萬世人道之防不宜抑揚如此之甚彼前六朝後五代之臣皆以社稷無常主君臣無常奉而輕為去就獨非藉斯語以為固大聖人之所許乎生謂死於溝瀆不指召忽吾亦不必援笙瀆即句竇即溝瀆以為實指召忽也然嫌疑之際聖人愼焉豈若後世文士但逞其一時議論之快而不顧其或有所涉哉明明召忽死子糾之難而今為此言意雖泛指文實有嫌焉得人人而解説之以吾斯言之為泛指也故應劭奏議以為召忽死難而孔子曰經於溝瀆人莫之知顔師古司馬貞諸人咸亦謂然似不得專咎讀者之不審也顧袁二氏之論實出於天理人情之正聖人復起必將有取焉有子親受業於孔子聞喪欲速貧死欲速朽之語以為是非夫子之言如不得子遊之解而執此二語即為定論可乎且多聞闕疑愼言其餘固聖人之所訓也食肉不食馬肝豈為不知味哉生姑置此而信其可信焉者斯可矣與友人論無服之殤書承示所論無服之殤三條其一條云無服之殤經不言其喪之節傳謂以日易月乃以哭之日易所應服之月如期親之殤十三日卒哭不識此十三日中衣服冠纓何若用凶則違禮從吉則非情文弨案吉凶相變此十三日中必非吉服可知羔裘元冠夫子不以弔弔且必為之變況此所殤者固當為之服期者乎經雖無文或當如深衣練冠之制可也文弨又以是推之假如父若夫有喪未除其為之子若妻者既終喪遂偃然純采可乎然則無服者固不謂其皆可以吉服也抑古之人施之有其等其必由厚且重者等而下之以至於輕且薄者亦不患其恝然不足以相及否則於此何有焉又一條云古者士逾月而葬其在期殤十三日卒哭必不葬以逾月而不言其期何也文弨案葬可以月計而不可以日計日計則巳蹙謂夫天時人事之或有不齊者不可以一切也然無服之殤瓦棺而葬於園事約而易舉必不葬以逾月旬之內外可也又一條云延陵季子之子死於齊葬於嬴博之間韓文公葬女商南既而歸葬河陽之墓夫二子皆習於禮者今將奚從文弨案季子殆有為為之也以君命使而以子之喪入可乎哉觀其左袒則用吉禮也且既言骨肉復歸于土命也而又重諄然申之曰若魂氣則無不之也無不之也蓋既不得以其喪歸故但冀魂氣之得以隨巳而偕反其慘痛之情千載如見今使無季子之事而焭焭稚弱死不得歸骨於其父母之邱隴以生恕死情何可安然則當以文公為常法可也瞽論如此尚冀足下有以教之幸甚弟子興化李晉垿西林校抱經堂文集卷第二十一終
