body:
  text: 東里盧文弨紹弓傳二孫文定公家傳辛丑公諱嘉淦字錫公號懿齋太原興縣臨河里人姓孫氏先世自代徙曾祖諱守意未仕祖諱世藎以貢生知江西崇仁縣縣有劇盜羅漢七阻西山聚衆數千人設方略禽獮之境賴以安父贈光祿大夫諱天繡生四子公行三家貧耕且讀嘗上山斧薪值大風雪斧落曾崖間緣迹手探之幾至僵仆卒不挫其志康熙五十二年成進士改庶吉士授翰林院檢討聞母原夫人病乞假不待報歸母旋卒服闋復官世宗憲皇帝即位命臣工皆得上封事公以言事見知憲皇帝嘗指以示九卿曰朕即位以來孫嘉淦每事陳奏可謂直言極諫朕不惟不加怒而反加恩汝等臣工當以為法以國子監司業命提督安徽學政遷祭酒仍留安徽年餘調順天學政奏革一切供應蒙恩賜養廉歲四千兩并賜西城官房七十餘間為考校京邑生童之處歲滿受代蒞祭酒任公先為司業時即上言人才出於學校而科目但取文藝無裨於用宜令天下學政選拔諸生貢太學使九卿舉經明行修者任助教一以經術造之三年考其成舉以佐用時方急西事未行也至是與同官鄂公爾奇復上言經術必可成人才必可得今入學者多必別置學舍以居之支帑金以贍之教成宜分等敘用以示勤世宗允所請令戶部歲給六千緡賜官房三百餘間今所謂南學也公嚴立課程五日一會講一時經術稱盛焉署順天府尹奏請立法以平米價贈公卒於京邸恩賜銀一千兩為喪葬費公欲長留君惠乃竭家資營葬而以所賜建宗祠置祭田服未闋以順天府尹召晉工部侍郎奏請各工程宜定成式以頒示天下而天下之物價與挽運費宜先令報部嗣後核銷遂無駁詰稽滯之患遷刑部侍郎兼辦吏部侍郎事府尹祭酒皆如故以引見國子監教習人員不稱旨逮獄世宗旋宥之且知公不愛錢命在銀庫行走時果親王總庫務意公既貴重驟遭責降或不視事偵知不然既又有人言公以輕兌邀譽者公先以所兌別置一所至是王命取以比較皆中程以是益重公河東鹽政有積弊世宗命往署理不數月陋弊悉除今上即位召至京授吏部右侍郎擢都察院左都御史仍兼公上三習一弊疏其略曰臣以至愚荷蒙皇上隆恩卑以風紀重任日夜悚惶思竭愚夫之千慮而每月以來捧讀聖諭剴切周詳仁政皆巳舉行臣愚無可更言所欲言者皇上之心而巳皇上之心仁孝誠敬明恕精一豈復尚有可議而臣猶願有言者正於心無不純政無不善之中竊鰓鰓私憂過計而欲預防之也今夫治亂之循環如陰陽之運行坤陰極盛而陽生乾陽極盛而陰姤事當極盛之際必有陰伏之機其機藏於至微人不能覺而及其既著遂積重而不可返此其間有三習焉不可不愼戒也主德淸則臣心服而頌仁政多則民身受而感出一言而盈廷稱聖發一令而四海謳歌在臣民本非獻諛然而人君之耳則熟於此矣耳與譽化匪譽則逆始而匡拂者拒繼而木訥者厭久而頌揚之不工者亦絀矣是謂耳習於所聞則喜諛而惡直上愈智則下愈愚上愈能則下愈畏趨蹌諂脅顧眄而皆然免冠叩首應聲而即是此在臣工以為盡禮然而人君之目則熟於此矣目與媚化匪媚則觸故始而倨野者斥繼而嚴憚者疏久而便辟之不巧者亦忤矣是為目習於所見則喜柔而惡剛敬求天下之事見之多而以為無奇也則高己而卑人愼辨天下之務閲之久而以為無難也則雄才而易事質之人而不聞其所短返之己而不見其所失於是乎意之所欲信以為不踰令之所發槩期於必行矣是謂心習於所是則喜從而惡違三習既成乃生一弊何謂一弊喜小人而厭君子是也今夫進君子而退小人豈獨三代以上知之哉雖叔季之君孰不思用君子且自智之君各賢其臣孰不以為吾所用者必君子而決非小人乃卒之小人進而君子退者無他用才而不用德故也德者君子之所獨才則小人與君子共之而且勝焉語言奏對君子訥而小人佞諛則與耳習投矣奔走周旋君子拙而小人便辟則與目習投矣即課事考勞君子孤行其意而恥於言功小人巧於迎合而工於顯勤則與心習又投矣小人挾其所長以善投人君溺於所習而不覺審聽之而其言入耳諦觀之而其顏悅目歷試之而其才稱乎心也於是乎小人不約而自合君子不逐而自離夫至於小人合而君子離其患可勝言哉而揆厥所由皆三習為之蔽焉治亂之機千古一轍可考而知也我皇上聖明臨御如日中天豈惟並無此弊亦並未有此習然臣正及其未習也而言之設其習既成則或有知之而不敢言抑或言之而不見聽者矣今欲預除三習永杜一弊不在乎外惟在乎心故臣願言皇上之心也語曰人非聖人敦能無過此淺言也夫聖人豈無過哉唯聖人而後能知過唯聖人而後能改過孔子謂五十學易可以無大過文王視民如傷望道如未之見是故賢人之過賢人知之庸人不知也聖人之過聖人知之賢人不知也欲望人繩愆糾謬而及於其所不知難已故望皇上之聖心自懍之也返之己真知其不足驗之世實見其未能故常欿然不敢以自是此不敢自是之意流貫於用人行政之間夫而後知諫爭切磋愛我良深而諛悅為容者愚己而陷之阱也夫而後知嚴憚匡拂益我良多而順從不違者推己而墜之淵也耳目之習除取舍之極定夫而後衆正盈朝而太平可覩矣不然自是之根不拔則雖斂心為愼愼之久而覺其無過則謂可以少寬勵志為勤勤之久而覺其有功則謂可以少慰此念一轉初似亦無害於天下而不知嗜欲宴安功利之説漸入耳而不煩而便辟善柔便佞者亦熟視而不見其可憎久而習焉忽不自知而為其所中則黑白可以轉色而東西可以易位所謂機伏於至微而勢成於不可返者此之謂也大學言見賢而不能舉見不賢而不能退至於好惡拂人之性而推所由失皆因於驕泰驕泰即自是之謂也由此觀之治亂之機轉於君子小人之進退進退之機握於人君之一心能知非則心不期敬而自敬不見過則心不期肆而自肆敬者君子之招而治之本也肆者小人之媒而亂之階也然則沿流溯源約言蔽義惟望我皇上時時事事常守此不敢自是之心而天德王道舉不外於此矣疏上上嘉納宣示焉遷刑部尚書總理國子監事河南鄭州有疑獄命使往勘仍不得實上復命公會同總河白公鍾山審訊得其冤狀十餘人盡脫之轉吏部尚書乾隆三年出為直隸總督鉏治豪強穿濬溝洫豁邪教之株連者釋重囚之誣服者時酒禁甚嚴罹法者已至數萬人公言以日用飲食之故而令天下騷然非盛治所宜上即令弛其禁環京師五百里皆旗地旗人居京師而以田召漢人佃佃既熟姦民即增租奪佃先佃者多失利以故多莫肯盡力旗人租入亦不足公為酌定租額官為征給而奪佃之風遂息又奏旗人願就田者人豫二頃房屋牛種官給之慮近畿所容有限因巡邉見開平土地平衍易種藝可駐數萬家即具規畫上請議者以其地苦寒難居遂止今內地之民往耕者獲利數倍六年調湖廣總督楚人仰食淮鹽不時至價苦昂公至除陋規令所司以鹽船啓行日先關白禁其逗遛而鹽價遂平橫嶺三洞為前巡撫馮公光裕所開鎮守者因路險地僻議欲棄之公親自履行從城步入口路皆險峻越嶺數十重乃至長安豁然開平延袤數十里土田肥美公度若棄之則羣不逞之徒或且嘯聚於此煽連鎮筸而寶靖城綏之民無安枕日矣乃奏設武員益兵數千守之尋以湖南巡撫許容劾驛鹽道謝濟世案內革職九年冬起為宗人府府丞遷都察院左副都御史十二年京察自陳休致十四年冬復以副都御史召命在上書房行走遷兵部侍郎晉工部尚書署翰林院掌院學士恩禮日有加十七年九月以吏部尚書協辦大學士又充經筵講官因召對自陳年老請免所居官惟在上書房效力上優答不許公以易詩春秋為聖人全經而解説紛繁欲秉受睿裁講明要領以垂教來世乘間進説上納焉令日進講義一章於是先成詩義折中次及易傳彖爻甫畢而公遂病矣以乾隆十八年十二月六日薨年七十有一疾之始作也聖情冀其速痊中使侍醫駱驛於道又特命三阿哥臨視及遺本奏入上深軫悼遣大臣侍衛奠茶酒賜銀一千兩治喪事恤典如例賜諡文定居恆以八約自戒一曰事君篤而不顯二曰與人共而不交三曰勢避其所爭四曰功藏於無名五日事止於能去六曰言刪其無用七曰以守獨避人八曰以淸費廉取在翰林日讀春秋患四傳互異於是專精思經文著春秋義一書巳版行及蒙世宗憲皇帝訓飭翻然悔曰吾學無真得奈何妄測聖經遂并所著詩刪南華通一切毁之後遂不復著書以副都御史召之明年有逆徒偽為公奏稿傳播遠近逾年罪人斯得公深不自安恐生平好名之纍未盡有以致之也先後屢典文衡總裁會試者二典鄉試者五分校鄉會試者四教習庶吉士一司成與督學皆再三世皆贈光祿大夫刑部尚書妣皆贈一品夫人娶原氏繼娶張氏皆一品夫人子男三孝懿太學生前卒孝愈蔭授刑部浙江司員外郎擢直隸按察司使此據其家行述孫詒穀云由刑部山東司主事擢孝則天津府河捕通判女四人郭冠恂原宗淯李念祖陳針其壻也孫六人鎮今庠生鑾銓殤鑄鏞銘葬於邑之東鄉喬家溝門下士盧文弨曰公粹然儒者顧外人每傳公少年手刃仇人事其詳不可知今來公鄉復細詢於人始得其崖略公伯兄楨淦為同邑趙氏子所殺其人既論抵繫獄矣夤緣且脫罪時贈公痛子死非命而仇人顧安然得無恙憤結幾不欲生公時年十八不忍痛傷其父乘間入獄刃趙氏子死跳身出與其仲兄鴻淦一晝夜步行三百餘里至會城門啓而入遭貨瓿甊者仆焉盡碎其器於是相與至縣庭令某素知公拒移逮者謂殺人者實非公事遂解嗚呼此亦足以見公孝弟之性矣所謂仁者必有勇非與不辱其身不危其親其智又有足多者焉文弨以乾隆三年舉於順天公實為試官分校者慮語不盡醇或未必當公意公曰此本於經何害遂置所取中公之教人一本經術文弨雖無似亦曷敢不以公之所為教者教人哉四川布政使長芳李公家傳辛丑文弨與陽曲李公仲子觀察君天培同乾隆三年舉人宦迹參差不獲以年家子禮謁見公及來公鄉公巳不可作矣得觀察君所為述因略識公之為人強敏能任事而一本於仁厚使方伯連率皆如公則宇下之民尚安有失所者乎於是輒次第其事為家傳以僃異日史官之采擇公姓李氏諱如蘭字長芳先世由山東臨淸州遷山西之榆次曾祖諱傑人稱長者祖諱登山考諱寶與其弟璽又遷居會城故遂為陽曲人公少為叔父所器年十九補學博士弟子員試輒高等而不獲舉於鄉叔父助資令入太學循例得澤州儒學訓導公是時以暇日於民生利病吏治得失之故巳熟究之矣世宗初年以例當改主簿與同輩三十六人入見奏對獨稱旨徑授江南高郵州知州州當水驛孔道使舟往來用夫牽挽以四人為之長歲斂民間數千金為顧募費官吏因以為利所募夫率流丐水次居民受其擾公至禁絶科斂擇其便令可飮食宿止單騎上下巡歷弊遂絶州西甓社湖驟凍合有客舟膠湖中無可為計公用小舟二剖竹編聯其底行冰上如轉輪遂得濟今皆用其法在州九月積案悉淸吏無所容姦擢浙江紹興府知府世宗廉知公高郵之政特換江寧府知府使仍在江南總督以公熟河務先署知淮安府稽核一切工程數月事皆辦始蒞本任江寧無賴子恃拳勇結死黨以害民號曰喇子公縛其首惡數人斃杖下餘黨始戢同城有將軍所屬兵素縱恣不畏吏公請於將軍有犯者悉繩以一切之法於是嚄唶相戒不敢肆經兩考遷分巡廬鳳兵僃道兼榷正陽關嚴禁苛索而稅益裕自懷遠至壽州數百里間湖陂瀰漫向為盜藪商民苦之公欲絶其患駕大舸偽若過客者伏健役舟中抵暮有數盜援纜而上縛其一役請急歸否則患且不測公曰此去人家遠歸安得至且示之怯益非計泊舟不行令衆人皆寢息獨㸐二巨燭危坐夜半見火光隱約林莽間又聞岸上人語切切復有數十小舟劃波下上窺公舟寂若無人者卒疑怪不敢動旦發有跪而請者謂昨所縛者良民公命並縛之以歸具得盜首從主名及窟穴誅其魁數人盜皆陽以漁為業公令漁船各限以地界悉編記一二數及誰某在其地劫掠者即坐之又增塘汛責保甲嗣是行旅過者始不為畏途改雲南督糧道進四川按察司使初至罹重辟者以數百計公一一平處常達旦不休訖無留獄向發配人犯任自便以故殷阜之區往往羣聚滋事公上言請以打箭爐松潘二廳茂會理二州等邊地處之又奏秋審人犯定以期限軍流加等不入於死竊賊問罪不計人數皆一一報可嘗刊決獄近事比以為問刑之準其命盜等案牽連婦女者概免逮有疫者皆給豫善藥囚得免瘐死在川六年調江西未幾授四川布政司使蜀人聞公來歡迎載道公首重農桑以足其衣食舉鄉飮旌善良以示之勸重倉儲使緩急有所資鉛銅就地開採以省遠運滇粵之勞費乾隆九年水十一年飢以經理得所民樂更生而城郭倉庾之被水衝塌黴爛者不以為吏過吏亦不至於困成都華陽兩縣民向領銀輸屯兵糧準田科之下戶亦不免公言於大府均之近州縣公所到恤災興學皆有善政而無若江南四川之在任久故其事為尢著會瞻對金川相繼用兵公督率饋餫無乏興然常惴惴慮不免悉索驛騷之纍日夜焦勞馴至於大病以乾隆十二年九月五日卒官年六十有四階通議大夫父祖兩世誥贈如公官妣皆淑人娶曹氏少公三歲封淑人逮事祖姑繼姑以孝謹聞在高郵製葛衫一領逮八十猶完衣率手自浣以嫗婢鹵莽為之易敝也子及孫既仕宦時時以公遺訓訓焉卒後公二十七年是為乾隆三十九年五月五日也子天培既貴遇覃恩贈公通奉大夫封曹氏夫人子男五雲鵬候選州同知天培進士歷官廣西左江兵僃道永祺舉人今四川成都府知府思訓念祖優貢生候選儒學訓導女六劉充智趙泰賈育賓馮郁黃景緯閣秉升其壻也孫九履謙廣西潯州府知府由豫以潤附貢生知臨國子監生德申縣學生兆恩之烜錫璉鳴臯曾孫十一葬於太原縣許丹村之原盧文弨曰才者德之用也有仁民利物之念而澤不下究功效不見於後世者才詘也公之仁政彰彰若此非才之能充其德者乎世宗早識拔之於未試之初今上復委任之於巳效之日遭時遇主位躋通顯設施之大宜巳然公當為學博士時巳不録録嘗署陽城教諭民怨其令甚聚數千人郊外謀揭竿為亂公聞變即夜馳往諭使解散絶口不言功向使公終為小官亦必有以善其職決不至墮廢昔呂新吾著明職一編自公卿以至庶司百執事莫不有職莫不當盡其職公之於職可謂盡矣漢之黃霸唐之韋丹其後皆至顯官而史列之於循吏舉所重也今之操史筆者儻亦用斯比也有不以公為循卓之選者乎弟子武進吳兆慶佩德校録抱經堂文集卷第二十七
