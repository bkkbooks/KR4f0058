body:
  text: 東里盧文弨紹弓書三答錢辛􅎝詹事書丁酉方今學博而行醇蓋未有出閣下右者每以不獲常奉教為憾自聞讀禮家居道里差近而文弨徒為廩粟所縻不獲走唁寸私缺如大著金石文跋尾願見久矣今承見示欣喜疾讀歎考核之精實有前人歐趙董洪及本朝顧氏朱氏之所未逮者文筆雅健持論極純正皆有益於世教文弨見聞寡陋一旦獲此幾如貧兒之驟富矣頃讀左氏傳見陸氏釋文熒陽竝從火且明辨之云從水者非而今本太半從水學者雖見釋文究亦莫知其何以非也今得尊跋熒陽太守元寧記而始了然矣古一字有數體如紱黻芾三者實一也而易書詩各異句文固有不盡畫一者石經叔亦作叔孺亦作孑焉正而今本皆祇作叔字孺字矣宋張淳儀禮識誤燕禮內宴字淳從監本定作宴後來校者復議淳為非是今觀唐張琮碑亦以為宴也五經文字宴二字竝載云上說文下字林說文大段當遵而亦不可過泥然如據之為據泰之為泰又不得以古碑刻有之為解矣敕字古多作勑韓勑碑或讀如賚豫之賚而尊刻徑從說文作敕莫當仍依碑刻書寫否高植志跋云渤海滌人後又云此碑以蓨為條如後所云則滌人似當作人也至以蓨為修之語以前後較之例亦似有異同如衡方碑跋云以寬栗為寬栗聲香為馨香之類與洪氏隸釋語勢正同至司馬紹志跋云以驃為以休為烋及高植跋中語似皆變例也莫亦可兩通否他如召邵哥歌克尅贊讚之類經典及諸史類多通用似不必以為異文此詹詹者何當於尊書之輕重而少有見及不敢蓄疑如其非也幸有以教之毋以莛扣之微而不為發聲也且尚有欲求教者韓勑碑什言向誤釋為斗言尊跋以為即十言之教可謂精確無與易矣近讀左氏定四年疏亦引十言之教而有疑於疏之所云焉疏云乾坤雖是二字亦一出口乃相溷尚冀異日領教也方言郭景純注而今本與音切相雜廁且顯然有後人語附益者觀爾雅音不混注中則此亦宜有界隔其音以指物指事為喻者當出於景純與山海經之音政相似其加翻切者恐皆後人所為不知曾為釐正否與辛􅎝論熊方後漢書年表書己亥文弨拜白辛􅎝先生閣下友朋來自金陵者咸云閣下之於僕曲相推飾人有異論輒拄其口使不得發此自是謙德厚道之所形聞之彌用自愧閣下品如金玉學如淵海國之儀表士之楷模得師若此允無閒然深為一方士子幸矣讀大作熊方後漢書年表序校正精核指摘彌復切當源流異同之故數言暸然於後復丁寧於元文之未可輕改此不欲殁著書者緝綜之勞而並慮後人紛更之失致掩其前美誠凡傳述舊人文字者皆當若是即僕向來持論亦然然於此書反覆考核瑕舋甚多若遽流傳深恐疑誤學人有不得不與閣下商之者如前表於侯封之下閒係以所在郡邑之名此自是當時文簿可徵確乎不謬今若欲仿斯例自當求之本傳如濟北惠王壽傳云分太山郡為國則當係以太山而熊氏則署云兗州又河閒孝王開傳云封樂成勃海涿郡為國則當竝係三郡之名而熊氏則署云冀州夫州之為境也遼矣今不切指其所封之地而舉一州以相函蓋何所當乎且考章懷注中引據舊書亦自有明係所屬者如武邑侯耿植注云屬信都而熊氏署云安平不其侯伏湛注云屬琅邪而熊氏署云東萊蓋熊氏但知以續漢書郡國志為據而不知事實之有不符也其最不可通者如淮陽王􅏏之下署云陳州即郡國志竝無此州名閣下知其誤而省去州字若以愚見揆之陳字亦不可留蓋淮陽之在前漢本為國後漢章帝章和二年始改為陳國今􅏏之封在光武時以斯知其不可也至於鄉亭之侯但當係其本縣其鄉亭之名固有與縣名同者不可混也范書中有明著其為某縣之鄉侯者如抗徐之為烏程東鄉侯楊茂之為烏傷新陽鄉侯烏程烏傷皆會稽屬也二人所封皆其縣之鄉也今熊氏於異姓諸侯表一則但書東鄉侯抗徐不係以烏程而係以南陽蓋誤以為南陽之東鄉縣也一則兼書烏傷新陽鄉侯楊茂下係以會稽又係以汝南是又誤以茂曾為兩縣之侯也夫既明曰鄉侯而可曰縣侯乎即二人之體例亦自不畫一愚以為不若並州郡而盡去之亦未見其必不可巳也蠡吾侯翼一段閣下校勘極細足以正熊氏之謬然猶以為當仍其舊愚意頗似有所未安蓋翼為河閒孝王開之子出後平原懷王勝建光元年貶為都鄉侯遣還河閒則此以後事仍當以翼係於河閒之下本末方得具明所受蠡吾之封則父開請分國以與之者也於後其子為桓帝追尊翼與開而不及勝以非所承也即後桓帝封兄顧為平原王但云奉翼後不云紹封熊氏之云紹封者妄也使桓帝以其父終為勝後而以其兄紹封則桓帝獨非勝之孫乎而追尊顧何以不在此而在彼也夫倫類典禮所關匪細後人將於此置喙焉而可輕徇乎至若始封之君當列於首其追尊者止當於注中附見不得以冠始封之上乃齊武王縯魯哀王仲皆非始封也建武二年封縯子章為太原王興為魯王以興嗣仲二王乃始封也熊氏一則書太原哀王章嗣夫嗣者嗣王也史不載先封縯為太原王何嗣之有於興則書曰紹封考建武十五年方追益縯為齊武王仲為魯哀王皆依其子之封也而熊氏之所謂嗣與紹者非其率意妄造者乎又魯王興後徙封北海子孫訖於漢末不改若依前書之例雖有始封而以後之定名為準則此當大書北海靖王興冠首庶乎得之異姓如壽張敬侯樊重非始封亦不當冠首以於實事皆不合故也更甚有謬者異姓諸侯表中有桃鄉侯福當塗鄉侯亢熊氏既皆明注云以任城王安母弟封而又係共下云姓闕文夫任城王安者東平憲王蒼之孫也福與亢亦憲王孫行也而乃不知其姓置之於異姓表中使後人舉而正之則吾輩亦當與熊氏分過矣又有安衆侯劉宣即安衆侯劉崇之從弟襲封為侯者又愼靖後劉隆本傳明云南陽宗室而熊氏竝置之異姓其用意不可曉也盧芳於建武十六年封代王以其稱武帝曾孫則不能不載之於同姓但於注中明著其詐亦自不沒其實不宜徑削之也他如濩澤侯鄧鯉曲成後劉建皆光武時封見寒朗傳而熊氏竝遺之若按章懷注所引及水經注唐宰相世系表亦尚有可補者至其世系相承位置殊舛如魯哀王之曾孫一行凡敬王睦之子如威如毅皆綴於其叔父之下此類更不可枚舉若一切因循不但為無用之書反慮其足以惑亂視聽質之鮑君其意亦欲仍舊而附駁正於其左如集解索隱注史記之例既完然為熊氏之書而又不以其誤誤後人洵兩得也但如同姓入異姓之類不識可改歸否閣下尚有以明教之答汪容甫中書丙申九月八日文弨白容甫足下今世可與道古者極鮮足下年方壯盛而專精古義此巳能不囿於流俗矣惜相隔百里而遙不能朝夕見以䇿我之頽墯意常缺然承示儀禮逸注一條並以所録孟子章指全本見寄使得補足以成完書誠大快也在辛巳歲從吳友朱君文游處借得毛斧季所臨吳匏菴趙注孟子校本獨末卷缺章指於意終未慊也今相距十有六年而始得之幸目力無大減尚可一手謄寫不假他人晚境之樂無過此矣夫子加齊之卿相章公孫丑問伯夷伊尹何如案注但云丑曰伯夷之行何如下又云言伯夷之行不與孔子伊尹同道也似正文不當有伊尹二字上舉諸賢以為問以其同出聖人之門固無嫌竝舉也若伊尹之與伯夷則有辨矣如復雜然竝舉以為問不漫浪乎其為後人所增入明矣其他如西子章注惡人醜類者也趙氏必本是醜䫉以形近而訛為類也滕更之在門也章注宜答見禮定當是宜見答禮而倒其文耳此皆斧季本所未校出者足下之本尚有遺漏一二處則以墨筆識其㫄斧季過信宋本於其字之沿俗體者亦復規規然從之此誠可不必也足下之見韙矣孟子全冊今先奉還其儀禮尚欲細看一過再寄上聞近著小學一本古訓補蒼之亡作雅之翼拭目以期蚤覩也答沈南雷世煒禮部書丙申歲前接手書並錢鵠雲觀察書皆索僕所校查初白先生蘇詩補注云香雨太守欲會合王施兩家共成一書此正人人意中所共欲其如是者不可不慫恿成之弟前主北平黃崑圃先生家見有此書底本實勝今所梓者如昔賢名甚著者大率舉其官封邑里或字或號而不直斥其名如杜稱少陵韓稱昌黎之類是也今本乃一一名之矣此在館閣奉命編纂例當畫一若私家所著政不當爾又其校對疏略訛脫甚多而本所援引亦閒有誤者不揆荒陋輒為通部校正其義可兩通自當從長鄙說列在簡端可具桉也然掃塵之喻深歷而知其信然今因索觀復稍稍檢點遺漏尚多安敢即自信為善本向於施注不過涉獵而巳今觀其中所引亦有甚失本文之指者恐此書亦大須商榷若王注則向未曾儲昔人訾謷巳多但當精擇其善者耳噫自著一書固難即會通良亦不易僕嘗欲取史記三家注而加整理之使同異不相淆蹉跎至今竟不能就今聞初白翁賢後人有此舉喜而躍躍欲觀其成僕雖恐以疏駁貽嗤何敢靳而不出但此閒別無副本兼朝夕更欲檢尋今寄在舍弟處令親可令一人就鈔之不至稽遲是所望也答朱秀才理齊縉書己亥讀來書陳義甚高夫雜學不如經學而窮經之道又在於研理理何以明要在身體而力行之時時省察處處體驗即米鹽之瑣寢席之褻何在非道即何在非學正不待沾沾於講說論議之為功也姚江勞餘山先生性行誠篤所學一本程朱布衣無尺寸之勢而鄉人望而生敬薰其德以勉為善良者比比也先師桑韜甫先生少年豪邁不可一世而獨折節於餘山以所著示先徵士敬甫府君府君署其後自稱私淑弟子府君弱冠之年著有勸行篇一通悼時之易失而行之不可不自力也其言剴切深至當先師設教大梁之日嘗寓書以倡明理學相期亦如足下所以命僕者然愚意則以為講學之名不可居而要其實則惟視吾力之所至而有以自盡即今之課舉業者亦不可不謂之講學也以之博一已之富貴則不可以之求顯揚謀祿養行義利物舍舉業何以哉學固有自源而達流者亦有自流以泝源者今讀四子之書詮四子之理知吾之管窺隙見亦未嘗不可以見天則以知聖賢去人其閒亦邇不致驚為高遠難至而循循然庶有以相入若置舉業不講而號於人曰吾講學吾講學其不譁且笑者幾何也故與其駭之莫若馴之果有同志之士遺祿利而志道德者自不必復勸之以舉業然此固千百中之一二不可概望之於人人矣文弨早離父師之側雖有一知半解不能闡明勞先生之學而大發揚之竊用自愧今足下讀其遺文而欣欣然有得焉則餘山之傳人非足下其誰哉僕向聞前輩語云閲人文字曲為周旋此便不是修辭立其誠此語銘之不敢失至於親疏貧富一無異視此自課童蒙時即然所謂視吾力之所至以自盡者也昨在西湖書院見諸生有不衣冠上堂者嚴訓切之蓋士習之輕侻囂浮久矣變之非一朝夕事也足下所印餘山遺書必擇其人卑之而後可若分給諸生令各償紙墨之費恐煩言嘖嘖起矣於人己兩失之意待吾力稍裕印數百部散之人閒以俟聞風興起之士庶淵源得以不墜此誠與足下有同契也欲過面談因一城遠隔不能亟前終當造門奉訪一慰願見之誠耳與理齊書己亥大著中君子小人論三篇窮源徹流剖析既明處置亦甚平允千古有國者之蓍鑑也此為世閒不可少文字餘持論多正然或圭角尚有未融亦有辨其所不必辨者若肅宗靈武之事宋儒巳有苛論然實未嘗審度當日天下之大勢設坐視宗社之淪喪而退就匹夫之小節相從奔竄能保胡越不起於轂下乎即以身殉亦復難以言孝故責肅宗以後來之不孝則誠不能為之辭若其前則天下安危去留之機閒不容髮固當以其身繫屬海內之望鼓舞羣英共圖恢復之略使鐘虡不移玉步無改而若考得終免播遷之患言孝之大孰大於是昔楚平王執伍奢以召其二子尚與員尚知往必俱死令其弟適吳以圖復讐若以後儒之見相例員固當負大不孝之名而尚縱其弟使逃父之命亦當並蒙惡聲矣論事如此如之何其可乎彼宋高宗亦是後來失䇿耳若其先不正名定位則並偏隅亦恐不能為宋有足下於此宜再審也言子一書纂訂極好敬叔載寶一事尚當闕疑又評騭徐靑牧先生惜陰録數條亦極是謂先生此書尚在中年後來進境恐不止此此論殊然前日當道試書院以可以為難矣命題見一二朋友作頗以難為不滿之詞謂其根株未盡容易萌牙耳僕曉之曰論固如是然天理渾然自無四者之弊此是從容中道之聖人即顔子之克已復禮聖門亦不見有幾顔子所以聖人只說先難只說用力中庸曰或勉強而行之及其成功一也勉強自是好若以仍然乘閒竊發為慮則是尚未能不行也詎便許之以難乎靑牧先生正從勉強入手者才有失不肯自諱如此把捉過去久之亦自會得純熟此書尚須選擇以從精約而先録其全文者欲不沒其實耳去取之閒尚欲與足下面商也曩丁丑分校禮闈得山左一卷決其人必正氣薦後不為主者許可將次開榜猶抱其卷上堂力爭竟不能得近數科中未曾有此事因此通國傳聞且謂僕為之墮淚者後其人來見乃昌樂閻君名循觀果道學君子也再進再黜即僕亦勸其姑少變文格以諧俗而此君瞿然正容以不能對至丙戌始見賞於識者置之高列得官考功主事三年告歸卒於里中友人為刻其困勉齊私記又僕當日於闈中録其四書義三篇今一並呈覽可知因言考行古人良不余欺黃陶菴先生文光明磊落凛凛有生氣彼仲昭介生輩纖碎雕巧自立不住腳跟故昔人云舉業何能壞人人自壞舉業至言哉又切近編者乃先師桑韜甫與沈椒園先生同輯朱子陸淸獻張楊園勞餘山四先生語也觀此可知先師晚年所詣之平易切實案上一筆一硯之外並書冊亦不置惟默與義理相涵泳少壯豪氣詞章宿習刊除幾於淨盡文弨無似不能發揚其道為愧又所著夜炳録尚未得見其中必多見道語若見之當為傳之庶使外人不僅見先生前半截便謂如斯也俟面時罄悉一切再答理齊書己亥承教皆金石至言敢不佩服吾友睂菴亦嘗以此相規近年來精力遠不如前亦思稍減雜學求息正途矣遠異録述正論以闢異端足為吾道干城然異之待辨者以其似是而非也今之習病在無廉恥不講辭章不求功利不歸釋老而公然無忌憚而不顧聖賢處此不知更何以救之閻懷亭困勉齊記中所云束修宜從古訓者謂約束修謹漢人皆如此用色斯舉矣節蓋謂翔而集時也既集矣因共而復作亦時也但下段亦在色斯舉矣中而閻君分之故語驟閲之覺難曉耳齊戒不問疾謂可不問之疾此語析義頗精設若至親而有疾自當廢齊而往問之大夫之祭有齊衰大功以上之喪尚為之廢況其在齊限內乎愚見如此未知然否江陰楊文定公亦南中之學者也其言行略見於僕所為傳今呈教其著作只易詩兩種為門下士所梓嘗見其以中庸解呈安溪安溪細細為之點定今士大夫有如此暇豫乎外雜文數首並附覽理齊君子人也相與不數年而遽死矣無後遺文不知誰為傳之哀哉與周林汲永年太史書王寅文弨再拜林汲館丈閣下起居甚適書言處境之艱此文弨夙所飽諳者殆於不堪回想前見示孔子世家補一書因校左氏傳未畢功久置篋中今始得一讀其考訂歲年行事以正史公之誤誠有足多者又所引左傳昭草五年萬者二人謂當作二八魯自隱公考仲子之宮始用六羽其後羣公之廟必皆用六佾可知季氏卿也舞用四佾今又取襄廟之四佾而為八佾故唯有二八在耳又引鄭賂晉悼公女樂二八而悼公分一八以賜魏絳秦之遺戎王亦以女樂二八是知樂無問雅俗皆以八人為佾也此段二人之誤學者亦多疑之而未有若此之剖析明而證據確也又昭草九年傳趙鞅賦晉國一鼓鐵以鑄刑鼎謂鐵當作鍾鼓鍾皆量名一乃齊一之義毀其不齊者更鑄以給焉又取其餘以為鑄刑鼎之用也古人鑄鼎皆以銅未聞以鐵杜氏不考古制乃云鼓為鼓橐凡鑄鍾鼎誰非鼓橐者何必以是為文耶斯言當矣至若太宰問多能則據列子家語􅍘其為宋太宰鄭人謂夫子其顙似堯數語謂假相人而隱其辭以曉子貢其語頗辨此書誠當版行以垂示久遠不可任其湮沒也文弨見識淺陋其中亦尚有疑焉者論語乃孔門弟子所記比之他書為可信而此書閒有不用者如衛靈公問陳而孔子行置之魯哀二年在陳絶糧則置哀六年接輿歌而過孔子謂歌於孔氏之庭與之庾謂當作與之廋廋與籔同季孫使冉有問田賦一節亦云然不知鄭康成注聘禮記云藪或為逾則與庾音正相近考工記作魁莊子作斔其字皆從臾則安得改從叟以合於藪之音素口反也行不由徑謂徑為正直之道以不由徑與非公事作一例且取證於夫閒有遂遂上有徑與夫列子說符之所言以為徑者譬自東而中行直達於西也然獨不思夫祭義樂正子春之所言道而不徑舟而不游乎老子云大道甚夷而民好徑此亦謂徑非正道也且就其所言以徑為直以東西為喻亦未盡其理假如欲由東而南或由東而北則必方折而後可惡能取必於徑直哉漢書載童謠云邪徑壞良田易林噬嗑之未濟云徑邪賊田行不由徑之徑指邪徑而言也非必路之小者也邪徑必小而小路未必皆邪陋巷尚可居小路如之何其弗可行乎文弨嘗觀乎齊魯燕晉之郊田之成隴畝者亦既耕且種矣而人之取捷者穿田而過以正道為回遠而不肯置足夫是以有壞田賊田之云也滅明則不由是耳更謂舊館人之喪乃顔濁鄒也南宮敬叔非孔子弟子此皆不敢信以為然其最謬者乃取莊子漁父之寓言而全載之何其卑視吾孔子之甚也今當付雕亦不必為之改訂唯俟讀者之自為取舍焉耳此書見示只五冊尚未見夫子曳杖之辰應尚有一冊在閣下所此閒未移置他處不宜有遺失今粗校一過仍送上刻成時見賜可也弟子上海曹洪陶範成校抱經堂文集卷第十九
