  text: 抱經堂文集卷第三十二
  hash: sha256:b4ab89b934eae4d91a24bbda1aca8f12d066efb21d13b31ca5003d196564aaf9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0058_SBCK_032-1a}
body:
  text: 東里盧文弨紹弓墓表墓碣山西汾州府知府雷公墓表甲辰古之善為政者莫不以水利為要務史遷作河渠書而班固則志溝洫溝洫之於民尢切矣禹決九川陂九澤孔子獨稱其盡力於溝洫蓋民以土為命而土以水為命故思利民則必求美其土疆能美其土疆者厥惟水昔西門豹為鄴令鑿渠十二引灌民田後世稱賢焉史起猶以漳水在鄴㫄豹不知用於仁智猶未盡然則循良之政多端唯能因水之利利民者斯其利匪獨在一時兼可以遺後世若吾鄉雷公之為令為牧為守也其一行此道者乎公諱汪度字饒九號蓮客浙江錢塘人也其得姓實自黃帝時源遠流長漢唐以來代有聞人有居湖廣之麻城者復徙居四川之井研有以進士起家歷官監察御史外補天津兵僃副使者諱嘉祥公七世祖也子孫科第仕宦蟬聯不絶六世祖諱過湖廣荆門州知州高祖諱起龍湖廣長沙府知府曾祖諱經中浙江衢州府知府既致仕不能歸祖諱宏遠拔貢生娶故大學士錢塘黃文僖公女孫遂占籍錢塘生公考諱驥兩世皆以公貴贈朝議大夫公考舉丈夫子四人公其季也十歲而孤母汪太恭人辛勤教育少長益自刻苦向學既壯舉於鄉旋南宮報罷慨然有經世意伯兄素器其能為入資謁選得河南寶豐縣知縣調繁虞城擢陜州知州最聞特授山西汾州府知府七年以足疾告歸在官凡二十一年歸逾年而卒年五十有七是為乾隆四十七年七月十二日也最公之政在寶豐則開浚德化暜濟新慶等渠以資灌溉而礓礫皆成沃壤又疏泄潦水達之於汝州之宋公渠而水患亦息虞城瀕河其南岸則江南之碭山也有土壩三橫亙下游以禦河水之建瓴直下者當伏秋水王時河水去緩多泛溢自上游之儀封考城商邱以至於縣境多被其患公請於大府會河督商度兩利之道於是始議殺埧尾公喜於得請晝夜督率改作工竣數邑賴焉陜州地處高州屬之闅鄉與陜西之潼關鄰閺鄉西薰村之民向飮渠水渠發源於潼關之南山嵩岔峪潼之大留屯居民占吝不以及鄰訟久不決公移商潼關吏謂兩境皆王民也然大留之水亦非有餘若以有餘之水濟大留而大留之水亦可以濟西董於是始議移瀵井等村之水給大留如公言而訟乃息汾治西北有馬跑泉故時疏引入城以資民汲久之堰壞水遂不至公案故道如法修治而民乃不苦遠汲因請渠名命之曰通㢲他若決獄如神懲姦不尚姑息興程明道祠修汾州府學置學田建西河書院規畫其經費平由汾道永寧之黃蘆嶺而挽運者利焉王師征緬甸道出於陜軍無乏興而民亦不告勞皆公之政績也分校乾隆三十年河南鄉試得士六人周君世績為解首士論咸伏階朝議大夫積資軍功加三級紀録十一次卓異候升初娶朱繼娶吳皆前卒贈皆恭人子在者輻國學生孫一汝恭三女皆宇右族其詳志銘具之輻今以乾隆四十九年七月壬申葬公於城北甘墩村之原伐石樹表而以文為請案公之宦蹟誠有可揭示於後者遂不辭而為之且系以詩曰衆人之智僅營目前後世稱利利乃大焉公勤於水磽為腴田既開其利亦弭其患匪私所治兼惠其鄰爰暨江南以逮於秦未耆挂冠世鮮此賢福云考終胡不永年崇崇堂封鬱鬱松阡欲求公行豐碑屹然湖廣道監察御史蔣公墓表戊申公名和寧字用安系出周文公之後以國為氏氏曰蔣有居河南開封者復徙居江南之常州今為陽湖人世有達者考諱汾功雍正首科進士官松江府儒學教授通經術工古文辭學者宗之稱為濟航先生公稟承家學未弱冠所作詩若長短句巳流傳人口且兼工徐庾近體教授公既一意古學有來求應用之文者率命代之及去任無以治生趣公往京師時族人有以文藝見知寧邸者正思得暜人乃以公名薦一見契合唱酬無虛日聲譽大起諸老先生多款門納交以諸生就順天試久不遇思歸省宗衮虞山文恪公與賢王咸惜其去相勸為迎養計教授公亦止其歸謂新婦汝當攜汝子往公不得巳復留以乾隆十七年皇太后萬壽恩科聯捷鄉會試殿試二甲第三人賜進士出身改庶吉士亟請假歸旋丁教授公艱服闋散館授翰林院編修充方略館武英殿纂修官改湖廣道監察御史充會試內監試命為貴州鄉試正考官未復命復丁母莊太宜人憂哀毁奔歸逮喪葬事都畢將補官會有以私干鹽政語上聞者遂落職余與公為同年生深知公竊於公之歷履而不能無疑於天道之難知也公非僅文士也其智識遠過人通曉當世之務處事多中其性行純淑無激亢矜厲之氣中朝貴人咸折節與為久要而朋輩亦樂親之鄉舊貧士之困於旅資者來告必有以慰其意而去為人如此而又有才華之美聲譽之重汲引之衆將進而掌制誥僃顧問宜不後人或出而當旬宣統率之任亦必恢恢乎有餘力此皆吾同人意中之所竊料者也一聞中於蜚語咸相顧歎咤以為怪事才名果足以折官職耶然以公之才又似未可謂之不遇者長安米珠薪桂顧況所謂居大不易者也公以諸生久居日下滫􅸷之奉饔飧之計傔從車馬之費咸取給於筆硯而餘力且足以贍窮交世有懷才而終艱于一第者矣公雖晚遇而以高第入承明遷侍御掌文衡淸資要職舉皆處之然則雖有才疑亦不為造物之所忌而何以止於斯耶此誠不可知也公歸而培植後進邑有利益事率身任之主休寧講席造就甚多大吏聘入書局謂書成例當剡薦公巳無宦情矣辭之娶同邑莊宜人內外無閒言先十年卒生三子長泰殤次齊耀貢生需次縣丞次重耀副㮄貢生直隸州判署浙江餘姚蕭山松陽等縣知縣女三長殤二適士族公就養常往來江浙閒以乾隆五十一年九月初六日卒於杭州之寓館年七十有八初教授公有遺集未及梓藏於家公遠出而家不戒於火焚焉公痛甚於己所作亦不自整理子姓私相抄撮成若干卷將乞知公者而梓行焉嗚呼公雖不以功業顯而託於文以傳亦可以無憾以公卒之三載文弨來公鄉主講席聞既葬乃為文以表於墓且系以頌曰有才不施而昌於詩人也天也誰其知之失馬為福墮甑不顧優游壽考抱朴完素不為良臣猶為才子胚胎前光引掖後起地能埋骨不能埋名餘輝爛然何羡時榮處士吳愚齊墓碣己亥處士吳於諱珳中愚齊其號也系出唐左臺御史少微至處士三十有七傳矣自休寧遷海寧之長平鄉今四世生而岐嶷少長有老成風非僻之事一不涉於耳目事父玉方公母蕭孺人僃極孝敬病則千里致醫凡可以冀有廖者無不盡也居喪一遵朱子家禮日夜求所以安先人體魄者取昔賢大儒論葬之書參互考究而從所謂三合土灰格之法凡築十二晝夜始封異哀泣過甚目由是失明平素嫉異端之教為世害嘗著不惑論以闢之且預戒後人我身後愼勿延緇黃作音樂也居嘗致千金盡償先人遺逋與弟共財不為節量親舊以緩急告無吝情以故亦時形支詘然卒不為悔教其子愼擇師友凡所訓誡皆立身行己之要晚年病風眩以乾隆三十六年九月二日考終故里春秋七十有二娶程孺人考州同知韶母王蚤世撫二妹一弟恩義竝至既許字處士未行而若考又卒重以外侮孺人以弱女子為之搘格既遷匶於淺土次第嫁其二妹屬幼弟於叔父而後來歸事舅姑盡婦道雍正二年秋淫雨海溢姑適病牀蓐良人遠出求醫夜半水奄至孺人攀牀號泣水勢忽小卻負姑升極以免時東西家之罹於厄者衆既免人咸異之同産弟夭復為考立後且營葬並葬兩叔父之無後者手植松楸里人稱孝女阡云年七十後處士九月卒子三人皆為儒仲出後蚤世文弨與其季子騫遊騫博覽多通能文章泊然于榮利之途蓋能守處士之訓者其敘述考妣言行具有條理葬時未有銘余以賢孝逴絶之行所當使人其見聞之有所興起故不追為之銘而特文諸碣使揭於墓道之左且系以論曰人子之於親莫不志在顯揚然富貴而名磨滅者何限求不死其親莫若處善循理而有文章天地之道其蓄之也淳厖敦固其發之也顯融光明以若人之行事得令子而彌彰有美而稱之余是以信其道之交相成也處士之名百世之榮豈藉圭紱鍾鼎而乃為輝光也哉國子生朱君補堂墓碣辛丑蒙養之不講也久矣豈為人父兄者顧皆不愛其子弟哉毋亦以能養正者之不數數見也則求之庸愈於不求也吾求之即得朱君補堂真其人也得之而幸則知失之之大不幸也君之教余幼子慶鍾也不以其蒙蒙無所能識也而易諸為之審句讀辨形聲坐止有儀進退有節導其性愼其習剛不迫柔不怠由斯道也聖功具矣豈非於世不易求之而得者哉君之病也余適有遠行懼吾子之失所依歸而日祝君之愈也若所親然聞君之訃為痛惜不巳今君之子縉以狀來合余所見於君者則知其言之皆可信也君諱以寬字容之別字補堂系出新安長老相傳又云其先本吳興趙氏元季遷於杭改姓朱今遂為仁和人自十一世祖以來始班班可考曾祖式曾應徵君撝謙之門人祖世恩父廷文兩世仕宦皆不甚顯咸有著述藏於家君年十九隨父宦遊閩越荆楚閒棄舉子業專竭力營護緩急賴以取濟壯歲入燕有高資王氏者以鹽策請君經理久而益孚君所主在豐潤其大綱在長蘆事尢重司其事者所得亦最饒欲以屬君前主者有私冀君相為隱君不肯苟就并辭豐潤歸未幾王氏業驟落人以是服君先見昔秦西巴放麑而孟孫取為子傅君不負人之諈諉其於貨財猶若是況人之子弟乎乃館君僅兩旬而病病未浹旬遂卒於家天乎何奪之速也居常疾殉貨者謂當官以盡職獲罪可無憾也若以賄敗庸足惜乎吾不願子孫他日有是也疾革猶惓惓以小學不可不讀為勖卒以乾隆四十五年六月甲寅年五十有八娶盛氏先七年卒子四人謙縉齡發伯與叔皆出為人後仲即縉也邑庠生有志正學與余善季尚幼女一人孫二人孫女三人即以其年十一月辛丑葬於錢塘五雲山先人之墓不及為納壙之銘余以君言行皆合義儒者之道不是過故為文使揭於墓以動來者之慕焉奉直大夫候選直隸州同知吳君墓碣乙巳吾杭海寧新倉里有以孝友能繼志聞者是為東山吳君諱正純字景一系出唐左臺御史少微君之高祖由徽之休寧始遷今居焉祖誠菴公諱琦文嘗因父病徒步百里外求醫及父沒慟哭歐血數升母目有眚舐之復明鄉黨皆稱其孝生贈奉直公諱有曦君即奉直之長子也生三歲母查宜人亡哭泣如成人逮少長以生計之艱求所以解贈公憂者家故啇籍乃厪身從事經營積歲家始漸饒贈公恆以誠菴公孝行未得表章為恨君於今上初元手疏事實陳請逮得朝褒而贈公巳前卒君以若考抱此志有年而不及見也一慟幾絶邑故有忠孝祠君又創為孝子專祠於文廟大成門外並出田若干畝歸之祠為歲修費以考墓地庳慮有水欲遷葬人曰未必然君求得善地於海鹽石屋山之陽卒移窆焉及啓竁而椁上果有痕若屋漏然者人始歎君之精誠獨至為能洞幽入冥也祖姑適朱者歸侍母疾以勞卒無子贈公遵考之遺命附葬祖穴㫄令吳氏子孫守其祀君又歷敘平生懿行求名人文碣其墓其切於紹述舉類此家又立孝子祠祀誠菴公為祭田五頃兼以贍族一如宋范文正義莊遺規君壯未有子取母弟景源子為子無何相繼殁乃子從弟之子武人日君之齒未也何遽為君日吾恐老人以無孫為戚也蓋是時贈公在堂故云卒年七十有九其日則乾隆四十有四年十一月七日也循例為選人當補直隸州同知加二級授階奉直大夫妻曹氏宜人不逮事姑而奉舅也孝考妣咸封贈如例武為君後者前卒有二子英進英達俱太學生君又以英達後其弟英進今巳舉二子矣以歲辛丑之三日葬君於海鹽東山之阡美哉孝友之風為不墜矣乃系以詞曰泰伯虞仲孝友開先仲後嗣伯以永其傳遙遙千載仍世象賢孝友繩繩有光於前行無定軌體微入元有創有因咸無閒然古稱不朽匪曰世祿繼述若斯輝華其族東山之原行者止止宰如繄誰孝子孫子弟子上元胡本淵靜夫校抱經堂文集卷第三十二
