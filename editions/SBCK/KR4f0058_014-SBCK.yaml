body:
  text: 東里盧文弨紹弓跋七書晦菴題跋後癸巳毛氏汲古閣刻朱子題跋三卷以跋東坡與林子中帖爲首考朱子文集則其前尙有一卷不知此何以獨遺之書河圖洛書後引大戴明堂篇鄭氏注此誤也明堂在盛德篇中杜氏通典所引但稱盛德在未爲後人分析之前可据也注乃北周盧辯著中有引鄭氏語其爲非康成注自明矣又踐阼篇作踐祚此在魏晉六朝人書中多如此通用但記朱子嘗與人辯及此謂阼爲主位不應作祚今何以亦爾也其書參同契後末署空同道士鄒訢六字此朱子自寓其姓名也鄒本邾也訢當是昕之譌或以訢有喜義古音本與熹通此亦放魏伯陽篇題而爲之而毛氏不察妄增一歸字於空同道士之上誤矣其跋周益公楊誠齋送甘叔懷詩文卷一篇竟是禪門上堂參喝語朱子􅍘不爲是必妄人竄入無疑也其他如重復改作複傲倪改作睨皆不知古字玉楮詩藁跋丙申秀水曹侍郞溶之圃在郡城中名之曰倦圃葢宋岳倦翁金陀園之故地也余嘗至其地林木薈蔚溪流彎環坡陀峭蒨雖結構未必皆如曩時而昔賢遺風猶髣髴遇之其時葢巳不爲曹氏有矣倦翁爲武穆王之孫所著有金陀粹編續編今猶傳於世云此玉楮詩藳八卷者當嘉熙時三年閒之所作也其詩刊除浮豓風格峭異驟若不見可喜而咀噍旣久亦自有得味於無味中者明嘉靖閒其裔孫尙書元聲刻而傳之今版本不可得矣外閒所傳寫者率譌缺今姑就其本傳之不能細校也集中記爲韓正倫因詩致怨欲陷倦翁於死賴廟堂覺之事得白以武穆之精忠所謂思其人猶愛其樹者正倫乃絕不顧而幷忘其舉己之恩欲文致之於罪是尙得爲人乎倦翁雖未能忘情而深憐其失計詞不憤激有君子之養焉他日讀邵氏聞見錄見种詁訟范忠宣而忠宣猶薦之乃爲詩有曰丞相襟量滄溟同一眚不捐三世將自言曲􅀡何必言愧死老奴作何様後又有讀誠齋集詩復及之所謂怨若怨焉者殆終有不能盡化者歟劉後村集跋甲午後村集有百九十六卷今此祗五十卷僅居四之一毛氏津逮祕書中載後村題跋凡四卷此集無其前二卷黃氏千頃堂書目所載後村諸集班班尙多距今未久宐尙在世閒然余求之數年卒不見也此集舊寫本字迹麤殺閱之頗不爽目故别加校正重錄如右而以毛氏前二卷之題跋幷入焉倘得全集自當各還其舊若不可得則毋寧匯置一處庶不復有放失之患後村劉克莊號也字濳夫莆田人學於眞西山以蔭入仕屢廢屢起宋理宗時賜同進士出身官龍圖閣􅀡學士謚文定後村詩詞及各體文皆有法度卓然爲南宋一大作手七言古風初喜摹長爪生詩人玉㞕所載三篇酷與之肖而皆不見此集集中此體亦不多見唯有築城開壕運糧朝陵六七篇而已風格蒼老頗近老杜畱花門塞蘆子諸章其本意欲息唐律專尙古體以趙南塘言而止今集則律體居多石門吳氏後村詩鈔亦無出此集之外者豈其全者非獨余不及見卽前輩亦未之見耶余因其言考其人亦庶幾無愧眞氏之門者乃宋史無傳柯氏新編亦不爲之補文獻通考於他人之集則嘗采用後村之言而其集亦未著錄幾疑於名之晻晦矣雖然唐書不爲韋應物傳而蘇州之名常在天壤閒文章自可傳不仗史筆垂後村亦復何憾哉剡源集跋丙申余舊讀蘇伯脩所輯元文類劉欽謨所輯中州文表略識元人所爲文古辭奥句磥砢斑駁大率取材於先秦兩漢其體裁則昌黎之曹成王碑柳州之晉問庶幾近之當宋之末年其文多流於漫衍荏弱嘽緩骩骳而不振若元閻靜軒王秋㵎姚牧菴許圭塘諸人之文差可矯其弊矣然古於文者不必皆古於辭也如第以辭之古爲古文則又恐以􅄱貌求之而非精神命脈之所在是乃贋古非眞古也繼得黃梨洲所錄剡源文鈔則大好之剡源者奉化戴表元帥初也其文和易而不流謹嚴而不局質􅀡而不俚華腴而不淫此非徒古於字句之末者也明初宋景濂氏重其文在史局爲下本路卽家謄其集二十卷入祕閣元史列之儒學傳中景濓又爲其集作序推崇甚至三百年來唯棃洲遴擇其文以傳之學者而其全集殊不多見金陵陶孝廉衡川以是詢余余愧未能荅也南濠朱君文游多蓄古書余因求之乃得明神廟時版本其上有何義門先生評校乃其弟子沈穎谷名巖所傳錄者何氏得嘉靖以前舊鈔爲文祇六十五篇以校版本改正甚多如唐畫西域圖記脫去後半篇二百六十五字賴以補全其詩亦得舊鈔刊正余見之大喜屬友人爲臨一本但此集爲卷三十文雖視舊鈔本爲多亦有鈔本有而版本無者十有三篇何氏巳爲補錄而朱君本無有不知又落誰氏矣詩源出江西視山谷爲稍渾融余師桑弢甫先生讀之目爲狷士云剡源嘗爲建康府敎授而元史乃作建寧考其自序云爲昇學敎授建康實唐之昇州然則元史誤也後來序其文者亦多􅆓誤當正之穎谷吳人稱剡源文近子厚亦閒似蘇門能從容於窘步萌茁於枯條此數語亦殊有見朱君曰此亦吾鄕之學者也故附著之云仇山村金淵集書後辛丑山村爲溧陽敎授在元大德九年年五十九矣在任四年官滿受代歸詩作於其時溧陽自唐以來皆屬昇州故吾子行爲之題詩稱仇仁父解秩建康有新文曰金淵集也其分敎京口又在前故其寄京口諸友絕句云郡邑山川我舊遊歸舟千里十年秋相逢若問村翁信貞女江頭狎白鷗貞女江乃指溧陽言也京口今鎭江府本朝雍正年閒始以溧陽隷焉或遂以此集在京口時作誤矣詩淸綺流美有蕭閒之韻而無酸寒之氣五言律中有哀方嚴州五首嚴州乃方虛谷也詩中具有微詞虛谷之爲人卽不至如周公謹所詆之太甚要其人之不足取固較然也今本乃題爲懷方嚴州詳詩意當作於其新殁之日非懷之也七言佳句吾愛其書生愛日唯愁晚稚子敲冰不怕寒無白衣來多釀酒放靑山入別開門冰懸古樹花尤雋雪漲寒江水不渾塵世不知秋過半水鄉但覺月明多情與境俱淸絕其七言一絕云野風吹樹廟門開神􅁚凝塵壁擁苔笑爾不能爲禍福村人誰送紙錢來亦有風人之致此集戊戌年閱一過辛丑再閱遂書其後書李空同詩鈔後癸巳乾隆十五年弢甫先生主大梁書院因空同後人請􅃟其祖之詩爲檢定十六卷付之裁畢梓卽以本寄文弨京師使讀之空同詩當以五言律絕句及七言古詩爲最去其摹仿太似者而眞氣骨乃見固未易以訾謷也他􅃟本閒有篇刪其句者曩以質之先生先生曰刪則吾不敢無寧仍之而附注以己意耳文弨於此本譌字一一校勘以覆於先生今略著二條於此如河之水歌云河水淲淲舟子搖櫓檢字書淲與滮同則與櫓韻不協意謂作㶁㶁差近之先生曰淲當是韻文弨今思之或當讀如滸滸然未知空同本何書也又有句云毖毖圓波踊殆卽用毖彼泉水而㬪其字他人集中亦未見又左袒行云產不信祿不入軍右袒計安岀文弨謂別本作寄不信者是易有言不信謂不見信也寄之言不見信於祿祿不入寄之言似當如此解先生曰誠然唯軍右袒不可依明詩綜作軍左袒耳其末又附本朝人劉湛詩有列莊鳴臺使之句文弨謂當是列狀之譌先生曰吾思之不得汝乃得之才相去果三十里耶噫此雖先生戲言而奬誘殷惓不遺纖芥乃如此今整理舊書復見此編追憶往復之言殆將二紀去先生曳杖之辰亦巳再㫷矣把卷憮然因具識之今日卽欲就正何可得也乾隆三十八年三月七日書跋西北之文辛丑此皇朝湖廣布政使澤州高平畢振姬亮四所著之論議諸雜文也太原傅山靑主爲之序仍以解元稱之其言曰東南之文槪主歐曾西北之文不歐曾不歐曾者非過歐曾之言葢不及歐曾之言也解元爲西北之文而卒不得罪於東南者以言之數數於理也山又爲解元之西北尙多乎其理者也然終不以其文東南解元也靑主之言如此余東南人也非謂文必東南若特以畢公之學之富而用之於賦頌碑版等作矞皇典麗當推一大作手若論理自當以平正易􅀡爲主欲人之易曉也議事自當以明白剴切爲主使人皆可以舉而行也今其爲言也瀾翻藻耀非有學問人不能究其指歸吾恐讀其文者之不易曉也然其議事之文實非徒託空言可比當以俟知者知耳至論孔子弟子家語有縣亶與史記之鄡單非一人此則失於不考縣乃郻字之誤漢書地理志鉅鹿郡有郻縣續漢郡國志作鄡葢實一字周大王亶父亦作單甫古亶單多通用故鄡單卽爲郻亶實一人畢公信史記集解之言以爲鄔單晉人欲祀之於銅鞮豈其然乎景菊公先生詩集跋丙申先大父書蒼公交友中最精風雅同輩所共推服者兩人一爲上虞王文白先生名德璘寓杭州先大父割宅以居之其錢塘懷古七言長律凡若干題氣􅁚雄渾音節亮拔不落宋元以後格調余外大父馮山公先生爲序之余篋中曾藏一本南北轉徙縑幐書㨭多爲他人紛亂近檢之未得其後人不振復相繼以死遺稾不可復問余丱角時巳不及見先生以鄰近故至所居見先生小影四周皆有題詠先生夫人亦尙在計此時訪求尙可得而童年見不及此至今恨之一爲同邑景菊公先生先生垂殁盡以平生著述授余師桑弢甫先生先生爲版行其詩八卷而爲之傳以著其人菊公可無憾於泉壤也巳夫多不如精前明布衣稱詩最富者如沈嘉則王百穀王承父之流今其集流傳葢寡以云重刊抑更難巳余固知菊公先生之詩之亦不必以多爲貴也雖然派別不一嗜好亦殊後之人豈無擩嚌其中而更有得焉者乎矧余先大父情好往來之密咸見是是更不可以廢此集先生手自書古今五七言雖各分體而卷或閒隔余移之使各從其類幷卽以弢甫先生序傳冠諸首弢甫先生没時有四孫遺書皆巳分析今一孫又亾余猶覷得菊公文集與說部而讀之而恐其終不􅀗也無可求者巳矣有可求者更當求之向鈔得菊公詞八卷今又鈔此集五十卷又多乎哉視文白則誠優而以云得先生之全疑尙不止此菊公文集說部在弢甫先生二房長孫濟燾所濟燾殁其妻乃余母舅張端甫先生之孫女余請端甫先生借鈔焉固不岀後聞爲所親全攜去不知落誰手矣濂洛風雅跋庚子此本相傳以爲元金仁山先生所􅃟輯首濂溪周子八傳而至王魯齋皆正傳其餘源流所漸凡三十五人所錄皆有韻之作凡箴銘祭文咸入焉意主於闡明義理裨益風化初不於字句閒求工也本朝雍正年閒其裔孫律實始版行今相距五十年吾宗東源衍仁欲復爲開雕請余爲正譌余北上攜之行笈中友人睂菴北方之言學者也就而正焉其意以爲題曰風雅卽文不當在所錄中又劉屛山戲作十二辰屬詩一首亦當去其言良是然出自前哲之手毋寧仍之善戲謔兮亦風人所不禁也仁山錄朱子靜江府虞帝廟詩附記其後云廟中舊有有庫君像南軒牧此州舉而投之水文弨竊疑其已甚而睂菴以爲不然謂傲卽萬惡之根去之不爲過且廟制尊一不尊二然余考道州有鼻亭之神道州卽有庳地也􅁚必有遺愛於其國故神而祀之靜江去道州不遠祀􅁚不爲無因有其舉之非後人所可意爲變置也且俑以􅁚人猶不可用像亦􅁚人也而投諸水戮巳太甚視流放又甚焉卽操千古賞罰之柄者亦不宐岀此余以爲蒲坂之舜廟不宐有􅁚而靜江之舜廟實宐有􅁚􅁚葢從祀也亦猶先主武侯同閟宮之義也非竝尊也聊著不同之見於此以俟後之人論定云乾隆庚子臘月之望盧文弨書題王阮亭先生感舊集後辛未王阮亭先生輯其平生知交之詩爲一編曰感舊集凡三百三十有五人此本藏北平黃崑圃先生家先生瓣香阮亭旣盡梓其遺書此編以未得校讎尙畱篋中不鄙淺學諈諉及之余觀阮亭生平好􅅄引氣類於同時人士所造有一字之俊一韻之工靡不津津激賞且筆而記之今其書如池北偶談居易錄古夫于亭雜錄漁洋詩話中所載且至有重見㬪岀而不厭者學者因先生豓稱之亦願爭先覩其全爲快今是編所載朝廟十一山林十九其人則皆素所稱述之人也然向者第等諸窺豹一斑而今乃得見其全其爲快意當更何如哉因亟校歸之冀有好事者付之梓元本分四卷卷袠重大擬毎卷分上下二篇又詩之先後與目不相應今定從目序所云以考功終者今乃在第二卷末此則不敢妄易云阮亭自序爲康熙十有三年甲寅余今兹始得參校爲乾隆十有六年辛未葢相去七十有七年而先生之書猶有不盡出如斯者也閏五月廿四日校竟幷識卷後又有補遺此或鈔時偶遺或後時所見非是別有義例今當歸倂一處凡是正三百餘字有近人名字難考者此不可以意爲定也有詩中下字偶不契勘而誤者如云醉時喜得虎頭筆滿壁烟雲峯削戌今若從漢書司馬相如傳改作戌削則非韻然削戊實無所岀又如云始焉弩在機終也刃出鞞上韻用術字下韻用必字此必因鞸字􅄱近鞞遂誤讀鞞爲鞸也鞞蒲頂切與術必二韻不協又有一詩序云樂羊以息壤而克中山案息壤是甘茂拔宐陽事若樂羊之克中山則􅉪篋也唐人詩吾聞中山相乃屬放麑翁事雖誤用終不失爲佳詩特學者不可􅆓習所聞而不考其本也予是以著之且明予之所不改者類如此文心雕龍輯註書後辛丑余向有此本粗加讎校寓吳趨時兒輩不謹爲何人攜去後遂不更蓄也昨年吳秀才伊仲示余校本無可比對復就長安市覓得此本紙墨俱不精吳所錄隱秀篇之缺文及勝國諸人增刪改正之處此本具有之然他人所改俱著其姓唯梅子庚獨不不幾攘其美以爲己有耶亦有異同數處其練字篇引尙書大傳別風淮雨於傅毅制誄巳用淮雨下多元長作序亦用別風八字頃無王融集可檢惟憶陸雲九愍有思振袂於別風之句此亦一證也傅毅作北海靖王興誄云白日幽光淮雨杳冥古文苑所載其文不全今見此書誄碑篇者又爲後人改去淮雨易以氛霧二字矣鄭康成注大傳云淮急雨之名是不以爲字誤而詩正義引大傳竟改作列風淫雨葢義僻則人多不曉也哀弔篇首云賦憲之謚此出周書謚法解旣賦憲受臚於牧之野乃制作謚今所傳周書文多脫誤惟困學紀聞所引尙有此語此於賦憲下引舊人校云當作議德失之不考也至詔䇿篇賜太守陳遂汪本作責博進陳遂正與下故舊之厚句相應然責字亦疑償字之誤其末引詩云有命在天明爲重也周禮曰師氏詔王爲輕命吳本亦如此余以爲當作詩云有命自天明爲重也周禮曰師氏詔王明爲輕也下衍一命字養氣篇故有錐股自厲和熊以苦之人案下六字吳本無當本脫四字不學者妄增成之而忘其年代之不合也末序志篇云茫茫往代旣沈予聞眇眇來世倘塵彼觀也謝耳伯云沈一作洗余疑皆未是似當作況況與貺古通用又吳本倘字作諒吳本從曲江錢惟善本臨出前有其序余遲暮之年尙爲此矻矻不欲虛見示之惠故也凡異同處勝此本者巳具錄之爲語小兒子輩愼勿再棄也乾隆辛丑七月九日書舟車攜帶此本近又不完全䂬溪詩話跋辛丑此書議論純正凡豓冶之辭槪不插齒牙閒其評品李杜優劣後人莫能易也至子美之廣厦與樂天之大裘其意一也其詞則有工拙何必以窮達校其難易急緩與作者之先後以爲高下哉義山詩却羨卞和雙刖足一生無復没階趨此有激之言何嘗如新豐老翁搥折其臂之出於實事者哉乃譏其爲子春之罪人毋乃太迂謂子美玩弄嚴武藐視禮法亦但襲前人之言於少陵詩未嘗熟復也東坡詩浮江泝蜀有成言江水在此吾不食於下注云江水在此吾不食言光武語也東坡去一言字殆歇後也案有成言三字巳見上句則但用吾不食意義自足何歇後之云乎常明未必有斯謬必校者之妄加也此書出吾鄉鮑氏所藏黃氏仕履之詳尙可以考見云乾隆辛丑七月十日書逸老堂詩話跋丁酉逸老堂詩話二卷得之江寧嚴侍讀東有所書中不列鄉里姓名然稱魏莊渠馬抑之爲同鄉則蘇之崑山人也又稱祝枝山序其父約齋漫錄二十卷云兪君寛父吳之耆儒又以知其人姓兪矣其大父醉菊翁亦見書中然皆不知其名崑山之兪唯允文字質甫者最著廣五子之一也考其事蹟又齟齬而不合此書與約齋漫錄江南通志及千頃堂書目皆不載雖有詩句又不爲明詩綜所錄一時無可蹤跡顧其書雖無大過人處而敘述亦班駁可喜其論麓堂詩載同官獻諛之詞未免起後人之議尢確論也爲錄而傳之至其祖孫三世之名若字俟他日得崑山縣志與祝枝山集再爲蒐考云
