body:
  text: 東里盧文弨紹弓題辭重校經史題辭庚午余家無藏書經史皆不具少時貿貿不知學有本末費日力鈔諸子國䇿楚辭及唐宋近人詩文皆細字小本滿一篋經則周禮爾雅亦嘗節錄注疏一過餘經及諸史未之及也洎官中書始一意經史去冬卒業周易史記以未見内府新校本爲缺然今割俸之所入先購得數種冀以次觀其全焉官事隙卽展卷讀之此書經通人學士校讐比他本爲善然卷帙旣多校者不一手其中亦不免一二譌脫余非敢索瘢指瑕陵掩前人顯自標異然竊惟書之傳於世相嬗也遠者不可得而見見其近者今世見宋本者曾幾人惟明世本通行耳後之君子亦當有幷不及見明世所刻者余故復取諸本與新本校其異同其譌謬顯然則倣六經正誤之例爲一書其參錯難明則倣韓文考異之例爲一書毛氏汲古閣本大段可觀至於小小疵纇亦易尋求諸本中要以此爲勝今所據依多在於斯小學浸廢六書失眞點畫􅄱誤不可徧舉聊從略焉誠知千慮一得無足重輕庶幾來者得有所考云周易注疏輯正題辭辛丑余有志欲校經書之誤葢三十年於兹矣乾隆己亥友人示余日本國人山井鼎所爲七經孟子考文一書歎彼海外小邦猶有能讀書者頗得吾中國舊本及宋代梓本前明公私所梓復三四本合以參校其議論亦有可採然猶憾其於古本宋本之譌誤者不能盡加別擇因始發憤爲之刪訂先自周易始亦旣有成編矣庚子之秋在京師又見嘉善浦氏鏜所纂十三經注疏正字八十一卷於同年大興翁祕校覃溪所假歸讀之喜不自禁誠不意垂老之年忽得見此大觀更喜吾中國之有人其見聞更廣其智慮更周自不患不遠岀乎其上雖然彼亦何可廢也余欲兼取所長略其所短乃復取吾所校周易重爲整頓以成此書名之曰周易注疏輯正正字於郭京范諤昌之說亦有取焉余謂其皆岀於私智穿鑿而無所用故一切刊去若漢以來諸儒傳授之本字句各異巳見於釋文者今亦不錄惟釋文本有與此書異者著焉唐宋人語之近理者雖於注疏未盡合亦閒見一二焉如欲考經文之異同則自有前明何氏楷所著古周易訂詁在學者自求之可耳毛氏汲古閣所梓大抵多善本而周易一書獨於正義破碎割裂條繫於有注之下致有大謬戾者葢正義本自爲一書後人始附於經注之下故毛氏標書名曰周易兼義明乎向者之未嘗兼也此亦當岀自宋人而未免失之鹵莽正字亦未見宋時佳本故語亦不能全是此則今之官本爲近古也用易舊本獨不載釋文於經注閒可無竄易遷就之弊今就通志堂梓本倂爲校之輔嗣略例余案頭祇有官本亦就校之噫余非敢自詡所見出正字考文上也旣覩兩家之美合之而美始完其有未及更以愚管參之夫校書以正誤也而粗略者或反以不誤爲誤考文於古本宋本之異同不擇是非而盡載之此在少知文義者或不肎如此然今讀之往往有義似難通而前後參證不覺渙然者則正以其不持擇之故乃得畱其本眞於後世也旣再脫稿遂書其端云七經孟子考文補遺題辭辛丑此日本國西條掌書記山井鼎之所輯謂之七經孟子考文七經者易書詩左傳禮記論語孝經也又益以孟子皆據其國唐以來相傳之古本及宋刻本以校明毛氏之汲古閣本書成當皇朝康熙五年其國之享保十一年也古本祗有經與注其文增損異同往往與釋文正義語多相合但屢經傳寫亦有舛譌其助語致多有灼然知其謬者亦竝載入然􅍘非後人所能僞作也其次第先經次注次釋文而疏居後其條目有考異有補闕有補脫有正誤有謹按有畱家諱改舊凡明代所刻之本彼國具有閒亦引之而頗譏篇第行款之不與古合其言良是不可以其小邦遠人而槪棄之也其尙書經文更多古字別􅡔置一􅁽此皆中國舊有之本遺亾巳久而彼國尙相傳寶守弗替今又流入中國讀者當倍加珍惜也其曰補遺者後來彼國東都講官物觀承其國政府之命而復補其所未僃者也其同校者石之淸平義質木晟三人也余見唐陸龜蒙詩中有聞日本圓載上人挾儒家書洎釋典以行作一絕送之云九流三藏一時傾萬軸光凌渤澥聲從此遺編東去後卻應􅂽外有諸生觀此足知其相傳唐以來本之果可信也此書余從友人鮑以文借得之猶以其古本宋本之誤不能盡加別裁而各本竝誤者雖有正誤謹案諸條亦復不能詳僃又其先後位置之閒頗費尋檢因欲取其是者別爲一書庚子入京師又見吾鄕沈萩園先生所進十三經正字則凡譌誤之處多所改正其不可知者亦著其疑又凡所引經傳脫誤處皆據本文正之此岀自中國儒者之手又過其書遠甚然所見舊本反不逮彼國之多故此書卒不可棄置也余欲兩取其長凡其未是處則刪去之不使徒穢􅂤編然今年余巳六十有五矣未知此志能竟成否聊書於此以見余之亦有志乎此也乾隆辛丑正月二日呵凍書題三立書院所藏通志堂經解卷首癸卯三立書院中舊藏有通志堂經解六十函而獨闕其首帙余蓄意欲補之乾隆辛丑庶吉士介休劉君錫五余小門生也舊嘗監院事其請假歸也來謁余余屬其還朝之日就京師士大夫家借本鈔足幷與下一帙令如式裝潢之乃歲餘而書不至余同年友洗馬大興翁覃溪知余將離山西惟此爲懸懸因卽代劉君成之以寄余微翁君之力將幷其次帙而亦亡之不轉重余之過歟但書首有諸名人所作序幷其目錄尚皆闕如今不及補矣後有同志更爲鈔足庶幾大快也中閒林拙齋尚書全解本闕卷第三十四未梓曩友人從永樂大典中鈔得以示余亦未得補入此皆有待於後之人噫此書之能全讀者罕矣唯桐城方望溪先生曾徧爲點勘其專治一二經從而嚅嚌者尚多有今余雖不及見若人乎然不可不畱以相待也乾隆四十有八年歲在昭陽單閼壯月朢後五日題鍼膏肓起廢疾發墨守庚子考隋書經籍志春秋左氏膏肓十卷穀梁廢疾三卷公羊墨守十四卷皆何邵公􅁧鄭康成爲鍼膏肓起廢疾發墨守何見之慙乃曰康成入吾室操吾戈以伐我乎公羊卷帙最多而亾最早膏肓後亾崇文總目尙有九卷今三書皆不傳毘陵莊進士葆琛述祖於各經疏所引廣爲搜輯鍼膏肓得廿八條起廢疾得丗八條發墨守得五條邵公當日專欲伸公羊然公羊理本短囿於鄕曲之見而朝廷典故不能周知所以一經輸攻而壁壘巳摧後人亦不能復爲樹立以與兩家相抗拒此其亾之所以獨先也歸安丁孝廉小雅鈔得莊書幷得朱石君學士前任晉藩時所進本互相校讐晉本不及莊本採輯之多而鍼膏肓中有一條尙爲莊本所闕余於是􅡔而鈔之其中小小異同從其長者不復加以識別兩君任其勞余獲其逸設不遠涉烏從見此乎以此置歸裝中大可壯我行色乾隆庚子小春月重校關中新刻淮南子題辭壬子此刻從藏本出載高誘注爲詳不似俗本之刪削然亦尙有一二遺漏者余往年在太原復取藏本細校乃知書中古字多出錢君獻之所改非藏本之舊也如贍作澹能作耐兗作沇讓作攘霸作伯憾作感施作􅴬之類殊可不必其中閒引文弨所說今都不復省記且傳寫不無錯誤定不免爲通人所嗤安能一一正之廣陵世講秦太史敦夫好學士也知余別有校本託爲傳之此書經江陰趙文學敬夫曦明杭州孫侍御詒穀志祖梁孝廉處素履繩博引詳證足稱善本非余一人之力所能至是因幷題數語歸之庶不没其所自題張之象注鹽鐵論庚子此陽湖莊太史本以永樂大典校勘增多九十餘字其異同處亦據以改正可謂善本矣力耕篇故乃賈之富本書之誤無所舉正音亦多譌此微爲短也刻成後當是未經校正故譌字觸目皆是有沈君名上一字同家諱醇者考其所引諸書一一正之甚有益於學者然此書難解者尚多其中容亦有可疏通者安得通人更爲之補注乎新雕西京雜記緣起丁未乾隆丙午之歲爲同年謝少宰東墅校梓荀子旣竣計剞􅕻之􅀡尙賸給數金思小書可以易訖工者有向來所校西京雜記因以授之費尙不足鍾山諸子從余遊者率資爲助而工始完始余所欲校梓者以漢魏爲限􅍘今此書或以爲晉葛􅇝著或以爲梁吳均僞􅁧而何梓爲余則以此漢人所記無疑也說苑新序其書皆在鐂向前向校而傳之後人因名二書爲鐂向著今此書之果出於鐂歆別無可攷卽當以葛􅇝之言爲據􅇝非不能自著書者何必假名於歆書中稱成帝好蹴踘羣臣以爲非至尊所宐家君作彈棋以獻此歆謂向家君也􅇝柰何以一小書之故至不憚父人之父求以取信於世也邪若吳均者亦通人其著書甚多皆見於梁書本傳知其亦必不㞕託名於鐂歆且均之文卽俊拔有古氣要未可與漢西京埒則其不出於均又明甚隋書經籍志載此書於舊事篇不著姓名新舊唐書始題葛􅇝且入之地理類似全未寓目也夫冠以葛􅇝以􅇝鈔而傳之猶說苑新序之稱鐂向固亦無害其文則非􅇝所自􅁧凡虛文可以僞爲實事難以空造如梁王之集遊士爲賦廣川王之發冢藏所得豈皆虛邪至陳振孫疑向歆父子不聞作史此又不然歷朝􅁧造裒然成編所云百卷特前史官之舊向傳之歆歆欲編錄而未成其見於􅇝之序者如此本不謂其父子皆嘗作史也􅇝以爲本之鐂歆則吾亦從而鐂歆之耳又何疑焉題春渚紀聞丁未陳振孫書錄解題云何薳浦城人自號寒靑老農東坡所薦爲武學博士曰去非者其父也今案其書題韓靑老農二字不同未詳孰是此書名春渚紀聞春渚與韓靑皆其所居之地名歟其書十卷中一卷皆東坡事實葢其淵源所自見聞爲最確也末一卷記丹藥頗亦似惑於此者然所言實足以爲貪夫之戒毛氏汲古閣曾以之付梓第九卷中缺一葉毛黼季後得宋刻始補全而不及入梓其鈔本尙有流傳者余過蘇州從吳秀才枚士翊鳳案頭假歸而傳錄之不見有舊人序乾隆丁未歲四月二十三日鍾山書院長東里盧文弨遂題其端三水小牘題辭王子此書同里湯秀才典三於故書叢殘中得之以示余乃舊梓本作此書者安定皇甫枚也枚在唐懿宗咸通末爲汝州魯山縣令僖宗之在梁州赴調行在此皆見書中可考者也明嘉靖閒吳中姚樗老鈔是書謂枚於天佑庚午歲旅食汾晉爲此書此必見枚之自序中不然姚何以知之此序余未之見世倘有見斯序者幸􅂌余以弁諸首庶尢完善也此書雖多仙靈鬼異之事然所載烈丈夫如董漢勛烈婦人如李庭節妻崔氏殷保晦妻封夫人皆凜凜有生氣郟城令遇賊偸生而下卽繫以崔氏之罵賊被殺此與歐陽傳長樂老而以一婦人相􅄱意亦相似可興可觀有裨世教又如紀夏侯禎事而知神靈不可褻黷紀嚴郜事而知婦女不可入廟其垂戒亦深切矣善讀者當以是求之又案天佑庚午唐亾巳四年矣時晉猶稱天佑而枚亦稱之其不臣二姓亦可見此書烏可使之無傳乎揮麈錄題辭乙未揮麈有三錄共十八卷又餘話二卷南宋時汝陰王明淸仲言之所著也宋人於本朝典故前輩言行率能畱意仲言爲雪溪先生銍之次子家庭之緒論賓客之叢談得之見聞者爲多於眾座中偶舉舊事了了如在目前甚爲李仁甫尢遂初諸公所稱賞其言無私軒輊故可以爲國史之助實錄院牒泰州錄其書則在當時巳爲世所貴重如此仲言有兄名廉淸字仲信年十八著慈寧殿賦而今賦􅡔收此篇署其名爲王仲言見此書乃知其誤仲言所著尙有玉照新志投轄錄等書外閒所傳多非足本唯此書爲全余是以先錄而藏之篋笥其餘尙俟續訪冀或得之題癸辛雜志乙未此書江陰楊伯庸敦裕所校畱余篋三年矣前年六月余病臥金陵城南小樓中以此書作消遣時樓中人尙無恙也未幾而分飛矣又逾年伯庸亦下世始余無意鈔此書爲其語駁雜多刺人之短非長者今年復繙此書見故人手迹班班其勤亦不可沒且稗海中此書多脫誤不及是本之完善況益以校讐之功不更善之善者歟大凡君子立身不能使人無毀而不當自授人以可議之隙舉動之失旣以昭著烏能望人之掩覆耶讀此者亦可以自警故余復爲之訂正數字而錄之􅁣伯庸之不及見也而當時相與卽卽足足於小樓中者亦惟腹知之而巳自今余第緘置之亦不忍復讀矣乾隆四十年六月對牀夜語題辭乙未對牀夜語五卷其前題著書人姓名則孤山人范晞文景文也有馮深居去非序首云景定三年則知其人宋人也孤山之在錢塘者則以林和靖著而此孤山則在今常州靖江縣東北二十里山向在江中明成化時沙合始可陸行立縣亦在此時舊則江陰縣之地也余杭人不以爲吾邑之孤山而以爲江陰之孤山何徵乎徴於吾友江陰趙君敬夫之言也且余所見本實江陰人所爲梓也是則可信也浙江通志不載此書宐也乃江南通志亦不載則漏也其書則詩話之􅀋也自三百以逮有宋各有論說或取其意之相師辭之相􅀋者而衡搉之不入於腐不涉於刻斯其所以可取也歲在癸巳六月坐金陵城南之小樓手鈔此書余婦季楊見余之揮汗爲此不急之務也日天時正炎君子宐自愛乃鈔僅三卷奪於他事不果再逾月余婦亾後二卷令他人續成之漫置篋中今將裝治之使成帙復披覽一再過情事宛然而歲巳再閱也讀書中所引安仁文通樂天悼亾之句彌難爲情放翁有句云此身行作稽山土猶弔遺蹤一惘然余亦豈能自禁也鮑君以文考范景文實杭人今不廢此篇以掩余􅋘者一時情景不忍􅃿也自記碧血題辭丙申碧血一編紀明天啟時死奄禍諸忠也前列其目自新建萬郞中燝以下凡二十有一人次載六先生遺書則應山楊大􅇝嘉善魏廓園嘗熟顧塵客江陰繆西谿無錫高景逸江陰李仲達也六先生之集世多有而此則皆被逮以後及獄中之筆也其後附以天人合徵錄有燕客所自爲傳隱其姓名故日燕客天啟五年聞六君子之獄興乃走燕變服雜北鎭撫司獄卒中得其遺言遺札且僃見許顯純以非􅆿楚毒諸君子而致之死狀以著爲是錄也東里子讀之而歎曰嗟乎世事至此欲國之無亾也不可得矣六君子者楊魏顧三公外一爲桐城左公浮邱一爲武定袁公熈宇一爲南城周公衡臺是皆憂朝廷嫉權奄不顧其身而冀萬一之可以挽救者也卒之勢不足以抗而甘以身爲殉彼奄黨者唯恐其毒之不至不足以快奄之意不足以自􅆺於奄而取容於是以古今未有之慘毒不以加諸元惡大憝者而乃以施於諸君子之身呼號宛轉而君不聞血肉狼藉而君不知斯時之天下一昬暗鬼鬽之天下也彼自以爲典兹祕獄外廷莫聞而孰知其諂附惴葸之􅄱與其恣睢殘酷之態卒亦有㫄觀者爲之繪畫迨其身旣膺顯戮而其醜名仍流播於天下後世而不可掩雖然若此輩者不能必後世之無有惟在人君不使之與政事而竊國命則奄何能爲附奄者亦何所利而爲之而顧乃驅除其不爲奄者而使之盡爲奄也正氣摧殘公論消沮蟲據腹而身危奄持權而國壞易世而亾豈爲不幸哉書後又附天變雜記但云五月六日不著何年考明史熹宗本紀天啟六年五月戊申王恭厰災死者甚眾五行志火災内所書加詳又火異内則書六年五月王寅朔厚載門火神廟紅毬滚岀與此皆合但紀作戊申志一作戊申一作壬寅朔而此則丁未也災異之發猝然而至不應中閒暌隔數日似當以此記爲是又有人變述略則紀蘇常二郡民憤擊殺緹騎之事燕客自云通天文兵法其人葢亦奇傑之士而是書首列諸忠題云黃煜􅡔次予以爲當卽其人姓名唯其邑里本末則有未能深知耳是書足以僃監戒動感發故錄之分上下二卷予所定也史糾題辭乙未此明季太倉朱明鎬字昭芑之所著也案千頃堂書目史糾二卷書史異同三卷新舊唐書異同二卷今此本倂異同入史糾祗分上下兩卷其書駁史筆之違失考事詞之紛􅄮文采斐然條理秩然讀之頗快人意此當是節本始於三國志無晉書而有宋齊梁陳北魏北齊北周等書南北二史新唐書宋史而止遼金二史閒亦涉之是謂史糾其兩異同附載於後者寥寥葢無幾矣吾浙採訪進呈書内所載亦同其元本殆不可得而見然就此本讀之亦尙有全錄裴松之之語者有採自吳咸林之糾繆王浚儀之困學紀聞者則元本汎濫益可知書史之異同下有注云文多不錄錄其有議論者然則節而取之亦不可謂舊人之過矣余是以卽據此本錄焉宋書謝晦傳有兩庾登之而昭芑誤以爲是一人此殆千慮之一失也昭芑爲本州儒學生當闖賊之陷京也有悲憤詩云銅馬連羣壓帝畿百官猶是殿廷非東華父老吞聲哭誰斲桐棺覆玉衣見於明詩綜後遂絕意進取年四十六卒鎭洋志載有史􅁽史幾史略史風史游史嘉史芸史異史最史俳史鑒史燦史糾凡十三種而史糾特精題明史藝文志稿癸巳此志稿傳是溫陵黃虞稷兪邰氏所纂輯今以頒行明史校之所分門類多有刪倂移易之處史於書不甚著及無卷數者俱削之黃志中小注爲史所採入者亦無幾耳志稿自南宋及遼金元之書俱捜輯殆徧此卽晉隋史志兼補五代之遺則而今以􅍘代爲限亦俱削之巳安得有力者將此四代書目別梓之以傳亦學者之幸也外閒傳有千頃堂書目與此志大致相同而亦閒有移易堂名千頃固黃氏所以志也然今之書􅀡是書賈所爲郡縣志幾於無所不載別集各就其科第之年以爲先後取便於檢尋耳宗藩與宗室離而爲二俱失體裁而小注又爲鈔胥任意刪減益失黄志之舊但此志稿別集類於羽流外國亦俱缺如篇第亦閒或顚倒恐此尙有脫􅂤余先鈔得書目後從朱君文游借得此本力不能重寫但取以校書目改正不少旣畢校遂書其前以還之此志稿乃康熈時史官倪燦闇公所􅁧非黄氏也莊香塍古文􅡔鈔補題辭辛亥鐘鼓筦􅁌不同器而皆悅於耳查梨橘柚不同味而皆可於口此天下人之所同也然而􅇝纖殊致甘酸異宐又往往各有其性情之所主以之自怡悅則可而終不足以饜眾人之所求文之􅃟亦猶是也自周秦以迄於今文之流傳多矣學者豈能敝敝焉徧觀而熟讀之於是有爲質性魯者計則其所擇而􅃟者主乎約有嫌其􅋘而擴充之者若桐川兪寧世荆谿儲同人之􅃟今皆盛行而吳門又有蔣君新又之古文􅡔鈔凡十卷庶幾洋洋乎大觀矣莊君香塍幼而聰穎承其尊人鏡堂先生所授讀葢又有軼於􅡔鈔之外者昔所熟誦久未能􅁯且將轉而爲後人勖也官􅷜多暇手自捃輯又成五卷合蔣􅃟共十五卷於是文之體裁無一不僃有高古􅂤質者有華腴充悅者或幽深奇峭或紆餘坦迆舂容乎大篇寂寥兮短章惟是是歸有美必登鏘鏘乎八音之繁會也津津乎五味之芳嘉也此可以通天下人之情而更無未醇未僃之憾矣是舉也不􅁯先人之敎孝也以敎子姓使不囿於聞見義也岀以公之於人而無所祕惜忠也有此三善是當表而岀之固不但服其搜羅之富採掇之勤而巳也余故樂爲之弁其端羣書拾補小引丁未文弨於世閒技藝一無所能童時喜鈔書少長漸喜校書在中書日主北平黄崑圃先生家退􅀡之暇兹事不廢也其長君雲門時爲侍御史謂余日人之讀書求已有益耳若子所爲書幷受益矣余洒然知其匪譽而實諷也友人有講求性命之學者復謂余此所爲玩物喪志者也子何好焉斯兩言也一則微而婉一則􅂤而嚴余受之皆未嘗咈也意亦怦怦有動於中輟之遂覺闕然有所失斯實性之所近終不可以復反自壯至老積累漸多嘗舉數􅁽付之剞􅕻氏矣年家子梁曜北語余曰所校之書勢不能皆流通于世其藏之久不免朽蠧之患則一生之精神虛擲旣可惜而謬本流傳後來亦無從取正雖自有餘奚裨焉意莫若先舉缺文􅍘􅂤譌繆尢甚者摘錄以傳諸人則以傳一書之力分而傳數書費省而功倍宐若可爲也余感其言就余力所能友朋所助次第岀之名曰羣書拾補雖然卽一書之譌而欲悉爲標舉之又復累幅難罄約之又約余懷終未快也然余手校之書將來必有散於人閒者則雖無益於己寧不少有益於人乎後有與余同好者而且能公諸世庶余之勤爲不虛也巳乾隆五十二年八月丁巳書於鍾山書院時年七十有一劉隨州文集題辭丁酉劉隨州文集十一卷其前十卷皆詩也後一卷文而摠題曰文集何義門氏以宋本校正如此其卷之起訖字之同異皆僃著焉然後一卷有目而無文余案其目求之僅於文苑英華得四篇錄之他尙無從考也隨州詩固不及浣花翁之博大精深牢籠眾美然其含情悱惻吐辭委宛緒纏緜而不􅍘味􅇽泳而愈旨子美之後定當推爲巨擘眾體皆工不獨五言爲長城也近時吳郡席啓㝢刻唐人詩百家以隨州爲首雖其詩差僃然頗有同異究不及是本之精夫一字之不安通章之病也學者可不唯善本之求而但􅆓流俗之所傳乎有志風雅者其必樂考於斯矣題宋板施注蘇詩庚子宋刻不必皆佳而此則楷法端謹爲尢難得向在商邱宋公牧仲所公撫三吳時先外祖馮山公先生與毘陵邵子湘吳趨吳荆山諸老咸在幕府宋公得此書遂梓以行世先外祖與校讐焉又別爲補遺三卷附其後今元本歸於同年友大興翁覃溪所一披卷不獨古香可愛而緬惟舊澤對之不覺生敬乾隆庚子頒來歲朔之日杭東里人盧文弨書遺山樂府題辭乙未遺山詩渾雄沈鬱有唐大家之嗣響也老來更得其樂府讀之姸雅而不淫和易而不流其抒情也婉以暢其赴節也亮以淸使竹山草窗諸公見之亦當推爲作者遺山生當易代其詩不勝故國故君之思今樂府中亦時時遇之朱竹垞黃兪邰所見本俱祗二卷今此五卷者岀於義門何氏卷帙過倍而竹垞詞綜所􅃟顧尙有岀於是本之外者則亦未得爲全書也繼從友人鮑氏所借得明初錢塘凌雲翰彥翀編􅃟之本則凡詞綜所􅃟皆在焉比是本增多十三首又附見李冶仁卿之辭四首及玉華谷古仙人詞一首後又有雷淵題語今皆補錄以繫於後至如雁邱詞雙蕖怨之類亦得凌本始著其事焉凌本詞之屬遺山者祗一百二十首固不及是本之多然是本第五卷淸曉千門開壽宴以下八十二首皆酬應之作而其中春垣秋草一首注見辛稼軒集疑有他人之作誤闌入焉者矣第二卷中附閑閑公趙秉文促拍醜奴兒一首余因疑第一卷滿庭芳前首亦閑閑公作也以其詞推之所賦是十月牡丹次首題云同座主閑閑公賦則前首爲趙作明甚旣不著其題又不別其人疑皆轉寫脫去其他不及考者尙多儻有好事者爲之剞劂余當更整比以授之遺山樂府􅃟題辭乙未元遺山詞五卷余旣以盡鈔之矣此爲明初錢塘凌彥翀氏所編􅃟不分卷雖甚􅂤約然亦有出於五卷之外者余又錄於五卷之後爲補遺矣而復鈔此何也此遺山辭之精華也有五卷以萃其全有此􅃟以標其雋春之朝秋之夕聯佳客於一榻懷故人於千里意有甚適則引之而永焉情有不怡則融之而釋焉便觀覽資吟諷莫若此􅃟也宐且吾鄕前輩之所甄綜也不可以莫之傳也彥翀在元膺鄕薦爲蘭亭書院山長􅇝武初以薦授成都府敎授此書題前鄕貢進士不􅁯元也所著有柘軒集五卷余未之見是書本岀裘杼樓葢桐鄕汪氏之寫本也汪氏多藏書有詞綜之􅃟其所得宋金元以來諸詞人之作必大僃而今散失者巳多矣韓詩外傳云君子之居也綏若安裘晏若覆杼汪氏之名所居義必岀於此然杼實杅之誤杅卽盂也覆之乃安若杼柚不可以覆言抑莊子山木篇有云孔子辭其交遊逃於大澤衣裘褐食杼栗入獸不亂羣入鳥不亂行此則裘杼之可連文者而義則遠矣夫寧取於是乎米襄陽畫史題辭丁未藝非能重人也人苟重矣有藝而藝亦重無藝而人亦不加輕越哉米氏論唐五王之功業不如薛少􅍖之圖繪爲人所珍重得以流傳至今也古來盛德豐功死而不朽其英光固常在人耳目閒豈待披圖展軸而始見耶後之人撫遺文而咏歌之過墟而憑弔之豈區區寶鈿瑞錦之什襲珍玩爲足較其勝負耶如米氏者風止詭越徒顚不足以傳而幸有書畫之足以名家故傳乃遂謂書畫之外皆可薄也茲適成其爲偏宕之辭而巳矣古今成物必無不毀米老所見多有今人所不及見者此亦如數富家之遺齒於我奚裨焉然其所言要可以爲評鑒家之標準且五穀不熟不如荑稗亦足以媿夫一無所成者偶得善本遂傳錄之爲桂明經未谷馥題說文統系圖庚子未谷通說文學去許君千載猶旦暮也屬羅山人爲作圖圖許君幷圖江式而下七人皆如漢經師之恪守家法者此特意之所到而巳非謂昌明其道者止此數人也未谷或將別爲一書以明淵原所漸則不惟在許君後者當補而幷當遠泝之羲頡矣吾獨謂未谷胡不皃己於其中以爲之主人乎近代詩人之圖少陵香山東坡者巳有例而未谷不爲此則誠缺事耳題桑東愚先生松林采藥圖端庚辰先大父之友桑孝子文侯翁古篤行君子也孝子舉丈夫子二人伯弢甫先生文行著稱於時兄事先君子文弨娶先生女又師事焉仲東愚先生嘗學於先大父以孝子年老棄學治生令伯得極意學學成世人但知有伯鮮知有仲也夫東愚先生特未嘗操三寸不律以馳騁於詞壇藝苑之閒耳其學之勤固有過人者熟於編年之史上自皇帝以訖勝國校其得失成敗之故目可得而覩手可得而指也世之習舉業者往往愧之先生少多病壯歳目幾枯然善自養於世無爭也於物無嗜也左手三指甲長而不翦積於今三十有餘年甲之長盈今尺尺有餘寸世遂目爲長甲翁孝子精於醫先生得其傳世人求其治病多有驗然未嘗取利名於時也年向六十屬善繪者爲松林采藥圖以寄意天台齊次風少宗伯首爲之咏國中屬而和者將百十數而未巳也於是向之知伯者且知有仲云先生之子公僃經邦語文弨曰子先君敬甫先生嘗見是圖許爲之文而今不可作矣子其述之不孝聞言嗚咽先生與余家兩世交最深先君子少壯之年與弢甫先生相厲以學其於先生固不若弢甫先生之親也近年弢甫先生常出遊先君子所朝夕遊處者惟先生親人有以􅄱迹之論閒先生者壹不顧先君子常謂孝子兩子皆賢子也前十年爲文以壽先生有昆侖兩脈之喩得其淸淑者弢甫先生也得其敦龎者先生也噫不孝其惡能易此言乎先生名鼎元居城東隅以東愚自號亦所以志也公僃與文弨善庶幾能篤兩世之交者不知其不肖而屬爲題其端噫使先君子而在當何如發揚盛美者豈若小子兹言之􅋘也題虞山趙氏增置祀田碑記虞山趙謹凡先生爲前朝文毅公之後人公嘗置祀田三百畞矣易代而亾之謹凡與兄鹽山謹承先志節縮所入僅復其半爲其成之難而失之恐易也自爲記幷其經理之規咸勒諸石使後之人觀感而益恢廓之葢不僅望其能遵守勿暜而巳也余師桑弢甫先生旣爲文以發揚之矣余無似曷以加諸無巳則以閱歷所得者而進一說焉欲田之能世守且益增也此以賢望後人也望後人之賢則在乎讀書識義理其達而有祿者則必能繼前人之志而不徒爲宮室妻妾之謀其窮而伏處者亦不待禁防而自恥爲侵削之計趙氏望族也士之子恆爲士則與田相輔而行者其亦知務乎葢吾嘗見失有基而壞者多矣皆由其族鮮讀書人之故吾是以有云題嚴葆林香照圖後乙卯余同年友烏程嚴君葆林今之循吏也文學實過人而屈居百里初任山東之蒲臺兼攝商河凡治水卹災平役諸善政余欲爲詳述之以上於太史氏今適有河魚之疾未能也此圖凡十幅自讀書靈山以至調任曲阜生平歷履藉此可見圖皆有小序君所自紀也文筆雅馴絕無虛憍之氣余與君㮄下一別中閒了不聞問乙酉之歲余爲廣東主考官巳事而反紆驛程五十里謁孔林而君適爲其縣宰相見驩甚以于役有程匆匆別去後聞君擢任桃源同知旋吿歸皆不在此圖中君有遺腹子章傑年巳二十有二矣能讀父書此圖常不去左右頃以示余余深憾知君之不盡也讀其自序􅁣然增慕焉圖名香照取香山寫眞詩序觀今照昔語也君自幼愛白香山詩卽巳工是體其吟詠自必褎然成役諸善政余欲爲詳述之以上於太史氏今適有河魚之疾未能也此圖凡十幅自讀書靈山以至調任曲阜生平歷履藉此可見圖皆有小序君所自紀也文筆雅馴絕無虛憍之氣余與君㮄下一別中閒了不聞問乙酉之歲余爲廣東主考官巳事而反紆驛程五十里謁孔林而君適爲其縣宰相見驩甚以于役有程匆匆別去後聞君擢任桃源同知旋吿歸皆不在此圖中君有遺腹子章傑年巳二十有二矣能讀父書此圖常不去左右頃以示余余深憾知君之不盡也讀其自序􅁣然增慕焉圖名香照取香山寫眞詩序觀今照昔語也君自幼愛白香山詩卽巳工是體其吟詠自必褎然成集異日尙當從其子索見之四時尋樂圖題辭甲午圖十二幀幀各當一月月各撮其景物之勝不必其相兼也名之曰四時尋樂圖尋之者誰海虞席硏農先生也舅氏張端甫先生頃自其里中歸爲文弨道先生之爲人性至孝其宦於吾浙也奉太夫人以來春秋佳日常奉板輿游湖山之閒太夫人顧而樂之而先生之樂可知也旣而乞歸家有園池之勝指僞僮奴澆花洗竹以娛侍老人不必祿養而樂亦無不具足也然則奚尋之爲噫吾有以知先生之意矣大凡外境之交於前者無不隨人意爲轉移故同一境也意所樂斯樂巳意所集異日尙當從其子索見之四時尋樂圖題辭甲午圖十二幀幀各當一月月各撮其景物之勝不必其相兼也名之曰四時尋樂圖尋之者誰海虞席硏農先生也舅氏張端甫先生頃自其里中歸爲文弨道先生之爲人性至孝其宦於吾浙也奉太夫人以來春秋佳日常奉板輿游湖山之閒太夫人顧而樂之而先生之樂可知也旣而乞歸家有園池之勝指僞僮奴澆花洗竹以娛侍老人不必祿養而樂亦無不具足也然則奚尋之爲噫吾有以知先生之意矣大凡外境之交於前者無不隨人意爲轉移故同一境也意所樂斯樂巳意所不樂竝不見其可樂也卽或境能移情風日之硏和也山水之淸嘉也魚鳥之親人也花藥之紛敷而猗靡也遇之未有不神怡者然而樂繫乎物境過則遷斯猶非眞樂耳今之十二圖先生之所謂樂也人皆可得而同也先生之所謂尋者意實不繫乎物而自有其眞樂者在上堂拜慶繞膝承歡所尋之樂孰有過於是者此較之孔顏之樂不必相同而亦何必不同故先生之自謂圖斯境也幻吾則以爲先生之有斯樂也眞四蓮池題額庚辰吾杭許氏建宗祠於城東隅其地近古荷花池眾水匯焉於是面水闢軒顏曰四蓮池取王子年記中語以爲子姓繁衍之徵抑吾更有說焉夫蓮之爲物其莖其葉其本其花其實其根無不爲人取資焉者爲人祖父旣望其子孫之眾多更望其皆賢且才各有所成就以自表見而不爲世所棄亦如蓮然然則他日許氏合族於斯覩斯題也其必思無負斯語也夫弟子江陰王璋秉政校抱經堂文集卷第七
