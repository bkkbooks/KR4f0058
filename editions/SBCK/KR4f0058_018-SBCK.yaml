body:
  text: 東里盧文弨紹弓書二上黃崑圃先生書庚午士之能自守者莫不以有求於人爲病雖然此但謂不當爲流俗人之所求耳若士亦有士之所當求者如必以無求斯可爲士此葢狷狹之行非宏通之道也文弨弱冠來京師三年而歸歸而復來迄於今且十年矣官司之長及舉主歲時隨例往投刺而巳未嘗一進謁於其庭也其餘王公大人之門未嘗有文弨之迹焉此非敢薄當世之王公大人爲不足事而故以偃蹇爲高也流俗之所求固􅍘然不爲然使見之也不以事請閒而進欠伸而退其所言非性命之理非當世之務非有剙解之獲而疑義之析若此者雖不爲流俗人之所求吾猶恥之若文弨之所求則有在矣家貧不能得書自來京師卷軸益少讀班范之漢書欲求荀袁之紀以證之而不可得也讀歐宋之唐書欲求劉昫之舊本以證之而不可得也借之友朋皆相笑以爲不急之務此其所憾一也家君在南方師友亦皆遠隔每有滯義輒錮於胸中積日不得豁然見前人議諭之未是者竊欲更張之深懼不知而作所謂見螳蜋之在前而不知黃雀之隨其後苟不就正於有道終不可信然竊觀士大夫閒類皆勞勞於職務而無暇爲審定焉者此其所憾二也若是則文弨非無求也患其不得所求也先生以高才早掇巍科復從師問學無絲豪自矜意旣而敭歷中外爲朝野所共欽懸車歸里猶日以友朋書籍自娛好􅅄引後進客至不畱於門文弨懷企久矣而以無介紹之故不敢以褻見今者猥辱令子侍御君之下交而又示以賢孫之文夫交其子孫則必登堂而拜其父祖禮也況先生更文弨之所願見者哉夫少而不事長賤而不事貴古人以爲大戒碌碌於世而不爲有識者之所知亦士之恥也以先生學行聞望何可不見且里居則旣無職事之勤文弨雖數踵門亦可無流俗人之嫌是以一旦舍其狷狹之行有此請焉謹先獻所爲古文若干首漢書續考證三􅁽幸先生不棄而辱敎之且岀其藏書以示之則文弨之所求庶幾大慰復秦味經先生校勘五禮通考各條書甲申日承尊諭以所著五禮通考雖巳刊刻完竣未卽行世恐其中或有參錯不及細檢處須及今改訂爲善文弨學識短淺誠知不足以副諈諉然先生之虛懷爲巳至矣繙閱之勞所不敢辭謹就愚見似其中尙有可參酌者數事輒疏左方呈覽伏乞恕其狂瞽或有一二采擇不勝幸甚主臣尊案云鄭氏注經文天帝名目錯岀一天帝也曰北辰耀魄寶天皇大帝皇天上帝昊天上帝一天而數名又謂皇天北辰耀魄寶上帝太微五帝一號而二神一五帝也曰五德帝當方帝感生帝一感生帝也曰靈威仰赤熛怒含樞紐白招矩汁光紀隨文而屢變文弨謹案康成六天之說雖參錯屢變然約其旨歸不過北辰耀魄寶及太微五帝二者而巳上所譏一號而二神者是也至五帝之名則東方蒼帝靈威仰南方赤帝赤熛怒之屬蒼赤黃白黑卽木火土金水之五德主東西南北中之五方異名而同實者也唯感生帝則隨代而易周木德蒼帝之精故以靈威仰爲感生帝殷則以汁光紀禹則以白招矩五德各當其方而當代祇一感生帝是不可謂之屢變書類于上帝蔡傳其禮依郊祀爲之尊案云類之名義諸解皆不若鄭注之確故朱子書集傳取之以授蔡氏也文弨謹案下文又有尊案云經言類祭不外陟位行師巡守諸大事皆義類之正大而不可以巳者然則類之爲名或亦正其義類而吿之之謂乎若以類爲依倣郊祀則旅亦未嘗非依倣爲之也云云據此則此處尙未可遽以鄭注爲確也禮志壇毎成高二十七尺三成總二百七十有六乾之策也尊案云乾策二百一十有六七爲誤字顯然分之爲三當作毎成七十二尺亦刻本誤也但三成共二十一丈六尺何乃太高亦不可考文弨謹案毎成二十七尺此似非誤意此下或尙有脫文考前後制度多言十二陛陛七十二級三成陛級之數合之適得乾策然則非言每成有七十二尺明矣葢毎成二十七尺巳比舊之高加倍有餘舊每成高八尺一寸無遽加至七十二尺之理但當以爲文有脫誤可耳或總字誤當本是級字後漢書祭祀志立春之日迎春於東郭外一段至三時不迎尊案云此永平以前舊制劉昭以其不成禮典故祭祀志中列永平迎氣五郊之禮於前而附此於下卷之末文弨謹案祭祀志末所載靈星先農風伯雨師及此迎春一條皆縣邑之事故不僃禮且不言郊而言郭外若天子國都則永平以來卽有迎氣五郊之制本之禮讖月令又采元始故事爲之則知非永平創造可知矣迎春一段不紀年月不可卽􅍘以爲永平以前舊制如此而後乃改易也今州縣亦止有迎春一節此卽古法之猶在者又案後漢書附見諸志皆晉司馬彪續漢書中之志梁劉昭注以補之故題曰注補毛氏汲古閣本猶然近乃改刻作劉昭補幷注此大誤不可承用周禮大宗伯以實柴祀星辰注星謂五緯辰謂日月所會十二次疏辰卽二十八星也尊案云星兼經星緯星而言辰天之無星處皆是是以日月所會大略分之則爲十二次耳非卽指二十八㝛也文弨謹案二十八星皆日月之所經一歲之中凡有十二會故疏又云不當日月之會􅀡謂之星若日月所會則謂之㝛謂之辰謂之次葢專言星則可以兼經星緯星此以星與辰對故注一主緯一主經也若邵子言天之無星處皆是辰此別一義而以施於祭祀則不合何則太虛之中坱兮無垠旣祭天矣又祭其無星者此何義也若謂大略分之爲十二次則舍二十八㝛之外不聞又立娵訾之祭降婁之祭諸名目也又尊意以北辰辰之最尊者竝無星象亦不在二十八㝛之內爲證竊疑北辰雖無星象然天之樞紐確然有可指處鄭氏旣以北辰耀魄寶爲上帝故此不具列耳若日在營室日在昴旣巳確指其星爲日之所在而猶不謂之辰轉求之杳冥之處恐未然也餘星不謂之㝛而唯此方面各七者謂之㝛㝛卽次也次十二而星二十八以所會包所經也若過泥無星一語則水星又何以謂之辰星大火又何以謂之大辰中庸日月星辰何以總謂之繫於天乎此猶儒者以天爲卽理也而要不可以理爲所祭之天所謂言各有當也觀下條尊案所云取附近之星以相識別是巳洞悉其故而猶引無星謂辰一語竊謂當幷去之爲是尊案云太歲之祭或以爲木星或以爲十二辰若云木星則卽五緯之一而非別有一神若以所行之次每歲一易者當之是卽十二次是巳在二十八㝛之中而又非別有一神也文弨謹案周禮􅍖章氏十有二歲鄭注云歲謂太歲歲星與日同次之月斗所建之辰也歲星爲陽右行於天太歲爲陰左行於地十二歲而小周又互見太師注假如元枵子星紀丑析木寅大火卯壽星辰鶉尾巳鶉火午鶉首未實沈申大梁酉降婁戌娵訾亥此十二辰之建乃左旋也若子爲星紀丑爲元枵寅爲娵訾卯爲降婁之等則右旋之辰也馮相氏旣言十二辰又言二十八星疏以辰爲子丑寅卯之等是又與十二次之爲辰者別也太歲之祭雖始近代然考之於古太歲實非歲星又非二十八星明矣敢獻其所聞王舜中劉歆文弨謹案漢止有王舜無王舜中考漢書王舜下接以中壘校尉劉歆陳氏禮書誤以中字屬上其實當時尙少二名也尊案云來室之制孔仲達謂房與夾室實同而名異鄭康成又謂房當夾室之北文弨謹案鄭在孔前文勢似不應爾竊以實同名異之語雖見孔疏而實創於孔安國陳氏禮書所引可證然則仲達改作安國可也周禮天官凌人祭祀共冰鑑注不以鑑往嫌使停膳羞文弨謹案周禮祭祀共冰鑑下云賓客共冰此注九字單釋下句非釋祭祀也祭祀共冰鑑何云不以鑑往祭祀自有主者何云嫌使停膳羞此注應刪去幷下疏二十七字亦當刪㽔賓又下生大呂又上生夷則又下生夾鍾又上生文弨謹案㽔賓係重上生此卷內後所載鄭康成語不誤此處四字上下俱當互易朱子鍾律篇及徐氏萬卷堂周禮本皆不誤可證也尊案云蔡氏以九起算非止得太史公之法實黃鍾律度爲萬事根本之妙蘊也黃鍾以九爲本以三爲用神明自然乃造化之奥機其所謂九寸者不過假尺度之名以紀損益乘除之數而與尺度之積十爲分積分爲寸之寸截然不同朱子謂爲假設之權制可謂得其意而與史記注合但此稱其數整齊􅂤􅀡過於鄭法之難記而易差不知黃鍾自然之數妙合天成是以生律生聲極其所至而無不通若鄭以分寸審度之法拘泥推測不但與律度之本旨霄壤懸殊卽其算數巳難記而不可行矣嗚呼黃鍾之蘊朱子且未能盡窺何怪算數家紛爭執礙揣摩擬議而成萬世不決之疑也非大聖人孰能冥悟神會而與於此哉文弨謹案朱子謂十二律之數鄭氏與太史公說不同且謂鄭法難記而易差竊嘗求鄭氏之法止是三分之數與史公合未見其積十爲分積分爲寸與史公異也何也南呂長五寸三分寸之一則是以三分爲寸也姑洗長七寸九分寸之一則是以九分爲寸也應鍾長四寸二十七分寸之二十則是以二十七分爲寸也推之至於中呂長六寸萬九千六百八十三分寸之萬二千九百七十四與史記生鍾分酉之數合也無射之分數卽史記申之分數也夾鍾之分數卽史記未之分數也夷則之分數卽史記午之分數也其他莫不皆然鄭何嘗拘審度之法而以十爲分積分爲寸乎夫史記自子而亥極於十七萬七千一百四十七分六萬五千五百三十六數亦可謂多矣而不患其難記者其法不過三之而巳其實則倍之四之而巳又何獨於鄭而以爲難記而易差乎史記卯二十七分十六與南呂長五寸三分寸之一合也三爲一寸十五爲五寸尙餘一故云三分寸之一辰八十一分六十四與姑洗長七寸九分寸之一合也九爲一寸六十三爲七寸尙餘一故云九分寸之一以此推之莫不皆然則史公鄭氏一以貫之朱子此論恐尙未可以爲然也史記古者天子七廟諸侯五大夫三雖萬世世不軼毀今始皇爲極廟文弨謹案此段史記各本皆然其實誤倒案雖萬世世不軼毀當在今始皇爲極廟之下觀下文云自襄公以下軼毀便知此句之爲誤倒明矣宋史禮志至道三年孝章皇后宋氏祔享有司言孝章正位中壺宐居上室懿德追崇后號宐居其次詔孝章殿室居懿德下尊案云孝章祔享乃祔於孝惠賀皇后之别廟也太平興國元年太宗懿德符后巳先祔其廟故孝章祔時有司以居室之上次爲論但孝章乃太祖之繼后懿德乃太宗之繼室以兄弟之序君臣之分而言俱宐以孝章居上室今乃易之亂其序矣文弨謹案以太祖之繼后降居太宗繼后之下其爲悖禮夫人而知其不可乃當時後世俱無議論及此者竊以眞宗朝決不應有此事禮官趙湘請以眞宗本生母元德太后祔太宗廟室眞宗曰此重事也俟令禮官議之又越三年始因羣臣表請而後從之則其必不以私情而黷禮之大分可知矣然則禮志何以云爾乎曰禮志之文殆有譌誤若懿德先祔孝惠之廟則以孝惠之未嘗一日居正位者而懿德且爲之屈矣何獨不屈於孝章乎若懿德先巳居孝惠之上則其失巳在前不待至此有司始議其先後之次也兩者俱無所處竊意禮志之文當云有司言孝章巳正位宐居上孝惠係追崇宐居次詔以孝章殿室居孝惠下兩孝惠俱譌作懿德者葢轉寫者見下有懿德居上及懿德居淑德之上之語文相附近故譌耳且卽以懿德居淑德之上一句考之若如禮志譌文則孝章居懿德下居淑德上乎抑幷居淑德下乎不應止以懿德爲言也如此大舛錯而無一人言者有是理乎故知兩懿德字皆兩孝惠之譌觀後文所引神宗紀及玉海等書皆以孝惠孝章淑德章懷連稱卽可知當日之次矣尊案云斬牲之禮行於京師都試之法行於郡國文弨謹案劉昭注續漢志云漢承秦制三時不講唯十月車駕幸長安水南門會五營士爲八陣進退名曰乗之是都試不但行於郡國也晉書禮志載魏國有司奏漢西京惟十月都講亦其證此乗之之名似不可不載入又案晉書禮志雖與續漢志相同然以賜武官下當㬪武官二字六十四陣下續志有名曰乗之四字尢詳僃唯天子下車一段當仍之亦見續志注尊案云夏小正緹縞傳末有何以謂之小正以著名也十字殊不可解朱子儀禮經傳移在夏小正篇名之下戴氏震考正以爲北宋大戴禮本無之乃爾雅疏之文校書者誤編入此共說極確今芟去文弨謹案此係戴君初說曩曾與論及此殊不敢以爲然卽朱子所更定亦有未安旣而戴君精思之乃知舊本非誤其讀當於何以謂之句􅍘小正以著名也六字爲一句此於本書亦有例因爲歎服前人之不得其解者止坐句讀未明耳今新刻大戴禮卽從戴君後說此條亦宐改正緹縞注下應增入十字寄孫楚池師書丙申日承手示論近今人士學不如古者有二弊一則貧窶所累不能不以衣食分其志一則爲學使者不能衡鑑惟允取通經學古者以風示之夫士也旣處不能專精之勢而所以應上之求者又可以幸而得之此所以績學能文之士葢千百人中庶幾一二而猶未可必也兹言可謂切中近時之弊夫伊古以來士之能自立垂名聲於後者惟貧士爲獨多其當大任而著勲績者尙巳卽以文士中求之傭賃樵牧織簾鬻畚然荻照雪聚螢抱犬者比比而是安在貧之不可以益厲所學耶竊謂近今之弊尢在乎志節之不立風操之不振故中材以下以貧爲病而墮其守者有之矣葢不獨役役焉惟治生之是急也亦由上之人不能貴士而遇之以禮偶有微忤輒欲借之以立威而摧折之唯恐其不至於是士之自處也亦日賤所憂不徒在學之不專文之不工而巳旣不知學則益不知古聖賢之志節而冥冥以行不得志猶未甚害也使其得志其害可勝言哉至於學使者之於士未能如古者敎之之法也所衡者文而巳而文實可以見學學非徒記博而誦多也理則昭昭然法則秩秩然其辭氣溫溫然浩浩然皆不可以襲而取也今父兄之望其子弟鮮不務爲速化之術矣然以其文與老成積學者較葢如朱紫玉石之不可以雜糅也乃或貴紫而賤朱寶珉而弃玉速化者有效而積學者無功嗚呼於此有人焉迪後生以窮經硏理之事鮮不以爲迂矣更抗之以聖賢誠正修齊之法則卻行而退耳其弊葢非一朝夕之故也若文弨所業則在鷄鳴之三章矣在鍾山幾五載幸有一二同志信而從焉至於漸染俗學巳深者殆終不能變也始文弨初至時肄業者百數十人今則倍之矣每課必卷卷而評校之但苦年力漸衰精力不及而實不敢以慢易處之是以幸免於愛憎之口毎思人當中年以上讀書實難唯童髫穎秀者可敎之以五經爲根柢庶有異於俗學之􅋘而不貽終身之悔恨與前學使者言之因􅃟得四五人皆年十四五新入學者送院受業毎月定期考校者六次爲之析疑陳義且察其成誦以否而究竟能副所期者絕少雖至今羈縻弗絕然窺其意念似終不若時文之可悅高者亦不過諧聲屬對爲詩賦之用而巳所謂學者如牛毛成者如麟角不信然乎文弨家貧唯仰束脩所入故不能辭講席而不居然亦非徒食也所梓書院諸生課義二􅁽呈覽其於吾師公正論文之旨未知有合焉否耶與趙敬夫䂀明書辛巳僕自來曁陽兩年於兹矣於今乃得覩足下之面豈非篤於實學不求人知之士哉觀足下所注徐庾諸人集皆能􅀡探事始深究詞源本隱以之顯睹指而知歸元元本本殫見治聞於此服足下之學旣又讀足下詩古文辭皆有法度其志節超夐風規淸峻脫然自岀於塵􅅽之表千百世下當想見其爲人詩格矯健有風骨書義山詩後七截句闡幽發濳議論特精當不可易序記根極理要能肆其醇騈體文淸麗流轉佳處於宋人爲近夫此數體者或不能皆工而足下又能兼擅其長如是則豈流輩中所易得乎然而足下名不岀於鄕里學使者未聞改容而禮焉邑長無有過而式其閭者猶復聚二三童子而課之業脩羊之所入不足常上農夫其處境之困如此此在常人宐何如感槩者而足下獨守之益堅養之益充閉門絕跡不交當世唯以著書自娛然則足下固不求千百人之知而在乎一二人之知且不汲汲乎當世之知而庶幾古人之我知因以卜後千載下之必有以知我也而何憾焉昔歸熙甫以一老舉人與弟子講學於􅂽山之濱世固未之奇也後得一有力者推崇之而人始信焉至今無異論以當日之才華氣􅆋如王弇洲者猶且自以爲不及由是觀之祿位容貎及身而盡士固當爲其不可盡者耳雖然足下自爲計則得矣世有足下其人而不爲之延譽於四方豈非吾黨之過哉先以書通於左右以明區區傾倒之私云爾與程致堂以道進士書戊寅貴鄉戴東原兄僕重其學問與之定交今聞其因祖墳事與賢從兄弟將生嫌卻此固戴氏不肖子孫爲之然其羣子姓中苟少有人心者自不容見其先世百餘年藏魄之所一旦受侵削震驚之患亦漠然袖手緘口不一校計此在常情尙不岀此況於賢者在貴族初買之時必不知爲戴氏祖墳之地今則巳知之矣卜地以葬求其安吾親也今如所卜之地恐吾先人亦將不安夫利他人有不肖之子孫而吾得乗其閒而取之使吾亦有如是之子孫而人亦得乗其閒而奪之一彼一此其情有異乎否乎賢者愛其親以及人之親其必不肎陵人之親以爲孝也明矣今之堪輿家動以福利啗人僕素不明此然第以理觀之人方銜哀茹痛積怨含怒不量其力之不敵而必欲起而爲難以求伸其爲人子孫之志事儻不濟而怨毒之氣愈不能平是在我方欲求福乃反以之招怨而犯怒訐訟由之而起釁讎由之而深恐亦非貴族之利也年兄天屬相關誠宐及早調處如其昭然遠見舉地相讓以安兩家之先靈此其於仁智孝慈之道兼僃無憾戴氏子孫宐何如感戢也若其勢萬不能巳亦愼毋相逼太甚期於兩安而巳年兄亦度其所能行者而盡誠以相吿焉譬之啟竁而遇水石蟲蟻之害亦將不改卜乎吾之爲此言誠私於戴君然自年兄言之則亦可謂忠於貴族矣佇望覆示與彭允初紹升進士書王午去歲得手書見所著傳記雜文四篇命意高遠毅然以古人自期待不以目前之得失爲欣戚此固與流俗之見殊矣又聞將盡硏諸經首先致力於詩以年兄之才之年之境固所優爲第恨不能合幷無由共相劘切耳鄭氏詩譜本有圖今所見者歐陽氏所補者耳然歐公旣自爲書於後乃自謂於絳州得見鄭氏本則圖固未亾也周召邶􅅠衞檜鄭齊魏唐秦陳曹豳王此鄭氏詩譜次第也有明刻本俱各置當篇之首今本合而集之爲一卷皆今詩之次第而非鄭譜之次第已此何異朱子易本義元依古本與程傳之從王弼本者本判然不同後人旣以本義散附於程傳之後爲一書巳又復抽岀本義單行其次第仍依程傳無復區別凡此皆鹵莽之過亟當正之勿使疑誤後學鄭氏圖於今可得見否江南多藏書家幸爲訪之何如荅彭允初書丁酉年兄以擬傳二字無本欲改爲行狀前愚作此傳時私念爲大臣作傳乃史官之職非某所敢􅆫也湯濳菴先生有擬明史稾其書首署姓名擬此雖近時人然文正乃大賢其所行卽足以爲世法是以用擬字且古今文中所用甚廣不獨擬古人也如朱子有擬上封事矣封事可擬傳胡爲其不可擬也則愚之爲此亦非徑屬杜􅁧葢終愈於􅆫云爾然年兄有言亦不可虛雅意考唐之經籍宋之藝文志皆有爲名臣􅁧傳而稱家傳者此外又有別傳外傳等名目今愚因其子姓所請而爲之則當標家傳無疑也年兄精於古人行文義法彈射不少假借誠余亮􅀡之益友也則所自爲文必矜愼可知巳乃去年寄來二林居制義一􅁽開卷見自序卽有大不愜意者夫年兄之深於禪學夫人而知之卽己亦不自諱也僕自相識以來至今巳二十餘年交情益熟而未嘗與年兄論禪亦未嘗砭年兄之爲禪誠以造化之奥鬼神之祕未能硏究洞徹而於彼家之言又素未嘗參討夫人之質性固有各適其所適而不能自反者古來禪學中之爲忠臣爲孝子者亦復何限不必槩行抺殺也吾但取年兄之恬㓗􅀡諒而巳今者以時文詮孔子孟子之言而序乃託於夢中之二境以標明旨趣固巳褻越而不尊矣乃一則夢爲老師擁皋比闡羲文周孔之敎圜而聽者百千人而樂之巳又夢爲衲子空山趺坐六根蕭寂五蘊廓然則又樂之何年兄此中之紛而不靜也夫夢成於因年兄有自賢之見而以爲百千人皆莫己若也是以夢之中有此一境也若衲子殆似所云夙根者今但未祝髪耳使於斯而詮金剛釋楞嚴也者吾又何責乃今以冠四書義之篇豈其倫哉援儒而入於墨且不可況抑大聖大賢而使之皆岀於西方氏之敎則得罪於名敎甚大今年兄書來乃以爲此祗指點文境顯岀虛實二機不可以實爲是以虛爲不是至其自得之實一且不立安得有二云云則愚更所未喩也夫吾儒有吾儒之虛實彼家有彼家之虛實吾儒非執有彼家亦自謂非頑空也今年兄乃如鴻溝之截然畫界而以實歸儒以虛歸釋無論儒不任受卽彼家恐亦非正諦也聖人曰吾道一以貫之旣以詔曾子又以喩子貢吾人爲學自當於萬事萬物之理卽身體驗而尋其所爲一者何在今云一且不立安得有二則明明是彼家所爲萬法皆空之說而義仍未了更當於此句下又進一轉才許悟徹耳僕在鍾山不得巳而看時文講時文實非性之所樂以年兄之才沈濳於義理之中以輔經而翼傳何不可自成一書旣幸而早離場屋之累矣及髪將頒白顧復頫首以效舉業家之面貌何㞕㞕也如欲自喩所樂則吟風弄月亦何在不得吾與點也之趣而必爲是乎年兄欲兼有其樂政恐坐是交喪也文凡若干篇實不能徧讀但首一篇題爲學而時習之文則旣見之矣夫必先知所爲學者何在因而時時習之今年兄但有見於時無見於學祗欲敎人常惺惺耳中閒唯不可離一語似少近之然云不可離者時也而吾以不可離者習之則仍然捕風繫影專一玩弄精神而未有實地且其後自記云開宗明義不應以小儒臆說參之則太倡狂無忌憚矣開宗明義四字梁皇侃始以標孝經之首而唐人卽因仍之亦由當時習釋家之言久不復知所持擇聖賢安有所謂開宗也學以明倫爲主自書契以來未之或改也而言語動作自幼儀以至於動容周旋中禮無時而可廢學朱子集註自是顚撲不破今年兄所云小儒所云臆說者何人乎是明明指朱子而巳矣朱子大儒古今駁難不一其於朱子無傷也而年兄乃肆筆逞臆不顧所安如此卽以前輩而論意見各殊尙當婉約其辭寧謂朱子而可橫詈若斯也首篇如此是以未及徧觀葢雖有他作之合理者而亦無救於此之離經而畔道矣及得年兄書自舉數題謂朴實說理正發明洙泗之傳程朱之奥僕因取而覆閱如自古皆有死篇後自記云惟此一事實餘二卽非眞案此二語本岀法華經事本作法字所謂一法彼葢卽指趺坐而坐引而不發爲學徒作指點語今改法爲事列之文後便令人百思不解齊景公篇從聖人老於匹夫不得一民寸土說起聖人豈有此胸襟也夫作四書義代聖賢語氣細意體認猶恐粗而不精有負當代文明之盛乃年兄駁雜而堅於自信加之貴公子有才學友朋閒非素􅀡諒不撓者孰肎以言賈人之怒僕觀所載評語皆仿年兄詞意而爲之安知非陽是而內實不然旣不欲因此取憎又恐言岀而爲士林中所責誚故作此種筆墨使見者皆曉然於有所不得巳而岀於此也今爲年兄計莫若擇其大害理者亟火之能決然舍其舊習而唯吾儒是從斯大勇也否則愼無爲騎墻之見詩有之涇以渭濁湜湜其沚知言者自能辨之惜年兄以有用之財災梨禍棗爲此不急之務而轉取不韙之名是以面晤時微露其端而不欲著之於文字之閒今旣見詢不可以不盡所懷故輒陳之如右弟子上元黃自超軼羣校抱經堂文集卷第十八
