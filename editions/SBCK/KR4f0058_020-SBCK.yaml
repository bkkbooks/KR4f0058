body:
  text: 東里盧文弨紹弓書四與王懷祖念孫庶常論校正大戴禮記書庚子讀所校大戴禮記凡與諸書相岀入者竝折衷之以求其是足以破注家望文生義之􅋘然舊注之失誠不當依違但全棄之則又有可惜者若改定正文而與注絕不相應亦似未可不若且仍正文之舊而作案語繫於下使知他書之文固有勝於此之所傳者觀漢魏以上書毎有一事至四五見而傳聞互異讀者皆當用此法以治之相􅄱而不相掩斯善矣此書尙有管見所及欲請正者如夏小正五月初昬大火中種黍菽穈傳云大火者星家諱改也星中種黍菽穈時也竊意經於種黍句絕菽穈當作菽糜下所以云菽糜巳在經中又言之也其傳之菽糜當爲衍文葢星中可以種黍見於尙書考靈耀及尙書大傳等書所言相同若菽則非五月所種不可以種黍菽連讀而去糜字傳此處於菽糜葢無釋也或云當作初昬大火中種黍大火者星也星中種黍之時也下以菽糜二字作經以記時也三字作傳亦可僃一說保傅篇工誦正諫正當如詩正大夫離居之正葢大夫之長也故注於此句下先釋工誦卽云大夫諫之以義後於瞽史幷釋正諫也似不必依漢書白虎通改正諫爲箴諫及增大夫進諫一句古人作文亦知避就之法未必㬪用兩諫字爲句也又行雖有死不能相爲漢書作行有雖死不能相爲竊意此較漢書爲勝葢有死二字是成文左氏傳有死無二有死而巳此類不一作行雖有死語勢較健似不當反改從漢書也曾子事父母篇中有云諫而不用行之如由己足下疑此語有誤此不必致疑也行之者從之也從父母之過如己實爲之而非岀於父母之本意然所謂引慝也少閒篇君曰足臣恐其不足君曰不足此下脫一句方本補臣恐其足四字竊所未安前者巳略論之矣葢君曰足則有過於自信之意而臣之進辭也當婉故可以云恐也若君曰不足則但謙讓未皇而巳其臣之進辭也當決施恐字則爲不當故注於上二句云未足而君謂足則臣恐未足吿以不足也於下二句云實足可行而君曰不足則臣云足所謂可不也一有恐字一無恐字注可謂善體語意矣此愚向所以欲補以臣則云足四字也然不敢卽入正文附見之而巳方本專輒改易古字古語多不可信注中引詩節南山但稱節左氏昭二年季武子賦節之卒章巳有此例矣若伏之與服本可通用本命篇婦人伏於人也卽其證采地之采本作菜音注疏中多有作菜地者不可謂誤文王官人篇醉言悴也言疑是猶之誤少閒篇注言有可同不可同也不可二字疑誤倒足下其爲我更審之旣觀足下所校本因幷求官本觀之其中復有鄙意所未愜者以東原之博雅精細與眾人共事乃亦不能盡其長邪曩日曾共校此書其中是者亦棄而不錄何邪今摘其當更定者數條於左與足下共商搉之夏小正來降燕乃睇傳云百鳥皆曰巢突穴又謂之室何也操泥而就家入人内也案語云突穴卽燕之所爲似穴而突出者也入人或作人入今從關本文弨案皆曰巢下本作室穴也與之室何也葢經乃睇下必本有室字故傳作如是解今乃從別本作突穴而所釋者頗失之於鄙俚大不可解與之室作與字爲古與猶許也不當改作謂下當作操泥而就家人句入內也家人猶今言常人家耳哀四年左傳公孫翩逐蔡昭侯而射之入于家人以卒漢書中􅀋此者尢多云入內正以足與之室之義若作操泥而就家語頗不足旣言家又言人參錯複㬪亦不成文理似不當從關本竊疑室穴也亦當本是室內也與末句正相應穴與內􅄱近致誤菽糜巳在經中又言之是何也時食矩關而記之案語云上初昬大火中說曰星家諱改中種黍菽糜時也謂種黍與菽糜二事皆以星中爲􅃸此民事之常記星中則二事自見故云巳在經中又言之非經重出此文也矩當爲巨夏時以菽爲糜乃時食之大關文弨案上文大火中下本有種黍菽糜四字或脫去耳今仍其脫而又曲爲之說君子之於幽也不言審經文本無菽糜而鑿言之云巳在經中􅍘無是理以星中見種黍之􅃸容可通以種黍必當在此月也以星中見菽糜之􅃸將非此月卽無菽糜者乎食矩本作食短關本作閔是月也舊穀行盡新穀未升農民於此時常苦食短故以菽爲糜菽以佐食之不足非常食也何大之有記言啜菽飮水史言半菽不飽菽是穀之粗者故用以爲況耳小正閔而記之故辭之重如此然則上文本有菽糜二字明甚下隕麋角亦再見若食巨關從未見他書有引用者於複舉之意亦不顯保傅篇有司齊肅案語云各本譌作參夙今據李彪傳改正文弨案參乃亝字之譌今卽作齊亦無不可唯夙字􅍘不可改肅注云齊夙謂三月朝也夙訓爲早與朝義合若齊肅而􅀡訓爲三月朝不太遠乎燕度地計眾案語云度各本譌作支今從方本文弨案度本作支故注云支猶計也後世尙有度支之官若正文本是度地則是常辭可不加注卽注亦當以度量爲義不當轉以計字相比況葢計字之義不顯於度字故也此亦失之曾子制言中無忽忽于賤案語云忽忽各本譌作勿勿據立事篇君子終身守此勿勿注云勿勿猶勉勉今從方本文弨案立事篇君子終身守此悒悒君子終身守此憚憚與所舉勿勿凡三言此篇言君子無悒悒於貧無勿勿於賤無憚憚於不聞正與前三言其辭同其所指則異前則憂其所當憂勉其所當勉者故曰終身守之若貧賤則在天不聞則在人於君子何與而何所憂焉而何所勉焉今獨改勿勿爲忽忽殊不可通曾子天圓篇龍非風不舉龜非火不􅄱家諱改鳳非梧不棲麟非藪不止案語云各本脫此十字今從永樂大典本文弨案此好事者􅄭增入也本文龍非風不舉龜非火不􅄱下卽接云此皆陰陽之際也注云龜龍爲陰風火爲陽陰陽會也今以鳳麟梧藪閒其中其於陰陽之義何所當乎此之謬􅄭顯然易見柰何信之武王踐阼篇王齊三日端冕奉書而入負屏而立案語云各本作王端冕師尙父亦端冕學記疏云師尙父亦端冕大戴禮無此文鄭所加也文弨案唐人所見大戴禮偶脫此一句遽􅍘以爲鄭所加於文義全不考究竟似王奉書而入負屏而立與下言王下堂南面而立皆成齟齬果古本脫去而鄭增成之亦當從鄭況漢人所見本在前唐人所見本在後烏知鄭之時必無此一語乎曩時但以學記正義之說附於後於本文卻不敢遽刪不知何以不見從也以仁得之以不仁守之其量十世案語云各本以不仁得之以仁守之今從禮記疏文弨案以不仁得之以仁守之正所謂逆取而順守也若創業之君旣能以仁得天下安有忽反而爲不仁者如有之則始之仁也亦僞耳可曰以仁得之哉且未見夫開創不仁之主之可以待至十世者也不􅍘之以理而惟誤書之是信夫豈可哉衞將軍文子篇終日言不在尢之內注在尢之外案語云此四字各本譌作正文今從方本文弨案立事篇亦有此語無在尢之外四字今以爲衍文可以爲申殷勤亦可唯以爲注則大不可鄉學究作此語以曉童蒙尙不爾況作注乎勸學篇於越戎貉之子文弨案舊本於越竝作于越荀子作干越字􅄱相近前不依荀子而仍作于越者以漢書貨殖傳云戎翟之與于越不相入孟康曰于越南方越名也師古曰于發語聲也于越猶句吳也皆作于字若荀子之作干越莊子淮南亦有之說者或以爲漢餘汗等地是干亦音寒然則各仍其本文可矣今以春秋有於越入吳遂改于爲於所謂知其一不知其二也凡舊本作於者官書普改爲于獨此又改舊于字作於文王官人篇志殷而㴱注殷盛也㴱葢深也文弨案舊本作志殷如㴱注葢深字今檢字書無字或古有之而字書失載要爲傳寫巳久故注有此語抑或校書者所加後來誤倂入注中今旣改正文作㴱字矣㴱與深有古今之分實則一字作注者寧此之不知而猶疑其辭曰㴱葢深也邪竊以爲當作案語云㴱舊本作注末有葢深也四字戓校書者之辭斯爲得之而與如古通用今竝從方本改易矣他如四代篇睪然睪卽皋字亦見莊列荀子今誤作睪朝事篇不補侯伯於中等子男於下等二語亦不加案皆不可曉偸墮懈墮卽是惰字乃以爲譌其他脫句武王踐阼脫於戸爲銘焉脫字公冠立於席北脫北字及注中脫誤之處非本校者之失固可以共諒也與陳立三以綱上舍書辛丑去年來京師聞友朋閒盛道足下之名卽思得一見論著爲快時足下方館於圻外今正始相晤於翁覃溪太史所歡然如舊相識會足下行急文弨亦俶裝將往山西所懷仍末由得遂別之明日足下惠然畱一文以寵我行見豹一斑嘗鼎一臠縱未卽大快夙願以視求一見一嘗而不可得者則固巳遠勝矣求益之云辭何謙也文弨少無彊記之功老而遺􅁯更甚卽欲効一得於吾子何有哉承示大戴記諸條凡所證引俱一一可桉不虛足下之於此書功良深矣然區區一隅所見亦不敢爲足下隱謹條疏如左惟爲我審正之以盡切磋之誼幸甚哀公問五義篇竆爲匹夫而願富李善注文􅃟引此作不願富楊慈湖從之足下遂謂當增不字文弨竊以爲竆而不願富此少知自好者優爲之何必賢人夫子之所謂賢人葢進於士與君子之上者也顔子一簞食一瓢飮在􅋘巷之中可謂竆矣而以爲邦問則知其有志於治天下之道此非願富乎孔子栖栖皇皇目營四海故其言曰苟有用我者期月而巳可也三年有成葢聖賢當其不遇時則贍一身而猶不足然其具固在我實足以拯一世而有餘唐詩人杜子美亦似微見此意者故處破茅中而卽有大庇天下寒士之想所謂願富似當作如此解若夫以多財爲富此亦非賢者之所甚惡也富而得行其所欲爲如之何不願孔子嘗謂顔淵使爾多財吾爲爾宰至喪欲速貧則有爲言之有道而貧賤方且以爲恥故貴而不願富可言也卽下所云貴爲諸侯而無財是也竆爲匹夫而不願富此正易所謂苦節不可貞者天下安賴若人爲聖人亦安取若人爲故愚竊以願富之爲義更精也夏小正四月莠幽幽之爲葽是巳莠之爲秀與王萯莠之莠同與莠雚葦之例亦合此無可疑者足下不引豳風四月秀葽爲確證而顧遠引廣雅莠葽戰國䇿幽莠以證莠葽是一物莠不可改作秀信若此則於四月之下但空舉一草名而巳毋乃太不辭乎盛德篇外水曰辟雍南蠻東夷北狄西戎太平御覽所引南上有列字今據此增之義自較顯然卽不增而南則蠻也東則夷也北則狄也西則戎也此東西南北自從明堂生義與他處本其地以爲稱者固當有別至公冠脫文當以家語博物記增補夏小正俊風之爲東風據山海經以駁傳言南風爲非是五月鴂不辜之時不字爲衍文凡此所見皆極是易本命篇王懷祖太史亦以淮南參證與足下所見符同王太史所校是者極多而愚意不敢卽據以更改此書者則以校書之與著書不同今足下旣有意欲自下注則於正文審擇而從其是可耳何必拘拘就盧氏之範圍哉若但校盧注本惟可於注末略加辨證而於正文定當一仍盧本之舊又古書中有本來稱引譌錯者正復不少卽如保傅篇以齊威王置􅂤公之前此或是本文之誤向疑威王爲威公猶不過一字之異同耳若如他書引下句作而湣王以弑死於廟梁則迥非盧氏所見之本殆後人覺其誤而爲之更定亦不可知觀其於弑字下又贅以死字文筆頗似不古念足下意惓惓不可不爲報非敢強爲說以求勝希亮察不僃與孔葓谷繼涵書庚子令姪叢伯所梓鄭志極佳在諸本中最有條理且點畫亦致不苟幾與相臺岳氏所刻諸經相伯仲今欲奉求一本務爲我致傾遟之意古書之流傳者稀矣全賴好古有力之士摹印流通嘉惠後學若復過於吹毛令人意怠非樂與爲善者所可岀此唯是古大儒傳注亦不能一無可訾而校書之難則又如掃落葉瑜多瑕少轉不妨略獻所疑如書中定之方中荅問乃指左傳水昬正而栽兩言今以毛傳爲緣起非本意矣常棣一詩趙商因魚麗之序而發問舜葬蒼梧之野張逸因堯典三危乃西裔而致疑此必須注乃明又如七月鳴鵙但云豳土晚寒亦晚溫義頗不亮其問之原委似亦不可不詳它本頗有以唐人正義之文羼入者此本巳多删薙然如月令昬火中一段自如此言中以下亦是正義之文又脯非食殽内則正義所引唯此一語爲鄭志餘者皆非也其沿注疏中譌字俗字如酒正轉寫益澄字耳益誤作盎喪服目其家之爲宗者目誤作自泠剛之姓不當作冷陳鏗之名不當作鑑至如梁本從刅今誤從刀厚字之首混與原同此當一倂改正方全美也又書中疑相覺二字有誤案相覺卽相校趙岐注孟子富歲子弟多頼章及中也養不中章春秋無義戰章皆有此語又宋書天文志云斗二十一井二十五南北相覺四十八度皆可證也白虎自見王會篇今本但缺黑文二字耳又昭三十一年左氏傳服䖍云十一月日在星紀據下問荅則十一月當是十二月餘尙有小增減處不盡詳也與丁小雅杰進士論校正方言書辛丑方言一書戴君疏證巳詳愚非敢掩以爲已有也然疏證之與校正其詳略體例微當不同亦因其中尙有未盡者欲以愚見增成之故別鈔一編今不能卽寄聊舉一二乞足下審正之大凡昔人援引古書不盡皆如本文故校正羣籍自當先從本書相傳舊本爲定況未有彫板以前一書而所傳各異者殆不可以徧舉今或但據注書家所引之文便以爲是疑未可也如卷一内延長也又云延永長也凡施於年者謂之延施於眾長謂之永案延長也巳見於上似可不必復出葢此自爲下文各見其義故先竝舉之於上揆以文法􅍘當如是考之宋本亦無不同今或但據李善注稽康養生論引作延年長也便謂此書作延永長也爲誤夫善此注特櫽括施於年者謂之延意耳爾雅疏始誤以爲卽方言本文此不可以稺年小也相比例夫使云延年長也下卽當云永眾長也而後可不然兩句復杳於文義殊未安方言此語亦祗大判而言其實通用處正多也又卷二秦晉曰靡注靡細好也亦因李善注引作靡靡遂補一靡字不知善但順兩賦之成文耳長門賦夫靡靡而無竆魯靈光殿賦何宏麗之靡靡今必強此注以從彼拘矣且王逸注招魂云靡緻也李善注文賦引辥君韓詩章句曰靡好也皆以一字爲訓而義正相同故凡此類皆不敢從正文如卷六掩索取也或曰狙注狙伺也宋本如此不誤俗本始誤作狚今因卷十有抯取也音柤黎遂移彼以易此不知狙伺而取正與掩取義同又閻笘開也因廣雅笘作苦遂從之夫苦之訓開他書未見竊疑當是苫字苫葢雖皆所以覆屋而葢亦可以爲戸扇見荀子宥坐篇九葢皆繼楊倞注又案說文葢苫也周禮夏官圉師茨牆則翦闔康成注闔苫也然則苫與葢闔義皆同而此則訓爲開夫字固有反覆相訓者余以爲與其從苦字之無義不若定從苫字此因􅄱近致誤耳又厲卬爲也亦從廣雅改卬爲印夫印之訓爲亦未經見而卬與昂通激昂正振作有爲之意不可因曹憲音爲於信反遽棄方言而從之也又卷十誺不知也誺音癡􅅭戴本改作䜉引玉篇䜉不知也丑脂丑利二切誺同上又力代切誤也戴謂以六書諧聲考之䜉從言桼聲可入脂至二韻誺從言來聲應入代韻不得入脂至韻作誺非也竊以爲不然姑無論古讀來爲梨常與思協卽與癡同一部如素問云恬澹虛無眞氣從之精神内守病安從來又漢柏梁臺詩武帝云日月星辰和四時梁王云驂駕駟馬從梁來又廣韻從來之字如􅘭庲倈皆與􅁵同紐竝在之部今必謂從來得聲者應入代韻其可乎卷十一蠅東齊謂之羊俗本羊誤作芊案蠅似黽其聲葢與閔相近楚姓之芈其聲亦相近故注以此類皆不宐別立名是也今若作牛羊之羊雖與蠅亦一聲之轉而究不若蠅羊之轉之尢切況蠅微蟲也羊家畜也皆有定名矣而云蠅亦可呼羊羊亦可呼蠅不亂名乎而反譏郭氏何也卷十二嬀娗嫚也舊本嫚作乃俗僈字舊音薄丹反注云爛僈健狡也雖與今之爛漫義不相近而其音正同顧乃改僈作讀爲斕斒有何據乎又蒔殖立也以殖爲誤云當從曹毅之本作植案周語云以殖義方韋昭云殖立也與此訓正合卽左氏襄卅年傳鄭輿人之誦殖與嗣協釋文殖是吏反與蒔聲亦相近何必植之爲是而殖之爲非乎至注中之字如卷三軫戾也注相了戾也案軫與紾同了有樛曲之義作了戾方切紾字義考酉陽雜俎云野牛高丈餘其頭似鹿其角了戾長一丈白毛尾似鹿出西域正與考工記老牛之角紾而昔義合又導引經云又手項上左右自了戾不息復三又字亦作繚戾劉向九歎云繚戾宛轉阻相薄兮詩魏風葛屨毛傳云糾糾猶繚繚朱子卽以繚戾釋之於古義有合也今又因李善文􅃟注之誤字而改作乖戾則與正文戾也之義殊遠幷注中一相字亦賸矣楊倞注荀子脩身篇云擊戾猶了戾也宋本世徳堂本俱作了戾不誤元時本誤了爲孑今俗閒本亦改爲乖戾矣卷九矛骹細如鴈脛者謂之鶴厀注今江東呼爲鈴釘案說文鈴字下云令丁也方言俗本皆作鈐釘尙仍其誤卷十一姑䗐謂之強䖹注建平人呼羊子羊卽䖹也足下謂強䖹當讀強羊良是乃俗閒本竝誤作芈卽姓也爾雅疏又因誤本而改作芈楚姓也唯陳隅園方言類聚本作羊卽䖹也且明其說云今吳會閒通呼爲羊子作卽姓者誤是皆當改正也卷十三姚娧好也注謂妦悅也正與卷一好或曰妦注言妦容也合俗本誤作謂姅悅也夫姅變婦人汚也其誤甚顯不當猶仍之又憚怛惡也注怛懹亦惡難也俗本懹竝誤懷案卷七憎懹憚也陳曰懹今據以改正至於舊來之音有岀郭氏者亦有後人附益者其所音閒與今世所讀不同如謾之有莫錢反凡兩見豈可刪乎抱婏耦也卷二俗誤作抱㛯音追萬反一作嬎又於耦也注下有音赴二字戴本乃移音赴於抱字下案抱一作菢同音暴後云房報反江東呼蓲乃音央富反則抱字本不音赴㛯字宋本作婏從女兔聲廣韻與赴同一紐乃玉篇音爲孚萬切產婏也又岀嬎字云同上案產免俗始加女作娩與婉娩之字混玉篇於娩字音無遠亾辯二切若從兔則與孚萬之音迥異只當音嬎下爲得之故今少有更易又案正文耦也與抱婏義不近疑有錯􅂤或是敵耦也故注云耦亦匹互見其義耳抱婏下或有孚也字孚亦音赴故臆測如是然無左證未敢卽以爲然也又蠲有圭音詩吉蠲爲饎三家詩作吉圭爲饎是也舊本音涓下誤作又一圭反乃又一音圭之譌耳見卷三又蠎南楚之外謂之蟅蟒下宋本蟅音近詐亦呼虴蛨卷十一玉篇虴蛨蟅蟒蟲也正相合俗本方言誤作吒咟此必當改正又下舂黍謂之􅱁蝑注江東呼虴蛨舊本皆不誤廣韻虴字下云虴蛨蟲蛨字下亦同今必據詩釋文而改爲虴蜢似可不必文弨又竊疑上蟒一條竝不指食苗之蟲郭注云蟒卽蝗也葢卽依爾雅蟒王蛇生義故於蟅蟒下云亦呼虴蛨加一亦字亦舂黍之呼虴蛨也於或謂之􅻭音滕而不音特意亦可見但於宋魏之閒謂之蚮尙未有左證然舊亦音貸不音特蛇之文固有如玳瑁者當因此名之耳此須足下爲更審正之又抒瘛解也卷十二舊本抒音抒井誤也宋本作抒考之廣韻抒渫水俗作汿則乃渫之誤字若抒井義甚僻詩大雅生民篇毛傳云揄抒曰也胡不引此爲音故知亦必非抒井也至正文之義亦尙有可通者如卷十三魏能也案周書謚法解克威捷行曰魏克威惠禮曰魏此非魏訓爲能之證乎又懼病也案凡人性怯者多苦畏非懼卽病之訓乎且懼又可轉爲癯亦病容也又攋隓壞也案太元經度之次三小度差差大櫴之階測曰小度之差大度傾也范望注云事之骩櫴故傾危也此非攋訓爲壞之證乎但彼櫴字从木字書所無定傳寫誤耳又賦臧也臧當作古藏字訓賦斂所以爲收藏也至於字畫亦有不可盡依說文者如娥㜲卷一說文嬴从女羸省聲遂據以改㜲作案羸乃力爲切音不近或當是贏省說文於贏字云從貝聲字下云或曰獸名象􅄱闕郞果切郞果之音本不出於許氏音訓本有闕或元有盈音未可知也故與其作不若徑從說文作嬴爲猶愈矣又餳謂之餦餭卷十三說文止有􅄳字从食易聲徐盈切遂從之案劉熙釋名餳洋也煑米消爛洋洋然也此諧聲爲釋不更岀从易之􅄳字廣雅本亦然陸德明音周禮小師注云餳辭盈反李音唐是一字有兩讀今謂辭盈反者當从易音唐者當从昜於古未有聞也又如􅞳字不當改爲古字少一字可兩三用漢書律志地理志字亦省作􅞳可證也􅜝字不當改作寂字不當改作齘漢人作隷巳不能如篆法之嚴此等字縱出自魏晉以下然相傳巳久在今日不猶有古意乎至郭注引書微與本文不同亦不可改也如引外傳余病􅡅矣本書􅡅作喙引漢書初陵之墲本書墲作撫此皆不改獨引左傳餬予口於四方則改予從本書作其字此或郭公偶爾誤記或因與昭七年傳饘於是鬻於是以餬余口文相涉致誤此類古人多所不免正不必爲之镾縫也余又疑正文卷一碩沈巨濯訏敦夏于大也齊宋之閒曰巨曰碩下便當接以陳鄭之閒曰敦至于通語也止中閒凡物盛多謂之宼四十九字當別是一條足下細審之以爲然否戴君通人在日文弨敬之愛之情好甚摯今此書若無戴君理之於前使文弨專其事紕繆當益多決不止於此區區數條而巳今戴君巳沒寧忍爲之吹毛索瘢乎然念古書流傳旣久其考訂必非一人精力所能盡戴書之善者巳盡取之而著之矣安知他人所見不又有出於文弨所見之外者乎願足下先爲吾􅍘其是非焉如有新得乞卽錄示是望弟子懷遠方紹董正誼校抱經堂文集卷第二十
