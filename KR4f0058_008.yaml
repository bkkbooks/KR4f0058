body:
  text: 東里盧文弨紹弓跋一十三經注疏正字跋辛丑是書八十一卷嘉善浦君鏜所訂仁和沈萩園先生廷芳覆加審定録而藏之其子南雷禮部世煒上之四庫館大興翁覃溪太史方綱從館中鈔出一本余獲見之前有敘録稱所見有監本有監本修板有陸氏閩本有毛氏汲古閣本今惟監本修板及毛氏本行世故就此二本之誤正焉其釋文則以徐氏通志堂本校又取宋玉山毛氏六經正誤之說訂其得失此其大指云爾余初得日本國人山井氏鼎所撰易書詩春秋左傳禮記孝經論語孟子考文深喜其遵用舊式據古本宋本以正今本之誤然特就本對校而巳其誤處相同者雖閒亦獻疑然而漏者正多矣且今本亦有絶勝於舊者不能辨也是書所校正視彼國為倍多且凡引用他經傳者必據本文以正之雖同一字而有古今之別同一義而有繁省之殊亦僃載焉此則令讀者得以參考而巳非謂所引必當盡依本文也蓋引用他書有不得不少加增損者或彼處是古字或先儒之義定從某字若一依本文轉使學者讀之不能驟曉則莫若即用字義之顯然者為得矣至字音之用反語起於魏晉閒反與翻音義同故胡身之注資治通鑑即用翻字今則依說文玉篇等書之例普改為切殆以反作如字讀為語忌也其書微不足者不盡知釋文之本與義疏之本元不相同後人欲其畫一多所竄改兩失本真此書亦未能盡正也又未得見古本宋本故釋文及義疏有與今之傳注不合者往往致疑此則外國本甚了然也又於題篇分卷本來舊式多不措意或反有以不誤為誤者余有志欲校諸經已數十年晚乃得見此兩本其善者兼取之以􅡔成一書而後無遺憾矣乾隆四十六年元日甲戌書郭氏傳家易說跋辛丑此宋郭雍子和之所著也其為說皆平易正大有益於治謂以氣運而言盛必有衰治必有亂然在君子則自有保泰持豐之道故云吉凶之道貞勝者也正則勝而常吉不正則勝而常凶此蓋與君相能造命之說相合其釋損彖云損天下以奉一人則善日消而惡日長迂儒方究多儀僃物之享不知損過復禮之義則天下不勝其僞矣又釋豐六五云豐之世盛大無以加又求豐之是無厭也聖人貴夫持盈守成而不以豐大為務故書有滿招損之戒而易著豐蔀豐沛之失皆篤論也以六十四卦為文王所重謂以書言之神農之時未有益與噬嗑也以道言之神農之時蓋有益與噬嗑也又謂歸妹所歸者妹也非從姊而嫁孔子言天地之大義娣媵豈能具此義哉其善於持論多若是此書從永樂大典中鈔出分為十一卷釐然為完書但繫辭傳說卦傳郭氏亦本分章段故有前章此章之語且有與朱子微異者而今本缺之漏也庚子臘月余在京師閲起明年二月九日在山西訖功因書其後融堂書解跋辛丑此宋淳安布衣錢時子是撰嘉熙中以喬行簡薦得官下嚴州取其所著書以進此其一也向來疑書序者以書本不待序而明而此書獨推闡入微信非夫子不能作至於經文一切無所更改而節次不差脈絡通貫其說武成康誥足以洗憑臆紛更之謬謂武成自王若日而下辭無閒隔皆武王之言序所謂識其政事是也康誥之首正是區處商民其頑民巳定議遷矣乃始以其餘民封康叔故在康誥之首至其說洪範也謂建極功夫全在敬用五事若次五之建用皇極專為斂福錫民而設庶徵凡六自五者來僃以下明雨暘燠寒風之證自曰王省惟歲以下明時之證語皆一正一反昭然甚明此等議論皆能自抒已見批卻導窾後學得此蓄疑可頓釋矣唯顧命伯相命士須材疑其不為喪用又疑側階將近內寢豈執兵之大夫所可立或當立於堂此則猶未審耳喪事所須不可經營於無事之日故舊君之終即當預為新君之地記曰國君即位而為椑天子寧獨不然古者宮府一體不為私嫌況奉宣顧命之日內人無事往來北堂立於側階胡為不可是書二十卷從永樂大典鈔出缺者僅三篇梓材在其中惜乎不知其解又云何也乾隆四十六年閏月二十三日東里盧某書呂氏讀詩記跋丁酉釋經雜而不貫與隘而鮮通兩者均失之東萊之為讀詩記也一字一句必本其所自而不以自專其意所不取而可僃一說者亦附注於正解之下以俟夫人之自擇焉蓋其織綜之妙合衆說如一說既不使異說得隔閡其閒而其近是者又未嘗盡棄也斯非釋經之善者乎公劉次章以下雖未及重加整比然固出東萊手所纂輯也東萊所自為說比衆說下一字條例固云然乃書內有即繫衆說後稱東萊日者參差互異余一從條例正之他不敢妄增損也余初得明神廟時南都􅡘本第二十七卷中脫兩葉陶孝廉衡川湘從嘉靖閒舊刻鈔補足之余既喜是書之詳贍而無偏倚自用之失又惜完本之不多見屬二三友人為余寫之功未半有以小版本示余者稱為宋刻余驚喜亟取對校則知神廟閒本頗多脫誤小版本字多用分隸體神廟閒本易用今字且更有妄為撰造者然小版本實即嘉靖閒四明陸釴所校鐫也書中唯一處尚未刊去其名故知之二十七卷中兩葉亦係鈔補則知嘉靖初印本神廟時即巳難得矣使余但據神廟本傳鈔則仍為未完之本冥冥中有若惜余之徒勤也者而以其善本畀余然則余之受賜誠多矣以鈔者不一手不能盡復其舊余閒取小版本古字略注一二於旁其沿宋刻之舊歟是未可知也助余校讐者江陰趙茂才敬夫曦明也小版本尚有訛以余所鈔本視之為更勝矣王厚齊詩考跋庚午漢賈景伯受詔撰齊魯韓詩與毛詩異同今其書不傳厚齊王氏乃從三家既亡之後區區於羣書所引零章陸釴所校鐫也書中唯一處尚未刊去其名故知之二十七卷中兩葉亦係鈔補則知嘉靖初印本神廟時即巳難得矣使余但據神廟本傳鈔則仍為未完之本冥冥中有若惜余之徒勤也者而以其善本畀余然則余之受賜誠多矣以鈔者不一手不能盡復其舊余閒取小版本古字略注一二於旁其沿宋刻之舊歟是未可知也助余校讐者江陰趙茂才敬夫曦明也小版本尚有訛以余所鈔本視之為更勝矣王厚齊詩考跋庚午漢賈景伯受詔撰齊魯韓詩與毛詩異同今其書不傳厚齊王氏乃從三家既亡之後區區於羣書所引零章􅍘句掇拾而成之其用心可謂勤矣夫三家之學誠不如毛公之精然竝行於當時立博士諸儒傳授各有源流非鑿空妄說比而今皆失墜莫覩其全幸此書所輯得以考十一於千百三家中唯韓詩差詳齊魯則皆寥寥無幾矣惜哉明人有僞作魯申公詩說及端木詩傳者故為文蝕簡脫以示可信時亦有覺其僞者得此書以相參驗其僞乃益明則此書誠學者所當寶貴也余又觀近時人往往見古人所引詩書與今不類者輒以意更之使得見此書亦當瞿然知其不可妄作故余急校而録之並增其所未僃者若干條又所注書名復釐而析之視舊本稍詳正矣然余又欲學者善觀之無徒取一二字句之異曲為之說反攻毛氏蓋古人引用偶有異同如同一左傳所載而匪交匪敖與彼交匪敖皆兩有之王氏但載其與今異者耳豈可便據此謂必當作匪交乎又毛詩今所傳亦有訛如朔月辛卯今皆訛為朔日辛卯矣家伯維宰今皆訛為家伯冢宰矣此非三家之文乃轉寫致誤而舉世習讀鮮有知其訛者余恐後世反得議此書之漏是以並附著焉何楷詩經世本古義書後癸巳何氏以三百篇之詩分屬世次不與通行本同始於公劉訖於下泉其先後頗難盡信然此亦自成一家之學其書二十八卷配以宿名首角終軫每卷之首各有小引又有原引為卷首則當在二十八卷之前又有屬引為卷後則當在二十八卷之後今此裝潢本於卷首之下將各卷首篇小引紬出􅡔置一處下又即將卷後一冊繫焉以下詩之次第仍同今本以關雎為首殷武為末茫然無復卷數大失著書之本意矣其屬引一篇蓋倣序卦而為之屬以聯屬為義若知後世必有紛更之者而殿以此篇其序灼然可尋庶幾淆亂之餘不難復舊今當於原引之下仍以小引散之各卷之首依角亢氏房等宿名目尋之則二十八卷乃成為何氏之書而以屬引終焉則與本題卷後之名亦相䐇合矣春秋尊王發微跋丁酉夏五之下其為月也無疑矣而聖人不益者謂其文或不盡於此也益之以月將謂鄭伯使其弟語來盟為五月之事所書僅此無復更疑其上之容有脫文者矣孫氏謂孔子專筆削之任舊史有闕必從而刊正之此殆後來傳者脫漏耳豈其然哉士丐不伐喪春秋之所善也孫氏本穀梁義謂其貪美名以廢君命惡也夫不伐喪者周之舊典如是丐能行之何至有廢命之責且見可而進知難而退亦軍之善政也受命以出知敵之不可勝亦將老師費財不惜千萬人之命以求一逞而俱殲焉然後為不廢命哉苟知其難而全軍以還君子猶善之況於不伐喪乎孫氏此書昔人謂其論多苛刻而在當時則甚重之歐陽氏謂其得春秋本義為多要之言亦以人重也有得舊本見示者因令學徒鈔之向見通志堂有版本未知視此何如當從友人借以相校始可定耳乾隆四十二年三月癸未盧某書張氏治春秋集傳跋癸丑張氏為朱子門人宋史載道學傳所著有春秋集傳二十六卷春秋歷代郡縣地里沿革表二十七卷春秋集注十一卷並綱領一卷今集注並綱領已刻入通志堂經解中而集傳無聞焉秀水朱氏經義考亦疑其已佚蓋學者之不得見久矣今湖州嚴文學久能復得其書喜甚乃元延祐元年所梓雖所缺尚有七卷十八至二十又二十三至二十六皆缺而其採擇之精立論之確即於此可得其崖略其辨胡氏夏時冠周月之說見於集注而傳亦著之他若論天子諸侯昏禮不親迎責隱公之不朝聘於王朝責文公之昏惰不親會伯主以取晉怒而於齊商人弒君之賊不能告天子方伯以致討及其見侵反使命卿往而求平焉此皆大義凛然非若孫氏之多刻核胡氏之有牽合也嚴氏其寶守之神物會合或自有時安知所缺者之不復再見乎余以塵事紛雜未能卒讀為憾漫識數語於簡末以告四方之學者俾皆留意訪求得完張氏之舊並沿革之巳佚者亦再出焉豈不更大快矣乎書春秋繁露目録後乙巳案此書之大恉在乎仁義仁義本乎陰陽陽居大夏而陰居大冬見天之任德不任刑也又言除穢不待時如天之殺物不待秋則董子之論固非倚於一偏者其重政篇云聖人所欲說在於說仁義而理之不然傅於衆辭觀於衆物說不急之言而以惑後進者君子之所甚惡也即此可知其立言之本意矣我皇上新考試詞臣取仲舒語以仁安人以義正我命題臣竊仰窺聖德聖治固已與天地同流與陰陽協撰矣而於是書猶有取爾況在學者其曷可以不讀向者苦其脫爛乃今而快覩全書尢為深幸臣服習有年見其以天證人析理􅍘事實切於養德養身之要而凡出治之原郊祀之典用人之方弭災之術無所不僃即其正名辨制委曲詳盡亦始入學者所必當研究也謹就二三學人覆加考核合資雕版用廣其傳冀無負朝廷昌明正學嘉惠士林之至意至書中如考功爵國等篇尚有不可強通者在以詒夫好學深思之士或能明其說焉乾隆五十年十月舊史官臣盧文弨謹書目録後惠定宇春秋補注跋戊子丙戌之春借得此本課兩見分鈔不解文義舛訛者半兒子師江陰朱與持黼略為正之鈔未竟會有湖南之行攜之篋中兩年矣卒卒無暇理此今年至京師長夏無事補鈔末卷元本經轉寫亦有誤復為之一一正定書乃完善昔杜元凱嘗謂立德不可及立功立言或可庶幾其注左傳誠欲以當不朽之一也豈知紕繆荒略之失亦有不能自掩焉者名位赫奕當時或未敢相難而後之經生乃得明目張膽掎托其短長豈非率爾之為纍哉公卿大夫各有職業其為學必不如經生之專且勤何事強其所不能以為名邪雖然元凱居其位尚有餘力著書余則因官罷閒居僅能卒業彌不及矣書之閻大喜乃余今亦得見之而證何氏之言信不誣日本國亦有此不誤之本參相證而知近本亦尚沿王氏所見之本非善本也速當改正必如是而後杜注所云傳終言之之義始明太平御覽所引傳凡標昭五昭六者乃其卷數非年也至近來所分卷亦非復當日之舊矣會于夷儀之歲一段宋本尚在襄五卷之首二十六年之前杜注云傳為後年修成起本當繼前年之末而特跳此者傳寫失之其語甚明近本竟改置前年之末矣宋本之可貴蓋不止一端也是書不用圈隔不載音義卷末載經若干字注若干字中閒亦有一二字誤皆人所易曉云書公羊注疏後己亥此書雖列十三經中能留意者絶少蓋公羊氏以經生之見測聖人而聖人幾為亂名改制之尢今當聖道大明之日固夫人而知其說之謬矣雖然漢治公羊家者有醇儒焉有名臣焉讀一書即能得一書之益今人見解議論遠過古人而行反不逮何也乾隆戊戌余讀春秋繁露既已尋其脫簡審其訛文而正之余因思董生頗精公羊家言為之沿流溯源則是書不可不讀獨恨何氏之識遠不逮江都故其說多苛碎不經之談而疏必為之依阿其閒不敢直􅍘以為非是此猶是漢人欲伸師學之見要其繆盩亦不待摘抉而後見也何氏文筆未善故其言多有晦僿難曉者疏獨能通之其所引春秋說與諸緯書俱已不傳後世亦賴是見其一二廁諸疏中視論語孟子猶當勝也閲起於臘之八日至次年三月十一日始輟功云方望溪鍾蔗經兩先生刪訂周禮訂義書後辛丑今上登極之初纂修三禮望溪先生為總裁選通禮學者為纂修大興鍾蔗經先生與焉名晼字勵暇官至禮部儀制司郎中蔗經其晚年自號也此周禮訂義乃宋樂淸王與之次點所著其用朱筆點勘者蔗經也用緑筆審正者望溪也別其是非擇所去取蔗經先之望溪成之閒亦有異同焉此正修三禮時所相與衡校之底本也計凡舊人禮說皆當有望溪點定者即蔗經所刊修亦不止此而此一書適為烏程丁小匹氏所得出以示余皆二公真跡也余不及登望溪之門獨於蔗經遊從最熟及其老而依子宦遊也余一見之於南昌又見之於松江又見之於江寧詒余祭禮考一冊今斯人不可作矣覩其遺墨莊謹不苟恍如見其為人望溪有評史記真筆在北平黃氏亦用緑色筆與此正同豈以此自識別耶蔗經富於經學著書甚名其子觀察君居憂嬰疾今不知何似未知其能為乃翁表章否也偶翻此書小宰六計弊羣吏之治次點以康成六事廉為本之說為不然廉猶廉問廉察也蔗經不刪亦似有取爾者意竊疑之曰聽曰弊意已足該何必變其文而曰廉問其善乎廉問其能乎謂察為廉經無他比六計具有功狀聽之於始弊之於終其人巳無可匿何必如後世之寄耳目於人使為刺探而後其真可得耶記曰大臣法小臣廉羣吏則小臣為多矣而曰廉非所貴乎且廉訪之字古亦不作廉古作字惜乎當日不能就蔗經而請正之今質之小匹幸有以語我乾隆四十六年閏月十一日後學盧某跋魏華父儀禮要義跋甲寅此書五十卷世罕流傳聚樂堂藝文目有之朱錫鬯載之經義考然未之見也烏程嚴文學元照聞杭州汪氏新得此書猶是宋刻亟以二百六十千轉購之甚寶惜手鈔副本以示索觀者而刻本不輕出也余至其家始得見之此書分段録賈氏之疏每段先標大指為提綱以下但載賈疏魏氏絶無論說余時為儀禮注疏詳校取以覆對其訛舛處與近世本大略相似朱子通解雖有改正而亦未能盡則知此一書之傳訛也久矣今此上方閒著溫本一二異同不多見其經注闕者亦未之補也然每段括其大要使考究者易於尋求則此書亦不可廢以朱氏過目之書廣博為人所不易及而今乃得見其所未見者可不為幸歟書校本儀禮後丙申昔吾從兄宇安兵部宏熹家居時嘗為人說儀禮余時年尚小但聞說牲體長脅短脅與今世所稱無異又謂宰相必用讀書人兹言良不誣亦因讀儀禮有感而發也嗣後秀水盛君庸三世佐從余師桑韜甫先生於南屛精舍講此書盛君以所得著為集傳疏其凝滯約其旨歸余讀而善之亦遂有志於是以為禮之節次皆出於自然苟得其一不難以三隅反也閒於賈氏疏亦嘗訂正其誤有出於館閣校本之外者然以云融貫則卒莫能自信今年江都汪君容甫中語余曾見宋本儀禮鄭氏注與今本有異同余因假其傳録者以歸即用注疏本就文改之然宋本鄭氏注實與賈疏先後次第多於後知容甫所云宋本非真宋本也其鄭注前後移易乃據元敖繼公集說本耳甲寅正月記新刻大戴禮跋庚辰吾宗雅雨先生思以經術迪後進於漢唐諸儒說經之書既遴得若干種付剞劂氏以行世猶以大戴者孔門之遺言周元公之舊典多散見於是書自宋元以來諸本日益訛舛馴至不可讀欲加是正以傳諸學者知文弨與休寧戴君震夙嘗留意是書因索其本並集衆家本參伍以求其是義有疑者常手疏下問往復再四而後定凡二年始竣事蓋其愼也如此余嘗謂此書之極精粹者曾子數篇而巳而立事一篇尢學者所當日三復也博學而孱守之余素服膺斯言自為棘人每誦君子思其不可復者而先施焉數語輒不禁淚之盈􅗃也孔子三朝記其文不能閎深疑出漢後人所傳會學者當分別觀之戴君丁丑年所見余本即元時本耳自後余凡六七讐校始得自信無大謬誤刻成覆閲又得數事今附見於後以此益知學問之道無窮心思之用亦無窮庶幾來者亦將有所得乎此也哀公問五義篇躬為匹夫而願富案躬字疑本是窮字夏小正篇將閒諸則案閒字疑當作間字保傳篇安陵任周瞻而國人獨立注安或為隱案隱字疑當作隱下隱陵君同曾子立事篇伐則不益補則不改矣案上注云補謂改也則此不當云不改蓋當作補則不復矣形近而訛下文云其下復而能改也可知當作復字無疑曾子本孝篇君子之孝也以正致諫注諫卿大夫案注中諫字當作謂字武王踐阼篇戶之銘日擾阻以泥之案此語朱子亦謂不可解竊疑擾乃獿字之訛服虔注揚雄賦云獿古之善塗塈者王伯厚校此篇一無阻字則當為獿以泥之無疑蓋擾亦本作形近易訛也衛將軍文子篇主人聞之以成注公西赤聞之以成家語云衆人聞之為成主或聲誤也案此不見何字為聲誤疑自家語以下後人妄增入又是卜商之行也注如􅍘言便能案當作使能形近而訛盛德篇蒿宮注木工之鏤示民知節也案之字當作不字文王官人篇考其陰陽以觀其誠注陰陽位隱顯也案此注余初疑位乃謂字因聲誤今案當作猶字形誤耳夏小正補注書後辛未夏商之書傳者無幾學者往往以不克盡見為憾然即其零章􅍘簡求之則古先聖王之大經大法又未嘗不可得而見也戴氏之傳夏小正傳去聲可謂精矣所辨析不過字句之閒而有以通乎作者之本意夫古人元非若後世之求工於文也然道德有於身則明天時察物理通人事立國制無在非性命之旨寓焉而文自從之矣濟陽張爾岐稷若氏採金仁山之注附於傳而又為之說今崑國黃先生復因其本增訂之以傳於世吾觀先生之說也於綏多女士見夏道尊命近人而忠焉於豺祭獸見夏之先賞後罰先祿後威焉於其終篇再書隕麋角而以為聖人扶陽抑陰之意故於夏不言隕鹿角且證之以易姤復之義焉則微獨一代之大經大法如公田入學之制可以考見而並其精微之藴亦如將見之豈非讀書之善者哉此書明王廷相楊愼皆有纂輯余未之見見先生之說當無以過之矣有一二舛誤蓋校者之未審云乾隆十六年五月八日識書楊文定公大學中庸講義後庚辰公卒之明年余方至京師已不及見公今來公之鄉得交公之子蒼育應詢登公之堂匪飾匪崇公歷事三朝宦蹟烜赫而淡泊寧靜不改寒士之素於此亦可見公自少即深究性理之學李文貞主禮部試時以此發䇿獨賞公對為粹然一出於正自此成進士從文貞受業益極意於學此乃公讀大學中庸有所得手疏以質諸文貞者文貞為點定且評其後日圓融潔靜枝蔓去而根本呈其師弟之閒相契若此此可見當時士大夫相深以學問相漸以義理為一時盛事惜余生巳晚不及見然一朝得見兩大賢遺墨所言又皆聖賢之精義抑亦可謂幸焉公嘗揭經書言學指要示學者其功在敬與義其歸在於盡誠而達天此以中庸知人知天為知人之所以為人與天之所以命人者智以開仁之先明善為誠身之本公之於學不專守章句而獨得其要領與朱子平日先知後行之言正相䐇合而非為苟異也豈從詹詹治經生家言者之所能倣佛也哉孟子注疏校本書後丙申趙邠卿注孟子今所傳監本汲古閣本几與疏相連者多被增損失趙注之舊矣趙氏於每一章後皆有章指作疏者徑削去之仍取其辭置於疏首而又不盡用也獨於章指所用事辭往往於疏內具釋之然則何以知章指為作疏人所去也其於恥之於人大矣章具著之矣云几於趙注有所要者雖於文段不録然於事未嘗敢棄之而不明是以疏內釋章指之語者不一而足當館閣校刻經史時於此書未嘗前後契勘於是見注無其文而疏乃為之具釋者則疑以為衍文或又以為他書誤入於此或徑刪去之或雖刪而仍録其疏於考證中乃亦有疑今所傳趙注之不全者衆論差互皆不知有章指二字之名目也乾隆辛巳余從吳友朱文游奐處借得毛斧季所臨吳匏菴校本乃始見所為章指者獨於末卷缺如也後見余仲林蕭客所纂五經鉤沈亦復如是更後乃聞有何仲子校本則所缺者獨完求之纍歲不獲今江都汪容甫乃始以其録自何本者借余遂得補録以成完書計今年丙申上距辛巳十六年矣及老眼猶明得還漢人舊觀豈不大快也哉更有孟子篇敘亦出趙氏世知之者蓋鮮余意欲先鈔篇敘與章指孤行而注之為後人增損者亦不可不復其舊誠得好古而有力者合而梓之則尢為善之善巳疏非孫宣公所撰而假託其名宣公有音義序作疏者即略改數語便以為正義序此尢為作僞之明驗昔人譏其疏陋不足觀非過論也附孟子異文行者有裹囊也曰伯夷何如趙注無伊尹二字今本有之非也曰然則有同與自有生民以來未有能濟者也古之為市也許子必織布然後衣乎放勳日勞之來之有攸不惟臣事在易而求之難政不足與閒也則使人導之出疆無君字王使人瞷夫子今作瞰今之事君者皆曰此惟注疏本有皆字無不知愛其親者夫豫之設科也萬子曰一鄉皆稱善人焉句讀之異惟曰其助上帝寵之句有人不得句雖由此句霸王不異矣至大至剛以直句宜與句夫禮若不相似然使虞敦匠句事嚴季孫曰異哉句子叔人名疑十一經問對跋丙申此元時茂林何異孫所著也黃氏書目云設為經疑以為科場對答之用今案何氏自敘其緣起乃因小學訓導為學生承問失對而停職故輯為是書以助蒙訓非為科場設也元時為校官者必先試而後授之及至官不得不勉盡其教人之責撰為講義以時示諸生其弊雖亦文具而巳然賢者尚能舉其職不賢者亦知顧其名自今觀之猶令人慨然思古風焉是書固為教小學設然其所訓亦有折衷儒先擇取精當而不唯以一家之言為墨守者惡得而廢諸異孫之履行吾未知其詳其云豐城開州治之八月會二教諭於講堂因言及桉察責訓導之事考豐城之升為富州在至元二十三年丙戌也書成而序繫以戊戌則大德二年也異孫蓋嘗為校官於豐城者書中引王稼村先生講義講莫春浴沂為實周之夏五月且云於杭州府學講此一章則稼村必是杭之校官而郡志闕焉其名不可考矣志唯載何庚孫嘗為吾杭教授竊疑庚孫必異孫之訛惟其同官故知之詳悉如此是又當著之以諗夫修郡志者是書有通志堂梓行本無何序卷有更易而後二卷闕文最多今本係從元版鈔得者乃毛子晉藏本紙亦糜敝然猶有可據以補通志堂之所闕者其儀禮中有兩條本有問而無對余為足成之此書於三禮祇略舉其郛廓不若論語孟子之條析為詳也五禮通考跋癸未天地閒一皆禮之所蟠際乎五禮之用猶夫四時五行之成歲功也蓋嘗大較分之嘉近於春賓近於夏軍近於秋凶近於冬而吉實流貫乎四者之中亦猶夫土之寄王於四時焉天高地下萬物散殊人之生也孩提知愛少長知敬蓋自三才立而禮即於是乎肇端有聖人作為之經緯焉踵而成之者未必皆合於節文之中然亦緣情而制因義而起苟擇其宜而審行之固亦聖人之所許也吾師味經先生因徐氏讀禮通考之例而遍考五禮之沿革博取精研凡用功三十八年而書乃成文弨受而讀之其書包絡天地括囊人事縷析物情探制作之本旨究變遷之得失義未安雖昔賢之論不輕徇理苟當即豪末之善亦必録窮經者得以息紛紜之訟處事者得以定畫一之準大矣哉古今之菁英盡萃於此矣洵懸諸日月不刊之書也夫昔之有事於綴緝者通禮類禮今已不傳馬氏作考但志王禮而士庶則略且於古有今無古無今有及本無沿革者皆不之及凶禮有五而徐氏但志喪禮蓋規模大則節目益繁精力固慮有不逮也先生之書豈非獨冠古今者乎顧說者謂士當求合先王之意已耳而不必㞕㞕於既往之迹此大不然孟子當籍去禮壞之後故不得已而為約略記憶之辭孔子之時文武未墜則大小無所不學杞宋無徵而夏殷未嘗不能言也上考三代下暨百世所因之禮損益可知臚而列之究其變而常道之不可易者益以著以此知聖人之亦必有取於是書也明矣文弨懵學竊快覩是書之成敬識數言於簡末云廣韻跋戊寅此本鋟版年月無可考觀其獨避宋孝光寧三帝諱眘惇字皆缺筆十九鐸內有廓字無擴字疑在寧理二朝時所刊也明時有內庫版行本孫北海春明夢餘録所載凡二百五十五葉今此五卷並敘計之止百八十四葉注已經刪整朱錫鬯謂明中涓亦有刪本然此本不避明帝諱知非勝國所刊目録所注獨用同用卷內多有異同其分並處亦非本真吳下張氏重刊宋本注比此為完而上平二十一殷作欣去聲四十三映作敬與此不同殷與敬皆宋所當諱而一避一否此不可䁱也孫愐作此書本名唐韻祥符重修始易以廣韻之名而鼂公武讀書志即以廣韻為孫愐增加陸法言之書豈誤記耶抑廣韻即唐韻本無分別邪明末嘉定陸元輔自言於范秋濤處得見唐韻五冊此本如在安得好事者求而表章之張萱彙雅前編書後癸巳考明史藝文志此書尚有後編今此特前編耳有吳郡趙頤光家經籍八字印頤光即宧光字凡夫乃著說文長箋者此書有硃墨字皆其筆也末復篆十二字己酉三月草二下春天階館閲書刻於明神廟之三十四年歲在乙巳己酉即其後四年耳萱好大言其題辭云余為字觿計非十年不敢出然一出當令古今字書皆廢凡夫題其上云果可廢則吾書亦廢矣快哉快哉其然豈然案凡夫之為長箋亦自矜詡而顧寧人頗抉摘其玼謬古人所以有目睫之論也通篇俱有句讀標識則本朝康熙辛酉歲常熟許玉森所加也有數字識卷末弟子武進丁履恆基士校抱經堂文集卷第八
