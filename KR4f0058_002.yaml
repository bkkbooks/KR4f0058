body:
  text: 東里盧文弨紹弓序一聖廟樂釋律序丙午大樂與天地相應故審音與明時無異理也康熙年閒司天者中西各是其說而不相下廷臣莫能決聖祖仁皇帝謂不明其理則何以判其爭於是專精研求於句股乘除之術而數學於以大明於是乎有儀象考成之書而晦朔弦望無不正合朔中氣無不驗又推之以定樂而有律呂正義一書不泥古法而獨探天地閒之元聲為發千古未發之祕今上纘緒悉遵循之以為準聖明作述此誠極千載一時之盛也巳儒者躬被陶淑之化而不明其理不究其數陽景中天而瞽者不見震雷動物而聾者不聞不當引以為深恥乎嘉定錢君學源塘以名進士為江寧郡學官春秋二丁釋奠於文廟其所職也因恭閲祭之樂章與其改宮起調之法而識其所以變通之由默識神會著為一書名曰聖廟樂釋律凡四卷詳列昭代所定律呂之度數於首以絲竹為八音之綱領為具著其同異焉以字譜與十二律相配為明其畫一焉以及七調之旋宮加減之比例絲竹之遷位無不條析分明使人易曉更以器有長短厚薄弦有肥瘠當隨其形質以定譜不當執一定之譜以槩夫器同而形異者此尢為達變之論也錢君以所居之官盡所居之職故其言樂律也不泛及焉然其闡發精微之奧疏證同異之原􅡔而通之殆亦不外是矣夫天地之氣正而後樂正今者七政齊而八風平協氣㫄流休嘉四塞樂之和也即以理推之而可知也昔孔子歎周文之郁郁而曰吾從周又非徒斤斤守不倍之義而巳曩曾見蕭山毛氏所著皇言定聲録亦欽承聖祖論樂之旨今復覩此書是其信從也誠悅服也其所以導一世之趨而解將來之惑者不皆重有賴也夫丁小匹杰校本鄭注周易序庚子鄭康成注周易九卷唐書藝文志作十卷至宋崇文總目則僅有一卷而已鼂陳兩家皆不著録南宋說易家所引用已非全文至於末年四明王厚齊乃復為之裒輯以成此書明胡孝轅附梓於李氏集解之後故凡巳見集解者不録姚叔祥更增補二十五則皇朝東吳惠定宇棟復加審正搜其闕遺理其次第益加詳焉蓋說經之道貴於擇善而從不可以專家自囿況易含萬象隨所取資莫不具足鄭易多論互體繫辭傳曰雜物算德辨是與非則非其中爻不僃又曰物相雜故曰文此即互體之說所自出王弼學孤行遂置不講而此書亦遂失傳王氏搜羣籍而緝綜之功蓋不細其不能無誤則以創始者難為功也近者歸安丁小匹孝廉復因胡氏惠氏兩本重加考定舉向來以鄭注易乾鑿度之文羼入者為刊去之以漢書注所云鄭氏乃即注漢書者非指康成又於字之傳訛者如小畜之輿說輻當作輹夬之壯于頄當作頯一一正之又王氏次序本多顚錯胡氏惠氏雖迭加更定而仍有未盡今皆案鄭易本文為之整比復托補其未僃者若干則扶微振墜使北海之學大顯於世此厚齊諸君子之所重有望於後賢者而丁君實克纘之非相違也而相成也豈與夫矜所獨得以訾謷前人之所短者之可比哉余於厚齊所輯若詩考若鄭注古文尚書及論語若左氏賈服等義皆嘗訂正惟詩考稍加詳此書雖加瞻涉然精力不及丁君遠甚今覩此本老眼為之豁然增明歸時攜以諗吾黨之有力者合梓之為王氏經學五書知必有應者乎至於字音鄭氏時未有反語及直音某字為某者後人因其義而知其讀或去其比況之難曉者而易以翻切之法以便學者雖非元文要為根本於鄭不可廢也夫此書收拾於亡佚之餘復經二三君子之博稽精核而後得以完然無憾百世下讀是書者其寶之哉王厚齊輯鄭氏注尚書序丁酉鄭康成注尚書九卷舊唐書猶著録然自隋以來其學寖微故祕府一失其本而世遂無有傳之者鄭氏之於書自不及三禮之精書前有孔安國之傳後有蔡九峯之注故人視鄭氏之亡益不足惜雖然一人之見豈能盡得事理之精詳而無遺憾衆家之言猶必兼採擇焉況鄭氏漢之大儒今所傳自詩禮之外若易孝經論語及此書之注皆寂蔑無聞使後生不見古義豈非一恨事哉宋厚齊王氏辛勤掇拾於墜失之餘於易輯為三卷於論語輯為二卷於尚書更輯成十一卷尢班班可考其釋五禮之異於舜典則日公侯伯子男朝聘之禮於皋陶謨則曰天子諸侯卿大夫士庶民蓋周監二代儀文始僃於是乎有吉凶軍賓嘉之五禮其源雖皆昉於唐虞而當其時未必能詳也在巡守則言五等諸侯朝聘之禮為切而論其大常則自當以上下各有等衰者言之其釋金三品為銅三色古者唯銅之用最廣而以之作貢必不責以難得之貨孔傳言金銀銅金銀非民閒所常用也他如作服十二章州十二師鄭注皆勝孔氏他或不皆然則在讀者自擇之耳昔虞仲翔條鄭解尚書違失事目以奏吳主云顧命康王執瑁古似同從誤作同訓為酒杯洮頮為濯以為浣衣成事又古大篆丣字讀當為柳古柳丣同字而以為昧分北三苗北古別字又訓北言北猶別也於此數事誤莫大焉宜命學官定此三事今考王氏於虞所舉者皆不載入余讀書正義見所引鄭注此書亦閒有漏略者此則余為補之而他書力未能遍及也鄭氏易近世巳梓行矣此書與論語注江寧嚴侍讀用晦長明得自秦中故家欲與王氏所輯左傳賈服義竝為雕􅡘以傳與吾夫子信好之旨知皆必有當也鄭氏又注尚書大傳朱錫鬯作經義考時謂其巳佚而今尚有四卷之書見在德水盧氏所鐫本雖亦未全然必非後人所能僞撰也然則天下之大安知鄭氏所注諸書若尚書若論語若孝經世閒無尚有留遺者在乎余不禁慨然有餘望焉尚書大傳考異補遺序戊寅尚書大傳三卷宋志猶載之近代學士大夫多不聞有是書吾鄉孫晴川氏之騄嘗於羣書中鈔撮薈萃釐為三卷以求合於前志之數其用力可謂勤矣文弨嘗得其書而讀之如洪範五行傳不及文獻通考所載之詳而其閒又有以向歆之文闌入之者與伏生書大不類至若耆甫刑仍作戡黎呂刑而又無臩命思欲因其規模少加增損然載籍浩繁非一目所能盡偶有綴緝未必有益於本書也吾宗德水雅雨先生尊經嗜古訪求此書得之吳中藏書家刊而行之文弨得之以校孫氏之書其詳僃實勝之至篇目有互異編簡有先後則皆出於掇拾之餘而非隋唐以來之完書然求其所闕佚者殆亦僅矣其閒傳寫異同蓋所不免因為作考異若干條且念孫氏苦心搜討不為無功凡有可以裨益是書者亦愼取而集録之以繫於後使有所附以傳焉孫書召誥傳有大社唯松東社唯柏南社唯梓西社唯栗北社唯槐之文蓋本諸白虎通然北史劉芳傳引此以為尚書逸篇未必即是大傳故余作補遺亦不載然書中如王曰若圭璧及丕天之大律亦逸篇也則此亦不可遺也故復取以綴於此云增校王伯厚詩考序庚子曩余於此書增其所未僃並以元本補遺各歸本篇録成淸本為之跋其後矣自爾以來時復翻閲見王氏於釋文所載之異同多不引入夫古來傳書不皆畫一即釋文本亦與正義本多不相同宋人刻經注疏附以釋文至其差齵處便改釋文以就注疏之本使非通志堂所梓宋本經典釋文三十卷具在後之人又安從識別乎繼又得日本國人山井氏鼎所為七經考文觀之其所傳古本往往與釋文所云一作某或作某及正義中所云定本作某者符同而王氏於異字異義獨不取諸釋文說者謂王氏意主別三家之異同於毛詩之異文可從略余向者亦未之採今補採之以廣異聞有陸氏所據之本有陸氏所云異同之本貝别白焉若其明指以為非者則不録也至今書之訛異者不但陸氏時未有即王氏亦當未之知也余曩巳舉朔月辛卯之訛月為日家伯維宰之訛維為冢兩條矣今更悉數之如何彼襛矣襛訛為穠終然允臧然訛為焉不能辰夜辰訛為晨碩大且篤碩訛為實不可畏也不訛為亦胡然厲矣然訛為為天降滔德滔訛為慆降豫卿士豫訛為于又若羊牛下括誤倒為牛羊家室君王誤倒為室家小旻與抑之如彼流泉皆誤倒為泉流而竹竿之遠父母兄弟不與淇水在右相協據石經當作遠兄弟父母至四月之奚其適歸乃朱子從家語訓奚為何若毛氏則作爰字其訓為於與左氏所引正相合凡若此類世人習其讀而昧所從來者比比矣古書所引在未誤以前其又可執以為異文乎本朝嚴思菴虞惇著讀詩質疑會稽范蘅洲家相著三家詩拾遺於此書亦各有增損然於王氏採用之誤則皆未能盡正而一經移易轉又滋訛近又得歸安丁小雅校本凡王氏之沿訛互異者一一釐革余見而善之亟為傳録亦採用嚴范二家之長各著其姓以別之至所引各書本無當篇之名則以余所知者增成之又若日本國之本其異同頗多於釋文所云雖未必全是然要為中土舊傳之本居多非僻遠之人所能僞撰也亦取以入焉而是書乃可謂完然大僃矣噫諸君子之勤勤掇拾者非欲申三家以抑毛而奪朱也義可􅍘章辭無達詁是在善讀者意逆而微會之耳苟其不然即陳古以諷一語亦為禍階致令末世子孫不欲人頌揚其先世之美而以為魚藻之義則詩之為教幾可廢矣豈古說詩者所能逆料也哉是書本不分卷今以所增益者多因分之為四卷云王伯厚輯古文春秋左傳序丁酉文武周公之典章制度於左氏傳尚有可考者其言多古文其訓釋亦當用古義自晉杜元凱作集解雖曰取前人之說而會通之然其閒輒以其私臆妄易故訓者多矣其最悖謬者謂天子三年之喪卒哭遂除衰麻更制諒暗之服以終喪以衛文公大布之衣大帛之冠為證遂以其議定當代之制此其誣經蔑禮不可為訓明甚而唐時作正義顧乃棄賈服之舊注獨以杜氏為甲其不可通處必曲為之說而以賈服為非今賈服本書既巳不可復見就正義所引謂杜所不取者往往遠出杜解之上宋厚齊王氏乃於諸書中搜輯補綴賈服外若鄭康成馬季長王子雍之說咸録焉匪徒掇拾闕遺蓋將以正杜氏之失也因十二公分十二卷江寧嚴用晦從秦中舊家録此以歸余見而愛之向見吳中惠定宇氏左傳補注一書亦以古義糾杜之違服其精確録而置之篋中有年矣今乃知王氏此書定宇祖父以來即相傳有鈔本而外人罕得見余雖往來吳中實不知惠氏之有此書也頃閲近人余仲林所為鉤沈而後知之惟王氏開之於前故惠氏祖孫得益精之於後如邱賦卒兩之說皆不從杜遂扶以下依服䖍作遂跣以下以為燕飲解襪之明證一字之異其有關於典制如此余讀昭元年傳云秦后子享晉侯十里舍車自雍及絳歸取酬幣終事八反服氏謂十里置車一乘千里百乘以次相授車率皆日行一百六十里杜氏則謂每十里以八乘車各以次載幣相授而還不徑至故言八反千里用車八百乘正義從杜難服謂千里之路往還八反車率日行一百六十里計則一萬八千里雖追風逐日之足猶將不逮遂謂杜義為長案正義此駁何其輕脫不思之甚也十里一乘一反行二十里八反行百六十里故服以是為率安得忽生一萬八千里之說輕相嘲笑乎且其法至元董摶霄實祖之以運糧矣十步一人負米四斗三十六人行一里人日五百反為二十八里輕行者半重行者半百里用三千六百人致米二百石是即服氏之說可實見諸行事者正義必抑之使不得與杜氏竝多見其無識也此書雖非全文然學者當愈知寶愛如惠氏遂能以是成其家學矣必若此庶無負厚齊扶微繼絶迪後人擇善而從之指意也乎是書本無序余不自揆既稍加整比遂僭為題其端云春秋五測序丙申揆日之度察星辰之行以正時而成歲必稽其元焉必立之法焉而猶有參錯而難合者則其立法疏也故善觀天者不能廢法而要當使法一稟於自然此豈幸其一二偶驗而遂謂吾法之盡善至其不驗則將強天以求合是其為不可也不甚明哉說春秋者之有例也猶夫觀天者之有法也屬辭比事之為教也遠矣顧左氏所稱猶為史官之常例雖其閒亦有聖人所不易者然不可即以為聖人之所筆削者盡如此厥後諸儒之說莫不知有例而用之不精或偏而不全或常而不變其蔽往往陷於繚繞破碎而使經之義轉晦故夫法不密則懸象遲速之度不能必其無差也例不精則垂文示教之旨不能必其無失也今戴君敬咸之說春秋也其所以測者五焉蓋謂春秋之文有常有變有互有便有闕斯五者比類求之而各有得例具於文故即文可以見例且約指古今之說春秋者有四失一曰不赴不書赴則從赴書二曰諱則沒而不書三曰得禮不書凡書皆譏四曰史䇿舊文仲尼新意此四者其言皆近是昔之人所據以為說春秋之例然者君謂其不盡然立五測以袪四蔽不必定出己見而亦不必固守成說期於適當而上君之所以為例者不綦善乎夫觀天者至近世而儀器更精分數更明故其密合亦遠勝於前代蓋鑒前人之失而順天以求合不偏守一法以測天君也因文以見例不偏執一例以測聖人其道實有相類者余是以擬議而為之說如此君名祖啓上元人乾隆二十七年鄉貢士今為關中書院山長讀大學衍義補膚見序己卯前明胡端敏公前發寧王宸濠不軌事以罪去後事驗得雪復用於時人以是稱之至今而不知其侃侃正論有關於天下國家之大計者正多也公為吾邑臨江鄉人其裔孫以公所著膚見二卷示余屬為之序蓋公讀邱文莊大學衍義補而著其所欲設施者如此其中有云吾嘗於某疏中備陳之則此為公登朝以後之書也嘗慨夫世之學者自為秀才時即專以決策發科為念一旦得志推之無本而措之無術鮮不為國家病夫士當其困窮里巷其於朝廷政事之得失容或不能盡知若既巳在其位矣於事有所不便令有所難行疾苦之所致禍患之所伏豈可以不知既知之則當思所以處之思處之則必取古人之良法美意而推擇用之然彼溺於富貴者既不足以語此其少欲有為者又或囿於一偏之識不知通變之宜違古而失泥古亦失國家何賴焉若公此書或增成文莊之義以為必可行或摘抉其弊以為必不可行文莊之以微文見意與其所遷就而不敢言者公則一一引伸而別白之余讀公之書而歎公之識微知著其議論平正通達實過文莊遠甚何以明之史稱文莊性褊狹與劉健王恕不相能御史言事不合意輒面斥之公有是乎方大禮議起之時公家居持論頗與張璁桂萼合然終身未嘗與之比逮諸君子廷杖而公復上書諫其虛衷觀理庶幾可與其中立而不倚矣且即其書求之邱氏言敬大臣而公則以為體羣臣亦當詳也邱氏極論周官安富之道而公則以為今有司之為富家役者亦多也邱氏欲以餘田準丁謂如是則丁不匿而公則以為是教之使匿也邱氏既知鈔法之不便而又欲強立一法以必其行公則以為􅍘然不可行也邱氏有取於董摶霄運糧之法而公則以為如其言百里當用三千六百人日遞米二百石實計人日運米五升五合餘耳奈何以為便而取之殆未之思也至若宦官近習之弊在當時所宜救正者事孰大於此而邱氏無一言及之公獨危言正論一無所撓此尢為人所不易及者余故以公為過於文莊非私言也夫以公之通曉治體如此而於論治河也猶曰身未親歷未敢以為必然其論西番也亦如是不諱其所不知然則是惟無言言則必明見其可行而後從而言之此豈與世之以冥冥決事者可同日而道哉學者讀是書當知古人仕學之不苟而求其所以用心雖處極盛之朝瞿然思所以為持盈保泰計者亦致不可忽也文莊之書世多有得是書輔而行之不益盡善而無弊乎書之以諗天下之留意於治道者中庸圖說序丁亥文弨弱冠執經於桑韜甫先生之門聞先生說中庸大義支分節解綱舉目張而中閒脈絡無不通貫融洽先生固以為所得於朱子者如是蓋先生少師事姚江勞麟書史先生勞先生之學一以朱子為歸躬行實踐所言皆見道之言雖生陽明之里餘焰猶熾而獨卓然不為異說所惑先生信從既久固宜其言之與朱子悉相吻合而文弨亦幸得竊聞緒餘於按試寶慶日諸生循例講書有以君子中庸一章進講者與吾素所聞於吾師者未有合也因舉吾師之說以為諸生正告焉既有以所著中庸圖說來質者則新化生員劉光南也其所解平易切實多與吾舊所聞合而又本朱子相當相對之語以為之圖不知者或以為穿鑿破碎而吾獨喜其一本於自然初非私意小智之所能為也及入試劉生又冠其曹其文能以理勝迥異乎矜才使氣以求見長者益信其有得於儒先之旨深也吾房師漢陽孫楚池漢先生嘗寓書教文弨宜昌明理學毋務華而棄實顧所至殊不易得既得劉生亟舉以告先生索其書於今月始齎以往使者尚未返不知於先生意何如適劉生遠來索序歲云暮矣姑且以文弨所見者塞其請韜甫先生遠在浙江異日將並寄是書以求正必待兩先生許可而後乃可為是書增重也新刻古文孝經孔氏傳序丙申表章遺書莫先於經近代之僞撰者若張商英古三墳書吾衍晉文春秋楚檮杌豐坊子貢詩傳申公詩說之類其言舉無可采而好事者為傳之此則過也然如張霸之百兩篇時君既知其僞撰矣而愛其文辭亦使之流傳於世連山歸藏古無著録而隋唐志始有之今見於諸書所引用者其文類斑駁可喜子夏易傳見於陸德明孔穎達李鼎祚所引者於訓詁名物為詳相傳以為張弧僞作弧唐人也孔陸諸人寧有不知而肯輕相承用乎此必有所由來然如今通志堂之所收者則又並非張弧之舊矣使此數書而在亦焉得不為傳之孝經有古今文鄭康成注者今文也孔安國傳者古文也五代之際二家竝亡宋雍熙中嘗得今文鄭氏注於日本矣今又不傳新安鮑君以文篤學好古意彼國之尚有是書也屬以市易往者訪求之顧鄭氏不可得而所得者乃古文孔氏傳遂攜以入中國此書亡逸殆及千年而一旦復得之此豈非天下學士所同聲稱快者哉鮑君不以自私亟付剞劂而以其本示余余按傳文以求之如云閒居靜而思道也則陸德明引之矣脫衣就功㬥其肌體云云則司馬貞引之矣上帝亦天也則王仲邱引之矣其文義典核又與釋文會要舊唐書所載一一符會必非近人所能撰造然安國之本亡於梁而復顯於隋當時有疑為劉光伯所作者即鄭注人亦疑其不出於康成雖然古書之留於今日者有幾即以為光伯所補綴是亦何可廢也蓋其文辭微與西京不類與安國尚書傳體裁亦別又不為漢惠帝諱盈字唯此為可疑耳漢桓談唐李士訓皆稱古孝經千八百七十二言今止一千八百六十一言此則日本所傳授前有太宰純序所謂不以宋本改其國之本是也唯是章首傳云孔子者男子之通稱也仲尼之兄伯尼十五字􅍘屬訛誤因下有曾子者男子之通稱一語而誤曾為孔當為衍文仲尼之兄自字孟皮安得與仲尼同字且於本文亦無所當此當為後人羼入無疑余所以致辨者恐人因開卷一二齟齬遂並可信者而亦疑之則大非鮑君兢兢扶微振墜之本意矣故僃舉其左證於前以明可信且尚書傳朱子亦以為不出於安國安在此書之必與規規相似也然其誤入者則自在讀者之善擇矣德水盧氏嘗刻尚書大傳周易乾鑿度等書流布未廣其家被籍之後板之在否不可知此皆漢氏遺文好古者所當愛惜若能與此書竝壽諸梓以為衆書冠冕譬之夏彝商鼎必非柴哥官汝之所得而齊量矣前朝所刻書多取僞者今皆取其真者不益以見國家文教之美朝野相成為足以度越千古也哉鄭氏注論語序丁酉康成注論語十卷自周齊至隋盛行於人閒唐書猶著録至趙宋始不以入志則書之亡也其在五代之際乎金陵嚴侍讀用晦自秦中歸從三原王端毅後人處鈔得王深寧所輯古文尚書鄭氏注古文左傳賈服各家義而此書亦其所編綴者也鄭氏注在今日誠如椎輪耳使其書尚在舉業家亦必不好而志古之士要不忍使其墜遺深寧叟勤勤搜採於亡佚之餘釐為兩卷此書之不終泯王氏之力也其訓不時不食謂一日之中三時食不時謂非朝夕日中也於人而無恆不可以作巫醫則謂巫醫不能治無恆之人以子貢方人謂謗人皆與朱子義異然亦未嘗不可以僃一說也王氏又嘗輯鄭氏易及詩考世多有其書而此三書即吾鄉藏書家亦未僃故浙江通志中亦未以之入録侍讀一見而傳其本以歸可謂知所寶矣余次第録之適此書先竣遂序其緣起如此孫詒穀曰此三書非深寧所輯疑惠定宇託名也孟子章指序丁酉漢趙邠卿為孟子章句其題辭又有云章別其指者蓋隨文訓釋之外每章撮其大指而為之辭於是有章指之目李善注文選出師表引之又王伯厚云章指引論語曰力行近仁誤以中庸為論語鼂子止讀書志云孟子十四篇趙岐注又云為章指是則唐宋人咸知有章指也自僞作孫宣公孟子疏者掠取其文入於疏首又不能全載而多所更易乃於趙氏本所有者則徑削去之至所引故實閒為疏其所出且於恥之於人大矣章略著之云凡於趙注有所要者雖於文段不録然於事未嘗敢棄之而不明疏雖為此言亦不云是章指自經削去之後於是人罕知有趙氏之章指矣且疏既刪其全文而但釋其一二字句使後人讀之茫然不知其何屬甚矣作疏者之謬妄也朱子集注孟子於王之臣章小辨章求則得之章所引趙氏皆出章指而後人或以為總注此皆未之深考也宋時嘗以四科優劣之差命題今見於有事君人者章指中是書之在前代昭灼如此而今乃任其若滅若沒可乎乾隆辛巳之歲借得毛斧季所臨吳匏菴鈔本孟子注始見之而末二卷尚闕越十有六年而後覩其全焉恐友朋中未必皆見是書故別鈔之以傳又篇敘一篇世亦不多見故引以冠其首其題辭與注世自有本而今之注亦頗與吳本有異同雖亦當考正然今不暇及者以急於扶微繼絶故也讀者當與我共寶之乎重雕經典釋文緣起此書雕版行於海內者止崑山徐氏通志堂經解中有之宋雕本不可見其影鈔者尚閒儲於藏書家余借以校對則宋本之訛脫反更甚焉當徐氏梓入經解時其撲塵掃葉誠不為無功然有宋本是而或不得其意因而誤改者亦所不免且今之所貴於宋本者謂經屢寫則必不逮前時也然書之失真亦每由於宋人宋人每好逞臆見而改舊文如陸氏雖吳産而其所􅡔輯前人之音則不盡吳産也乃毛居正著六經正誤一書譏陸氏偏於士音因輒取他字以易之後人信其說遽以改本書矣又凡切音有音和亦有類隔陸氏在當時或用類隔未嘗不可以得聲而後人疑其不諧亦復私為改易注疏本多有之幸本書尚無恙然其浸淫以疑惑後人者不少矣古來所傳經典類非一本陸氏所見與賈孔諸人所見本不盡同今取陸氏書附於注疏本中非強彼以就此即強此以就彼欲省兩讀翻致兩傷又本書中如孝經論語爾雅多以校者之詞羼入之今雖不遽刪削唯略為之閒隔使有辨焉唐人經典多不全用說文陸氏意在隨時不取駭俗此書中閒亦引許氏以正流俗之非而不能畫一信從且有以俗字作正文而以正體為附注者至其點畫之閒亦每失正觀唐人石經及五經文字所載皆是習相沿用今亦仍而不革庶乎不損本真然於六朝人所用甚鄙俗字陸氏固未嘗闌入也余念此書闢經訓之菑畬導後人以涂徑洗專已守殘之陋匯博學詳說之資先儒之精藴賴以留俗本之訛文賴以正實天地閒不可無之書也而年來流傳漸少學者不能盡見因為之手校重雕第以遲暮之年精力慮有不周刻成猶再三校目幾為之昏弗恤也其文舊皆連屬今審其可離者離之以便觀者書中是非及今所因革以嘗所聞於師友者別為考證附於當卷之後不以殽亂本書時乾隆五十有六年歲在重光大淵獻九月既望書於常州龍城書院之取斯堂九經古義序癸巳九經古義十六卷吳徵士惠松崖棟先生之所著也凡文之義多生於形與聲漢人去古未遠其所見多古字其習讀多古音故其所訓詁要於本旨為近雖有失焉者寡矣唐之為釋文為正義者其於古訓亦即不能盡通而猶閒引其說不盡廢也至有宋諸儒出始以其所得乎天之理微會冥契獨闢窔奧不循舊解其精者固不可易然名物象數聲音文字之學多略焉近世學者安於記誦辭章之習但知發䇿決科為務與之言古訓駭然以為迂晦而難通塞耳而不能聽也嗟乎此學問之所以日入於靡爛而有終身讀書不識一字之誚也乎今讀徵君此書單詞片義具有證據正非曲徇古人後之士猶可於此得古音焉求古義焉是古人之功臣而今人之碩師也為性理之學者或視此為糟粕然虛則易岐實則難假承學之士要必於此問塗庶乎可終身不惑也余十數年前見是書即為之商略體例校訂訛字而還之徵君之子承緒洎余自湖南歸復從乞借鈔攜之京師嘉定錢學士莘􅎝大昕歷城周進士書愚永年各録一本以去而余轉鹿鹿未能卒業至今春賴友朋之力始得録全計元本之在余篋中又五年所矣書此以見歲月之空馳而讀書能不閒斷誠難也且以志余愧云時乾隆三十八年仲春旬有二日弟子上元孫邦杰漢賢校抱經堂文集卷第二
