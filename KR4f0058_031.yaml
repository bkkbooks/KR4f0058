body:
  text: 東里盧文弨紹弓傳六事略夏節母傳庚辰江陰夏節母者傳一先生之室也先生至性過人喪父哀毀將葬值天寒不忍父棺入泠穴特創意以身暖之臥竁中兩日夜竟以是致疾卒母時年二十九有姑在堂禁之得無死督二孤甚嚴訖為名諸生次子二銘嘗客宜興令王君所王甚重之王疾病家人為姦利者咸弗便二銘肆妄言二銘怒欲辭去王君堅留不可則使人聞於母母乃速止之曰王君與爾交好今病困舍去不義乃止王病亦愈既縣人有以試事屬二銘者其人於二銘素有德雖不可然意猶慊慊母曰汝唯有辭王君而歸可耳王復使人邀之再三母曰前王君有急義不可去今無事何必往其􅍘事合義皆此類夏氏之先好施以是毀其家傳一先生歾時有責半千金母鬻田以償曰不可使夫子有遺憾雖所負母家者亦必償族人哀其志欲分建祠金並公田以贍母母堅不受二銘與兄愼修自幼即好施憐號寒者積尊長所賜為之衣母雖當困乏不移取以給他用或問其故曰童子有仁心不可閼也邑有災煮粥以食飢者二銘任其事勞甚得疾醫危之母曰天道神明宜無有求活人而先自斃者他日愼修又因水災募槥收江中流尸病母信之亦如二銘巳皆如母言二銘奉母命一至京師遊鄉先達楊文定公之門未幾公捐館母命經理其喪畢即歸曰大賢既殁久留無益也母年巳合旌例堅不欲初邑人以傳一先生死孝求旌議者以暖壙不經却之母傷之故戒其子勿以節求旌也母年七十一而殁逾年為乾隆十九年乃始聞於朝得旌云母湯氏其孫祖焞來學於余乃僃知其事如此論曰母所為蓋有丈夫風易曰夫子制義今觀母於去就辭受閒何其審所處而皆當也得之於巾幗綦難哉易於坤為吝嗇母又不然其家至今能遵其教足以愧彼富者余嘗讀宋史孝義傳董道明葬母匿墓中三日又侯義沈宣葬皆不掩壙夜皆拊棺而臥彼皆無恙而傳一獨不幸死且不得旌然賴有賢妻以顯其事作史者其舍諸江陰張節婦傳癸巳江陰張節婦者不知其母家姓或云鎮江人嫁江陰張庖之仲子為婦張庖者以其業名之貧困去為滸墅關卒資少裕乃為兩子娶婦其冡婦得於舅姑仲婦即節婦也以無口才故不得於舅姑其小姑嘗為人婢後得歸與其邱嫂嘗陵藉節婦訌其夫亦弗禮節婦於是張氏無小大無一人善節婦者生一女而夫死節婦時年二十餘安張氏無改適意其家人百端說之不動乃交以惡語相迫婦亦自若也一日其兄來省之張氏合口稱仲婦不賢其兄信之亦怒其妹出誶語且曰汝何顏為張氏婦乎不改嫁將安歸婦至是始曰諾兄辭而去婦整理箱篋無戚容入夜尚自乳其女張氏大小皆喜謂不賢婦行去矣晨興見婦寢戶尚牢閉叩之不應抉而視之則赫然巳懸於梁矣以繈約兒於牀兒故得無墮婦既死張氏以無故輕生聞於官事遂巳鄉鄰有知者為大息傳其事余妻季楊在室時聞而異之他日為余說如此且請為之傳舊史氏曰張氏之遇仲子婦可謂少恩矣婦之以節殉張氏也豈為私愛哉語曰好內女死之此言夫常情耳若夫義根於性行成於志堅確不二以完所守則非恩怨之所能加損者矣節婦初不期死以徼身後之名及迫之以不得不死然後死此九篇得死之正有風化之責者當亟表之李節婦顧恭人傳甲午節婦顧氏上元人明南刑部尚書東橋先生之裔父配元名諸生節婦年十九歸同邑太學生李仙經字尹授後贈官至朝議大夫者也既歸後甚宜其家贈公思以文學致身讀書刻苦應秋賦者再不得志遂病節婦左右之勞瘁僃至疾終不起是時節婦年二十有六上有舅姑年皆俯七十遺孤文在始六歲欲自殉不可則強起搘拄外侮㬪至一不貽老人憂奉養極誠孝翁嘗有所往中途驟得疾距家四百里許節婦一昔夢見翁形容異常驚而覺即稽顙北辰祝翁得生還後果歸至正寢而殁姑病蠱節婦與之同臥起湯藥必親嘗夫殁後又四年舅姑乃皆以天年終教孤子慈而嚴以故文在名譽早起應童子試知縣事袁君賞其文引居門下以遠到期之文在顧善病時或失血節婦患其復如乃父之以勤苦致大也輸粟為太學生既又為之輸金入仕初任南城兵馬司指揮使出為廣西梧州府同知所司鹽榷人以為美遷節婦切誡曰必母染指後又攝鬱林柳潯諸州郡篆所至淸謹以最擢湖南常德府知府換劇衡州旋遷署衡永郴桂道又嘗護臬藩二使司印文在居官每遣人迎母再三請僅一至而返曰吾性好淸約汝能以此自持勝養我多矣及文在以失察所屬知桂陽州某虧帑不報落職歸節婦殊無戚戚意及文在復職需次吏部乾隆三十七年春卒於京師節婦晚年失壯子痛不自勝喪歸一一手自經紀逾年疽發於背猶日召諸孫至前訓以保身持家之道神明炯然不亂以五月七日終於內寢年六十有六節婦於乾隆三十一年奉旨旌表節孝又以子貴封恭人孫三人育蕃育芬育荃皆業儒長者方成童云舊史氏曰曩余督學湖南歲試始衡州為之守者李君也使者校生童騎射必之郭外教場地曠遠觀者填塞囂每不易戢而士又非素練或先焉或後焉往往惑使者之耳目以甲為乙者不少矣李君植木為表繩連之以節觀者闌入者始鞭之不勞而自肅於控馬將發處使官屬監之五人為一班一人出馬所司呼云某甲吏布於道傳聲相呼以達於使者則士之著籍而不至者與夫馬失道而求復者皆可辨也余是時以為通例然也既而乃伏李君之能自余來李君之里君時方留京師聞其鄉人云昔歲大饑官分地為粥以食餓者以在籍之鄉官分主之唯李君實視如己事勞怨不辭人用以濟其共事者皆能道之然不知李君有母也今因母之弟顧生銘來學於余始知之銘又自言曰銘幼喪父賴姊教育之以有今日李氏而無姊則風雨毀室之患殆亦不能有其家吾姊少嘗讀書識大義其待本宗外姻咸有恩義固不獨私於銘而銘感之不能忘也余聞銘之言乃知李君之才敏而事無不誠者得於慈教為多先儒嘗言婦人可無才若節婦之所處非德而兼之以才則李氏之業幾墜矣余嘗欲書李君之事不果今故並著之以見非是母不能生是子也汪氏雙節傳丙申乾隆二十九年蕭山故淇縣典史汪楷之繼妻王氏妾徐氏皆以忍苦完節奉命旌表樹坊於邑東所居之大義里曰雙節為之傳曰王氏會稽人庠生雍文之次女年二十三歸汪楷為繼妻楷前妻方氏遺二女尚幼而妾徐氏居簉室已七年生一子輝祖僅六歲徐氏鄞人也楷方為淇縣典史徐奉王偕之任王氏有母道慈子女若所生與徐歡若娣姒徐則嚴事之無閒言楷居官廉恕在任八年念父母皆老亟引疾歸父沒有逋不能償薄遊粵東未幾遂卒於粵是時王年二十八徐年二十九上有老姑沈氏在堂下有一子四女其二女王所生也家故有負郭田為小叔斥賣以償博進至是歲入無幾索責者滿戶外二氏辛苦營甘膬奉老姑且衣食其子女而己則忍飢以篇常或謂可以辭緩索責者王曰不可以口實貽死者鬻簪珥以償不足又盡賣其餘田猶不足相率晝夜勤織作銖積寸纍三年遂畢償當其夫凶問之至也小叔攜其妻子遠徙他所沈欲往就養二氏相與謀曰何可使七十餘嵗老姑遠離鄉井他日將無以見死者於地下乃皆涕泣固止之凡為養之具王殫力經營而起居扶掖病中百凡指揮皆徐任之時復有欺老弱構釁者或勸宜徙家避之二氏又相與謀曰汪氏支屬單微今三世墳墓在此去之將誰守卒不肯徙外侮亦漸息輝祖少多病兩母愛護惟謹及從師讀書少不中程則怒或至豫杖輝祖年十七請於母欲應童子試王問曰汝自度可入學乎應曰可先試於縣例取文優者覆試之無輝祖名王怒而詰之則以曾受兩生屬為代作文字得薄少以製夏衣為解其人則已前列矣王聞之愈怒謂徐曰兒無志氣吾寧凍餓死不忍見兒為此也幾欲豫杖卒流涕被面而起輝祖以是年為學使者所取入縣學為弟子員少長以負米出游而沈氏卒焭焭兩寡治殯治葬咸如禮徐以乾隆二十七年卒年五十一王以乾隆四十年卒年六十三其得旌也王尚在語及族婦有未得與者愀然曰吾與若等耳何獨以吾為異行其子乃採諸輿論得二十三人為上其事咸祔主節孝祠以成母志云子輝祖以乾隆三十三年舉於鄉四十年成進士孫男女各四人舊史氏曰觀二母處境之危苦何其甚哉唯其志定而一故視勞若逸視險若夷以周旋於內而扞禦於外卒之無不可感之人無不可格之天噫人可知所自處矣王之教子以遠利也不以微而忽不以幼而恕此與李景讓之母掩錢不取何以異徐甚憐其子而不溺於私與王有同德焉輝祖守母之訓以入官庶無得罪於百姓矣乎節婦楊孔氏傳丙申溧水楊汝柔妻孔氏高淳庠生孔雲彩之女也幼失母長於祖母宋氏不苟言笑及將笄朱又亡哀不自勝歸楊五年而寡時氏年二十有三也汝柔業儒應學使者試不入選後出其卷視之巳在所録中而復遺之憤惋成疾腹痛至不能忍發狂惑自刎死氏一慟幾絶遂不粒食昏迷者逾四旬死而復蘇舅姑諭以立後使夫不亡為辭乃勉起就食然自是成錮疾終其身無康寧矣其築里李亦早寡氏與相依日夜事組紃以給衣食不復歸寧撫夫從弟之子志忠為嗣課以讀書慈教兼僃子或少懈即不怡至垂涕泣子今為諸生乾隆三十五年閏月卒年六十有六合旌例云論曰義有所重恩有所遺婦人之有歸寧也上下一也父母既沒則無歸寧之禮此常也父母在而不敢歸寧者變也若節婦者豈不念其父母哉以義􅍘恩兹所謂變而不失其正者歟其夫以讀書無成而亡矣不懲前事又以是勖其子必使之繼乃父未竟之志賢乎哉其不以利鈍成敗易也子知乞言以表彰母德是即讀書之效也夫萬孝女傳己亥孝女上元諸生萬某女也少孤無他兄弟獨與母居矢志不擇對日勤針黹以養母所居隘甚以席自障外人罕覩其面里中聞而賢之屢有向其母求㛰者女輒泣涕不許鄰媪語以若母一旦不諱若將何依女曰亦唯有死耳乾隆二十一年大疫母病死女售其屋得四金棺而斂之越三日亦死時母年九十女六十餘矣女父有門人杜定基起元者聞而哀之使老嫗往為之斂今杜亦老死故其詳不可得聞或云女父名瑛字玉峯舊史氏曰女之死以病與以毁與抑果踐其言而以身殉與皆未可知也吾獨異一弱女子焭焭與母相依至白首所處又極困苦人所不能堪者而安之得不謂天性之異於人哉吾鄉土橋有莫孝女者兄以吏術佐人常遠出女不忍離其母願代供子職竟老於家當雍正閒請旌者數矣輒為吏所格未幾楚亦有與孝女事相若者先得旌遂援以為比得報可今屹然樹闕里中以萬孝女之所為尢難於二女乃若滅若沒久且不知有其姓氏不尢重可慨哉余得此於顧生淞為書之且以告後之修志乘者愼母遺若人也盧母包孺人傳己亥女子有士行者以吾族包孺人當之無愧焉夫士有百行而孝弟為本不孝弟即不足以為士顧常人性情未摯義理未深則孝弟之念尚不能不衰於妻子況乎以舅姑為父母以娣姒為兄弟異姓相合者而欲比於生我之愛同氣之親不尢難哉今觀孺人之事可以風已孺人之來歸永源也年十有八時姑方病劇孺人不以新婦故事嚴飾旦暮伺顏色奉湯藥數月姑少痊即以家政委孺人逾年而姑卒舅衡九公悲悼之餘體中時有不適而氷源又常客外孺人身代子職僃極孝敬舅賴是以安時諸叔五人長者才就孰小者一方六歲一方四歲孺人為之時其飢飽節其寒暖紉針補綴之事必躬親之逮舅之卒也叔四人者尚未授室巳各以次為之娶妯娌六人雍雍相得無閒繼而第四第五俱早寡依孺人居各有二女皆愼擇良對歸焉永源以父祖殯俱在淺土足繭山中以求吉壤既得吉卜以葬其大父母而更求葬其父母者遍歷湖上之山不得求之半山留下又不得蒙犯霜露遂病痁竟不起孺人痛其夫志之不遂也泣以命其子卒成之乾隆丁酉孺人八十初度子婦輩奉觴為壽孺人顧其子而言曰爾父在日時以先人窀穸未定諸子女嫁娶未畢為憂今幸皆次第舉矣汝父安豫更無不安矣蓋孺人一生其發於孝友之性者自初笄以逮白首無閒焉是不足以風乎長子其位永源第三弟宜源子也孺人以為己子次子世美側室張所生也女七人孫四人孫女三人孺人以乾隆四十四年三月七日考終年八十有二長孫家炎年十六能讀書後孺人十四日亦殁里黨皆惜之故亦牽連書焉事略張貞女事略丙子貞女故大學士張公允隨第六女也少許字安徽布政使安州陳公德榮之子曰籓將及笄而籓死貞女聞堅請歸陳氏時籓叔父官京師命其夫人往辭貞女嚮聞陳夫人來匿不見至是則服其喪父之故衰以見號哭不絶聲夫人亦相對嗚咽不能致其辭歸陳之議遂定乃具車迎至安州郭外從者假館請止易吉服入女曰惡可乎亟驅之至於陳氏門外哭而入盡哀姑止之曰勉事我老人乃屛居一小室聚瓴甋為坐臥具唯一老嫗與俱初至以稻米饋貞女問食有異乎曰皆食梁粟耳貞女即不肯食曰人食精我固宜粗食今反是可乎姑籍所有俾掌之至金珠則曰此非婺矛牙所宜佩不如盡斥賣易田以供祭安州去京師三百里貞女母思貞女甚趣歸寧貞女乃使人言於母曰兒非不念母也顧義不忍三年中釋衰絰他日其姑來京師欲與俱貞女仍執不可其動中禮節若是論曰吾嘗聞先儒之言以未嫁而守貞者為過中之行在室之女義當從父今相國生既以女字陳矣而相國死女舍其父之言安從哉然則貞女之行雖謂之中道可也而其他事又率暗與古合余聞之睂菴輒為次第其語如右近者正紅旗滿洲官生誠保之妻名祥符夫病亟無舅姑子女誓以身殉及卒不哭不成服不翦髮言語動作如平時衣服盡以豫人竟自縊死年僅二十後夫死二日也嗚呼為女而貞為婦而烈皆世所疑為過中者也然彼皆有不可奪之志故貞者卒成其貞而烈者卒成其烈士苟不立志尚奚可哉節孝王太君事略丙子太君王氏世為泉之惠安人祖池值明亡隨其季大父户部郎忠孝公俱赴海死父諱石蓮太君及笄歸於蔣府君諱某杭人也隨其父宦泉致仕後貧不克歸太君勤紡織操井臼事舅姑咸得其歡心舅沒府君亦病作罄所有營醫藥終不效逾年亦卒家故貧也又連遭大故太君年方少以頭觸棺和求死鄰舍有白嫗者急挽之曰若上有老姑下有稚子奈何一死可謝乃忍哀日夜勤十指給􅊡粥更急為府君營窀穸闢舍後隙地藝薯蕷以代糧㞕之和以穅核用自食別炊飯飯姑及子薯蕷歲熟可三十石食有餘薄切之㬥諸日以待蒸而食之其葉可飼肫豕豕肥碩售之取贏焉以故得無乏姑所嗜必進之衣敝取所織手製之以獻後其兄公官粵官江陰官黃巖太君皆奉姑往姑數患利下疾冬夜畏寒不能起太君以紙承之手掬以出一夜十起不安寢也生一子振雅從先君學嘗語余曰吾母至孝吾幼時不能識而得於人之稱者蓋僂指不勝記矣請言近事吾大母在太湖病甚吾母適亦患瘧猶自力起居不敢離左右一昔聞牀上窸窣聲起視則吾大母以帶自絞其頸欲死大驚救解乃得蘇使遲之數刻則巳不及救矣醫者謂病人不勝患苦則有此證云是時母之年五十有五矣乾隆十三年奉朝命旌表性仁恕明大體振雅所述尚多余以孝為大節故獨著之弟子上元葉步靑嘯堂校抱經堂文集卷第三十一
