body:
  text: 東里盧文弨紹弓跋九漢廬江太守范府君碑跋癸卯余年來頗嗜金石文字頃晤長山司訓曲阜桂君未谷馥于濟南言及此桂君曾見城南某秀才家有漢碑本二一爲范式一爲元丕皆世所不多見者及余訪孔君葓谷于闕里則范碑居然在焉無意中忽經余眼可謂快事元丕碑葓谷響榻一本又有元氏近年所得漢永初四年祀三公山碑皆出以示余小說家謂京師人有眼福余一日而得見世所不易見者三焉亦可謂雙童壺鑑之屬之必待破冢而岀也不貢於朝不登於貴人之筵爲物之所不爭玆洛生所以得據而有之竆居之士亦得相與摸􅟥而縱觀之其可寶貴安在其岀鼎彝壺鑑下也夫瓦之爲質士也火燒之而後成而乃能歷千百年而不壞則當日埏埴之工良非後世之所能及然吾聞漢武起神屋以銅爲瓦銅之爲物不爲燥溼寒暑所變易宐若更可久矣然爲人所資以爲用故反不若此瓦之無用得以壽於今也夫銅尙不能久而況夫金鋪玉瑱之炫曜一時者乎噫當日之崇基傑構旣巳蕩爲寒煙而此片物獨尙岀世閒吾黨之士有與洛生同好者其必因之而發懷古之幽情可知巳乾隆戊申開歲二日七十二叟盧某書豳州昭仁寺碑跋庚子此碑在明正德時都南濠所榻本缺者僅三字今此本在嘉靖以後全缺者廿餘字然猶未至如近榻之剝泐更多也金薤琳瑯中載此文亦尙有可疑者如云得兵鈐於􅏏敎吞戎韜於黃石今碑中敎字已莫辨而起筆猶在隱見之閒則疑是女字之首又云軒轅五十一伐殷后二十一征案碑二十實作廿字而讀爲二十也又云豈止菌鸖短獨西鶼東鰈之貢而已哉案菌鸖短狗見周書王會篇今碑狗字已全缺意元敬時其匡郭尙在故誤以爲獨也又云杖錫四禪之林攝齋三朗之路今朗字亦唯月字尙可辨余意必是三明用彼家語也凡此皆都氏傳錄之誤也若碑有云坐􅏏扈遊翠爲則翠嬀也置璽陳謙避河爲讓則撝讓也此或皆可省文至於詳觀郡帝則羣帝也高烽罷昭則罷照也白梃作挺僧祇作秖得無筆誤有不及檢者乎書法端重而無板滯之病剛健而無險峭之失乃唐初正書之佳者以爲永興則未必然乾隆庚子在京師金氏出此見示臘月六日乃爲題而歸之同州聖敎序跋庚子此書風神俊逸而後記尢爲豪縱余友金賢村藏此舊榻本今在其從孫所出而觀之有諸草廬先生跋以碑後題龍朔三年在褚河南巳卒之後疑史或失其傳余細審之後所題十九字雖形模相近而神氣絕不相類兩朔字一月字與碑中日月二月明珠恆明等字其相去乃天淵後所書者拳曲累墜􅍘不可以混眞當倂後題褚公書十一字俱爲後來所加無疑葢作書不自署其名古亦多有後人知其岀於誰氏因爲之補題重其人則尢欲其名之昭著也若此者非歟所缺者共十八字榻手之善近亦不可多得云庚子嘉平月七日書松江曹氏所藏淳化閣帖書後甲午閣帖刻於宋太宗榻用澄心堂紙李廷珪墨大臣之登二府者乃賜之仁宗時板燬於火或曰尙在但不賜耳歐陽集古目錄兩載其說而趙文敏謂元祐中親賢宅尙借板榻百本分遺官僚文敏書名冠一世又宋宗室所稱宐不妄世之言閣帖者主銀錠紋李莊簡言板完好時不用破裂乃用之則固當以少爲貴此本神采奕奕古色斑然自是宋榻中之佳品又第五卷末乃有一銀錠紋則去完好時未遠更爲難得但診其紙墨微爲不類耳其本毎卷皆有雲閒名輩印識一曰陸氏子淵乃文𥙿公深也曹氏相傳云本文𥙿家物祖某爲陸所自岀故得之余桉文裕著儼山書輯言閣帖火後巳亾今有者翻本潭絳耳以爲文𥙿家物似乎考之未詳且家有神物而無一語及之豈未嘗以此爲眞本耶然陶南村述劉濳夫之言曰今人不識閣帖某家寶藏皆非眞本卽非眞本而宋元閒人巳貴之如此何況又在數百年之後邪曹君其善守之書黃長睿題跋後戊戌余借得廣川書跋凡數本有一本似爲妄庸子所塗贅引鳧之脛接貂之尾故篇幅加多焉佗日余將卷而還之其人未去閒聊復一觀見中閒有三十三葉多署長睿父書葢會稽黃伯思也其所著法書刊誤三卷余旣錄之矣此則雜題書畫簡䇿而不著書名疑卽所謂東觀餘論余插架適無其書不能取以比對然餘論有二卷此尙有不盡者余愛其鑒別精審意辭方雅但鈔本多誤字又有一條乃複見余爲訂其誤刊其複而錄之以附法書刊誤之後卽目之爲長睿題跋他日得餘論改正之未晚也長睿自云勤於校書丹鉛不去手余於此殆庶幾焉東觀餘論跋戊戌始余得雲林子題跋數十則無首尾意其卽所謂東觀餘論者也今年夏歸杭州就鮑以文氏借得是書乃宋四明樓攻媿爲之訂正以付其子䚮所開雕者卷分上下其上卷則以法書刊誤兩卷置諸首其下卷之末則并他人之文爲長睿作者皆聯綴之不別標以附錄之名余謂法書刊誤當別出餘者乃爲東觀餘論其閒或記一時與友朋評論之語或爲辨或爲論或爲說或爲序跋大抵審正金石考核藝文頗班駮可喜攻媿閒爲指瑕然不以掩其瑜也書中多用古字其商山觚圜觚說有云與圭曶相爲用曶古笏字見說文又見穆天子傳傳寫之誤離曶爲二又以下曰字爲日字川本遂去此句此本不然但注其下云姑畱以待知者此深得闕疑之義凡傳古人之遺文者當以此爲式不可以已所不知而遂謂世無知者使去其文則雖知其文義之不接續亦不能以意增矣余前所鈔錄者目爲長睿題跋今旣灼然知爲東觀餘論但以物力之不裕不復棄前之所鈔而就爲補其首尾使成全書雖小不整齊無害也乾隆四十三年十月旣朢後二日書書金石史後戊戌華州郭宗昌嗣伯與盩厔趙崡子函同時人此書是其所著然未可與石墨鐫華方駕也書僅六藝之一考訂金石文字又書之末焉者耳古人說苟未當出所見正之足矣何至動出惡聲閒又雜以嘲笑可謂無忌憚之尢者矣朱子通鑑綱目凡一年中再三易號者皆以後一號爲定此在一君之時斯可耳若繼世易代之際誠有不可拘此體例者故昔人巳指其誤今謂紫陽不當去漢獻帝延康年號是矣遂謂其黷亂不經名不正言不順非所以爲紀載以一失而掩其全美可乎夫己旣譏彈古人之失亦當思不以失貽笑後人乃今觀其書則紕繆正復不少如周冢穆天四字此成何語以爲出自元美卽不當述之述之而稱其善可謂知言者乎漢孔宙碑陰洪氏隷釋所載門生四十二人門童一人弟子十人故吏八人故民一人合之正六十二人今不據此而但引用脩謂四十二人今所收反六十二人以此爲疑是昔人之失當駁正者彼反不能察也華山碑郭香察書昔人謂察書者察莅他人之書也東漢時尙少二名者此則相沿成俗使然非必猶遵莽制雖閒亦有二名者然殊寥寥見於容齋隨筆者祇可屈指數今乃引莽孫宗坐罪死莽曰宗本名會宗以制作去二名今復名會宗是當莽世亦有二名且謂往牒二名不可勝紀謂無二名爲瞽說無據可笑此又不足與之辨也後魏張猛龍字神旣讀爲呼骨切則是篆之字說文作曶岀氣詞也下从曰今乃云日出氣也此說別無所據余頗疑猛龍當本字神囦於名相配不知碑誤書耶抑傳本者失之耶字書中不見有字故疑之然亦不敢遽定爲然也其文筆拙澀杳拖姑不具論云乾隆四十三年十月二十三日書跋桂未谷所藏何義門評庚子銷夏記庚子予昔在曁陽鮑君以文新槧是書寄子索序勿勿應之未暇閱也後至都門於黃崑圃先生所見退翁後來改定本於卷首所云隨意讀陶韋李杜詩及韓歐曾玉文者易之以宋儒之書其大指可知也近年又從楊文定公家見一本與黃氏本略同中閒比今刻本尙多數條今未谷所收者乃其元本有義門何氏手評兩公所見不同苟元物不可得見雖有精鑒亦惡從定其是與非乎元王惲秋㵎集中所載元破臨安所得故宋書畫目此本附錄於七卷後在退翁甲申以後所著寓目記之前位置良是楊本亦有之鮑刻缺如或補槧􅍘不可移其次第至書中所云資暇是唐李匡乂著後人始加錄字義門所云洞天淸祿乃宋趙希鵠著其自序正作祿字義門不誤而今俗閒本槪改爲錄字矣予於書畫無所解聊以所知者附書之以釋觀者之惑海剛峯墨蹟跋辛丑忠介產自炎陬登朝直聲震天下至今猶重其名世因謂其書可辟邪以故贗作者亦不免金陵談茗村孝廉家有此冊爲公草書近體詩七言二首五言一首後題隆慶元年花朝前一日剛峯海瑞十三字茗村與其鼎彝圖書諸珍物􅡔置一所乾隆戊戌之冬不戒於火盡熸焉旣而掃除餘燼獨得此冊於瓦礫中四緣皆焦其中閒字獨完然無恙噫公正直之氣耿耿不可磨滅卽其遺蹟亦有鬼神陰爲之護持故能若是書法神采秀發光豓動人後來董香光頗近之未嘗見有峭厲不可犯之色當與魏鄭公之嫵媚宋廣平之賦梅花作一例觀彼贗作者多爲粗硬奇崛之態以求肖公之爲人豈可與此同日而論吾疑祝融回祿亦自具有精鑒故因是以顯其奇也邪昔趙子固有落水蘭亭寶之逾於性命今談君之寶此燼餘更出子固上遠甚尾舊有圖記曰子子孫孫鎭家之寶此洵爲談氏鎭家之寶也乾隆辛丑開歲五日在京師觀卽題於元冊之餘紙題茅鹿門示子卷後丙子鹿門先生因其子令章邱爲手書訓之前後凡若干紙皆老成閱歷之語且欲其爲善無近名而美一歸之上其所稱引必本經訓更勖其讀兩漢循吏傳歷代名臣言行錄眞西山所著二經與近代何元朗語林中德行方正二卷以爲出治之本先生嘗令靑陽丹徒皆有聲今書中猶以炫才揚己爲憾其商賦役一條云於我意不盡然然南北異宐不可卽以我言爲是而爾言爲非也其言藹然可掬後其子果以循卓聞先生是時年七十有三書初不經意而姿態横生良可寶愛今歸其從裔孫霞客所先生子名國縉書中亦稱其文可傳世惜乎今未之槪見也楊忠愍與鄭端簡牘書後丁未余家舊有鈐山堂集友朋見者輒命燬之何令人之深惡痛恨越數百年而猶未平一至於斯也椒山先生獄中家書向於其集中見之復有專爲之版行者近年保定臬使代州郞君若伊詢諸容城後人手跡猶在爲鉤摹而勒諸石余得其本而珍藏之今此片楮亦楊公在獄中寄海鹽鄭端簡於南都者端簡復識數語於後其家亦世寶之乾隆壬寅乃歸於余友海寧吳槎客騫所新舊題跋甚夥其視此敝紙與夏鼎商彝等嗚呼孔雀雖有文章而人終畏其毒裒然鉅編徒足供後人唾罵之資余之不燬人之欲燬其異也將無同今槎客得此零墨復爲之裝潢而什襲之其欲爲壽諸貞珉之意亦豈有異哉夫非楊鄭之子孫而猶若此足以見公好之與公惡皆出於自然而毫不容強人亦可定所從巳聞楊公二疏稿亦尙在其後人所於戲亦豈可不謂之賢子孫乎周忠介墨蹟跋丁未隱汀絕望舟騖棹逐驚流欲抑一生歡幷奔千里遊日落當栖薄繫纜臨江樓豈惟夕情斂憶爾共淹畱戊午夏日書於崇忠堂蓼洲老人周順昌右周忠介草書五言古詩四韻後題戊午乃神廟之四十六年也越八年而緹騎之禍作矣委鬼作威羣小逞毒芝生於獄凡六而六君子遂幷命焉公其一也嗚呼國事至此明之社欲不屋也得乎余向於吳中見一小幅畫亦公筆也老樹丫杈中危坐一人非如釋家所畫羅漢相不解其所用意豈如古巢父之流歟今此書法宛與後來董香光相近而更加蒼勁正氣鬱勃自流露于行墨閒爲吾姻家孫靜川宏智所藏假如不工猶將寶之而餘事況又過人如此靜川盍愼守寶焉萬勿爲蟫螙所齧蝕也乾隆丁未之歲重陽日杭東里小生盧某跋蕉隱亭記書後庚子古今富貴人所爲園圃臺榭何限其能令人僂指數者幾何耶揚子雲祿位容皃不能動人而能著書以傳於後則草元一亭亦自千古吾鄉和靖處士逸致淸機咏吟自適其所居百世下人猶增葺之若雲龍山人則又託於坡翁之文以傳不朽者也國初長沙廖次裴先生名元度富於著述兼有能詩名其所居息機園有水竹之勝中有亭曰雪蕉此其寓意於物而不畱意於物之微意歟其友劉裘客名友光爲之撰記而手書之去今百有餘年矣問其園則巳屬他氏而此記猶在其後人湘渚孝廉所文與書俱瀟灑不羣見之者如親見二賢之高致卽與夫斯亭之在廖氏何以異哉湘渚其善什襲之荼毘羊記跋辛丑太原傅徵君於書各體皆工而尢長於篆隷聞有石刻四大冊今其石在太谷段氏或云在太原縣人家分析零落其榻本不可得見李生德申得隷書荼毘羊記石本一紙以餽余文亦徵君所爲也前題眞山書事旣新異文亦有致以眞書寫之文曰方山門未闢時陰竇窈窕生客未繇也日眾經行見羣狗子直竇嗥睨之一羊規竇入羣狗子格之噍劇不退轉僧慈悲揮狗子去引羊入羊如少安隱謂逸諸牧翌日有尋羊來云潘氏役塗次大恐怖幸生還許賽羊關帝明日且賽忽逸岀廼至此請牽羊僧曰是羊逃死來道場有放生無殺生請贖之役曰柰得罪關帝僧曰關帝在伽藍共禱而􅍐之擘赫蹏寫一殺一不殺役􅍐得不殺僧眾念佛役亦念佛如是願畱羊常住去於是羊得大安隱常住芻豢月餘一夜無故殂大眾曰羊來有緣羊佛子暜請律眾爲羊轉呪荼毘附暜同後三行眞書律師海潤說因緣行師自聞煮荼居士高肖柴磨礱韻僧圓璧辦齋居士任復亨張敏同鐫隷蒼勁無近代人姿媚態可寶也六畜中羊似獨有知者嘗見類書中載王克王固黃載等事皆稱其跪拜求生而此更投佛地以幸免豈不異甚矣哉書傅長芳臨歐陽率更化度寺碑後辛丑太原傅靑主先生於書各體無不工其子睂字壽髦亦善書觀其以行草跋乃父重隷郭有道碑尾可見巳壽髦之子名蓮蘇字長芳逮事乃祖亦有祖風靑主筆時往往令其代作署己名非故舊具精鑒者亦莫能辨也今此卷乃臨大歐化度寺碑似不經意之作文多遺落而結體與歐亦不相似末亦署名曰山然其骨格勁峭形皃樸拙益見其姸政所謂粗服亂頭皆好者也昔子敬自負書過其父嘗拭去逸少所書壁而以己書代之逸少見之但曰昨眞醉邪子敬乃慙今二傅之作不知於靑主優劣何如而家風要爲不失曹生敘五之得此紙也寶之與靑主先生眞跡等誠不爲過乾隆四十六年十二月十八日在三立書院須友堂書劉文正公自書手記跋壬子劉文正公手記一小冊葢以僃隨駕木蘭行圍之用其亦古者笏記之遺意歟公在朝介然獨立皭然不滓人多憚其嚴正而延接士大夫又未嘗不藹然其可親也歲壬戌公考試中書文弨倖中選壬申入詞館公爲敎習師在上書房日亦常陪侍履綦及官罷南歸而公未久卽乗箕天上音容遂邈不可卽矣令覩遺蹟儼然如對古儀形昔司馬公作字必端謹公以暮年居政地兼數任尙能作此蠅頭小楷無一筆苟如此何相似也將由得聖賢持敬之力耶頃薄遊白下方訒菴觀察見示此冊勉識數語於後實不勝吾誰與歸之慨跋梅二如所藏徐䕫州墨蹟乙未近代以書擅名者多矣大率取法於唐更出入宋元明諸家其能溯而上之者葢鮮此卷徐䕫州爲中書舍人日所書也蕭灑閒靚如其爲人而運筆結體實有二王神韻長安歲晚人各有營乃獨泊然閉戸爲此冷淡生活其品高則其書安得不妙絕時流哉文弨於先生爲後進罷官後往還益密別來三年於金陵見此卷乃梅子二如所珍弆者幷言先生巳成古人昔共遊處時有善繪者貌得先生及其長君之容開篋見示宛然如生欲幷裝置卷首噫本一時偶然唱酬之事而羣賢相繼有作若不勝豓羨者然先生􅡔而書之梅子又從而乞之此皆與晉人風致爲近余旣追和其韻又綴數言於其後以爲若梅子者知先生之爲人則珍貴其書自當更倍於餘人也先生晚名良號又次卷中所署名字在未改之前云又跋梅二如臨徐又次太守手卷丁未文弨十二年前曾爲二如題所藏徐公手卷幷屬二如臨一本畀余竟不虛所請未幾二如下世余重是故人之筆且張徐二老一時韻事而得諸老先生爲之咏歌歎賞其事足豓千古因裝成一軸請二如之弟石居爲識數言於其上石居亦重岀前卷示余卷中有文穆公詩卽石居昆弟之先大人也憶余乾隆初方從師日下身亦爲童子師未能造大人先生之門然於邸鈔中時見公之奏章公是時於卿列中未爲甚崇而敢言無所遷避巳若是小子私竊宗仰者實久歐舫前輩爲龍眠鉅族是時宗衮方在朝而蕭然無異寒素武進錢文敏與余同鄕舉同選中書其登第也先於余旣貴顯而不忘舊好也新建裘文達公爲壬申殿試讀卷官余以是年登第以師禮事之有燕會必招余在座其卒也相傳爲江神主江寧之燕子磯云桐城王中涵戶部丁丑會試與余俱爲詩經分校官坐聯席相與浹洽者一月識其人朴誠君子也徐又次前輩乃書此卷者書旣絕倫且兼精岐黃術猶憶甲戌之春余長男慶詒方三歲患豆創醫皆以爲結痂可待矣時余七歳女久病請徐先生入視先生見余男亦在牀出謂余曰君男之豆醫者以爲何如此證有吉有險有凶君男在險法中余始皇急就先生求良醫先生因命其長君鳳鳴旦旦來視毒然後大發於外爲手製善藥護其裏散其外又逾月而始愈今余男年三十有六矣向微先生安能至於今也今先生喬梓與五公皆不可復作而余以衰齡尙得撫遺墨而追舊游情景了了尙在目中誠知筆墨荒穢然實有不能巳於言者略識其槪使來者得考焉余本不善書今更艱於捉筆因授余表姪王嘉客士玉爲書卷後時乾隆五十二年良月之六日也題方訒菴昂會試朱卷後壬子凡鄉會試之有朱墨卷也墨卷乃士子所自書朱卷則鈔手所重謄送內簾考校以定去取者也中式者取兩卷比對相符而後塡㮄又待磨勘訖而後歸之禮部藏焉所司未有復料檢者其人後官禮部閒取其得舉之卷攜以歸而未有以示人者吾故雖聞之而未嘗見也今訒菴乃取其會試中式之朱卷而裝潢之吾得見之因以歎訒菴之大有異於常人也自德行道藝之書廢上之求士也以其言而士非言亦無由以進此其爲拜獻之資也重矣顧士當釋褐入官之後轉不自貴重其言視之無異士苴然俗閒相傳至喩之以𫾣門磚噫其於修辭立誠之道何有殆不過揣摩剿襲徼幸弋獲而巳志得意滿矣其言本無足重輕至已亦不欲復觀夫以終身之發名成業顯榮赫奕之美報一追溯其際遇之關鍵所取者唯在其言而猶不自愛是其於言也先巳不誠而他又何望焉訒菴乃於其遇合之文珍重之如此此非遠異於恆流乎然訒菴何不倂取其墨卷而亦裝潢之將無重襲雜沓中無可撿尋耶抑巳爲識寶者攜之去耶吾聞廷對之卷亦皆在禮部其人後登端揆例當取其卷歸之謂其向所言者今舉以見諸行也訒菴大用必有日吾安得及見其敷奏而更以豁吾目也歷來闈中書手不能無恅愺其甚者至不能以句舉子畏其然常以利啖之以訒菴之貧亦不得免焉非然安能書之端謹若斯也向來分校者用藍筆十數科來始改用紫筆主司之用墨筆則新舊一也此卷流傳日久後人或有欲知典故者故復覼縷及之德隅齋畫品跋丁酉德隅齋畫品一卷宋濟北李方叔廌之所作也東坡嘗稱其文瀾翻不窮有飛沙走石之勢知貢舉日自佹必得而竟失之坡有詩自責見集中又哀其窮以玉鼻騂相贈今所傳馬劵帖是其事也方叔所著名玉巖集李端叔之儀爲序今不傳此帙乃評畫者耳能知名手用意處雖無題識而摩挲放像有以知同物而異時同形而異勢摹寫曲盡令人如將遇之誠善於言者也後言能畫不害爲貴人爲賢士是則固然然思唐中官傳呼宣畫師閻立本時則有藝又不如無藝之爲善矣此與圖畫見聞誌皆從金孝章俊明手鈔本傳岀中有脫字及避諱缺筆一一仍之圖畫見聞誌跋丁酉一藝之微莫不有法藝之精者亦可以取重於當時傳名於後世今名爲士人而束書不觀游談無根悠悠忽忽以至終老不大可哀也哉畫亦六藝中書之流也余不善書而書之形聲略略能溯之余更不解畫而畫之雅俗亦略略能判之使持是以蘄名於世也吾固知其必無幸矣雖然舍此而求所以立者安在乎余甚自危而又何暇唯人之責也觀此誌中所載諸人其能事必不可以假借孟子云五穀不熟不如荑稗必有其進乎此者而後可以不屑乎此也此書爲未郭若虛撰常熟毛氏有刻本余未之蓄從友人處見吳門金孝章俊明手鈔本託友人爲傳寫以僃插架之一種云書格古要論後丁酉此書特游藝之資耳觀其辨器物之眞僞的然不淆若是噫豈獨物爲然哉其所以審善否考情僞者果何具也身也者表也學也者鏡也表端則曲直見鏡明則好醜分不知務此而逐逐於物無乃適蹈喪志之戒乎雖然有卞和之璞而不之寶有干將之劒而不之奇不能盡物之理卽不能盡人之情雖曰識小君子亦不謂其無益而可廢也今所傳本云是吉水王功載所增輯以余觀之大率坊賈鈔撮以射利者耳重複錯雜巳疑非學者所爲而今所刊本更全不讎校字體惡俗甚且一篇之中首尾貿易不相聯貫豈非書之一大厄乎余以暇日依文尋之略得其讀爲校正之如右然余以衰白之年而乃爲此不急之務政恐後人不嘉余之勤而轉得誚余歲月之空擲也余其何辭以謝書五曹算經後戊戌五曹者田曹兵曹集曹倉曹金曹也題李淳風等奉敕注釋然所釋者五曹次第之序而巳疑當日尙不止斯也宋元豐七年與孫子輯古兩算經同雕版毛子晉謂其端楷精工眞希世之寶欲翻刻而未果今鮑以文氏縮爲小字版行之屬余爲校讎唯覆月田衍一字及方窖受粟之數其奇分有誤雖宋本亦爾然正不當沿習其誤也聖祖仁皇帝時欽天監推測互異爭執所見朝臣不能定其是非聖祖於是殫思硏學精析毫􅉭遂有歷象考成等書以爲天下後世之圭臬而宣城梅定九於是時伏處草澤亦復能薈粹古今中西之學而推闡之數學至今日舉天地人物精粗大小萬有不齊之品而罔有不該矣此區區者直淺以導夫初學者耳然唐時以算學取士故算書易以流通今之士習四子書外守一經有餘矣遑問此哉朝廷鉅製卷帙重大旣不能家有其書而此五卷者簡約可循椎輪爲大輅之始誠哉不可廢也鮑子從若滅若沒之餘依仿宋本盡爲表章其用意眞絕人也故余樂道之乾隆四十三年孟冬二十有五日書又跋辛丑乾隆戊戌曾爲鮑氏校此書卽就改正矣今見館中本復取而閱之余所校果不謬唯倉曹有一條其元本云今有方窖從一丈三尺廣六尺深一丈問受粟幾何荅曰四百八十一斛四斗奇七寸八分余以斗法只一寸六分二氂若奇數有七寸八分則又成四斗有餘矣當爲奇一寸三分今館中本尙仍其舊余乃更加覆審則奇七寸八分實誤也若七寸八分不誤則四斗二字爲誤衍明也此書與孫子算經皆得汲古閣影鈔宋元豐七年祕書省所進本故行款爲近古云首卷内腰鼓田鼓田兩條館校謂其術頗疎舛爲更定其法此當取其說以繫於後乾隆辛丑七月十三日在太原記弟子上元談兆華肇來校抱經堂文集卷第十六
