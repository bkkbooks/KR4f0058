body:
  text: 東里盧文弨紹弓議附論辨證解駁堯冢在平陽議庚子堯冢之在濟陰成陽千百年無異辭若河東平陽之亦有堯冢古傳記所未嘗言也呂氏春秋云堯葬榖林榖林實在成陽劉向云黃帝葬橋山堯葬濟陰邱隴皆小班固漢書地理志濟陰郡成陽下注云有堯冡靈臺禹貢雷澤在西北此二言者乃固所自注固之此志必非一己所能憑空撰造也自蕭何入秦收丞相府圖籍文書於是天下地形阨塞戶口之數皆有可徵固實本之以作斯志晉司馬彪續漢書郡國志於成陽大書有堯冡靈臺有雷澤一仍班氏之舊此本是細注與地里志班注一例因梁劉昭更加注以補所未僃遂進彪之注作大書耳鄭康成作曹詩譜云昔帝堯嘗遊成陽死而葬焉今之獻議者欲以堯冡移之平陽以呂覽爲不可信以劉向意主薄葬而非必考地志以班固自注爲顔師古取郡國志之注以爲注以司馬彪之郡國志爲出於劉昭以竹書紀年所載帝堯八十九年作游宮於陶九十年游居於陶一百年陟於陶爲岀於晉世不足憑以吳皇象等所著皇覽晉皇甫謐所著帝王世紀唐魏王泰所著括地志凡言堯冡在濟陰成陽者一切以爲沿譌以爲附會不知數千百年以來之通人學士何厚於濟陰而必欲與之何薄於河東而必欲奪之且平陽大國也曹參之子孫世守此侯封非荒陋僻左難自達於漢京者之可比也其地之顯者如霍光尹翁歸張敞之倫仕於中朝者當不乏人何皆喑默不一置喙於其閒而辯正之夫呂覽之作招致天下之士使人人著所聞而成之如平陽果有堯冡諸侯客子寧不聞之顧乃舍近而就遠強無而爲有以歸之榖林是誠何所利焉當時懸之市門一字不能增損猶曰畏秦相之威也子政孟堅去之一二百年何所畏而猶不敢有異辭乎子政校理羣籍博極羣書乃謂其非必考地志夫子政以前之地志何書也母亦卽班氏之所本者是乎地理志河東平陽下但云韓武子元孫貞子居此有鐵官莽曰香平而巳師古注引應劭曰堯都也在平河之陽未嘗有堯冡一字也郡國志亦但云平陽侯國有鐵堯都此劉昭注引晉地道記曰有堯城亦未嘗有堯冡一字也合前後之地志皆未嘗有堯冡在平陽之語而以爲古之地志必有之向特未之考耳不亦誣乎又其所據者以司馬遷史記之書法爲言凡都於其所而葬於其所者例皆不書必若黃帝之橋山舜之九嶷禹之會稽乃書之堯都平陽卽葬於平陽故史記不書也此言似是而非五帝紀中如帝嚳所都在河南匽師其冡乃在東郡之頓邱此何以稱焉湯都亳葬亳可不書而伊尹之葬亳何以反書於殷本紀中然則史記之作難以畫一之例相繩而議者乃欲於無字句處鑿然指以爲證不巳疎乎且其所引證者謂王充云堯葬於冀州此語見宋羅泌路史其子苹注語中以充之言爲謬不知其實確也案王充自有所著論衡其書虛篇中有云堯葬於冀州或言葬於崇山舉此兩言則仍未有實指且冀州大矣河東一郡尙不足以盡之而謂其必在平陽乎議者又云北魏酈道元注水經僃引成陽有堯陵有堯母陵有中山夫人祠然於後結之云考地驗狀咸爲疎僻葢聞疑書疑耳道元父酈範孝文所任用孝文嘗脩祠於平陽道元仕宣武孝明之時作水經注於濟陰巳云聞疑書疑則平陽之蹟猶自昭灼而濟陰之蹟固巳渺茫矣案議者此語又似未嘗見水經注之全文而妄說者水經注瓠子河過廩邱縣爲濮水下道元注云瓠河又左逕雷澤北澤之東南卽成陽縣地里志曰成陽有堯冡靈臺道元以此爲班固本文可知非師古用郡國志之語以爲注矣今成陽城西二里有堯陵陵南一里有堯母陵於城爲西南稱曰靈臺鄉曰崇仁邑號脩義皆立廟四周列水潭而不流水澤通泉泉不耗竭至豐魚筍不敢採捕前竝列數碑栝柏數株檀馬成林二陵南北列馳道逕通皆以磚砌之尙脩整堯陵東城西五十餘步中山夫人祠堯妃也石壁階墀仍舊南西北三面長櫟聯映扶疎里餘以上皆水經注之文今者道元自謂當時也其言歷歷可按若斯非身所親見必不能如是之詳悉今乃曰濟陰之蹟固巳渺茫使其見道元之注而猶作爾語乎若道元之所謂疎僻者自指郭緣生述征記而言記言堯陵在城南九里中山夫人祠在城南二里東南六里堯母冢此與上所親見者里數方位皆不合故云考地驗狀咸爲疎僻道元葢實嘗考其地驗其狀如上所云云者而後知郭記之爲疎僻否則所謂考驗者復何所指乎又考水經汾水過平陽縣東下道元注云平陽縣故城東晉大夫趙鼂之故邑也應劭曰縣在平河之陽堯舜竝都之又云水側有堯廟廟前有碑魏土地記曰平陽城東十里汾水東原上有小臺臺上有堯神屋石碑道元之於平陽其言止於此無一言及堯冢議者乃云平陽之蹟猶自昭灼欲誰欺乎且其曲說猶未巳也又謂考北史魏孝文本紀太和十六年祠堯於平陽此當祠於廟二十一年至平陽遣使者以太牢祭唐堯此則祭於陵唐髙宗顯慶二年帝在雒陽宮遣使者以少牢祭漢光武後魏孝文帝陵葢凡書祠者是廟書祭者是陵案此言祠祭陵廟之分不知何代始有此例考之前史殊不盡然今姑以其所言太和二十一年之事而悉舉之三月次平陽祭唐堯四月幸龍門祭夏禹又幸蒲坂祭虞帝充議者之意亦將移會稽之禹墓而歸之龍門移九嶷之舜墓而歸之蒲坂乎否乎紀又云詔脩堯舜夏禹廟亦同月事可知上所祭者皆廟也又云遣使者以太牢祀漢帝諸陵此何以不書祭而書祀乎是卽一年之中而其說巳難通矣且其言矛盾者非祗一端又引後漢章帝紀元和二年東巡狩使使者祠唐堯於成陽靈臺謂自劉向亦嘗據呂氏春秋班固雖未之采以班自注爲顔師古注巳大謬誤此又云然豈幷忘向傳卽附楚元王傳後載有此語邪然其說之行閱二百餘年度其時濟陰成陽巳起堯冡又閱三十九年安帝延光元年遣使者祠唐堯於成陽云云此兩祠者固亦不能不謂其祭陵矣而猶欲以祠祭定陵廟之分何其進退無據一至於此當明章之時石渠虎觀引經據禮議論大明今乃謂漢之君臣皆不學之人一惟流俗是徇而致敬盡禮於僞冡之前以成今日之笑端此其命意深不知其何居矣於是凡古來傳記言堯冡在成陽者疾之如讐謂皇覽之書多至百二十卷必侈必濫今指其一條云呂尚冢在臨菑縣南去縣十里以某所見太公墓實在周之畢原文王陵左周公墓右且禮記言太公封於營邱比及五世皆反葬於周以此思之皇覽之言未可盡信案此語又殊不然古有衣冠之墓不知太公實葬於周而子孫封齊者爲儀墓以思之歟抑不知實葬於齊而周人以太公元功與周公竝故爲之虛墓以陪葬歟今謂太公墓必不在臨菑抑何其專斷若是果也至五世反葬之說昔人巳言其難信乃於難信者而偏輕信之齊爲守土之君則信其念本而還葬堯當攝代之後反不得以傍母而近陶有是情理乎謂爲天子者必終其身在所都之地不得出國門一步則舜亦不當至蒼梧禹亦不當至會稽天下更無可信之書矣若其疎漏更不能以徧舉如引洪适跋成陽靈臺碑云郭緣生述征記成陽有堯陵南一里有堯母陵稱曰靈臺據此則與碑合靈臺非堯冢明矣以上是景伯跋語彼則注其下云案今後漢書本注云郭緣生述征記曰成陽縣東南有堯母慶都墓上有祠廟堯母陵俗亦名靈臺大母竝無成陽有堯陵陵南一里之句不知适所據者何本觀此言益知其未嘗見水經注全文也以水經注之文爲述征記之語此适之誤又曰适云靈臺非堯冡葢信章帝紀之成陽靈臺而直闢郡國志之大書成陽有堯冡靈臺也此言更不可解章帝紀云使使者祠唐堯於成陽靈臺書法固當爾寧得云使使者祠唐堯於成陽堯冡靈臺也适見碑與郭記而後知靈臺之非堯冡若漢人則無不知之今謂适信章帝紀之成陽靈臺則將改紀爲使使者祠唐堯母於成陽靈臺耶又與其前所言度是時成陽巳起堯冡之語兩不相顧其紛亂顚錯不可究詰實爲從來論古者所未有又引隷釋濟陰太守孟郁脩堯廟碑云聞帝堯陵在成陽遣戶曹掾具牢牽祠是因祠廟脩廟而先以虛詞敷佐而照耀之故曰聞若其有陵卽其地敘其事何必曰聞此又懵於當日之情事而闇於行文之法也成陽非郡治乃濟陰之外縣也濟陰郡治定陶孟郁時未親至其地不曰聞而何哉今以書聞之故斷其無陵將無遣戶曹掾亦子虛烏有之比乎以行文之法而論若其有陵卽其地敘其事直書曰遣某官往成陽祠堯陵而不書其緣起可乎凡所言適足以見其堅僻自用之私而巳矣其論易窮則又佐以形勝之說謂今曹濮閒之堯陵畧無山川形勢之結構竊計非帝堯諸臣皆大聖人之所營建若平陽堯陵乃是地中有山也在平陽城東北四十里從山口入不啻入於地中乃大轉大折於高壁大峽中始見陵山上平如地後擁五峯垂下結爲翠阜葢此一百五十尺天然之土安於平地之山上也夫古卜葬日不卜葬地形家之言上古未有就如所言勞人特甚亦與唐虞簡易之道相左今禮官巳力闢其說不行余恐世人不察且從而惜之又慮後之人復有起而嘘其燄者將使帝堯藏魄之所數千百年帝王之所敬禮封護者一朝而夷於平壤幷堯母堯妃之神靈亦皆無所附麗慢神之咎莫斯爲甚是以復私議之後議庚子初獻議堯冡在平陽者禮官旣力闢其說矣繼又聞其再申前議竊疑其必有左證乃得其牘觀之則唯辨駁言堯冢在濟陰成陽者之皆虛而於平陽仍未有一實據其言曰某祗辨堯陵之有無竝未嘗敢一字涉及改祀之處此無理之遁辭也旣無陵矣尙從而祀之此何禮乎其謂辨駁濟陰成陽之無堯冡莫詳於水經注水經注非僻書今就其所引條疏之於左一稱水經注引帝王世紀曰堯葬濟陰成陽西北四十里是爲穀此沿俗本缺林字某謹按此卽皇甫謐之牽三說而合之也以呂覽劉向班固爲三説其下接注云墨子以爲堯北敎入狄道死葬蛩山之陰山海經曰堯葬狄山之陽一名崇山二說各殊以爲成陽近是堯冡也某案云近是則猶未見爲確又云余按小成陽在城陽西南半里俗諺以爲囚堯城士安葢以是爲堯冡也某案囚堯城本屬竹書之荒唐況以是爲堯冡則道元之意深非皇甫謐之說今案此水經注之前一段所指乃小成陽道元本不信謐之說未可卽以此爲堯冡不在成陽之證葢此乃濟陰句陽縣下之注也墨子山海經二說亦謐所引皆所不信唯以成陽之堯冡爲近是道元知其所指者在小成陽其地俗諺有囚堯城謐所指堯冡殆卽此地小成陽與成陽不可混而爲一議者於此尙茫然莫辨也案謐所言誠爲糢糊影響然河東平陽卽求其如是者而豈可得也耶使古人有言之謐亦必引之矣又稱今成陽有堯陵有堯母慶都陵有中山夫人祠俱詳里數其所謂今者州縣之所興設有此現在也此段水經注言之甚詳正卽今濮州之地巳具錄前篇中若謂道元之時州縣始有此興設則東漢章帝安帝何以先遣祠於此且古之州縣雖甚好事安有憑空起一堆阜指爲古帝之冡之理旣云有此現在則前牘中所云渺茫者亦自知其不可通矣此不引成文故知是道元所親見又稱水經注引郭緣生述征記所言成陽堯陵中山夫人祠堯母慶都冡俱詳里數以見今與古里數參差不合夫祠可移徙陵豈有移徙者何以今與古里數乃不合於是其結束云考地驗狀咸爲疎僻則幷郭緣生亦槪斥之矣案疎僻乃專指郭緣生說巳見前篇中然此亦祗在里數之參差耳傳聞易譌自不如現在親見者之確且道元於緣生之說亦不全棄也引述征記云自漢迄晉二千石及丞尉多刊石述敘堯卽位至永嘉三年二千七百二十有一載此段道元不駁又引記卽述征記於堯妃祠見漢建寧五年五月成陽令管遵所立碑此段亦無駁又云亦是引述征記之語今本譌作文云堯陵北仲山甫墓南二冡閒有伍員祠晉大安中立一碑是永興中建記語止此今碑祠竝無處所此道元語下始引其言堯陵里數之參差者葢道元於皇甫謐郭緣生二家皆未之信所信者卽目耳如議者之意竟欲一槪抹摋而後巳里數小差尙知陵無移徙之理乃一旦而欲徙之千有餘里之外反有此理乎使隋唐以前有一人以爲在平陽起而助之猶可說也今必以獨見盡革數千年之所記載違舉朝之公論不甚可怪也哉更引明碑之徹唐太宗像不令其配帝堯以爲證夫唐太宗亦正是配堯廟耳而可以爲配堯陵乎總之可一言以爲斷曰傳記無有言堯冢在平陽者則一切謬悠之說庶乎其可息喙矣其他支離之說本不足辯然不辯彼且以爲漏也如稱黃帝葬橋山堯葬陬山黃帝諸臣帝堯諸臣皆大聖人此四字見前牘中之所經營相度等語案舜旣攝位禹皋稷契咸在朝烏有廢其職事而從事於邱隴之閒以爲恭者其所云皆聖人果誰屬也又云陬山靈境鴻蒙氣象春氣尙在此語更謬太和元氣在宇宙中無處不有今惟指陬山一區爲春氣抑何隘也其言甚難通矣論辨證解歸奇於扐以象閏論閏也者積奇日奇分而成者也天道有奇而歲功成衍數有奇而卦爻立此理數之同適相䐇合非必規規焉比擬而爲之也故閏之理本於天而聖人之作易也隱然同符而無參差之迹奇之數生於蓍而後人之推筴也又因以取象而無豪髪之差蓋歸奇於扐者求爻之法也歸餘於終者正時之道也簭人之所掌與疇人之所司無異理也朱子本義謂奇者所揲四數之餘扐者勒於左手中三指之兩間而橫渠張氏則謂奇者所掛之一扐者左右手四揲之餘其說乃異乎朱子今將何以斷其是與非乎夫以歸奇爲歸掛一之奇其說倡自虞翻而宋儒郭兼山復堅主之以與橫渠相應和從其言則是以掛象閏也若朱子之意則象閏者蓋以扐而不以掛其說亦本諸唐人之義疏此其不同明甚後人安可依違其閒而爲兩可之論乎夫奇有以奇耦言者有以奇零言者以奇對耦則一爲畫之始而亦可名之曰奇由整得奇則必在數之終而後可加以奇之名也今始掛一胡爲有奇之名乎凡人所以致疑於朱子之說者以經云歸奇於扐則奇與扐似是兩物而倂歸一處朱子則奇與扐一而巳竊以爲不然奇與扐非兩物實兩時耳當其揲始畢而所餘未歸也則無從遽得乎扐之名而祗可名之曰奇及其旣歸也則不必復沿乎奇之名而直可名之曰扐名以命事夫豈苟而巳哉且扐可以象閏而掛不可以象閏閏者歲之餘扐者揲之餘兩相等也一蔀之首必其年十一月朔旦冬至大小餘分皆盡而後可以爲首古今史官無以閏爲蔀首者若之何其以始掛當閏也夫一掛再揲當其不閏之年而再扐當其再閏之歲故此經下文云五歲再閏故再扐而後掛而張氏又謂第二第三揲不掛是六扐而後掛益與置閏之義相違反矣啟蒙巳詳辨之學者當以朱子之說爲正可也名諱辨一丁巳諱之興也始於周生則名之死則諱之自周以來未之或改近臨川李氏獨反其說謂生則諱死則不諱豈有見於春秋諸侯不生名死則赴以名之例故云然信若是誤矣諸侯不生名而盟會載書則亦名之然則死未葬而赴同盟之國以名禮固當爾記曰卒哭而諱赴在於未葬之前則猶未諱也何不可也李氏之意又因檀弓有舍故而諱新一語謬以故爲故君新爲新君攷之先儒之解皆謂故者親盡之君高祖以上是也新卽新死之君豈有若李氏之所解哉位有尊卑則諱亦有遠近故曰逮事父母則諱王父母不逮事父母則不諱王父母此非所論於天子諸侯也天子諸侯祧而後不諱也魯以獻武廢二山而後之來聘者且以犯其先君之諱爲恥釁夏之荅哀公諱宋爲商皆死而後諱也此皆昭然易睹者也曰君前臣名必君前而子乃得以名其父然則諱之久矣曰豈以爲諱不敢也父母之名可得而聞不可得而稱古人言之矣豈有爲人臣爲人子而顯斥君父之名以爲安者乎曰不敢名亦何異於諱曰此固有異父生前之名獨其子不敢稱耳他人及之其誰禁至於諱凡入其門者皆兢兢焉不敢道自周以來皆如是李氏博學人其議論宐有據獨是說余未敢信故爲之說以辨之名諱辨二李氏旣云生則諱死則名而又云生死皆諱是兩說者皆非也而生死皆諱之說於理差近始亦將信之又平心折衷於古人之說知其言之無徵而不足信也晉唐之世君在倂其嫌名亦避之然亦不敢名耳非諱也夫生不敢名與諱有別者非吾之臆說也杜預解左傳於周人以諱事神句名終將諱之則曰君父之名固非臣子所斥然禮旣卒哭以木鐸徇曰舍故而諱新謂舍親盡之祖而諱新死者孔氏正義亦云終將諱之謂死後乃諱之然則謂不名卽諱者殆未考諸此矣葢古人於死生之際禮各不同名亦不苟如生曰父曰母曰妻死則曰考曰妣曰嬪此亦無甚大異而且斤斤焉辨之今以考妣嬪之名加之未死者於心安乎乃儼然在室而遽謂諱之諱之是死之也故爲子而名其父母不安也不敢名而後其心安而以不敢名之故卽謂之諱則尢不安也且不名而卽可謂之諱則古者天子遇其所敬禮之臣入朝不名亦將謂天子而諱其臣乎夫生名死諱數言可決諸矦不生名尊爵也諸侯而下不盡然也失地名滅同姓名朝弒君者亦名變禮示貶也同盟稱名薨則赴以名欲其不忘好也卒哭乃諱以諱事神不通於生前也謚曰易名名將諱也子蒲卒哭者呼滅子皋譏其野葢狃於生前之所稱也且言諱止於門内者亦非諸矦之諱通乎國中故曰大夫之所有公諱大夫之諱君所亦諱之故曰士於君所言大夫没矣則稱謚若字常人之諱亦不獨一室之人諱故曰唯大功小功不諱又曰入門而問諱也後世之事旣不可爲據矣禮制具在而亦不可據乎哉外傳周語昔我先王世后稷證甲寅吾在京師日嘗從紀君曉嵐昀處借得影鈔宋本國語與今本多異同宋公序每謂之俗本今之所傳皆公序之補音本也舊宋本周語昔我先王世后稷今本無王字案左氏成十六年正義所引有王字以證杜注后稷先王是舊本有王字是也或因韋氏於下文我先王不窋下始注云周之禘袷文武不先不窋故通謂之王似上文王字無釋遂疑有王字者爲衍文余案世后稷三字當連讀譙周巳如此讀見史記索隱卽韋注亦云父子相繼曰世謂弃與不窋也是韋氏亦以世后稷連讀也使其上但云昔我先於文不足古人寧有此文法乎況世后稷下文云以服事虞夏韋注云謂弃爲舜后稷不窋繼之於夏啓也是明明以繼后稷解上世后稷更不當以后稷專指弃爲言矣下注通謂之王一語若通字連文武爲言則文武之爲王久矣何必以文武與不窋竝舉且通之爲言所包者廣自祖紺上溯之以至后稷皆可稱王王子晉所稱十五王十八王皆自后稷起安在后稷反不得蒙王稱韋注下又云商頌亦以契爲􅏏王正以契與弃同事虞舜故以證后稷之得稱爲王若但以證不窋殊不相當夫韋注有失尙當舍注以從本文之是況注又明白如此左氏正義所引正宋公序未改本也吾是以篤信舊本之爲得也佳兵者不祥解己亥佳者以爲嘉美而憙悅之也刑可爲祥兵不可以爲佳佳兵之人是天下之至不祥人也下云兵者不祥之器古之所謂兵者弓矢劒戟之屬是器也後人因亦名執此器者爲兵春秋傳所稱徒兵是也此溯其本而言之故曰兵者不祥之器若佳兵者不祥句下古本元無之器二字俗本有之蓋因下文而誤衍也佳兵字不經見然古人多自造語如曰覿武曰老師豈亦有本耶況此下文云勝而不美而美之者是樂殺人曰美曰樂此卽佳字之正詁矣下又云凶事尙右曰喪禮處之悲哀泣之其非可佳之事明甚而或佳之其爲不祥也孰甚焉凶事喪禮用兵之常道也非以此爲不祥也喪師覆國乃可爲不祥也軍禮近凶而佳者則近吉是反常矣反常之人是天下之至不祥人也固不待喪師覆國而後知也或曰佳乃唯字之文脫耳唯古作佳故譌爲佳也曰是不然老子之文凡云夫唯者眾矣其語勢皆不若是也今一一而數之曰夫唯不居是以不去曰夫唯不爭故無尢曰夫唯不盈故能敝不新成曰夫唯不爭故天下莫能與之爭曰夫唯道善貸且成曰夫唯嗇是謂早服曰夫唯病病是以不病曰夫唯不厭是以不厭曰夫唯無以生爲者是賢于貴生凡九見矣今曰夫唯兵者不祥之器類乎不類乎上章雖言兵而此章義本不相屬文又不相類不得謂之承上文也承上文則語勢當緊而此下乃云物或惡之其節舒緩與上所引亦皆不類也若云佳爲古文唯字豈九處皆從今文而此一字獨爲古文乎經典中若佳兵之新創者多矣今不疑祥刑而疑佳兵何也試熟復本章反正兩義則佳字有確詁􅍘然不可易矣弟子丹徒戴準卓亭校抱經堂文集卷二十二終
