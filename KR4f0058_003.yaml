body:
  text: 東里盧文弨紹弓序二吳槎客子夏易傳義疏序乙卯聖門之傳經多出於子夏經十有三而不由子夏氏之門所傳授者蓋僅二三而已顧今自儀禮喪服傳之外無他焉劉向七略載有子夏易傳漢志不著録隋志載其書二卷注云巳殘闕然隋唐之際作釋文及正義尚多引其說則其書雖闕而未盡亡也於後乃有張弧者作王道小疏而亦假子夏傳之名褎然成十一卷案之唐初人所引無一相合者世雖疑而不信而於二卷之殘闕者片言􅍘句亦都不復留意此世之所以知此書者鮮也子夏為人篤信謹守其教門人小子必以灑掃應對進退入故其於易也一切陰陽變化性命道德之旨每不輕言其所訓釋止於名物字義之閒蓋易非難知其言明白顯著故可以通天下之志定天下之業􅍘天下之疑愚夫婦皆可領解故不煩說也後人之於易往往窮高極深恍忽不可為象而其流極且墮於元虛彼其視子夏之言淡乎其無味也固宜不知此正其篤信聖人而猶是教人不躐等之意也其所訓釋頗與爾雅相近唐之一行宋人張舜元洪慶善俱嘗為之解而今失傳海昌吳君槎客乃復起而緝綜之為之疏通證明以薛虞記遵暢傳意者也亦取而繫焉書成二卷名曰義疏其見於唐人釋文正義集解及初學記太平御覽等書所引者此皆灼然可信采擇無或遺至宋元而來諸家亦或援引及之若吳草廬與明之二楊時喬愼未必皆由臆造當得之唐以前書中然皆不著所本學者究疑而未盡信也槎客不以篇幅稍狹之故而泛濫及之其見卓矣槎客謹飭人與子夏之學極相近宜其於此有深契焉是將於易闢荆榛而堙鴻水又不僅為西河氏之功臣巳李既方補李鼎祚周易集解序乙卯漢儒解易之書至多今皆不可得見唯唐資州李氏所著易傳集解中采取三十餘家後之學者猶得以見其崖略李氏之為此書未嘗執己之意以決擇諸家而去取之也故凡異同之說往往竝載不遺如夬之九五引荀爽說莧陸二菜也又引虞翻說謂莧說也陸和睦也既濟之禴虞翻謂夏祭也崔憬曰春祭如此之類不可以遍舉又如小過彖辭引虞翻說離為飛鳥震為音以或指卦象二陽在內四陰在外有似飛鳥之象為俗說矣乃至彖傳又引宋衷說則固虞翻之所斥為俗說者而亦具載之若必為一家之言則所取者轉狹而已之所非安知不為人之所是設使由我削之而遂泯焉不復傳於後世豈不大可惜乎近元和惠定宇其講易實宗漢學凡所援引多取材於是書甚矣李氏之大有造於天下後世之學者也今秀水李君既方富孫好讀易所經眼者不下百餘種而深斥圖說之附會穿鑿擯不欲觀其所深嗜者漢儒之學求漢儒之學則唯資州李氏一編為菁華之所聚既巳朝夕寢饋於斯而復於其三十餘家之說之尚有未經採入者更為之搜羅薈萃録成得六十餘番蓋幾於一字不遺矣然采取雖博而於元明人之所稱引概不及焉是其命意高而用力勤又加之以謹嚴述之之功遠倍於作今學者多知寶資州之書則安得不並寶是書剞􅕻之事是所望於賢而有力者吾安得亟見其成以與天下學士其讀之為快乎校本韓詩外傳序庚戌齊魯韓三家詩雖皆失傳而唐人經義及類書所援引唯韓獨多其內傳亦僅見一二若外傳固未亡也漢志本六篇隋志則析而為十非有所附益也其得流傳至今者豈非以文辭贍逸為人所愛玩故哉顧傳本雖多而訛脫亦往往相似吾友武進趙舍人億孫懷玉既取數本校之又取其與諸書相出入者參互考證擇其是者從之其義得兩通則仍而不革慮其損真也又諸書所引亦尚有出於此書之外者復為之博綜以繫於後蓋自有雕本以來至今日而訛者正脫者補閲者咸稱快焉余亟慫恿付梓公諸同好因綴數言於簡端夫詩有意中之情亦有言外之旨讀詩者有因詩人之情而忽觸夫己之情亦有己之情本不同乎詩人之情而遠者忽近焉離者忽合焉詩無定形讀詩者亦無定解試觀公卿所贈答經傳所援引各有取義而不必盡符乎本旨則三百篇猶夫三千也外傳所稱亦曷有異哉善讀者融會而貫通之將孔子所謂告往知來孟子所謂以意逆志舉可於斯參觀焉爾中閒或亦有里俗之言不盡歸典則者鑒別之明當自求之要其格言古訓之釐然有當者正多也然則此書蓋可以廢乎哉乾隆五十五年端午日序於常州之龍城書院春秋內傳古注輯序丁未春秋三傳左氏最後出鐂歆欲立學官諸儒多不肯置對蓋因陋就簡自古已然唐時貢舉之法習小經中經兼一大經於是人皆習禮記而不習左氏傳以左氏文繁故也至於先儒訓釋亦代廢代興漢東京以來陳元鄭衆賈逵馬融延篤彭汪許淑潁容之徒皆傳左氏而鄭及賈服為最著季長則謂賈精而不博鄭博而不精合之則無以加矣魏則賈服盛行晉時唯傳服義而杜預之注亦立國學至隋杜氏盛行而服義遂微蓋左氏謂之古文春秋其中多古字古言漢人尚能通之及乎年祀綿邈耳目益所不習於賈服所釋格乎不相入而唯喜杜說之平易近人相與尚之唐時作正義遂專取杜氏一家此外多所訾謷以致精誼美言弃之不復甚惜後人無由得見全書此可為浩歎者也東吳嚴子豹人蔚其治經也深懲專已守殘之陋而於左氏用功尢深始灼見杜氏之弊有違禮傷教者有肆臆妄說者慨然思漢人之舊於是凡唐人正義及史漢三國舊注與夫唐宋人類書所引綜而緝之賈服兩家而外若王肅之注孫育之異同略京相璠之土地名雖巳竝佚偶有一二言之見於他說者亦不忍棄也蓋當古學廢墜之後而幸有不盡澌滅者與其過而弃之也毋寧過而取之以扶絶學以廣異誼俟後之人擇善而從斯可矣何庸先以一己之見律天下後世哉斯則嚴子兼收竝録之微恉也今天下好古之士多於前時嚴子此一編出吾知善學者必能因此以定所宗而復推類以盡其餘安知夫賈服之不復生於今日也是則嚴子之為功大矣其或以為􅍘爛而不之貴是所謂嘉肴弗食者也又烏足與之論學問之事哉乾隆五十有二年五月序於鍾山書院之須友堂儀禮注疏詳校自序乙卯乾隆庚申之歲吾師桑韜甫先生講學於湖上之南屛秀水盛庸三世佐實從之遊余館於城中不能與共學而往還恆數焉見其手儀禮一經􅡔衆解而研辨之於其節次亦時有更易以其所為說質於先生定而後各條疏於經文之下余見而好之亦欲從事於斯而家無此書遂輟不為庸三以戊辰成進士余時亦在京師因索其向所著則已褎然成書因得縱觀焉歎其精鑿實有出於昔人之上者顧其文繁力不能倩人鈔録庸三既得滇南縣令缺旋出京蓋余之於此經其萌芽實於是乎始後更無有人相為提唱者則亦遂巳庚子入京晤程蕺園太史晉芳言於此經已得十一家之本將為之甄綜而疏通之則又躍躍然以喜是時余年六十有四距庚申已四十年稍得見諸家之本往往有因傳寫之訛誤而遂以訾鄭賈之失者於是發憤先為注疏校一善本巳録成書矣既而所見更廣知鄭賈之說實有違錯凡後人所駁正信有證據知非憑臆以蘄勝於前人也因復亟取而件繫之向之訂訛正誤在於字句之閒其益猶淺今之糾謬釋疑尢為天地閒不可少之議論則余書亦庶幾不僅為張淳毛居正之流亞乎夫前人有失後人知而正之宜也若其辭氣之閒有不當過於亢厲者此則微為削之今定書之總名惟日儀禮注疏詳校不加以辨駁之辭若是庶無得罪於先賢乎庸三之書名日集解滇之大吏委以解銅至儀徵而卒遂無從更見其書此書中僅載一兩條猶是昔年之簡録者也蕺園相晤之明年余至山西旋聞其卒於秦中所欲為者殆亦未就獨余以不肖軀尚留世間今年巳七十有九矣回憶南屛初見是書時去之五十餘年而始得成是編不可謂非幸也已重校方言序壬寅方言至今日而始有善本則吾友休寧戴太史東原氏之為也義難通而有可通者通之有可證明者臚而列之正訛字二百八十一補脫二十七刪衍字十七自宋以來諸刻洵無出其右者乾隆庚子余至京師得交歸安丁孝廉小雅氏始受其本讀之小雅於此書采獲裨益之功最多戴氏猶有不能盡載者因出其鈔集衆家校本凡三四細書密札戢孴行閒或取名刺餘紙反覆書之其巳聯綴者如百納衣其散庋書內者紛紛如落葉勤亦至矣以余為尚能讀此書也悉舉以畀余余因以考戴氏之書覺其當增正者尚有也劉歆求方言入録子雲不與故藝文志無之乃班氏於雄本傳舉其所著書亦闕方言世不能無疑考常璩華陽國志載雄書凡太􅏏法言訓纂州針反離騷皆與傳同而不及四賦乃云典莫正於爾雅作方言此最為明證應邵而下稱引日益多而是書遂大著其卷數則歆書中云十五卷郭景純序亦云三五之篇隋唐以下志皆云十三卷並合與遺脫不可知然定在郭注之後宋志又云十四卷當因劉歆書與雄答書向附在簡末者亦別為卷而並數之也雄識古文奇字嘗作訓纂篇今不傳趙宋時書學生亦令習方言則方言中字其傳授必有自如家䓇之類凡舊所傳本皆然考之漢隸亦有證據正不必執說文之體以盡易之又其中有錯簡兩條亦尚有字當在上條之末而誤置下條之首及不當連而連者有過信他書輒改本文者注及音義又有遺者誤改者余以管見合之丁君校本復改正百草有餘條具著其說可覆案也郭氏注爾雅三卷外又有音一卷則知此書之音亦必不與注相雜廁後人取便讀者遂並合之以郭音古雅難曉又附益以近人所音如通志載有吳良輔方言釋音一卷此書當有捃托及之者余欲使注自為注仿劉昭注補續漢志之例進郭注為大字而音則仍為小字雖未必即還景純之舊觀然要使有辨焉爾至集各家說及文弨之說上又加圓圍以隔之戴書巳行世故唯録其切要者舊本又有云字一作某者疑出於􅏯公武子止案鼂讀書志云豫傳方言本於蜀中後用國子監刊行本校之多所是正其疑者兩著之據斯言則知為鼂氏所加無疑也豫嘉丁君之績而惜其不登館閣書成不得載名於簡末世無知焉又其所緝綜者紛綸參錯不易整比久久將就散失不愈可惜乎故以餘閒為成就之如此丁君名杰今巳成進士待學博士闕於杭州其學實不在戴太史下云段若膺說文解字讀序丙午文與字古亦謂之名春官外史掌達書名于四方秋官大行人九歲屬瞽史諭書名名者王者之所重也聖人亦重之是以曰必也正名乎鄭康成注周官論語皆謂古者謂之名今世謂之字字之大端形與聲而巳聖人說字之形曰一貫三為王推一合十為士兒仁人也在人下故詰屈黍可為酒禾入水也牛羊之字以形舉也視犬之字如畫狗也此皆以形而言也其說字之聲日烏眄呼也取其助氣故以為烏呼狗叩也叩氣吠以守粟之為言續也貉之為言惡也皆以聲而言也春秋時人亦多能言其義如止戈為武反正為乏皿蟲為蠱二首六身為亥皆見於左氏傳故孔子日今天下書同文知當時尚無有亂名改作者自隸書行而篆之意寖失今所賴以見制字之本源者惟漢許叔重說文而巳後世若邯鄲淳江式呂忱顧野王輩咸宗尚其書唐宋以來如李陽冰郭忠恕林罕張有之流雖未嘗不遵用而或以私意增損其閒則亦未可為篤信而能發明之者逮於勝國益猖狂滅裂許氏之學寖微我朝文明大啓前輩往往以是書提倡後學於是二徐說文本學者多知珍重然其書多古言古義往往有不易得解者則又或以其難通而疑之夫不通衆經則不能治一經況此書為義理事物之所統􅡔而以寡聞鮮見之胸用其私智小慧妄為穿鑿可乎吾友金壇段若膺明府於周秦兩漢之書無所不讀於諸家小學之書靡不博覽而別擇其是非於是積數十年之精力專說說文以鼎臣之本頗有更易不若楚金之本為不失許氏之舊顧其中尚有為後人竄改者漏落者失其次者一一考而復之悉有左證不同肊說詳稽博辨則其文不得不繁然如楚金之書以繁為病而若膺之書則不以繁為病也何也一虛辭一實證也蓋自有說文以來未有善於此書者匪獨為叔重氏之功臣抑亦以得道德之指歸政治之綱紀明彰禮樂而幽通鬼神可以砭諸家之失可以解後學之疑真能推廣聖人正名之旨而其有益於經訓者功尢大也文弨老矣猶幸得見是書以釋見聞之陋故為之序以識吾受益之私云爾聲音發源圖解序癸巳此句曲潘氏一家之學也成是書者融如名已萬字也其大父孝成氏發其端其父亞才氏引其緒而今乃成於已萬之手噫其為功也勤矣古今之譜聲者有二有三有四有五有七而是書則分三陰三陽為六聲夫陰與陽平與仄之為二聲也發送收之為三聲也平上去入之為四聲也啌平嘡平上去入之為五聲也宮商角徵羽變宮變徵之為七聲也前人之論詳矣獨未有言六聲者言之自潘氏始其序則先上次平次舒又上去入繼之是為六聲謂初平之上聲為濁音自三代後寖失其傳遂與初仄之上聲一列而無以別獨今樂人之歌曲其發端必用初平之上聲則自然之理於斯尚可驗也於是演之為二十五韻一百二十五分音八百五十位五千一百聲各為圖而系之以解甚矣已萬之能守其家學也吾嘗聞西域貴耳中國貴目貴耳故以能審音者為賢貴目故以能識字者為賢字母所以辨聲雖多寡不同而大較多出於西土然中國之達於音者或分之或合之則未嘗不即其說而益求精焉安在其獨貴目乎且彼西域之所以詫於中國者則以其致力也專故其精之也易潘氏父子祖孫皆研習於是彼西土之人豈復能遠過乎吾知其必不苟異於前人也審矣自吾來鍾山悼世人字體之不正欲以說文救其失而俗學迷味安於所習其能從吾言者蓋寡夫點畫有定質者也豈若聲音之微渺而難係者乎而沿訛襲謬謂辭苟足以達意而巳奚取於是拘拘者今已萬乃欲以一家之學律萬有不齊之音是猶資章甫以適越也吾恐閲者未一二紙而巳缺伸思睡矣然茍執此以詫西域之人以雪中國有目無耳之說不得於此必得於彼惡在其可廢也因其求序遂書此以歸之雕洪景伯不全隸韻序甲寅汪君太完得宋榻洪景伯隸韻巳不全止第三卷下平聲上第八卷去聲下訃此書當有十卷今僅得五之一耳景伯氏之序隸釋也日既法其字為之韻復辨其字為之釋則隸韻當成在隸釋之前今隸釋之書尚不絶於世太完之兄又重雕以行傳益廣矣唯隸韻見之者鮮或巳疑其失傳今太完得其不全之本而追溯其所由則世祖嘗以賜商邱相宋文康宋之後人為豪所奪繼遭斥賣市司不能各歸其部零星散售故太完所得僅此而其餘不知歸誰氏矣汪君之意必欲得其全而後快若徒祕藏之則人無從而蹤跡之將離者遂不可復合此書為前哲精神所繫必尚在天地閒故立意即刻此二卷以傳示海內苟得其餘本者或力能則取汪君之書􅡔刻於其所藏本而書全或即以其所藏卑汪君使􅡔刻之而書亦全余亦日夜望之夫是以表白其意而亟為海內告也夫隸生於篆篆有說文蓋集倉雅之學而成自程邈始為隸書而賈魴以三倉之書亦皆為隸字漢人碑版大率用隸為多篆書難成隸書易就以故其傳浸廣後人於繁者刪之疏者補之字益多於前矣徐楚金嘗以說文纂為韻譜以便檢尋顧說文自小籙之外不過兼載古文籒文其他異同亦僅一二而巳繼之者夏英公之古文四聲韻於是篆書亦泛濫矣隸書至猥多尢不可不有所薈稡景伯氏始奮然採輯而為此書當時所見榻本自比今之闕壞尚少故其所見也博其摹之也真即其中有彼人自出新意變亂古法者寧過而留之以待夫學者之自擇或乃槩譏隸為俗書之所自始考酈元水經注人有發古冢其棺前和題齊太公六代孫胡公之棺唯三字是古餘皆隸字則自周以來隸已與篆竝行安可專歸咎程邈哉近世有顧藹吉者為隸辨一書亦以四聲分之未知本於洪氏邪抑暗與之合也吾嘗閒取以校隸釋頗有點畫不同者然以吾意推之隸釋傳録不一手若洪氏所手摹必無失真者洵乎此書之不可令其當吾世而遂湮沒也人之欲善誰不如我吾於太完卜之巳乾隆五十有九年十月十七日同里人盧文弨書校刻白虎通序甲辰乾隆丁酉之秋故人子陽湖莊葆琛見余於鍾山講舍攜有所校白虎通本此書訛謬相沿久矣葆琛始為之條理而是正之厥功甚偉因亟就案頭所有之本傳録其上舟車南北時用自隨並思與海內學者共之在杭州楷寫一本留於友人所在太原又寫一本所校時有增益後又寫一本寄曲阜桂未谷今年家居長夏無事決意為此書發雕復與二三友人嚴加考核信合古人所云校書如讎之恉凡所改正咸有據依於是元明以來訛謬之相沿者幾十去八九焉梓將畢工海寧吳槎客又示余小字舊刻本其情性篇足以正後人竄改之失蓋南宋以前本也與其餘異同皆於補遺中具之此書流傳年久閒有不可知者闕之然要亦無幾矣因撮其略為之說曰事必師古而古人又誰師哉道之大原出於天古人凡事必求其端於天釋尚書者於稽古有異說余以為稽考古道古道即天也天何言哉稽考古道是乃堯之所以同於天也古之聖人凡命一名制一事曷嘗不本之於陰陽參之於五行原其始以要其終窮則變而通則久其有不知而作者乎必無是也讀是書可以見天人之不相離而凡萬變之相嬗乎前無一非出於自然者曾私智小慧之可得與其閒哉顧說之不免有岐者何也天體至大仁者見仁知者見知昭昭之天何莫非天當時天子雖稱制臨決而亦不偏主一解以盡繩衆家之說此猶吾夫子多聞見而擇之識之之意云爾世有善讀者則此書之為益也大矣倘泥其偏端掩其全美而輒加以輕詆夫豈可哉若夫是書之緣起與歷代相傳卷帙異同之數則具見於葆琛之所為考余又奚贅乾隆四十有九年九月既望東里盧文弨書於太倉州之婁東書院弟子蘭溪柳兆勳書旗校抱經堂文集卷第三
