  text: 抱經堂文集卷第三十三
  hash: sha256:8581fb0613c119dbc4479acaa09f6a945d085ada19e15dc4a0665c805458411b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0058_SBCK_033-1a}
body:
  text: 東里盧文弨紹弓誌銘秦封公墓誌銘己丑封公諱有倫字天彝姓秦氏吾同年日講起居注官翰林院侍講學士大士考也先世太平當塗人祖考應瑚諸生崇禎末年挈家避流寇之亂道相失其妻方太君獨攜一幼子九歲者俱卽公考諱邦燦也至杜塘寇且至度不能脫見前有水則置兒岸側卓蓍簪令兒識其處遂自沈後三日應瑚公始求得其屍葬之率諸子來江寧占籍焉公考舉丈夫子七人公最少年十四刲臂以愈父疾諸兄治生適四方公獨在膝前盡子職有子敎以讀書立品乾隆十二年仲子大士舉於鄉十七年會試中式時奉廷對者二百有餘人天子獨覽其策異焉親置第一賜進士及第授翰林院修撰明年迎公京師文弨以年家子進謁見公神氣內充言語簡重信爲有德人也二十六年長孫承恩聯舉成進士改翰林院庶吉士公年登八十親朋捧觴稱盛事公益欿然以盈滿爲懼明年大士典福建試奏乞事竣歸里門覲省帝曰俞會覃恩進階公考曁公皆得贈封如大士官而大士與承恩亦各以其階授公僃禮郊迎焚黃吿墓旣訖事卽趣大士進京供職又數年而目始有眚時大士業已吿歸侍養公時與之述先德以敎子孫三十三年正月疾作以元夕前一日考終正寢享壽八十有七公平生坦直臨財廉勇於赴人之急有故人言氏子負逋官責之急欲自戕爲代償得免嘗與人共財其人客死有籍所不載錢三十萬其子亦不知也召而還之北鄕某甲兄病狂雉經死甲與乙讎乗闇移屍懸乙門乙大窘跽公前求爲計公直造甲所諭禍福事乃得解然人無知者公沒後有以善田來售者但取平價詰之卽乙也始言其狀且曰吾以報公德公國學生誥封中大夫日講起居注官翰林院侍講學士娶曹淑人先公卒子七人吉士大士彬士元士賢士上士升士彬士賢士先卒孫六人承恩今爲某官承業國予生餘某某女孫九人曾孫二人今將以某年月日葬於某原銘曰何以基福唯曰德深耕疾芸享其食田於何所方寸域愛護靈苗去牟螣天在人中此可識自童而耄厚穊植持以提撕無倦息讀書爲善各識職有欲型家必取式樂哉斯邱卜食墨銘玆貞石永不泐贈奉直大夫永順縣敎諭費君墓誌銘丁酉君諱元傑字渭英姓費氏岳州巴陵人也先世自豫章徙焉居於邑之雙橋山數傳而大多以文學顯名考厚齋公諱某重誼敦行不祿蚤世君是時年尚未成童母王太孺人撫敎僃至年十八試補郡學博士弟子員嗣是毎試輒冠其曹學使者書原潘公激賞尢至文譽大起前後視楚學者若養齋董公渭湄李公咸聘佐衡校之任所取士率滿人望始君之就幕也有致一緘於舟中者君不發封亟投諸水郡守許公熟君行誼禮請爲岳陽書院山長訓帥諸生多所成就蓋君之可爲人師者實不徒以其文也事母極孝病禱於神求代不得哀瘠幾殆其他爲義於鄕里者甚多如請豁瀕湖荒田之租及以鼉鶴灘新生洲歸之學爲學田岀資倡脩文廟浚泮池連書院割地以益義冢顧僧拾遺骼瘞埋之姻黨中有貧而未娶者輒量力爲之助當郡邑修志時載筆者摭君之實書之而人咸以爲允則孝義之孚有素也娶李宐人與君同德城南有步淪水人病涉君議修築宐人亦岀針黹所積百餘金助成之所謂馬頭者是也至今人享其利有佃負租欲鬻其女以償聞而憫之亟焚劵更資其嫁生平所爲類若此子四人應豫拔貢生官學敎習歴任福建龍巖直隸州知州應泰拔貢生武英殿纂脩任瀘溪縣敎諭江西白鹿洞山長應孚縣學增生應壯歲貢生女二皆適名族孫十一人遜學貴州廣順州知州志學江蘇崑山縣知縣其巳仕者也君先以長子官遇覃恩封文林郞妻孺人繼以孫遜學官誥贈奉直大夫妻封宐人君年七十有二以乾隆十四年九月十七日卒宐人年八十有六以乾隆二十八年九月二十七日卒先後合葬於邑之南角山而未有銘乃因志學之請爲之銘曰師儒之官古所重也山主堂長隆於宋也故相領之或侍從也爲文章宗道德統也洛閩誰嗣美難踵也岳陽鍾英行可頌也含和孕粹學緝綜也衡文式士材見用也厚德澤物爲後種也有美閨中黽勉共也仕雖不達享榮封也愔愔幽宮固無縫也不震不泄大無恐也余斯銘斯徵輿誦也翰林院侍講學士秦公墓誌銘戊戌乾隆四十二年二月丁巳學士秦公以疾終於江寧里第公乾隆十七年皇太后萬壽恩科聖上特拔第一人也而公之終適當奉皇太后哀詔哭臨之後四日公自聞國有大卹卽哀痛傍偟不寧厥居文弨與公爲同年生官階相等時適爲鍾山書院長詔至之日同班行禮哭盡哀而退語文弨明日早臨當先至迨歸而疾作入夜更劇次日竟不能至自審病不可起卻醫藥口占四言十六句以示子孫沐浴而逝嗚呼豈不異哉今葬有日公子觀察君以銘幽之文爲請乃案狀而書之曰公諱大士字魯一號㵎泉先世有貳守江南之太平者因家當塗曾祖諱應瑚縣學生娶方夫人値明季流寇之亂以節烈死事詳先封公誌中祖贈公諱邦璨亂定後隨父兄來江寧占籍焉故今爲江寧人考封公諱有倫國學生生七子公其亞也生有穎質十歲能屬文少長兼精篆隸行草之學求者踵至有知公貧以金幣請者微察其有德色遽還之一遊淮陽鹺使幕中聞前輩箴規語亟歸竟學以親年老顯揚須及時禱於神願減算以博一第迨壯歲舉於鄕三試南宮獲雋遂登上第授翰林院修撰明年充順天鄉試同考官又明年散館欽定一等旋充咸安宮官學總裁入直武英殿以母憂歸二十二年服闋復官命敎習庶吉士是冬奉命直上書房侍皇子講讀明年御試詞臣欽定一等二名擢翰林院侍講學士二十四年京察一等充順天武鄕試副考官旋又奉命祭吿北岳等處二十五年充會試同考官二十七年充福建鄕試正考官便道歸省封公明年復充會試同考官旣竣事遂請終養歸承歡者閱五載而封公沒服闋以病乞展假三十五年來京師祝皇上萬壽逾年又祝皇太后萬壽同朝諸公見公精神未衰敦勸復起而公巳無復出山之意矣公之勸講皇子也勤而恪正而和凡可以啟迪培養者無所不盡至膺衡校之任一字句不敢苟所得皆眞材其主八閩試也同事者適嬰疾公不辭勞瘁取八千餘卷盡閱之是科得人爲極盛他若甘肅提督馬公全後死王事於西陲者亦公順天武闈所得士也少卽詩邑令袁君枚取其詩以入志迨入館閣益得雅頌之體賦專以神韻爲工不專襞積爲古文則自謂得力老泉云嘗恭和聖製喜雨詩十韻進入蒙天語襃焉公長子承恩弱冠成進士相繼入翰林洊升侍講出爲江西分巡廣饒九南道公丁寧訓誡其要務在勵廉隅勤職守嘗一至官下亟歸家居怡怡友愛親課諸從子學業公素精於論文決利鈍無不驗嘗一主常之龍城書院在饒進芝陽書院高才生而親講示之無不得意以去近年當事有聘主揚之安定書院者謝勿往也晚年惟愛呂新吾呻吟語取其切要者錄之有求書者卽視其人之情性有可以爲韋弦者書之其不苟如此公以翰林院侍講學士加二級覃恩誥授中詩大夫祖父父咸如階官封贈祖母陳母曹俱贈淑人妻劉封淑人而承恩亦以庶吉士邀綸錫焉公享年六十有三子三人承恩江西分巡道署理按察使事承業鄕貢士承家幼女三人長適內閣中書舍人王彝憲次字江雲森次未字孫男一人繩曾孫女三人長字孫應魁次字王鼎襄次未字以某年某月某日葬公於某原銘曰始之求名欲爲親榮卒之告歸欲與親依方膺任使華膴可俟決計翩然勇退侔錢生兮若浮死兮若休眾人惜死擾擾未巳治命諄諄旋返其眞自挽同濳子姓炎炎此二端者似公蓋寡余來鍾山得數往還識公學力晚益有得兢兢長愼終免緇磷公不可攀余去鍾山勒詞幽扃公兮永寧贈資政大夫大理寺卿王公墓誌銘已亥今大理寺卿王君昶將葬其先贈公也上書天子乞假歸營窀穸事旣報可卽馳歸卜日得吉謀所以爲銘者向知文弨不肎爲澶慢呴愉之辭其言宐可取信遂以書與狀來請勤懇甚至文弨其可以苟辭乎哉案狀公名士毅字鴻遠王氏松江靑浦人先世由浙之蘭溪遷焉考諱璵生三子公其季也九歲而孤少長竭力爲母營甘旨自奉則取其至觳者伯兄出爲人後常苦貧時時爲給朝夕費仲兄沒無後公兼主其祭歲時對几筵輒泫然興哀檢身治家嚴而有法有犯者置不與校嘗擇經語十二條取史事附著之以朝夕自鏡因益悟誠中爲立身行已之大本誠則未有不形誠則未有不動顏子居陋巷言語不多見聖人乃亟稱之諸子皆自以爲莫及漢黃叔度徐孺子管幼安之倫皆終身隱約而當時稱之後世信之此於人世文章功業有弗藉焉矧富貴利祿耶公之志趣見於言者如此子就傅後毎夕爲陳說通鑑事又取古來名臣碩儒自屈子而下止於明季凡百二十人本傳總編之命曰百世師錄俾誦習之引其志使不落於庸近也同時㝛學耆德咸取其書以詔學者乾隆九年八月二十二日卒年六十有四以子貴三遇覃恩初贈文林郎內閣中書舍人再贈奉直大夫吏部考功司主事今誥贈資政大夫大理寺卿妻陸氏三贈至夫人子一昶以文學著稱進士出身今官大理寺卿孫女一適吳縣嚴榮昶以乾隆四十四年七月壬辰合葬公與陸夫人於蘇州崑山縣之雪葭灣從先人也初公葬其考於是土人謂其年於方不利率眾阻之公不能抗歸而慟哭至絕復蘇今昶之葬公也亦猶公之欲葬考也豈能一日忘哉然方貧賤時思有待以榮其親旣涉仕途義不敢私其身從役萬里飛書馳檄計不反顧迨乎綏定而還䇿勳飮至天子念勞臣積階至二品綸誥蜜章推及三代鄉里益嘖嘖稱公爲善敎子子奉朝命歸葬更爲非常之榮世有君子當快其遇而更憐其志之至是而始遂也銘曰木生火爲光明火不離木子父道以成不求名而名不求榮而榮敎子義方實顯實揚歸從先人無忝所生體魄孔安曰鍾厥祥其以卜子子孫孫之慶都察院左副都御史提督山東學政忍廬黄公墓誌銘辛丑公諱登賢字雲門系出徽之程氏祖大城縣學敎諭諱華蕃少失二親母舅無爲州同知大興黃公諱爾悟養以爲已子遂從其姓著籍爲順天人考侍郞諱叔琳學者所稱崑圃先生也以進士高第陟館閣柄文衡歴封疆享高壽終妣後武夫人侍郞公年三十七而生公雍正二年舉順天鄕試年才十六父不欲其速化會撫浙攜以自隨母卒於里第亟奔喪歸侍郞公爲怨家誣奏欲中以危法憲皇帝察其誣但令在海塘効力當是時公方弱冠感家門顚沛祖母吳太夫人年高懼其以憂致疾時時依膝前解慰弟登穀尚幼公以家督搘傾扶危形神交瘁猶以餘力兄弟相勉學問切劘無虛日侍郞公旅羈吳中八年少得以解內顧之憂者繄公是賴中閒與其弟更代來南省視兼得從諸名勝游所學益進乾隆元年成進士分部學習得戶部河南司額外主事越七年實授江南司主事轉員外郞又二年進陜西司郞中皆在戶部長官器公才能剸䌓常令兼攝他司恢恢而辦洞悉利弊吏不能欺遇興革大事推公定議奏上靡不報可爲尚書海公望撰皇后躬𧖟儀上覽之稱善詢何人爲之海以實對由是擢廣西道監察御史遷吏科給事中轉刑科掌印給事中巡視通州漕務丁憂服闋補戸科給事中再任刑科掌印巡視江南漕務前後任臺察給諫凡十一年所陳奏皆切於時務可施行者山東災運奉天河南天津米接濟公言如此則東省西界北界爲有僃矣惟靑萊距濟東窵遠利津昌邑以南諸縣山徑崎嶇陸運復不易謂宐豫糧仍舊運通而以南漕如數抵撥近從淮安鹽城出口由海港直達沂州府屬之夾倉口靑州府屬之宋家口萊州府屬之膠州東門外海口分貯平糶則東界南界亦俱得資接濟又言飢民就食他方向有畱養資送之例然其中有本來游惰之民無業可資轉以荒年爲幸及資送囘籍往往成羣滋事有於經過鄕村搶食作踐者臣以爲賑卹之恩難容濫及遞送之例當有區分被災之區自有賑濟勸其母輕遠岀其巳岀者惟老弱殘疾畱養外餘聽其自爲謀食至願囘籍者陸續資送按日分遣多不過三十人如有強梁之人混入隊中者卽繩以法別行遞解囘籍庶乎主客相安不受外來之擾其他如除幕客盤踞省會之弊杜經紀巧昂錢價之害提比捕役專責成府廳磨勘試卷令考官迴避漕丁餘米許在通岀糶諸議咸奉旨允行廢員劉光訓以縣丞署知縣被黜賄通文選司書吏藉起復原官文躐補知縣公劾奏論如法其巡南漕歸也復命稱旨擢太常寺少卿尋遷光祿寺卿又升授太常寺卿蓋駸駸嚮用矣會上御門班退公素短視不知駕猶未起卽於班後憩坐部議革職及所司別請簡人復奉恩旨畱任三十二年改宗人府府丞明年擢都察院左副都御史命往湖南審覈茶陵州城工覆奏有平允之襃又明年授倉場侍郞甫三月簡署漕運總督是冬實授加兵部尚書銜公在農部久又兩任巡漕於漕政素熟悉處置輕重咸得其宐丁有所資運乃速達明年督運北上命隨軍機大臣同入見眷顧方殷公因越常例奏請調劑湖南疲幫幷水次州縣建倉事宐且請親往鎭江察勘挑濬奉旨申飭部議降調去官需次當得運使上加恩以三品京堂用三十六年復補授都察院左副都御史三十九年奉命提督河南學政特調山東蓋是時壽張賊初平士習民風亟須整頓上以公有威重故改用公公之生也侍郞公正提學山東今相距六十六年而復繼斯任凡整飭士習崇勵風敎一以先侍郞爲法先是東人於大明湖三賢祠增祀愚山施公及侍郞公爲五賢祠公至瞻謁重加修葺幷置祭器且默自矢以母貽先侍郞之玷視事年餘恭遇聖駕東巡於界首祗迓上見公容痩諭加意調養蓋公唯以盡職爲念雖積勞成瘵而猶不自知也恩賜之隆亦視前學政有加是夏按試曹州閱卷不異常時忽命子嘉績具遺疏且曰生於山東死於山東命也生於學署死於學署數也吾分止此夫復何憾目注書笥他無所屬至夜端坐而逝時乾隆四十一年五月十二日也享年六十有八公奉侍郞公極孝自以生晚不及親見父少壯所行事毎於燕閒侍談隨得輒錄今所傳年譜率本於此學不務雜以小學近思錄爲主文弨館公家毎好糾梓本書籍之誤公曰讀書以求益也今書幷受君之益矣余知其以此規我也娶曲阜孔夫人襲封衍聖公謚恭慤女操身儉約有文采而不肎自著見先公二十八年卒子五人端紱縣學廩生早世景緯拔貢生今知江西安義縣嘉績以謄錄議敘分發江西候補縣丞符綵進士今知浙江台州府脩純府學生早世女三人一適舉人河曲縣知縣張德洄一適監生四庫館謄錄陳箴一適進士户部主事包愫孫六人應桐縣學廩生仲馥府學生季馨泰寧進冠文衡公豫作遺敎置書笥中令祔葬祖塋官階祗稱見在不可仍稱總漕前銜母以浮詞長語作行述公子遵其敎以某年某月某日葬公於韓山祖塋之旁來乞銘嗚呼余之不工於緣飾也公素知之巳銘曰出自貴介庸愈孤寒服官三紀左瓢右簞退食一編無營無競生斯卒斯信知有命卽事求理坐言可行再蹶再起帝嘉老成鞠躬盡瘁聿追先德前光後煇東人是式全而歸之韓山之原上配若考下啟後昆封儒林郞翰林院編修邵君墓志銘甲辰嗚呼士有績學砥行以沒其世而不能自致身靑雲之上所藴不得以大發舒於時此交遊知識之所爲重太息也雖然屈伸顯晦之理猶夫陰陽晝夜之代嬗終鬰不燿理固無之旣不於其身必於其後人吾以此驗諸人世往往而合今吾鄕邵太史請吾銘其先君子之墓因得以悉行履之詳亦吾言之一徵也案狀君諱佳鈗字藉安自宋南渡來世爲紹興府餘姚人曾祖琳前明進士山西洪洞知縣祖炳縣學生贈修職郞考諱向榮由舉人會試中式內閣中書改知縣終鎭海縣學敎諭贈文林郞翰林院編修前母陳氏母蔣氏俱贈孺人敎諭君年過四十未有子禱於神夢神自書叢中紬片紙授之巳而舉君占者曰書種也祖母張鍾愛特甚比就傅不程以所業少長會季父徵士坡自京師歸敎里中君諦聽其㫄卽能爲人演說因試之文振筆立就家人咸訝其何遽能是也自是從季父學學日進繼隨敎諭君於鎭海鎭海之士咸推服焉君於文不隨俗好識者以爲在明江右五家中與章羅酷相似亦嘗以諸生試高等宐可以食餼矣顧缺出蚤晚無一定卒不與相値僅補增廣生鄉試屢詘而君志氣卒不少挫居貧所守益峻其天性之篤也嘗侍嚴親疾不解帶者五閱月夜則究岐黃家言遂通其旨劑量醫所處方飮之愈季父客會稽而病君在鎭海聞之疾馳往奉以歸會稽至餘姚僅二百里而舟不能徑達中隔以曹娥江輿轎登陸肢體不得展舒渡江再易舟又過兩垻牽挽上下始達於姚江病者苦煩聞邪許之聲不堪尢甚君於陸行舁以涼牀施幕其上風日不侵過垻則約滴水爲號以齊眾力轆轤無聲而舟巳進其用意體貼入微若此敎諭君旣吿歸君事二親曲盡其歡疏小圃以娛之日求所嗜以進之以親居北方久溲麪效北人爲餺飥親食之甘於論著之散見者皆爲緝綜成帙與季父遺書竝藏之唯謹邑有介士徐君義不受人之周母病君託言負其家金厚遺之後其母死又鬻田以爲賻其勇於義率此類雖家人未盡知也晚年喜詁易詩文偶一爲之多出人意表以乾隆四十八年九月乙巳卒年七十有二及見其子貴受卦文林郞晉封儒林郞如其子官妻袁氏封安人子三人履涵蚤世晉涵乾隆三十六年舉禮部試第一人成進士官翰林院編修鼎涵國子監生女二入適名族孫六人秉恆秉仁秉華秉理秉章秉瑞以卒之明年十二月某日葬於邑文山之南原銘曰吉夢神吿誕生文人誰之不如而鬰湮不伸其行可式又進於文孝乎惟孝而乃醇乎醇嘗藥知醫巧變入微泆而爲義欲人莫知是曰隠德天其知之及身食報有子而才有子而才眾推班揚領袖南宮潤色玉堂錫以淸資方來未艾瀧岡之文將母有待見託下走作此銘詩雖曰不文庶無愧辭浙江杭嘉湖海防兵僃道周公墓誌銘乙巳公諱克開姓周氏字乾三號梅圃湖南長沙人乾隆四十九年七月二十日以疾終於浙江杭嘉湖兵僃道任年六十有一士民悲悼相與言曰天胡不俾終惠我民邪大吏以聞上深惜之公子內閣中書舍人有聲聞喪星奔將奉公柩歸鄕以葬匄余爲銘余嘗見公於江寧又客太原爲公舊治故老猶能述公治行公子以余嘗典學於其鄕師事余是不可辭案狀公以鄕貢士中乾隆十九年會試明通㮄引見發甘肅以知縣用葢刱舉也値甘肅軍興卽協辦軍務署張掖古浪實授隴西調寧朔凡歴四縣擢知固原州以憂去復補雲南姚州知州特擢貴州都勻府知府調貴陽緣事罷復用爲山西蒲州府知府調太原擢授江西吉南贑寧道署布政司使事坐失岀逆書案吏議効力軍臺聖恩許贖罪卽命往江南以同知用署知江寧府事特除江西九江府知府調南昌未幾卽擢浙江糧儲道調補今職此公敭歴之本末也性勁直不以依阿骩骳取容所至爲民興利必計長久治獄必當其罪於威勢無所瞻畏雖以此取怨怒勿恤也大吏久而知之屢以最聞聖上深悉公任事有風力故再折再起不久淹也寧朔舊有漢唐二渠與大淸渠而三百姓資以灌漑唐鐸堡之地有暗洞焉以泄濱湖宿水修治不善漢渠之水不行泛溢爲害議者苟趣目前欲加塡塞寧夏利而寧朔不利公堅主修復時春月資水甚急民以不及待相阻撓公期以五日可就及期夏民羣持畚臿來擬不就卽塡塞耳至則工巳垂竣反相助爲盡力葢么蚤籌度某所有石可用某項有錢可借故能成之之速如是縣民閏姓爲旗人所讎叢毆致斃旗員以獲偷拷問爲辭公驗狀非偷且身有傷須考實將軍聞之大怒詰以不當株連公據律令爲對竟致兇渠於法一破姑息之習人皆以爲快在太原修復屬縣之風峪口隄堰以除水患往時毎爲姦民佔荒者浮議沮其事及聞公往勘復蟻聚蜂擁洶洶馬前公陽言吾不審當若何試推曉事者導吾往得三人械之以行曰若率多人將復抗我耳有縶吾馬者必置若法眾紛然各散去於是沿隄行視隄亙十數里其尾爲水所決瀰漫平田中無所歸復循而下則汾流帶之中隔民田公以開田償直詢諸民民曰以潦田易永利某等願不受直隄卒以成民因爲祠以祝公公於臨財廉亦不以賂要結上官近年甘肅浙江官吏皆以贓敗而公絕無連染當時誚公迂者舉皆喪身亡家公獨安於其官獲保令名以終嗚呼仕者不可知所自立歟公督修海塘當潮汐之衝毎苦墊陷晝夜不離工所積勞冒屠以至於大故豈不哀哉舉此數端亦可以見公之崖略矣祖諱炳父諱宣智舉人漵浦縣學敎諭以公貴贈皆中憲大夫祖妣某氏妣侯氏皆恭人公初入仕授文林郞妻張氏封孺人後所得階封皆以貤贈子三長卽有聲徵仕郞以中書充歴代職官表纂修官次有度早沒次有蕃孫二鳴鸞鳴鷺女四人壻皆士族三巳嫁一許字未行卜以某月日葬於縣之某原是宐銘詞曰惟禮有云勤事而死則祀之公之盡職自初仕國功民功燿前軌口而祝者徧畏壘行書其實上太史報功有典俾筵几神則如水魄在是以此爲淸白吏歸金之所詎不美乎黃母方孺人墓誌銘辛丑今之卜葬者吾惑焉以父祖之骨爲子孫博富貴之具而一奉命於地師地師之說又言人人殊交持而不相下則狐疑而不敢決迨世逾久則枝逾繁宐於孟者或疑其有害於仲若叔若季亦惟恐其不利己也交相遷延寧使其親棺朽骨腐終不敢輕議葬事達官富室揚揚然伸睂抵掌出入光輝諸事恥不若人獨至於葬其親反不得下比於窶人子之蓬顆蔽冡猶得以安體魄而無暴露之患此其人於天下豈少也哉使其聞潮陽黃母方孺人之事寧不愧焉孺人普寧方氏諱淑考憲韶四川重慶府同知及笄歸於黃是爲同菴府君諱應泰舉拔萃科應廷試候選儒學敎諭歸而復舉於鄕得乙㮄未仕遂卒同菴始爲諸生時娶孺人患前妣郭孺人墓地卑下將改卜孺人力贊成之於時祖考妣之喪猶在淺土則以從祖兄弟人多議不一同菴之父雖能不惑於形家之說然猶慮持之過急則應之反緩乃延地師爲兄弟所信服者於家令其擇地孺人主中饋之事必豐必潔惟恐少怠彼將不肎盡力如此者數年地師感其意良厚指一穴謂其眾兄弟曰此最吉眾兄弟咸以爲然於是遂葬實孺人之陰爲相也旣而良人先卒君舅後亡督諸子獨肩附棺之事蓋視前此少易焉則孺人之素行孚於人者深也近三十年中黃氏之門遂無停喪不葬者豈非見理明決而又善於委曲調劑故事集而內外安之無異言噫可謂難能也巳其他閨門細行不悉書書其大者子五人長霖次鳴鸞皆諸生次象璣國子生次作乂先卒次雲章國子生女一人適海陽鄉貢生陳雄略孫七人蓮峯瞻峯皆諸生餘皆業儒以乾隆四十四年二月五日卒年八十有二同菴君已前葬諸孤重於啓竁乃以明年十一月六日舉孺人之喪葬於縣竹山都長美坑之原距同菴塋域僅數里未有銘其女夫余所取士也重以爲請乃銘曰不裂而泄不齧而缺地不違天爰得吉穴昔孺人之安先人也今後人之安孺人也昭爾子孫後先一轍馮恭人墓誌銘壬寅恭人氏馮爲代望族考諱元方廣西按察司使母王淑人馮公與四川布政司使陽曲李公諱如蘭交相善也遂以恭人歸李公次子天培由進士歴郞署岀爲湖南衡永郴桂道復授廣西左江兵僃道官罷恭人偕歸里中凡十有四年而卒年六十有七時乾隆四十有六年九月三日也逾年十一月某日葬於太原縣許丹村之原先期以狀來請銘余素知兵僃君之賢今乃知恭人實有助云恭人少隨父任兵僃君奉父命就婚焉旣而應鄉試歸馮公止一子聘兵僃君之妹亦命之蜀就婚旣行而馮公疾作恭人忘其將免身者日夜左右奉湯藥唯謹生男三日而馮公疾革卽彊起茹哀視附身物無一遺憾又懼母夫人年高不宐過哀所以調護扶掖者無不至洎與弟扶柩歸代以積勞幾濱於危逾年始差布政公以王淑人所生止此女不堪遠離命且畱侍母久之布政公卒官始歸奔喪家旋被籍至無以給朝夕恭人安之無愠容迨兵僃君仕於朝恭人奉姑曹夫人命送小姑嫁來京師未幾復至代由代至太原由太原至京復至代十餘年中往還殆無寧歲兵僃君家貲旣盡所得祿不足以給裘葛僕馬費士大夫舉京官之貧者必曰李君而君彌自刻苦微特不受非義幷不輕從人乞假恭人仰事俯育黽勉有無坼鈿移繡辛苦備至兵僃君乃得壹意職事絕無內顧憂旣而從宦衡陽南寧以遠離二母居常悒悒聞當䥴秩喜謂兵僃君曰今乃獲偕君歸事老親矣歸二年而母王淑人卒又四年姑曹夫人亦卒侍病送終僃盡哀禮恭人爲女爲婦之道盡矣以夫貴誥封恭人子二長德申增廣生員次錫璉殤女四皆適宦族孫二應垣應均銘曰處素貧易處暴貧難雪霜驟至當之鮮歡幸爲男子專奉二親女也及笄辭家適人豐約一致恩義無二天鑒孔明咸遂其志以亨其迍以榮其身同德賢夫無或緇磷井椁旣具高邱之原銘以考信我詞不繁談孝貞墓誌銘乙巳女子外成以適人爲家者此人道之常也離己之父母而事人之父母義則有降而情則無降故巳嫁而孝不衰者稱焉若夫兄弟凋零幼孤未立懼親年之易老傷左右之無人撤環瑱以守貞奉盤匜而致養遇値其變則其事爲尢難有若江寧談氏孝貞女者名淑範旦泉君之愛女也母許夫人女善承兩親意自小卽願長依父母及笄聞將爲擇對則涕泣終日旦泉有兩子先喪其長子其遺腹幸男也而次子又夭女願供子職之志益堅未幾母亾長嫂又相繼逝天倫之樂生人之趣旦泉舉無得焉女上承下撫綜理井然復勸父置側室親擇端謹者令視寢舉一男今巳就傅矣其孫授室後亦生男旦泉今乃有子有孫且有曾孫矣是皆女辛勤鞠養之所致也性嚴重寡言笑家人咸憚之以乾隆五十年六月十九日卒於室年四十有三其父痛之甚以其年十月十九日坿葬於祖塋之㫄請余爲之誌幷銘之曰女孝而貞國人所稱在室伊何降酷相仍生我孑然意先志承扶厥微緒家用是興先聞其鄉有萬孝女十指養母相依白首昔惟北宮今乃有侶述殊志同孰敢輕不卜兹幽宅日月其良魄歸於土神或在堂弟子定遠凌和鈞雲韶校抱經堂文集卷第三十三
