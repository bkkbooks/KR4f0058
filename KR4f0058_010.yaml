body:
  text: 東里盧文弨紹弓跋三書荀子後丙申曩余於乾隆四年以事羈餘姚寓周巷景氏東白樓中抽架上有楊倞注荀子一書遂手鈔之為巾箱本諸子自老莊外唯此為得之最先也世之譏荀子者徒以其言性惡耳然其本意則欲人之矯不善而之乎善其教在禮其功在學性微而難知唯孟子為能即其端以溯其本原此與性道教合一之義無少異矣然而亦言忍性則固氣質之性也又日性也有命焉君子不謂性也則在孟子時固有執氣質以為性者荀子不尊信子思孟子之說而但習聞夫世俗之言遂不能為探本窮原之論然其少異於衆人者衆人以氣質為性而欲遂之荀子則以氣質為性而欲矯之耳且即以氣質言亦不可專謂之惡善人忠信固質之美者聖人亦謂其不可不學學禮不徒為矯僞之具明矣荀子知夫靑與藍冰與木之相因也而不悟夫性與學之相成也抑何其明於此而暗於彼哉然其中多格言至論不可廢也余後得版本不甚精曾以他本校一過今年得影鈔大字朱本後有劉向校録奏一篇並其篇目在未經楊氏改易之先最後兩行一題將仕郎守祕書省著作佐郎充御史臺主簿臣王子韶同校一題朝奉郎尚書兵部員外郎知制誥上騎都尉賜紫金魚袋臣呂夏卿重校此當在宋英宗時奉敕校定者寫極工楷而訛錯亦復不少然以校俗閒本則此本字句尚未經改竄余亟取以正余本之誤蓋十有八九焉向嘗疑王深寧詩考引荀子與今本多不合至是始釋然知王氏所見之本即此未經後人改竄之本也議兵篇有而順暴得勇力之屬句注雖依文為解然相其文勢似不當爾江都汪容甫謂其上有脫文下有為之化而願為之化而公等語則此亦當是為之化而順其上文則無由知之矣宋本分章處俱提行於大略篇獨否此則當倣前例為之離絶者也歲月如流回憶三十八年前事若在夢境而白髮明鐙手此一編摩挲探討不自意得見善本疑若有鬼神為之賜抑何幸歟書校本賈誼新書後已亥新書非賈生所自為也乃習於賈生者萃其言以成此書耳猶夫管子晏子非管晏之所自為然其規模節目之閒要非無所本而能憑空撰造者篇中有懷王問於賈君之語誼豈以賈君自稱也哉過秦論史遷全録其文治安䇿見班固書者乃一篇此離而為四五後人以此為是賈生平日所草創豈其然歟修政語稱引黃帝顓嚳堯舜之辭非後人所能僞撰容經道德說等篇辭義典雅魏晉人決不能為吾故曰是習於賈生者萃而為之其去賈生之世不大相遼絶可知也此乃漢魏叢書中本近借得前明兩刻本一是宏治乙丑吳郡沈頡刻本校者為毛斧季又一刻本雖無沈頡名而其實即是沈本為之校者吳元恭也兩校皆據宋本是正今觀宋本科段字句有絶佳者而訛脫處亦致不少兩君一無持擇疏矣又有明正德年一刻本題為賈子與宋本相出入有欽遠猷者合郴陽何燕泉本長沙本武陵本而為之審定以去非從是其勤甚矣而義亦不能盡得其閒有為後人出己意增竄者誦之頗似順口而實非也余殫旬日之勞合三本以校是書其不可讀者不及十之一焉有所因則易見功也宋以前所增竄者疑亦不少此則不敢去恐其舐穅及米也捨宋本而從別本者著之意有疑者亦著之若專輒而改舊所傳則吾豈敢乾隆四十有四年冬至前四日書李軌注揚子法言跋壬子今俗閒所傳五家音注法言本雖以李軌為首而以法言每篇之序升之章首則依宋人宋咸所更易非復子雲之舊矣夫序在卷終史記漢書皆然李本獨未殽亂可貴也文弨於乾隆乙巳借得江寧嚴侍讀道甫本乃李氏一家之注不為俗本刪易因亟度於家書閲八年復假江都吳太史澄野紹澯本覆校始能自信無誤矣其書有何氏義門跋云絳雲樓舊藏李注揚子法言序篇在末卷未淆本書次序後轉入泰興季氏又歸傳是樓康熙己亥心友弟偶獲見之讎校訛字寄至京師冬日呵凍自校此本他日餘兒苟能讀之乃不負二父殷勤訪求善本以貽後人之意也閲此跋乃知此書流傳本末余今年七十有六矣目眵神昏而復自力為此亦不專望於子孫第使古人之遺編完善悉復其舊俾後之學者亦獲得見完書於余懷不大愜哉書鶴山雅言後丁酉此宋稅與權㢲甫記其師魏文靖之言也卷軸雖無多而釋經析理正文字考制度亦略僃焉㢲甫又録文靖與袁蒙齊書之語於篇端謂學人騖於高遠者則惟以直指徑造為能溺於卑近者則又但以記誦辭章為事必合內外貫精粗始可以言學觀此言可以知文靖一生為學之大旨讀此書者亦可以推類而自求之矣余從吳門朱氏借得元至正年金天瑞梓本字極精楷而錯誤不免因以所知者略訂正而録之版舊藏鶴山書院余嘗按試靖州過之想先生之遺風而求其書則舊版巳亡惜乎當其時不能得是本而為之翻梓以迪此邦之士也荷亭辨論跋乙未往時見章楓山與東陽盧正夫書議其著論之失私亦疑其用意過當或有未純近乃得荷亭辨論觀之始知其覃精研思實有灼見唯理之至是者為歸不輕徇古人此乃其所以深信古人也百年前蕭山毛氏立論務與朱子駁幾於戟手裂眦相向微論其所言非也即其氣象巳迥與儒者不侔矣前輩山陰沈徵君冰壼淸玉尚沿其餘風余嘗微諫之徵君大笑而起朱子之視聖人固當不同謂其言一無可議是無所用其思者也因一二未安而遂並疑其餘夫豈可哉此書論經而兼及古今之事績往往多創獲讀之犁然有當焉閒有與朱子異者夫非好為異也反求之而實有所不愜云爾此書明史不載儒者亦鮮傳余從同邑宗人信波解元潮生處鈔得之以為如此書庶無嫌乎為異且恐世人尊朱太甚一聞有異同便以為必無可採則深昧作者之意矣余故欲諗夫好學深思之士而與之共讀焉毋使徒篇不知者詬病云書學蔀通辨後己巳此書別朱陸之學之異較然明白學者熟觀之庶不為曲說所誤夫人而欲為陸氏之學亦第守陸氏之說可耳而必日朱子亦若是何居蓋篁墩陽明諸人雖陸氏是宗然亦知朱子之不可攻也不可攻則莫若借以自助於以搖蕩天下之學朱子者使亦俯首以就吾之範圍而莫吾抗若日子之師且不吾異子獨焉異之陸氏之學之所以盛實由於此而朱子之學幾絶自此書出知二家之學必不可強同陸氏之學實出於禪蓋終其身弗變也而朱子則屢變而始定故有始同終異絶無始異終同觀其援據詳確爬抉底藴而陸氏之為禪也信然吾怪夫人之惑固有不可解者近時人又有為陸子學譜及朱子晚年全論朱子不惑録等書不過復襲程王之唾餘而少變其說以為朱子晚年其學與陸氏合其論與陸氏異此語更齷齪不足辨顧反痛詆此書無知之人道聽塗說是誠何心哉書鶡冠子後庚辰鶡冠子十九篇昌黎稱之柳州疑之學者多是柳蓋其書本雜采諸家之文而成如五至之言則郭隗之告燕昭者也伍長里有司之制則管仲之告齊桓者也世兵篇又襲魯仲連遺燕將書中語謂其取賈誼鵩賦之文又奚疑近迭篇載龎子問聖人之道何先曰先人人道何先日先兵噫此可謂知道乎彼所稱詖淫詐遁者亦襲孟子語殆不能自免矣書陸農師解鶡冠子後丙申鶡冠子其人蓋生於末世而明於情事之變者也故其言日以利為情若不相與同惡則不能相親相與同惡則有相憎嗚呼何其辭之蹙也又曰萬賤之直不能橈一貴之曲此言其勢不足以相勝也然嘗謂君子者亦自行其志而巳奚論小人之愛憎乎我哉帥可奪也志不可奪也以勢而言賤固不勝貴矣然理之至是者自常伸於天地閒故曰斯民也三代之所以直道而行也如鶡冠子者蓋徒見其末而不循其本者也宋人黃東發斥其聖人貴夜行一語此又不可以辭害意也此即中庸言不見不聞之意也若其所謂無欲之君不可與舉者乃大謬爾陸農師解是書能增成其是而不回護其非其於小學功尢深故往往有依字形立解處最為釋書之善然泰鴻篇云物之始也澒澒至其有也録録俗本澒澒作傾傾陸便望文為說云傾傾未正之貌不知泰鴻取元氣鴻蒙之義自當以澒澒或鴻鴻為是陸解非矣頃因江都汪容甫向余借觀是書遂順取翻閲一過而後郵之其字下注或作某者多即其字之古文云聚珍版本鶡冠子書後丁酉陸農師注鶡冠子余巳為說書其後矣今年鮑君以文以武英殿聚珍版本贈余余覆閲一過與余先所得本無甚異其博選篇云樂嗟苦咄則徒隸之人至矣樂嗟苦三字本缺校者謂據他本增入案陸注云樂則嗟之苦則咄之其語頗與正文相合然余向見宋人黃東發日鈔載此句則是謳籍咄不謂樂嗟苦咄也又王鈇篇云家里用提注引公羊傳提月者僅逮此月晦日也提今刻作㮛校語云㮛一本作提今本公羊傳亦無提月之文余按徐堅初學記晦日條下引公羊傳正作提月是陸氏所見尚與唐時本不異今本公羊乃作是月後人將反以提月為誤矣又其罪有司而二其家本注有其人為首其家為二八字今本無之又參於兩閒四字本注在天子執一以居中央下而今以為正文又天權篇注引列子亦微有更動不似元文至凡一本作某字云云者此非農師所加其中有絶無義理者大可刪去館閣新出書余力不能購今僅有此當寶而藏之鬼谷子跋甲寅鬼谷子小人之書也凡其捭闔鉤箝之術祗可施於暗君耳其意欲探厥意指之所向從而巧變其說以要結之使得親悅於我膠固而不可離千古姦邪之愚弄其主者莫不如是彼豈待教之而後知學之而後能哉其用術一一與此書暗合未必皆見此書也來鵠有云捭闔飛箝實今之常態不讀鬼谷子書者皆得自然符契也兹言信矣及觀其施於常人亦必在於昏邪庸怯之輩其言日有守之人目不視非耳不聽邪言必詩書行不淫僻以道為形以德為容貌莊色溫不可象貌而得也如是隱情塞卻而去之觀此言是亦自知其術遇正人而窮也又其抵巇篇云世無可抵則深隱而待時此非遇明君治世所挾之術皆無所可用乎夫古大臣之立朝也以道事君不可則止耳焉有務為固結之術如此書所云者故曰此小人之書也或問曰如此則是書何以不毀曰凡夫姦邪之情狀畢見於斯為人主者不可不反覆留意焉庶幾遇若人也洞見其肺肝然彼欲以其術嘗我而我得以逆折之是助上知人之明也何可毀也吾甚惜其方寸之閒神明之舍惟詭譎變詐之是務而終不免於窮亦何苦而為此孟子云為機變之巧者無所用恥焉正若人之謂矣且其術亦有至淺至陋而􅍘不能轉移人者如遭淫酒色者為之術音樂之可悅謂足以移其所好夫聞正樂則唯恐臥安可以此語之必將說之以靡靡之樂庶或動之靡靡之樂適足以助其情欲耳其術不更疏乎是書余年家子江都秦太史敦夫恩復曾依道藏本繡梓為校一過今年甲寅始見錢遵王手鈔本乃知藏本之訛脫不可勝計內揵篇內至脫去正文注文其四百十有二字余亟借以補正之噫若使無此本不即以藏本為善本哉校既竟因為書其後書韓非子後丁酉商韓之術用之使秦強不知正乃所以速其亡也今當聖道大明之日其說之謬夫人而知之固不待於禁絶若非之辭辨鋒鋭瀾翻不窮人以其故尢愛之非之於說固其所專攻也如內儲外儲等篇猶今經生家所謂䇿目預儲以答主司之問者耳是本為明趙文毅校刊本遠出他本之上余向借之北平黃崑圃先生後先生以歸余乾隆丙子以凌瀛初本校一過閲二十一年丁酉借得馮己蒼所校張鼎文本乃以葉林宗道藏本秦季公又元齊本並趙本合校者因覆取參對改正甚多張刻本固不佳然其晦滯驟難曉處轉恐似本文趙本凌本乃文從字順安知非後人不得其解而以意更定者乎注傳為李瓚作不能盡知本意稍涉奧僻便置不說頃讀八說篇有云登降周旋不逮日中奏百趙氏疑當如左氏所云距躍三百曲踊三百之百解余以荀子議兵云魏氏之武卒衣三屬之甲操十二石之弩負服矢五十個置戈其上冠䩜帶劒贏三日之糧日中而趨百里以解此方合馮氏於崇禎戊寅一年中閲此書四過余隔草一年乃再閲遠不逮矣書呂氏春秋後庚辰呂氏春秋一書大約宗墨氏之學而緣飾以儒術其重已貴生節喪安死尊師下賢皆墨道也然君子猶有取焉秦之君臣曷嘗能行哉獨墨子非樂而此書不然要由成之者非一人其近墨者多也漢志謂墨家者流蓋出於淸廟之守淸廟明堂也此書十二月紀非所謂順四時而行者歟則漢志之言信也孟子尊孔子斥楊墨書中無一言及之所稱引者莊惠公孫龍子華子諸人耳世儒以不韋故幾欲棄絶此書然書於不韋固無與也以秦皇之嚴秦丞相之勢焰而其為書時寓規諷之旨求其一言近於揣合而無有此則風俗人心之古可以明示天下後世而不怍者也世儒不察猥欲並棄之此與耳食何異哉書子華子後丙申舊相傳以為晉人程本所為書名程子後更題為子華子凡十篇謂其人即孔子傾蓋與語終日者也劉子政校其書而悲其不遇宋人黃東發乃謂是豈有遇世之正學哉余謂黃氏於其書蓋未嘗觀其深也故其所取者特辨黃帝無鼎成上升之事耳此則應仲遠王仲任輩皆能知之而辨之何足以重子華子余獨取有道之世因而不為責而不詔二語非深知治天下之大體者焉能作斯語哉因而不為故在上無妄作之患責而不詔故在下無阿意之弊所欲與聚之所惡與去之因而不為也罔攸兼於庶言庶獄庶愼惟有司之牧夫責而不詔也君相之大道僃於斯矣是人也為政其庶幾成王道也歟劉向悲其不遇是也而黃氏謂其不然其所見之淺深固不同哉若其文辭之蔚然可觀抑末也是書無他本可校余以意定正數字且疑最後二章類六朝人所傅益之者後有讀者其審諸崔豹古今注書後辛未伏侯古今注見於史漢注中今其書巳逸惟晉崔正熊書傳爾首輿服次都邑次音樂次鳥獸次魚蟲次草木次雜注次問答釋義凡八篇舊止一卷今本乃三卷其輿服篇可與司馬紹統之續志相參考也輿服志云乘輿黃赤綬四采黃赤紺縹淳黃圭長丈九尺五寸五百首崔書作長二丈九尺九寸案下諸侯王二丈一尺則天子不僅長丈餘可知又綬者加特也崔書作特加也皆可以正續志之誤云此書卷帙甚約而脫誤頗多後又有一書名中華古今注太學博士馬縞所集其序云昔崔豹古今注博識雖廣逮有闕文洎乎廣初莫之聞見今添其注以釋其義目之為中華古今注勒成三卷稍資後學請益前言云爾縞蓋唐時人觀其所增不過數事而其書之脫誤殆有甚焉其次第亦普更易又獨不載崔書草木一篇未審何意又如乘輿即天子之稱而縞以為天子乘輿之制其所添注若魯陽揮戈烏鵲成橋之類皆非制度所繫又若改伍伯為部伍分莎雞促織為二條唱上乃行節而誤以唱為句其書疏繆如此不足別行然崔書之脫誤則藉以取正焉且擇其續補者若干條別為一編繫於此書之後其序所云廣初疑唐初之訛也乾隆十六年五月九日識玉照新志跋丁未宋王仲言明淸所著揮麈前後録及第三録餘話向俱鈔得之唯玉照新志未見善本今春過蘇州詣吳秀才枚士案頭適有此書乃秦酉巖四麟鈔之吳方山岫者几五卷其分卷與明人祕笈中本六卷者不同非缺逸也前後亦有互易字句大有異同秦之外孫孫岷自江復以元人録本對校之於是此書脫誤得補正十之七八矣余因假之至金陵淸寫一本以與揮麈等録同篋藏之向於詩話中見洪芻投竄海外而不悉其罪狀乃今於此書見之罪蓋不容於死者而僅從流徙當時之寬政如是然陳東歐陽徹與嶽武穆翻不得其死何哉仲言又有投轄録余尚未之見云乾隆五十有二年三月六日書書東坡志林後戊戌此書本謂之東坡手簡或謂之手澤而今所題者乃皆謂之志林此五卷單行者事各從其類頗便檢閲與全集中所載無小異也稗海本則有十二卷視此更多而不分類其次序先後不同論古一卷獨無之是皆從墨跡中掇拾而成者雖判語閒亦入焉以此知手簡之名之所由來也此皆安石碎金若論古則煌煌乎大文廁此殊不類余兩本皆為正其誤字而以稗海本為較善云乾隆四十三年十月既望後二日書湛淵靜語跋已亥始余見白廷玉是書紙墨巳刓敝文字脫爛致多斷續重是鄉前輩著作鈔而藏之篋中越三年從鮑君所借得一本書皆全唯序尚有闕文更一年復從鮑君所見一本並序文亦完好喜而録之遂成善本何義門取其辨饒雙峰論洪範五行一條謂能獨抒所得余則取其言士當愛名謂人苟不愛其名則悖逆很暴之事欲為即為矣欲為即為雖嚴刑重戮有所不禁故春秋一書正為名教使後之人恥惡名慕令名以相勸勉也其言如此有味哉余謂人之惡夫名者謂為一事而以善自與必將以不善歸諸人故好名為舉世所共嫉自非然也則名之在我猶影之與形實至則名歸猶形端則影正也使惡影之正彰於外也而故毀容易行以求免可乎哉夫子疾沒世而名不稱易傳謂善不積不足以成名記言欲為善思貽父母令名孝經言立身行道揚名於後世屈子恐修名之不立古人曷嘗不重名也無實之名名不可好從實之名名不可不愛立身一敗萬事瓦裂惡名歸之有欲蓋而不得者若快然自便其苟賤不廉之行而猶謂吾求免於好名之譏是致人之鄙我賤我怒我辱我而日吾甚畏夫人之愛我敬我也此豈可以欺童孺哉行已有恥恥則有所不為此即謂君子之愛其名也可吾安得起廷玉而一正之乾隆己亥十有一月十日坐北樓書書真誥後戊戌修練服食之事吾不能為也家有此書聊復寓目其書事興史傳相涉者頗差互不可考然吾於其中得要藥焉其曰念不宜多多則正散正散而求不病猶開門以捍猛敵此在吾尢為對證之方也志權勢營財利侈觀美極耆欲吾早巳淡然不嬰於懷巳終日所營營者惟在乎書策之閒壯年矢志欲取十三經諸史而全校之奪於人事至今未畢而年巳耆矣又經史外每見一書輒披閲盡卷乃巳常有顧此失彼之懼即一書中牽引衆書甚多是以千條萬緒紛綸交錯事有遺忘每費尋檢近來多病常為風寒所乘未必不由此也雖然世短意常多衆人皆有此病其為亡羊均也吾寧讀吾書終不願為頑仙矣乾隆四十三年十月二十七日書弟子江寧管鵬飛程萬校抱經堂文集卷第十
