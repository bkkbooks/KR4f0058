  text: 抱經堂文集卷第九
  hash: sha256:d101224f48e825597ca476ca60bf75573c2ba469a232d0e36c0d1ceef8637c84
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0058_SBCK_009-1a}
body:
  text: 東里盧文弨紹弓跋二書吳槎客所藏不全宋本漢書後汲古所梓漢書當是據北宋本此疑是南宋本誤字亦少汪文盛本殆亦從此本出今世所通行者顏注尚有脫落何論蕭該子京三劉而此獨全可寶也然余則謂設使當世有重雕者其款式自當依此其文字有􅍘然知其誤者不必因有宋人校語而反改不誤者以使之誤在擇而取之可也如是將使後人寶我朝之本轉勝於寶宋本多多矣余老矣槎客強力有餘當亟圖之余亦當蠠沒少佐其成焉竹書紀年統箋跋辛未歲辛未余館北平黃崑圃先生家先生門下士知名者衆顧獨詫癸卯主江南試所得三人曰任翼聖啓運陳亦韓祖范徐位山文靖此三人者其學皆博而醇且日人但侈榜中有狀元孰若得一二不朽之士哉任既宦達名益著陳徐亦並以經學徵陳老不至徐君年亦八十五矣健獨應徵此書乃其近著也一日徐君來先生令余出見先生家多客而獨徐見者此先生待余意不薄也他日至其館猶握三寸管低頭著書不輟云此紀年統箋者徐君所著書之一也紀年舊有沈休文注乃後人取宋書符瑞志附益之非注也今徐君始與之疏通證明疑者得以渙然冰釋然他書引紀年文自晉建國以來以晉君始立之年為元戰國時則以魏君始立之年為元而今本皆一以周王之元為元疑後人改之非其本真也然各本並同亦無由復其舊矣史記注中又往往以年表為紀年非此紀年也昔譙周作古史考以糾史遷之謬司馬彪條古史考中凡百二十二事為不當多據汲冢紀年之義今余方著史記續考證未竟得此書以相參覆庶可無憾矣題越絶後辛未此書為漢更始建武之際會稽袁康之所作又屬其邑人吳平定之觀其篇中離合姓名而知也而王仲任論衡案書篇稱會稽吳君高之越紐録向雄不能過越紐即越絶君高即平之字無疑則以是書專屬平所撰矣其首篇乃託之子貢復託之子胥且以小藝之文未足自稱為言其所載略與吳越春秋同蓋雜採諸書而成故往往有異文駁義如伍胥又以為申胥逢同又以為馮同類參錯不一康行事無所考然由此書以想其為人蓋其生適當雲集龍鬭之時負其奇氣欲有所試而卒不為人用故無所表見於世乃借胥倪種蠡之事會萃增益之以發抒已意云爾雖其自言欲竊附於春秋而實不離乎短長家之餘習其文奇而不典華而少實且亦多庸猥煩復蓋其辭又出國䇿下矣豫偶得明張佳嗣校槧本後又得吳琯本相參校吳本有脫文張本皆就其闕補之至不能補者乃作一方圍豫意所脫必不止是吳本僅空一字者乃轉寫既久失其所脫字數故耳不當僅作一方圍於中也乾隆十六年五月三日識越絶外傳本事第一越絶荆平王內傳第二越絶外傳記吳地傳第三今本次第如是然案本事篇以越何不第一而卒本吳太伯為問其末篇又云始於太伯次荆平次吳人次計倪次請糴次九術次兵法終於陳恆是皆以太伯為第一案吳地首稱太伯當即此篇然今本次在第三其下次序皆不相應豈為後人所貿亂歟其最無理者如稱舜用其仇而王天下仇者舜後母也鄙倍至此他如論堯舜不慈孝皆不可訓舜不聞有兄獨此書稱舜兄狂弟傲可以廣異聞云舜後母下或當有弟字但有庳之封在有天下之後與所言亦不合中興館閣録續録跋丁酉古人居其官則思舉其職前事之不忘後事之師也余雖忝竊淸華而當其時不能多購書若洪氏之詞家諱改苑羣書亦解組後所傳録也今又得此書復校而録之年六十有一矣玉堂天上余之徘徊慨想情有倍深於歐公者顧不能成一書以頌揚本朝列聖恩禮之盛常用內疚秀水朱竹垞氏有瀛洲道古録亦未之見此書宜在所取材者也卷或脫亡篇第疑亦有顚錯無所取以補正遊似楊万里之名自是本來如此他人則有作似作萬者而此二人獨不爾可據之以正宋史也書釣磯立談後丁酉此書南唐國亡後記其興衰之概不知何人著或云是史虛白其自序云叟山東人清泰中隨先校書避地江表父子皆不以進取為念書中有云山東有隱君子者與韓熙載同時南渡以説干宋齊邱齊邱引以見烈祖擢為校書郎不能用其言也於是放意泉石遂卒不仕此殆即其先人歟是書於忠佞功罪之迹可稱實録徐鉉等撰江南録誣潘佑之死以妖妄叟雖未見其書而疑其必有曲筆為書佑以直諫死使後之人不信其謬悠其用意抑何至也序云得百二十許條今計之祗三十條然要領巳無不盡且相傳止一卷未必本書多於此三倍也曹氏刻本多訛脫此本為何小山所傳較完善因傳録之夢粱録跋丁酉宋南渡以臨安為行在所其後乃遂安於是也朝廷之儀式與夫里巷之風俗日增月新殆將跨汴京焉是書為錢唐吳自牧著當宋社巳屋而為之追述其盛題云夢粱意可見矣序無紀元而但書甲戌若在咸淳則故都尚無恙也閲一甲子則當在元順帝時斯時元之為元不猶夫宋之季世也哉汴亡而夢華作其地巳淪異域孟氏特仿像而得之今兹所紀則皆耳目所素習者鐘虡不移井邑如故凡夫可欣可樂之事皆適成可悲可涕之端作者於此殆有難乎為情者焉浙江通志載此書十卷者非全本今從蘇州吳伊仲秀才翊鳳處借得此書二十卷乃足本令人録而傳之脫誤尚多惜無別本參正云書歸潛志後丙申此書記金源人物文雅風流殊不減江以南即一二諧謔語亦多有可觀讀者皆知愛之余謂京叔際危亂之時國亡之後幸而完歸追述交遊聞見以著為是書修金史者亦頗取裁於是乃其論一代之盛衰與其所以亡者實為確當可為後來之龜鑑其言曰章宗政令修舉文治爛然稱極盛矣然文學止於辭章不知講明經術為保國保民之道又頗好浮侈崇建宮闕外戚小人多預政大臣惟知奉承不敢逆其所好故上下皆無維持長世之䇿此所以啓後嗣之弱也噫金之盛衰相倚之幾此數語者實盡之矣又自言經喪亂後乃識溫飽安逸之味斯言也亦可以醒人人誠能知此則躁擾之胸可平而奢競之緣亦無不可淡矣真閲歷有得之言哉録竟因為識數語於簡末兩漢刊誤補遺跋甲午曩余讀漢書見監本所載宋人校勘語大率淺陋居多甚有鹵莽滅裂不考原委不究體勢於本無可疑者而亦疑之刪改憑臆傳布至今館閣有考證之作駁而正之未盡也余嘗思前人豈無見及此者今得吳斗南兩漢刊誤補遺讀之而不勝躍然喜也吳氏自以後進不欲斥言前輩名公之失而曰補遺不曰糾繆此其用意良厚於劉氏離句之誤則曰或傳録使然蓋雖辨駁之中而仍不失謙退之意其所徵引鑿鑿皆有據依又可通於他書蓋不僅史漢之功臣三劉之爭友也惜重校經籍刊刻時未及見是書故所載一仍監本之舊而於此書未嘗稱引及之世之知此書者絶鮮余乃今見之始知後人果不可輕量前輩也所借本多訛字余稍為正之而後録之儻與我有同好者欲為傳鈔余不敢靳至斗南出處已見秀水朱氏跋中兹不復及云新唐書糾繆跋辛卯此書言新唐書之修也其失有八誠後代作史者所當鑒也中間糾正書事不實體例不當處固難為歐宋解然亦有率意抨擊絶不細審其前後語意者今略舉數條於此如武惠妃謀陷太子瑛張九齡執不可時九齡巳為相妃故但諷以宰相可常處不云宰相可得也太子之廢在九齡罷相後故云卒九齡相而太子無患正言終九齡在相位日太子尚不廢也吳氏乃誤解卒九齡相如云卒以九齡為相又誤截太子無患句不復與上文相承遂譏云太子竟廢死安得云無患哉此誤糾者一李栖筠傳有方淸阻亂一節吳氏譏云栖筠是時為常州刺史且無討伐之職而方淸自是蘇州土豪依阻黟歙詔自委李光弼討平與栖筠無所干預何為乃見於其傳乎此當載之光弼傳也案此亦吳氏不細讀下文之過此段乃事之緣起非正敘方淸也案栖筠傳詔李光弼分兵討平之下云會平盧行軍司馬許杲恃功擅留上元有窺江吳意朝廷以創殘重起兵即拜栖筠浙西團練觀察使圖之此其所以載栖筠傳也方淸之亂帝特使光弼分兵討之許杲即其所遣之人矣光弼並不自行何云當載光弼傳乎此誤糾者二又張孝忠子茂宗詔尚義章公主孝忠遣妻入朝為子親迎卒於京師遺言丐成禮此情事本極明白吳氏乃誤疑亡者為孝忠前妻其入朝者為後妻旋又疑亡者未久而孝忠不應即娶朝廷亦不應以妻待之史官亦不應以妻書之謬悠可笑此誤糾者三亦有因一字筆誤過於辭費者如李泌辭大學士云張説為之固辭至崔圓亦引説為讓而止此皆泌之言也引説誤寫引泌吳氏遂疑其脫字必多全不可考即明知其誤如蕭嵩代張説因與李鋭文相涉説字亦誤作鋭而吳氏糾之凡三百八十餘字不太辭費乎然其論之正者則固未可沒也余初借得本其序文首一葉不知何人偽撰後又借得完本乃從海虞趙開美校刻本影鈔者序及表皆完然末卷柳宗元傳以下六條失其本文復雜取他卷中巳見者綴其後余故剃之俟他日讀新唐書案吳氏之目以尋之或尚可得也乾隆三十六年七月庚申鬯菴盧某書後得吳中舊鈔本遂補全咸淳臨安志跋丁酉始余之鈔是書也不得善本求之他氏亦復然更一二年間友人鮑以文氏乃以不全宋刊本借余向所闕六十五六十六兩卷獨完然具僃余得據以鈔入雖尚闕第六十四第九十及最末三卷然視曝書亭所鈔則巳較勝矣宋本前有四圖但字巳多漫漶余請友人圖之其依俙有字迹而不可辨者余以方圍識其處又校對其文字異同始知外間本刪落甚多顧力不能重寫則以字少者添於行中字多者以別紙書之綴於當卷之後且注其附麗本在何處庶來者尚可考而復焉噫世間之書若此者多矣書賈圖利往往妄有刪削以欺人其流傳甚易真本益微矣古人以讀書者之藏書為最善其不以此也夫嘉泰會稽志跋甲午會稽志二十卷以陸務觀序考之當時郡大夫與鄉之人士共事於斯而始終之者通判施武子宿也務觀亦與焉余既鈔得濳説友咸淳臨安志因並鈔是書為其無別於後來諸志本其書成之年標其目曰嘉泰會稽志猶臨安志之稱咸淳也武子嘗注蘇詩高出王龜齡之上至今學者重之務觀文筆尢為南渡宗匠此書詳簡得中紀敘典核臨安志尚有諂權姦揚己績之失而此無有要非施為主而佐之以陸不能鑒裁精當若是武子嘗知餘姚縣修捍海隄此當直敘其事使後來者可圖其繼不可與自功者一視文弨先世由餘姚遷杭州故於此二志尢鄉邦文獻之所繫不敢不惓惓焉又梁國張淏有續志八卷今書後僅載其序而其書不可得見仍當訪求補録以還舊觀此外郡之隸吾浙者尚有九考之於宋志嘉禾者有嶽珂志吳興者有談鑰志四明者有羅璿志赤城者有陳耆卿志東陽者有洪遵志信安者有毛憲志新定者有錢可則志永寧者有陳謙志栝蒼者有樓璩其書或在或亡不可悉知儻或得見猶當傳録之近代所修皆詳於今而略於古則欲知古者於舊志曷可少哉乾隆三十九年歲在甲午冬至前一日書蠻書跋戊戌蠻書十卷唐安南經略使蔡襲從事樊綽所録以上進者也凡管內山川道里以及詔􅚲等種族事迹風俗物産一一可考其書久失傳四庫館新從永樂大典中鈔出以行世乃得見焉嘗謂夷蠻為患未有不由中國失撫馭之所致也綽以一從事而明目張膽敢歷舉前政之失以上聞可不謂忠於為國者哉其言日自大中八年安南都謢擅罷林西原防冬戍卒以致洞主李由獨為蠻所誘乘釁而起又言李象古李涿相繼誅剝令生靈受害又言數年之間當州鎮釐革南詔入朝人數郵傳殘薄以致入寇本使蔡襲全家並元從悉殞賊所綽亦中箭攜印浮水渡江其長男韜及家屬皆陷蠻陬綽之進此書也實望廟堂鑒前轍而籌長算焉實亦後世之所當奉為蓍蔡者也此書多脫誤雖略為是正而無別本可對意終歉焉然如閣羅鳳之世次則可以正新唐書之誤云乾隆四十三年八月八日坐可怡亭書書西藏見聞録後甲子西藏古吐蕃地也唐宋迄明叛服不常獨向化於我朝最早百四五十年來恭順不暜列聖之所以攘其寇害恤其患災而休養生息之者雖在萬里若門庭然雍正間懲準噶爾之擾使大臣良將鎮撫之峽江蕭君名騰麟以韜鈐成進士宦川北乾隆二年以副戎移駐其地之所謂槎木多者蓋西藏之門戶也治軍暇為詳紀其土地物産風俗之殊異為二十門以括之名曰西藏見聞録令嗣錫珀梓行於世頃以示余昔漢班勇威行西域而其所記諸國事迹范史即本之以為傳君之書其不然乎然余獨於書中見君澤及枯骨一事為之憮然感肅然頌君之仁焉其俗人死刳剔之屑和之以飼犬此猶必有財者方能使人為之貧者則棄之溝壑君至募番人拾二十餘簏瘞之高阜以後月一行之在鎮五年所瘞不知其數始則土人相駭以為異事君導以天性之愛聳以律法之嚴久之其人意惻惻亦若有動者逮君之去若失慈父母然於戲君不以異俗難化鄙其民而欲以王道漸移易之此其運量為何等也軍旅之治斥候之謹不足以盡君即文墨之兼優者亦豈足以為君譽哉嘗思人性不甚相遠而每囿於其習苟能動之以天良示之以禮教不必聖人而始化也在昔邉徼之地若交趾九真之在漢時固亦不知禮法自錫光任延為之守而俗一變史以為領南華風自二守始君以武臣能上體聖天子仁覆罔外之德意引其孝慈惻隱之善性而陰消其鷙害獷悍之萌此其識甚大而遠而綏輯砥定之功乃在於無形也使當二守之任豈不能為二守之所為哉余故表而著之使來者知所慕焉水道提綱跋丙申此書天台齊息園先生所著也先生名召南字次風乾隆元年中博學宏詞科入詞林命課諸皇子讀墜馬骨幾折以禮部侍郎致仕主浙江敷文書院講席最久以族匪連逮訊明釋歸未幾卒此書二十八卷先海而次及諸水於諸水先經流而次及支流之巨者至支中之支則附見焉自畿甸暨天下郡縣藩衛凡聲教之所通者罔不尋源訖委秩然具列兼以度之東西極之南北較其差數則尢為易考也昔鄭漁仲謂志地理者必以山水為主以郡縣可更而山水不易也然水之性容有不常者加以名稱古今各别非確然有證者固亦不能定其為即古之某水也是書支分條析絲聯繩貫有證者實之無證者疑之人以為先生第取各郡邑志而輯綴之然其中亦有正郡邑志之誤者則歷代之史與夫諸家地理之書罔不參考可知也至其兼天以言地則更出於漁仲所見之外矣第臺灣在閩海外而先生敘次稍不如粵東瓊郡之詳則亦似尚有當補者至於蒙古部落等名新有更定先生不及知之矣他如僧哭勒河當為僧枯勒河哭路鄂模當為庫路鄂模諧音取字宜有趨避不便襲用舊文至書中有岙字當即嶴字之省文集韻有岆字又有字當即站字之俗體嶴字亦字書所無古但作奧而今吳越閩廣間或加山或加水見於名人著作者不一而足故今亦不得而削之今人名傳置之處日站亦非古訓然字實未經見字更有或脫或訛以余所知者增正十餘處是書刊於其門下士浦江戴君兄弟殿海殿泗以其本貽余故得而卒讀焉若戴君者可謂不負其師者與書徐霞客遊記後丁酉霞客遊記楊文定公有手鈔本余前在江陰其家以臨鈔副本畀余置之篋中不暇竟讀也今年徐之族孫筠峪鎮刻成十大册各分上下又以貽余余老矣無能遍遊宇內名山大川聊以此作臥遊是不可以不䜋霞客性好奇誠未免太過而能見重於黃石齋有某鄉官欲與之相見知其魏閹黨也避不往莫酋據歸順鎮安兩土司之地而慨當事之姑息貽患又覩緬甸之強有深慮焉則其負性直介而又非全闕經世之務徒為汗漫遊者比此記所遊歷直書即目非有意藻繪為文章也知言者亦正以其真而許之然大約類形家者言為多霞客之遊裹糧無多屢瀕於困而迄獲濟疑若神助其記巡按官一遊洞而居民受科斂之患費金二百山水之趣誠非高牙大纛者所可兼而有此又在位者所當聞而知戒也筠峪合諸本相讐校洵善矣而繡梓尚未盡工緻也卷之前元本間有揔敘其所歷以為提綱者今刻本去之似少睂目雞足山志中諸詩及石齋諸公之詩凡鈔本所有者似亦非後人所當削也削之則仍非全書矣余故仍以楊氏所貽之鈔本為善本云城東雜録跋丁酉吾杭人也既冠即客遊不能久居於杭親炙鄉前輩之餘論又無暇網羅遺文墜事以僃一鄉之典故今忽忽老矣意殊慊焉此城東雜録二卷乃厲樊榭徵君之所輯也徵君居東園在杭城之東故所録亦因以為􅍘吾祖居在東里坊其北則艮山門其東南則慶春門於東園最相近桑韜甫先生之居在焉先君子從幼往來里人有雙先生之稱後之人有續録者亦可以為東城重矣吾祖居即所謂數間草堂者也今吾弟居之而吾終年旅羈宅猶未卜憶曩從韜甫先生客中讀杜詩至過客徑須愁出入居人不自解東西之句恍然即東園風景也故鄉殊可念倘有惠我買山資者吾其就東園以終老乎書録解題跋丙申直齋陳氏書録解題二十二卷四庫館新從永樂大典中鈔出以行其持論甚正如顔氏家訓以其崇尚釋氏之故不列於儒家又以前志取樂府教坊琵琶羯鼓等書皆充樂類與聖經並列為非當入於子録雜藝之前又言白玉蟾輩何可使及吾門其人殆稜稜嶽嶽識見大有過人者不獨甄綜之富考訂之勤也陳氏名振孫字伯玉湖之安吉縣人嘗倅莆田宰南城守嘉興台州端平中為浙東提舉治會稽是書中一一可考見馬貴與既取其書以入通考而不用其言顏氏家訓仍列儒家樂府雜録羯鼓録仍列經部而目録一門又不將陳氏此書載入其能免於紕漏之譏乎乾隆己卯余讀禮家居友人見示此書僅自楚辭别集以下而其他咸缺焉乃秀水朱氏曝書亭鈔本也今距曩時十八年而始見全書殊為晚年之幸陳氏未嘗入館閣僅據其所見以為是書故卷數或多或少不必盡合於國史又鼂氏讀書志有袁本衢本之異通考所載乃衢本而海寧陳氏所梓者乃袁本又通考有元至大間本本朝有武英殿本兩者皆勝他本今校者似但據俗間本也余客居鍾山幸以課讀餘間少為補綴幾自忘精力之不逮前矣新訂書録解題跋戊戌此書外間無全本久矣四庫館新從永樂大典中鈔出分為二十二卷余既識其後矣丁酉王正復得此書子集數門元本於知不足齋主人所乃更取而細訂之知此書唯別集分三卷詩集分兩卷而其餘每類各自為卷雖篇幅最少者亦不相為聯屬余得據之定為五十六卷元第詩集之後然後次以總集又章奏又歌詞而以文史終焉其他次第並與館本無不同者其雜藝一類校館本獨為完善余遂稍加訂正而更鈔之余自己卯先見集部元本越十九年而更見子部中數門則安知將來不更有並得經史諸類者乎取以證吾所鈔者庶有以明吾之不妄為紛更也巳弟子仁和王崇本復初校抱經堂文集卷第九
