body:
  text: 東里盧文弨紹弓書一上桑韜甫先生書戊辰文弨再拜楊許州至得先生書蒙示中州遊草一帙喜甚急欲知道途間事粗讀一過覺情景了了在目虎竹年少詩之工巳若是霖潦彌塗更唱迭酬興不少減有以知先生之樂也文弨自聞先生之教私願杖履所到必往從焉乃不意八年之久不得一覿事勢阻格不能自拔每至昔時講習之地思師友聚處之樂邈不可得未嘗不徘徊歎惋自傷年日以長而不能竟其所學若何而可以自立也自先生之至中州也道里近音問可速達然知先生之於文弨望之深必將知其近所從事若何所得力若何其見於議論文字又若何而文弨之所大慙正在於此昔孔蔑嘗言仕有三亡而子賤獨否文弨今日不幸與孔蔑之言適相似也繕寫官書計字為率日當得一千五百敝敝於此何暇為學且古之為貧而仕者蓋將以祿養也今文弨力不能迎養是以居常少歡文弨行能無似無以動人又不能求當世賢士大夫而與之周旋孑然寡合以是益增其孤陋即有一二志趣相近者又皆為職事所羈束不得朝夕見夫既無為學之時又為境所纍而不能自力於學更無人焉共勉於學是則終於失學而巳矣此文弨之所以內省瞿然不能自寧者也近日略得間可讀書然不能如古人專讀一書之法讀經亦兼讀史先為之分句讀正訛脫偶有筆記非其大者以俟再讀然後求詳焉內府校定經史善本非力所能購亦無從假諸友人至耳目所觸未嘗無勃然於中而欲宣者而弗工於辭不能達吾意之所欲云展轉移時旋即銷滅昔歐陽子嘗歎言之不可恃是固然矣然傳不傳雖不能自必獨不可藉以自娛乎其上焉者不可驟幾其次又以為無益而不為未見計之得也文弨竊有意於此而能厲其氣使弗餒者唯先生願終教之與桑虎竹繩箎書戊辰承示新詩若干首鋒鋭如干將莫邪何可當也持與此間知詩者共讀之雖足下進而未巳無急於名然有美不彰吾之意有不安者非夫人之能重足下也實至而名自隨有不可得而終辭者矣夫詩之為道非雕琢曼辭以取悅於世而即可為詩也殆必由乎至性之所發而後乃為真詩今足下之至性吾見之於詩矣足下之侍親來河南也遇雨相失倣徨達旦此時豈有意為詩而詩乃自然流出先生亦嘉子之勤而見之於詩者又彰彰焉然則子之為詩皆發於性情而不能自巳焉者固宜渢渢乎其可誦也文弨八年於外不得事吾親又不能承其家學勞擾困踣幾無生人之趣雖欲諧聲律工字句以自列於作者之林亦難解於至性之薄矣年來自傷貧窶無以為養呻吟大息之作亦時有之然以視朝夕在膝下其幸不幸為何如則其言之工拙固有不必較者矣吾是以甚慚於足下且常人之親願其子富貴而意巳足也足下之親與吾之親所以願其子者雖得富貴意殊未慊也今吾獨營營衣食是急而不能盡力於古人之所謂學工為文章時出一篇以為親娛亦不可得足下其謂我何哉嘗竊思之富貴命也學問則人所能自力耳然亦必藉師友之助焉吾欲於明年請假來河南既得聞先生之教又兼以足下自勵也與薛澱山洪書戊辰文弨頓首澱山足下自隔音問三年於兹矣足下具過人之才而復奮志於學得友朋之樂且不為職事所羈則時皆我之有也足下之於學也其成矣乎嘗慨聰明有志之士世故不乏或為外物所牽又無明師良友為之助往往中道廢不克自振以可為之時擲之無用之地其後雖欲勉自收攝求為炳燭之明而精力巳銷亡耳目巳敗壞不能復有所為矣文弨自少時即知學之可貴也足下從吾父遊吾父時時為文弨稱説足下之好學則益自激發不巳足下與我相識意亦似可與共學時方汲汲於科舉之名私以謂吾姑取此而後從事於學乃無分吾志然古人之為學豈有是也此念一誤録録十年餘屢躓於有司之試一第曾不可得而學荒矣時已去矣足下前與我書教我讀書之道當動靜相調此朱子之説也吾受而謹識之乃今所處有萬不能行者蓋人以讀書為動而以靜坐時為靜也吾則以應事為動而以讀書為靜靜坐時安有乎足下又盛稱田傅二君之為人而樂與之友然則足下既得為學之方其時又可為又得同志之友相引翼學之成也吾為足下信之矣懷土之念人情不忘況此地二三好友逝者電滅在者星散吾安從得益乎與足下相見當不遠幸於諸君子前先道我願交之意他日談道論藝所與數晨夕而共遊處者必於是乎取之矣道遠情長不盡覼縷答陳警唐一傑書戊辰文弨頓首警唐足下令兄來京得讀所惠書慰誨兼至足下之關愛甚深也文弨之試於禮部至是而四矣初不敢懷一僥幸之念以冀其或有遇也固亦嘗肆力於是而求正於先達卜所業之中繩墨以不其視昌黎之自謂可不學而能固大有間矣今年所試之文頗小稱意而友朋亦雜然同聲許為必售榜發被黜人或疑余之不能無慍然此之得失亦何足道余固不以是介介也有謂余者曰子之言不慍妄也子有親在而名不成仕不達將何以為親榮其焉得無慍是則固然然僕亦知其不必慍也何也凡售而驟躋於顯列不過數人而巳其或不幸而旋降罷以去者比比也文弨不得進於是列職業易稱得安享其祿之所入且不至如古者鎖廳之法一試不中輒去官是文弨今日所處正吾親所得免於慮也而又何慍焉抑吾聞之荀子良農不以水旱輟耕良賈不以折閲廢市學所以為己也非為人也如不得於名而不學是兩失也竊有所未安焉近者稍得暇取經史兼閲之以經為律令格式而以史為案辭此文弨近日之所為學也然則謂僕遂無意一遇此亦不然要之固不足以是為憂喜矣文字之敝近來為甚夫文將以言聖賢之言也而今乃以兒童駔儈之言雜入之而恬不為怪夫兒童駔僧之言與聖賢之言豈待辨而知哉而世且寶貴之大可怪也昔曾子固不中而歸歐公為文送之稱其不非同進不罪有司思廣其學而堅其守今僕非敢非同進也罪有司也恐後生狃於聞見且將為人心風俗之蠱朱子所謂文字亦極有關繫者此也故願與有識者共明之非足下吾亦不輕以語之也與張東之弟孟陽書戊辰僕在京落落寡交所敬事者惟長民舅氏一人而巳自其以葬事歸復來京師過從益密方增益我之所不知而督我之所不逮不圖天不假年中道摧折其為痛悼若何可言舅氏生稟異資讀書能得古人之意為文雅潔有法詩宗盛唐名家中晚以後纖佻修染之習勿屑也舊歲為老親在堂思博一第與僕偕二三友人共攻應試之文而獨善僕之所作嘗曰文有俗韻雖工不貴也今吾與若庶幾免是乎同年王君立齋每見僕必云爾舅淸羸如是而子與之為文不休是速之死矣僕時以謂何遽如君言今不幸其言中然舅氏之死固不可謂死於文也其始病也貧為之祟也其病之至於亟也醫為之鴆也舅氏善為議論縱橫揮霍率嘗屈其座人與僕同居日常談至夜分不休母夫人遣婢傳教止之乃散去間嘗與舅氏語相者謂甥年殆不滿四十倘其言信則為期不遠矣舅氏笑而語僕吾與甥縱自知不及期頥耄耊猶當過強艾耳今憶斯言不自覺其驚痛之交集也將試之前月在同年祝君豫堂所會文既成色慘沮不樂曰此不祥之徵也遂內其文不出而評騭諸人文字某甲某乙而謬賞僕文為最未幾又集同人為文是日僕苦思致不屬自知文不佳而舅氏之文先成狂喜自矜以為絶調然僕視之實不逮他日所作因即為掎托其利病舅氏頗不以為然相搘拄不少下旁人幾疑其失歡然亦可見余兩人唯親厚無間故若此也中間遊從之樂頗多不能詳説舅氏為人略見僕所作行狀中巳寫一通寄歸想見之也近者老幼八口焭焭京師南方無室屋可棲止勢不得不暫寄於此賴舊交世好之力稍可支吾目前過此則不可知也嗚呼舅氏之道誼學問蓋非獨張氏之良而巳儒林中咸惜此人則羣從子弟其惋痛當更何如也人必聞正言見正事然後可成其德則如舅氏者方將以為後生小子之所則效而奈何其遽死也後起者為誰東之可不自奮耶文弨與舅氏親洽之至故即一二瑣屑談諧之事亦有不能忘者舅氏既自知死徵則日前之所以語僕者其毋乃故謬其辭以相解歟死非僕之所懼但懼無可以死者耳悢悢之懷言不能罄十一月七日文弨白與僃三大兄壽朋書戊辰弟年來苦無暇日親知往還之書絶少精神疲於酬應遂不能強之復作人但知京官事簡外官事繁不知京官所治之事無有不躬親者非若外官之有佐助者也至若往來慶弔雖視其人為繁簡然即至簡亦有不能盡絶者此亦何異於上下奔走之僕僕也故昔之為仕者往往反致羡於山林隱遁之士為之流連贊頌而不能巳豈故為是言以相謾哉彼實有所苦而其勢又不能毅然舍之而去乃不得巳而宣之於言則皆其情也非偽也以大兄之才久困於鄉而不才如弟反得竊升斗之祿於京師以世俗觀之鮮不以弟之所處為勝於兄然平心潔之弗如也兄未嘗處弟之境當不知弟之此言為誠然近者以久次之故稍就間地值纂修玉牒得與於繕寫八人之列弟書不能工而能速以此獲少暇得以讀書昨歲聞喪嫂氏知兄何以為情嫂氏之賢能以弟耳目所覩聞未有能過者也兄之廉介淸苦而嫂氏安之以故不損兄之高兄之剛直易忤而嫂氏順承之無有違言之達於外以一人之身理中饋治女功兒女林立緝糿補綴敝而能完此豈世間閨門弱質之所能獨任者而嫂氏為之綽有餘力其安貧食淡盡罄其嫁時之奩而絶無幾微怨尤之色且不志非分之得至使童稚皆率其教人或與之果餌則慚此尢為難能也文弨大母在日嫂氏時以飮食相遺行步則為之扶持大母念文弨在遠則哭泣又賴勸慰以解此更文弨所切切於中不能一日忘者也聞喪之日弟與弟婦俱痛悼纍日盛德之所感如是念諸子皆幼其小者更難提攜相去三千里弟婦不能為任撫育之勞常用內疚然諸子中後必有興者天之報施善人固不爽也與從子沂州守石林憲觀書戊辰信至具悉近況甚慰遠念公事倥偬自倍於京朝官愚雖非履之而知然實信其難為也曩者咸謂京官貧而事簡外雖繁而祿入之數稍優差相當也今也簡者未必簡而優者亦豈優乎愚奔走殿廷職業之外無分豪裨益國家誠不如得一令丞簿尉尚可以及民而為效於國家也今石林所處則既尊矣而其及民之廣非復令丞簿尉之可比所以為民者即為國也知石林之心亦惟知有民而巳必不屑屑計及於祿食之多寡與憚其任之勞也汲長孺薄淮陽而欲為天子拾遺補過之臣今日居長孺所故為之職者每多卷口結舌曠月逾時始托一二瑣屑不急之事以塞責天子既巳薄之而舉世亦竊相笑也既不可為名而又無以固乎其位吾意今之欲得淮陽者必比比也石林前以試當得御史而出外居郡若左遷然者然今則御史之能者乃得為郡耳不可與前時概論也勉盡職事餘無他屬與從子掌絲世綸書戊辰九月十六日得書知眠食無恙良慰余意書中具言近日讀書勤苦尢吾之所樂聞也但精神難支持亦不必勉強以掌絲平日善病恐過用難為繼耳所疏不知出處及疑義若干條具答在別紙此士安所謂遭人而問少有寧日者也掌絲之虛懷而勤力也至矣雖然吾竊以為更有進焉者蓋人之為言皆曰學問將學焉而繼之以問邪抑問焉而即以是為學也夫寡聞寡見之蘄至於多聞多見也有道焉得其道則耳目可以不勞思慮不至厖雜而其為功也易近世類書頗多又諸文集亦多有注釋箋解然則讀書之易宜莫如今日然吾以為殫見洽聞之助不在是也蓋巳經翦截割裂於事之始末語之原委必有不能通貫曉析者矣今以掌絲之資性日力計之吾不必訹以高遠難行之事六經之外如爾雅説文史記漢書皆所當讀也然後博覽羣書其不解者鮮矣此言初聽若迂然吾為掌絲細審之事無有捷於此者且不必遽為程限但日日讀之一卷畢則此一卷之事與言見於他書者自一覽而得也推而數卷至數十卷莫不然初可以省問之一二繼可以省問之五六又繼可以省問之八九矣苟若是則其用安有窮哉然此猶為記誦言之也若夫以之明理以之處事則所得者益不可以數計此事逸而功倍之道也不然則掌絲數月以來所不知者豈盡於此乎吾所縷析以答者能一一記之後不復問乎同一事也而出於人之所援引者又各不同其能明乎此而即無惑於彼乎吾是以深嘉掌絲之好問而尢願掌絲之好學也掌絲果從事於吾言則其於問也亦必有更進於此者矣與金崞縣天來潢書戊辰天來足下別後久不得書事定劇也京官雖不若州縣塵勞然得間亦絶少吾輩占畢習氣至此皆不能不少損也此時冬寒日短從王牒館抵家大率巳曛黑矣飯訖稍處分家事即取舊所讀書就燈下讀日力有限不能泛濫羣籍近來性亦厭雜聊溫故使不遺忘而巳婦抱幼女在旁女半歲略識睂目向子嫕婗欲語豫取置諸膝女似喜讀書聲謂若豫與之語者然久之漸不耐跳躍轉側不可抑按乃抱之徐徐行覆誦所讀書有不接續處即開卷正之腕力倦則還其母兒早睡豫讀書至寢以兒醒索乳為候則夜巳過中矣偶有所見隨筆記之惜良朋在遠不能是正耳僕之仕不可以為仕故第區區以其學為學若天來所處則仕中即有學不必更求其所為學吾於天來交最深相別幾一年寧無所以為天來告者然以未嘗經歷之事憑臆揣度勦襲陳説指畫其如此如彼非所謂強不知以為知乎且天來明達果􅍘其於政體亦何待告也然則僕遂無一言乎僕之所欲言者欲天來為所當為而毋瞻顧牽制以入於揣摩之習而巳矣蓋仕之通塞命也非人智力之所能為也知其為命則不足以榮擾而唯盡吾職分所當為之事吾未見世皆以軟媚進而以正直退者也未見世皆以武健進而以循良退者也且觀天來巳事之驗可以知命矣諸兄咸以甲科顯而天來曾不得一第豈其文之不若邪又嘗兩就榷鹽之職皆在選中親朋惜君之才咸以説沮君君前則以病辭後則吏部業以名上次日當引見而適遇改期乃又以病自免當是時人咸私相指目謂以君之才寧有不以文學顯者又有謂君於外吏第不就就則取之如寄耳君言語動作皆有矩度屢當主選者意他人皆不及君也會選人往浙江天來樂其山川風俗之美欣然就選期在必得既與矣復不得命視天來意若不釋然其時吾亦為天來曲解當必為文學待從之臣故且靳之於此以今觀之則凡人之所料卒無一當得失之際能自為乎命之説夫人而知之而能言之矣然安之者絶少吾無暇援引古義即以天來之往事思之安得不信吾言力從事於其所得為而毋敝敝焉以所不能為者自役則政之成也非天來所難矣迂愚之論謹以為良友告幸垂采擇與侍讀申笏山甫書辛未文弨趨走內閣忽忽巳十年每欲撰舍人録一書恨見聞淺陋又鮮同志之助久而未就近始見真定梁愼可所著內閣小識差可見明末及國初制度不知如此等書世復有幾當訪求而􅡔輯之博洽如笏山當有以益我所不逮也文弨之為是書祇就見在職分記載且録今昔凡為是官者之姓氏其行事可考者並附著焉固不敢旁溢一語於其外也雖然必使後世循其文而考之可以見政治之得失焉相臣之優劣焉其一時風會俗尚與其人品行之高下美惡皆可燭照而數計則其書乃不為徒作歷代之設是官皆稱淸選諸曹簿書期會日不暇給而此官尚不為吏事所拘得以餘間誦説先王之詩書參稽國家之典故以益厚其所植而為有用之器夫官位中無事而食祿者莫如詞臣而人不以為非也居其官者亦未嘗見其有不安之色即君相亦不以事之不當爾而欲以職事縻之然則職事之間劇惟其所處固不能一槩也今舍人之官幸處於間劇參半之間然以今較昔業巳稍稍繁猥苟職事粗舉似不必一切以吏道繩之至使國家養士之優待士之寬百年來相傳之厚意一朝而澌滅殆盡則其所傷者實大僕又聞之舊章者不可改也昔之所行今亦踵而行之即人主不得以其意輕易變更而況其下乎故事殿試執事止八人今科忽增二人又易其次序詰其故則曰中堂之意將使壯者任其勞焉夫凡百差遣皆擬議而後上何獨於此稱中堂之意乎夫勞逸之次先後以序曩吾與笏山儤直之時亦勞甚矣未嘗求助於前人今亦不當為後人任其勞夫苟以朋友之情言之亦何所不可然於國家之事體則非所宜也事無定準則趨避生趨避生則爭辨興而雅道壞苟推其所由來咎不得不有所歸矣笏山達於大體必知非僕一人之私言如其未是尚明教之弟子旌德黃朝俊冠英校抱經堂文集卷第十七
