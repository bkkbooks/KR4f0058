body:
  text: 東里盧文弨紹弓記吳江嚴豹人二酉齋記戊申近代藏書之家蓋莫盛於吳中如楊君謙朱性甫吳原博閻秀卿都元敬金孝章亦陶父子皆著名於勝國者也流風遺韻至於今不衰然非徒慕前人之美名而襲蹈其迹也此實關性情焉苟性情不在是父不能必之於子兄不能必之於弟縱或慕美名而誇豪舉挾千金入書肆連箱累櫝捆載而歸錦帙牙贉縹緗溢目而其中之簡脫叢殘弗之補也形似聲誤弗之正也善本俗本弗之辨也彼書賈者又工於爲僞以今爲古如以震澤王氏之史記四明陸氏之呂東萊讀詩記崑山徐氏之尚書詳解而皆以爲宋刻此猶可言也至以劉改之爲斜川吳正夫禮部集爲蘇子美滄浪集舛謬不巳甚乎而其傳錄以行世者又爲鈔胥暗減其篇頁則終不爲完書故夫鄴侯之架雖富君子不許其能蓄書也余往來吳門知朱翁文游者藏書甚精繼交吳子枚士皆常與之通書無所靳今又得吳江嚴子豹人焉其家去郡城百里而近自其少也卽以書爲性命友朋知其然也往往以祕本假之傳鈔故自尋常所得外往往有前人錄目中所未具者散置之慮不便於檢尋也於所居之右得爽塏潔靜可以爲精舍者三楹乃遷廿年巳來之所著錄庋閣其中以昔人相傳藏書之處有大酉小酉也遂顔之曰二酉齋旣自爲之記矣而又來乞余言知余之有同嗜也吾聞昔人所傳二酉之藏不過千卷今嚴子所儲巳遠過之乃意方慊然且冀幸後之所得容當有倍蓰什伯於今者是則誠然然余以爲藏之多也不若其精也精矣而復求之不巳安在其能無多乎臘前余過平望去嚴子所居僅十里欲順訪焉而叩其齋中之所藏者舟人誑余以一舍之程有難色故不果然嚴子所校之左傳正義及所梓之左氏賈服義則旣見之而伏其精矣虎豹之異於犬羊不卽一毛可辨乎顧余之好雖同於嚴子而業巳頽然老矣然見一異書眼猶爲之明思古昔聖賢若孔墨猶未嘗須臾廢書而余何人顧可弃秉燭之光而不自力乎楊儀部嘗有句云豈待開卷看撫弄亦欣然此眞愛入骨髓語也又曰自知身有病不作長久計偏好固莫捐聊爾從吾意余今白首鈔書矻矻朝夕亦正有自不可解者因嚴子臭味之同而縱言及此更欲就嚴子假一二祕笈而鈔之其庶幾許我乎杭州重建機神廟記乙未乾隆年月吾杭重建機神廟成里人求文於余以記其事杭爲禹貢揚州之域厥篚織貝實與兗之織文徐之纖縞荆豫之元纁纖纊竝進由周而來齊有紈魯有縞楚有練吳有紵而越亦以羅著迨河南褚公有裔孫名載者盡得機杼之巧於廣陵而歸以敎其里中自是吾杭所出更兼擅眾地之長而爲天下冠宋至道元年始於杭置織務沿及本朝因而弗改享其利者圖其報杭人之祠褚公舊矣旣又推而上之思報其始爲機杼者於是復立機神之廟其神則厲徵君之記據淮南鴻烈以爲黃帝之臣伯余是也廟建自國初在城之東北隅雍正中里人稍稍增拓其制閱四十餘年日就頽陊有吳君通海者蹙焉以爲己任謀諸同業率費得六千金撤而新之再閱春而竣不戒於火燬焉又謀所以興復之眾喩其誠輸者畢集鳩工庀材聿成壯觀正殿五楹中祀軒轅氏而以伯余褚公左右配焉軒轅爲伯余之君始制衣裳以大機杼之用者也其後爲會館同業祭享之日飮福於此又其後祀西陵氏西陵軒轅之元妃始育𧖟以開機杼之功者也其前有廡有門又有臺以奏樂而娱神此今時所重以爲不如是不足以昭事神之虔者也廟之晨昬啟閉朔望香火以道士主之其敎之所祀者別有室使祀之而更及於土榖之神開其爲彼而後可責其成於此凡爲機神計且可以廣福也嗚乎杭人之爲是舉核以三代制祀之典雖不必盡符然於先王敎民美報之指可謂周詳而篤摯矣要非朝廷之仁漸義漬有以返斯民於惇龐忠厚不至此則神之所以佑吾杭人者豈有旣哉說者謂淮南稱伯余始爲衣手經指挂成猶網羅後世始爲之機杼則作機杼者當別有人詩刺婦無公事休其𧖟織則織本婦人之業不知機杼不用衣裳何由而成織之所出上供國家服物采章而下被之士庶非婦功所得專所以周官典絲主之以下士而工有內有外此久爲男子所有之事且天地之閒陰主質而陽主文女成布而男成帛以目驗之可信也斯前記所未詳故幷及之是役也肇自往年某月歴若干旬訖功首事之勇於義與同業之樂於輸皆不可以不著因誌其始末而僃列諸氏名於碑陰云旌德縣建登瀛橋碑記丁酉旌德有鳧溪水源岀鳧山西南流合於徽水經縣城北十里則車徒四達之地也溪中巨石錯立舟泭不能徑度梁以木當春夏盛漲時不勝湍激輒傾欹壞墮不可治取道者必囘遠而後得濟迨霜降水涸居人累石爲渡劣容一人迹猶復惴惴恐陷焉往來者病之久矣邑黃氏天一以三兄弟家去溪㫄甚近本先人子裕府君志爲創石橋經始於乾隆三十七年閱四朞而落成其長三百尺廣二十尺高倍之翼以石欄寛容堅緻由是東西行以適四方者皆便之更以餘力於東岸建亭以憩行者其西又有一溪源出楂嶺亦建小石橋其上施功視鳧溪三之一焉費皆黃氏兄弟任之不求助於他人鳧溪之橋命曰登瀛爲其東直柳山西接正山之麓習形家言者有取焉橋成逾年而天一之孫朝俊舉於鄉當其爲是匪以私子孫也而食其報獨先可不謂天道歟朝俊學於余請余爲之記因考其實書之石俾出其塗者咸知化險爲夷之所自且以吿邑中諸英雋當思其名之甚美奮然偕黄氏子弟相與從此發軔以達王路而翔天衢無負兩翁之斯舉也重修紫陽書院碑記甲寅吳越書院之以紫陽名者三葢皆祀朱子而因擇士之雋異者使習業其中欲其學朱子之學而後庶幾於所言所行莫不循循然有法度也新安爲朱子之鄉其地有紫陽山故宋淳祐六年理宗御書紫陽書院以賜江東之崇祀朱子者而吾杭有紫陽山卽沿爲稱禮記曰凡釋奠者必有合也康成釋云國無先聖先師則所釋奠者當與鄰國合案今蘇與杭皆近新安以祀朱子實與古禮合杭爲大府治所敷文書院中丞領之而紫陽與崇文皆前任鹺使之所倡建鹺商相與踴躍以襄厥成葢鹺商多來自徽郡實古之新安其子弟又許其別編商籍與土著者一體考試故皆樂於順上之指而不由於強勉我朝康熙四十二年鹽法道岑溪高公熊徵始建兹院於紫陽山之麓初名紫陽別墅後乃正名曰書院至於今八十有餘年矣中閒雖小小補苴而費約工省馴至敝壞不可治文弨以乾隆己亥忝主講崇文越明年遷主紫陽覩危樓之將壓常凜凜焉去之一周星以爲必改作矣乃僅交午枝柱苟且目前以儌幸於一旦之可無事上之人以無與乎考成而未嘗一畱意卽或慨然有興舉之思而慮請之容或不得又鰓鰓慮經費之無從出也以故玩時愒日遷延以至於今往來觀者徒歎息於前人有美政而後人莫之繼爲可惜也廼歲在癸丑長白阿公奉聖天子新命來爲兩浙江南都轉鹽運使司鹽運使葢改舊鹽法道而正以使名幷特設督理鹽政一員與兩淮埒卽移兩淮長白全公以莅之全公素知公強幹有爲故於所請無不聽公之居是職也實能仰體上之德意淸以律己勤以莅事緝私平征以卹商而循名責實以造士覩兩書院之久不治也請於全公斥幣餘若干金大爲修葺不歸之縣有司而專委屬吏之能者日往監之公亦不時至以察工之勤惰而董其成於是腐者易欹者正缺者補隙者完磴道之犖确者爲平治之相其高下爲之欄檻使無失足焉若門若窗皆可以啓閉矣若庖若湢皆足以容受矣堊者黝者丹雘者咸得其宐於是望之巍然卽之煥然士之來肄業者咸欣欣然有喜色罔不亟思振作以仰副樂育之盛意葢士氣亦爲之一新焉葢嘗論之內與外實相因而互資者也故衞武公之爲懿戒曰洒埽庭內斯干之詩言殖殖其庭有覺其楹君子乃可以攸寧焉昔子路之治蒲也夫子入其境而見草萊甚辟入其邑而見牆屋完固亟稱其善焉葢卽此可以驗眾事之不苟類如斯矣兩公不以文弨爲不肖聘主紫陽敎事樂觀盛舉思有以紀載而監院車君向榮又率諸生以來請安敢以不文辭爰卽進諸生而吿之曰爾等之來學於斯者旣足以安其身矣亦知所以治其心乎夫屋之傾欹徑之榛塞夫人而知其不可矣獨於心而顧可安於不正不濬乎今諸生中能文之士不乏也然或狃於佻達之習慢易之風而不知變革其有害於虛靈之體實甚今公之有斯舉也豈徒爲美觀哉葢卽敎以治心之學也夫朱子集諸儒之大成而德性問學兼優者也諸生勉勉焉是則是效體斯立而後用有以行安見醇儒名臣之不由斯出乎余非能言者也朱子所爲學記者具在舉皆切要之論盍反而求之可乎是說也實推廣公所以造士之意而公之盛美乃益彰吾知崇文亦必有願爲紀載者文弨在紫陽故第就紫陽以爲之記云麗景校書圖記辛未乾隆丁卯之夏天子居圓明園命選翰林十人中書十人校錄唐李善所注昭明文選以僃淸燕之覽於是卽張相國園而開館焉麗景者園之軒名也厥構宏敞通流環繞匯於軒前而成池池多植荷時方花架木爲橋通南北道橋之南山徑迴複樹木蓊雜園故名也園康熙時明相國之所築也後獻諸朝賜文學近臣退直居之園之勝尚未能徧觀也所選二十人者校書軒中上命大官具食尚方給筆札頻遣中貴人攜瓜果及荷囊香佩諸物分賜諸臣上所賜唯瓜果爲非常賜非大臣及親近者不易得而今咸以小臣拜賜且訖事月餘賜凡四五斯亦遇之至榮者巳前輩錢赤岸先生性愼密而多聞識褎然爲中書領袖選與兹事文弨時亦從諸君子後移席近先生先生校勘精審孜孜不倦然諸人或各行其意先是中使宣上旨云爾等俱是有學人若書內誤處皆當改正而大臣恐或蹈妄改之咎又私相戒約非灼知其誤萬不可輕改以故明達之人多務更正愼重之士憚於改爲予因知事無大小總其成者爲要也大宦年高事繁必不能復究心於文墨之事安得如先生者合眾長而折衷之歟書成又錄考證二冊進呈上命分置各卷之後幷書校寫者銜名其冬又召諸臣入乾淸門至懋勤殿令各鈐小印識之上自爲之序其書巳裝潢成帙矣書之前貌聖容焉先是進呈之日又人賜紗葛各二端文弨欲爲文記之尚未成也今先生榮君恩寫之爲圖以文弨之亦與其事也屬爲記嘗考古者有寫書之官校讎之司其事曠而弗舉於今乃復見之禮意加優渥焉先生適當其盛將之以勤恪譌則正疑則闕不牽於異同之論可不謂賢乎自是役後有謂細事不足煩聖慮者於是凡有校寫皆開局於武英殿大臣監理之外饔供其食書成請旨賞賚而巳文弨亦一再與焉迴思昔日與先生在軒中散衣帶時水風淸暑花香襲人珍賜頻仍中使絡繹此景何可多得況四五年來此二十人中巳有化爲異物者其仕於四方及歸其鄕者又有之今先生又將歸矣撫卷之下不勝悵然他日從先生於明湖之濱縱談舊事再出此圖其感歎又將若何也因具錄其姓名於左翰林十人王錦改外王居正休致朱佩蓮丁憂湯大紳休致王際華丁憂歐陽正煥蔣元益徐開厚故許菼改外馮秉彝吿假後又益一人曰溫敏中書十人張敬業劉大佑故祝維誥眭朝棟程燾龎廷驥吿假金燾毛永燮先生名在培與文弨共爲十人收掌則待詔吳自高也乾隆辛未除夕前一日書張荷宇大任夢母圖記庚午始余未識荷宇時有客持一卷文示余卽荷宇自敘其夢母事其言悲悄乎不忍卒讀也異日有介友人來余門請受業者識其姓名卽曩之夢母者也因又見所爲圖焉自當世公卿大夫下至韋布之士工於言者咸嘉其至性冥感相與詠歌其事荷宇悉取而綴於圖之後余亦五歲失母此情人所同也感荷宇之事而因爲記之荷宇生十月而喪其母及有知卽時時念母不置彌久彌篤哀其身不能一日事乎母也哀母之言語動作亦未能識也荷宇香河人嘗南遊而反至乎錢唐夢母來前夢中卽知其爲母也旣覺乃噭然以哭曰此眞吾母也母胡爲乎使我至今日乃得見也母又何去我之速也母其可使我繼此而得見也於是卽夢所見爲之圖此圖吾不之見也今之圖吾見之則其夢母之境而巳余因語之曰夫人精誠所感無幽明死生之隔此理之可信不誣者況子之於親其喘息呼吸相通本無有閒之者乎人死則形亡形亡則氣散而有不散者在其精神卽附麗於其子孫之身故先王爲之立廟以聚之祭祀以事之笑語嗜好以思之於此於彼以求之又非但此也一出言而不敢忘一跬步而不敢忘故孝子之事父母終其身非徒終父母之身也今子之母不幸蚤殁然子在固不可謂亡焉夫自香河以至錢唐三千里而遙子之母生時固未嘗至其地也而胡爲於此而夢於此而夢者子之所至親亦至焉然則子之身親之身也子求所以不死其母者其必有在矣蔡施秉守城記戊戌雍正十三年貴州古州苗作亂諸苗響應破黃平州及凱里巖門諸城乗勝東下施秉縣適當其衝遂蜂擁薄城時平靖日久兵屯多倂省今縣治乃故偏橋衞也去舊治九十里許先是奉文淸理苗疆大吏案舊地圖不知縣移治本末猶承前謂距台拱大將屯駐處道里近遂議省舊所設遊擊員幷其兵盡撤焉而施秉遂無守禦之僃雍正十一年上元蔡君謹來知縣事謂地荒遠民苗雜居僃不可弛言於大府請仍設武員鎭守如舊制大府韙之而未卽行也邑無城君亟城之至是而逆苗之亂作民卒聞有寇惶駭欲逃君亟招集鄉勇合家丁僅百餘人授以兵練習之令登陴固守鄰邑民來奔者內而安輯之擇壯者令相助爲扞禦夜然火城上徹明城有水門賊使其黨濳入爲內應獲之得其謀取大板布釘塞其處苗人素跣足乗黑夜入輒爲釘所刺僨賊射火箭入城城內多草房君有僃火不得熾城西有半山君恐爲賊所據得形便城必危帥勇士先據之苗女有習妖術者佩符張蓋舞鏢槍前衝左右號端公者爲翼衞禁矢使不相及君取雞犬血厭之設伏以待大破之黔地苗窟穴多乗釁相挻而動官兵分道剿撲救不時至自夏涉秋凡九十四日大小三十七戰逆苗始散走城賴以全總督張公廣泗以其功入奏擢大定府通判未赴奉檄勘鎭遠等處災道病仍還施秉以乾隆元年九月卒民爲建祠立碑君所建城及橋梁民皆以蔡氏之今上嘉保城功賜子寰蔭國子監生舊史氏曰余客金陵君之里也聞君之先本和州人少孤隨母育於外氏遂家上元令其習藝謝不能也見塾師課童子書則聽之少長遂能文勇力亦過人通技擊之術嘗手搏武人之害鄕里者莫敢抗雍正首科舉於鄉君文吏耳而有武功其兼材信素具也抑古之儒將著名者多矣尚不足爲君異若乃糾率市人而與之共處危地卒非素練器非素習岌岌乎不可終日而卒能轉危爲安民免糜爛之禍則由君之見幾早僃事豫堅城屹然故可依以爲守也最君之功故當在此不在彼君里後生顧淞學於余能言君之事君字經山且云君之子今與其母居三山門外屋數椽以賣鍋爲生則又可爲太息者矣記烏程袁孝子刳肝事乙卯烏程有刳肝以療母疾而愈者邑有司與其國人咸稱曰袁孝子孝子名昌齡事在乾隆四年距今五十有七年矣當刳肝之時孝子年已五十有二其母年七十有一夫禮五十不毀哀過而毀猶爲不可況可重自毀傷蹈必死之途而徼幸其或一濟乎且徧攷諸方書無有人肝可以愈疾之說而孝子之事又相傳有神奇怳忽之談儒者難言之然其事炳炳誠不虛孝子深自韜晦幷其子亦不使聞知乃事卒暴著而不可掩嗚呼豈可謂非天哉今名巳載郡志其曾孫沂以志所書尙略其父秉鈞在日營葬其祖撰有事實一篇欲乞有道而文者以銘諸墓終於齎志以沒彌畱之際呼其子沂而命之曰必無忘而祖而父欲求所以表章其親之蓄念沂懹之又十有四年家貧業醫不能出而與士大夫遊又諸老有盛名者皆巳前死倀倀乎不知所向聞人言文弨尚能爲紀實之文不苟譽人者介其友楊君傅九以請於吾友嚴子久能而展轉以達於予予雖不能繼諸老之後塵然於發揚濳德敦勵風化亦竊有志焉遂不辭而書之方母之疾也孝子婦巳前死常時燠寒飢渴之節及一切煩辱之事妾嫗所任者皆孝子親執之至是醫療百方卒無效病且殆仿偟無措昏悶中若有吿之者曰服龍肝湯疾可瘳顧龍肝安可得忽念己生之年歲在辰辰龍屬也得非神命我刳肝乎乃潔誠虔禱夜半扃戶以刀刲胸之左偏深寸許以指剜取中熱如沸湯不得入昏暈而僵旋似有趣之起者驚視創處肝巳突出遂割之作湯以進疾良巳人無知者越數日近出過橋失足顚於橋下創裂暈絕子宗耀亟往抱持歸解衣見胸次束以帛血斑斑然漬其上猶新請之不言又涕泣固請始言之子蒼黃延醫用善藥敷治莫效夜又有若吿之者曰服藕汁可瘉如言而創始合終戒家人勿洩也然醫者巳出語人矣人人以爲異事更相傳播令甘泉羅君愫聞之親式其閭列狀聞諸臺咸有優奬唯格於例不得旌他日人有訟其子不孝者有司訊於市延孝子竝几坐指以示其子曰此刳肝袁孝子也居同里而不知所效邪杖之孝子爲憮然不寧者累日越十二年而卒其母後一年乃終子一人卽宗耀孫四人長卽秉鈞傳其祖事實者也沂能謹識其父之遺言久而不衰其人亦有足多者今葬巳久無所用銘沂以傳爲略傳之體故不能詳也余乃徇其請而爲之記其事庶辭不嫌於繁瑣云舊史氏曰自明以來刲肝割股之事皆旌例所不及以非事親之常道也然閭里之民天性篤摯當其至誠激發非有所慕效而中情所迫不自顧慮更何有於區區之名是雖不可以爲敎而君子亦必從而禮貌之且樂稱道之使人皆可以一自證其本然之良心則何嘗不有益於風敎也烏程一邑耳百餘年閒刳肝者有三人焉康熙初年有閔茂元越四十二年有陸國榮又三十三年而袁君復繼之是皆不漓其赤子之性者也嘗聞唯至誠爲能感神傳袁君之事者謂有鬼神以陰相之其理亦不可謂無今閔袁之名志俱載之而陸尚遺因幷牽連書之以吿後之修郡邑志者弟子上元孫瀛葆貞校抱經堂文集卷第二十五終
