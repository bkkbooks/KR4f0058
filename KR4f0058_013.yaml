front:
  text: 抱經堂文集卷第十三
  hash: sha256:db50892f44ff519fb5659841fef7c338d0248d817166b2dcd019d8d6d77833a3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0058_SBCK_013-1a}
body:
  text: 東里盧文弨紹弓跋六書鄭司農集後辛丑鄭康成集二卷錄一卷隋志巳云亾今刻附尙書大傳後者相風賦一篇伏后議一篇春夏封諸侯議一篇戒子益恩書一篇易贊一篇詩譜敘一篇尙書大傳敘一篇魯禮禘袷義一篇凡八篇皆從諸書中裒輯者也相風賦北堂書鈔藝文類聚皆引以爲傅􅏏作禘袷義卽禘祫志本不在集中然則僅六篇而巳案康成周禮序見於賈公彥序周禮廢興中雖非完篇然亦當附見序云世祖以來通人達士大中大夫鄭少贛名興及子大司農仲師名衆故議郞衞次仲侍中賈君景伯南郡太守馬季長皆作周禮解詁某竊觀二三君子之文章顧省竹帛之浮辭其所變易灼然如晦之見明其所彌縫奄然如合符復析斯可謂雅達廣攬者也然猶有參錯同事相違則就其原文字之聲類考訓詁捃祕逸謂二鄭者同宗之大儒明理於典籍觕識皇祖大經周官之義家諱古字發疑正讀亦信多善徒寡且約用不顯傳於世今讚而辨之庶成此家世所訓也賈序後又掇拾數語云其名周禮爲尙書周官者周天子之官也又云斯道也文武所以綱紀周國君臨天下周公定之致隆平龍鳯之瑞又云某以爲括囊大典網羅眾家此三條其文皆不相聯綴當亦序中語也又有論語序王伯厚嘗採輯附鄭氏論語注末亦當幷取之以繫乎此云孫詒榖謂論語鄭注非伯厚所輯疑出於惠定宇而託名王耳書毛氏袖珍本陶集後丁酉此本實從宋刻繡梓而校讎未精凡注一作某字往往不在當字之下亦有妄改處幸不多也吳中朱氏有臨宋本乃就明休寧程氏本上改塗者又有宋紹熙閒贛川曾集本以校毛氏所雕往往符會毛氏本得之母舅張端甫先生文弨旣重是長者之賜而又兼得兩宋本可以參校遂殫旬日之力畢功焉一字之異通否相懸亦古近殊別且不經後人曲說殽亂爲可寶也朱氏所臨宋本當出於湯文淸至曾氏本乃刪去五孝傳以下及四八目非全本也湯本不可見見毛本亦尙有典型焉近吳槎客得宋刻湯氏本爲重雕余因得見之書王右丞集箋註後辛丑此吾鄉趙松谷先生所箋註也余貧不能買書此本亦未之蓄今主晉陽講席架上舊有此書因得縱閱其校正視舊本誠遠過之徵引亦詳贍不過於刪節致使本事之原委不明此尢註古人書者所當取法也其事出釋氏者則其友王琢崖贊成之亦如朱長孺箋義山詩之取資於釋道源也集中潞州刺史王府君夫人墓誌銘云夫人姓盧氏范陽人也昔堯命伯夷典秩宗號大常爲尙父此下註云上有闕文余以爲當本是周號太師爲尙父與上旬文正相對傳寫脫去周字又誤改太師爲太常以就秩宗之號耳此余氏族所出故知之李穆堂先生序此書獨稱其辨霓裳曲七㬪始有拍以爲可以糾新舊二唐書之謬有功於學者然此皆夢溪筆談所說也松谷本明著其所自穆堂殆不暇細閱故有此語不知者將反疑其掠前人之美矣書梓成亦不得人覆校故其誤字尙多云李元賓文集跋丁酉掊土而得古器鏽澀駁犖何當於用愛奇貴遠之夫㫄睨之而不去予價不少靳珍捧之以歸筵以几室以櫝有佳客則薦陳之家所有常物不以爲娱唯此之娯其亦性使然耶今天下之操不律伸赫蹏日役其五指者亦幾於流矣流則庸庸則靡其易於成也亦易於壞猶詫於眾曰達是乃吾夫子之敎也其以之班條於里巷耶其以之釋詁於童蒙耶無乃徇文之名而失文之實耶吾讀唐李元賓之文其岀之也戛戛然其成之也斬斬然不綺而麗不曲而奥第其品非夫昌黎氏之流亞歟然或重自炫曜又復過於激昂不韜其光不和其聲此其短也施之於今其不目爲怪物也者幾希匪以爲用將以爲娛乃無不可況其可以砥流也書凡五卷前三卷二十有九篇陸希聲之所序錄也後二卷十有四篇趙昂之所增成也篇第部居無所改作其末二篇俄空焉當煩辱之地其脫爛有由矣今年歲在強圉月紀王正故人子陳燧相見武林借予傳錄攜來金陵尙未脫手何期惡秏陳君夭亾年優元賓殆亦無幾今覩終卷略敘所由志行可書請待他日題賈長江詩集後甲午長江詩雖不合雅奏然尙有古意讀之可以矯熟媚綺靡之習明海虞馮鈍吟有評本長洲何義門得之稱善其字句葢遠出俗本之上如云十年磨一劒霜刃未曾試今日把似君誰爲不平事今本作誰有不平事鈍吟云誰爲不平便須殺却此方見俠烈之槪若作誰有不平與人報讎直賣身奴耳一字之異高下懸殊舊本之可貴類若是余得其本因臨寫之令後生知讀書之法必如此硏校而後古人用意之精可得也再題賈長江詩集後丁酉始余得賈長江集乃馮定遠本錄之篋中余於賈詩素不嗜特以其近古貴之耳繼又得何義門所評校始悟其用意之深幾於無一字閒設昔人以瘦評㠀夫瘦豈易幾也彼臃腫蹣跚者正苦不能瘦耳賈以瘦故能成一家格然此決非館閣中之所尙也惟可與山林中人共賞之義門殆於此有深嗜者歟字字梳櫛之句句織綜之而長江之詩之美乃見然彼不嗜者猶夫故也余以爲有如義門者焉則能自領之巳故其所箋疏今亦不能詳錄錄其尢至到者其補遺詩數章亦出何本幷爲補入如右徐常侍文集跋甲午徐公文集三十卷南唐舊臣後入於宋東海徐鉉鼎臣之詩若文也前二十卷在南唐所作後十卷入宋後所作詩致淸婉在崑體未興之前故無豐縟之習其文儷體爲多亦雅淡有餘爲組織之學者見之或不盡憙然沖瀜演迤自能成家不可得而廢也李文正稱其爲文敏速不樂豫作臨事立揮草云速則意思壯敏緩則體勢疎慢今觀集中之文則其言也信亦唯其如是故亦無瀠洄渟蓄之趣崩雲裂石之勢此殆由人之才力各有所偏勝雖使自知之而固無能相易者乎余從鮑氏借得此集乃明虞山馮已倉舒手校本余又爲正其所未盡者錄成復請江陰趙敬夫曦明覆審又得十數條其本脫者尙無從補正之然此巳可信爲善本矣胡方平文恭集書後辛丑此集失傳巳久故自來以其遺詩數章附唐人之後云不知其時代爵里今從永樂大典中鈔岀者詩奏疏内外制及雜文共定著四十卷乃宋仁宗朝顯官也詩豐縟而不失氣骨置唐中盛閒誠無所多讓閒有近晩唐者如桐井曉寒千乳斂茗園春嫰一旗開拂窗紅葉欺閑臥倚檻黃花笑獨醒亦佳句也五言長律丰容美滿亦多合作但集中用字喜新而不免僻澀之病如云去騶呼巳遠自笑守應廬本應休璉百一詩問我何功德三入承明廬也海簪重拾笑彈冠本北山移文昔聞投簪逸海岸也葛華與參宿此見恐無緣余以爲葛華乃菖花也此傳寫之誤其他若用杵天葆髪之類甚多亦有不免割裂湊泊者如以昆明刼灰爲昆灰武都泥爲武泥黃堂爲雌堂老子如登春臺爲老臺畔牢愁截去愁字以叶韻且於小學亦殊疎押靑韻云寧待據梧瞑不知此瞑與眠同又云更籌深䇿破先零不知此零當讀憐皆非靑韻內字也又云鱣庭舊迹空案三鱣之鱣與鱓同顔氏家訓曾辯之又云月閒芳桂正窅窊桂色窅窊秀顔師古注漢書窅音一校反此必所見本誤脫校字偏㫄而以爲一交反也又云郊外春車駕屏星監州駕屛星屏星見續漢輿服志注劉昭雖無音然廣韻十二庚有簈字注簈篂車轓且卽以屏風類推之其必不讀爲丙明矣唐人於小學極不敢忽以故篇章流傳可指摘者極少宋人則不然雖腹笥富有墨瀋橫飛而細纇微瑕究不得爲全美辭章之士往往輕視小學其所以不及前人者正坐此烏可忽哉集中咏荷花詩有云妖漦周室出禍水漢宮來無所寓意而漫以此相方其唐突西子毋乃太甚乾隆辛丑後五月通看畢遂書其後尹河南集跋辛卯師魯之言兵事葢亦知持重而不貪小利者觀其欲厚集兵力與不城水洛之意可見矣數遭遷謫其功名不得與韓范侔惜哉其言致治之本在於務大體不在任察又曰吏益材而民益愁上貴良吏民始得遂其生是其識議卓然有古大臣風矣集二十七卷附錄一卷余鈔之朱鴻臚豫堂先生所朱鈔之新城王氏王之寫本則依宋南渡初年刊本之舊也王有校讐甚畧益都李進士文藻再校少詳焉朱以別本參校更加詳焉余鈔此本則凡行款高下之不畫一者悉整齊之其誤字爲余所知者改正之鈔旣竟朱又得一舊寫本幷李進士新增附錄若干篇示余取以覆對乃知後數卷其當正譌補缺者尙多也至兩本皆譌者姑仍之巳李所增附錄亦擇取而次比之繫於後師魯之文永叔稱其簡而有法子固稱其長於辯論其文之佳正不盡以能用字少也余旣讀而愛之且因諸君子校對之勤而樂爲繼其後也凡三四過始卒業云乾隆三十有六年十月壬辰盧文弨書書李泰伯文集後癸巳此本雍正閒李之後裔所刊正集三十七卷常語及周禮致太平論咸入焉舊以濳書民言爲首而此以禮論易論爲首其卷數皆不與舊相合觀其所采輯亦畧僃矣獨遺退居類稾一序此篇載宋文鑑中可取而補也讀其條畫經世之言侃侃鑿鑿殆可見諸施行不爲空談以薦先後僅得太學官位不足以行其志而其言則巳立矣見稱於二三大儒有以也夫又外集三卷則吿詞薦章以及誌銘之類也劉公是集跋庚子劉原父公是集元本分五種古詩集二十卷律詩集十五卷內集二十卷外集十五卷小集五卷總七十五卷諸議論辯說傳記書序古賦四言文詞箴贊碑刻誌行狀皆歸之內集諸制誥章表奏疏駮議齋文覆謚皆歸之外集諸律賦書啟皆歸之小集其弟貢父爲之序藏書家鮮有其本今從永樂大典中鈔岀者區分而聯綴之合成五十四卷不能依元本之次第以賦爲首而古與律不分又元本內集之與人書古文也小集之書啟俳體也今亦混而爲一矣曩觀唐人詩集中附見他人倡和之作舊本皆一例平寫無高下之別或他人倡而己和則置他人之作於前或他人和己則置他人之作於後近代則不然凡附見者皆置後且低一字以別之公是集尙有古法而鈔集者不察或誤以他人之作爲原父作七言近體中有其弟貢父先寄詩而原父和之遂誤以在前者屬原父而和詩反低一格從附見之例余與歷城周太史書昌言之當改正也原父詩有瀟灑出塵之致其議論多有啟發人意處謂人之儉儉於人而裕於己晏子之儉儉於己而裕於人有說犬馬一篇其大略云由漢以來苟進言於天子無不以犬馬自予者嗚呼使夫知治守道之臣進以義退以禮而犬馬之說不巳貶乎使夫亂國偸容之臣進以利退以刑而犬馬之說不巳僭乎今夫犬之爲人用也不過受一器之食然而外則有獲獸之效內則有禦寇之猛斯可謂適其材矣馬之爲人用也不過盡一鈞之芻然而外則有兵戰之捷內則有馳獵之奉斯亦可謂適其材矣故功著而利不益身勤而事不害此雖廉能之士盡瘁不貳何有能過焉若夫亂世偸容之臣功薄而罪尢身利而事害如此何以自比於犬馬耶余謂其言足以警有位者故特著之后山詩註跋乙未孟東野但能作苦語耳后山之詩於澹泊中醰醰乎有醇味其境皆眞境其情皆眞情故能引人之情相與流連往復而不能自巳然當時亦以爲愛之者絕少況後世哉余年五十八始讀而善之向以黃陳竝稱余尙嫌黃之有客氣也此本乃天社任淵因后山門人魏衍所編次而爲之註頗能窺其用意之所在然二人者皆未聞有篇什畱於人閒何耶葉石林嘗見彭城寇國寶之詩而善之後知其從后山學詩以爲淵源有自今此二人者何遽不若寇耶然亦幸附后山以傅矣余鈔此書在甲午之冬逾年始爲之跋乾隆四十年季夏之二十六日也樂圃餘槀跋丁酉著書滿家不幸而無零章賸幅之傳者比比是也宋朱伯原氏有文三百卷經兵燹亾失其從孫思掇拾補緝僅得三十之一而巳名曰樂圃餘稾不必皆其生平文字之至者然而流傳五六百年不衰猶幸也夫伯原吳人舉乙科以足疾不仕窮經閱古世皆知其賢起敎授鄉邦爲諸生說春秋後又以之敎國學著春秋通志二十卷今亦佚矣獨墨池編二十卷世尙有版行本他所著圖經琴史不能定當世藏書家之有無也人生何必爲達官要職如伯原氏官不過正字所盡者不過師儒之職而當時貴之後世慕之其所居樂圃之坊名至今未改也學何負於人哉人富善用其長毋強用其所短伯原氏可師也安在其無能庶幾乎絜齋集書後辛丑書錄解題載㓗齋集二十六卷後集十三卷南宋禮部侍郞袁燮和叔撰馬氏經籍考唯後集作十二卷爲異當由誤脫其畫耳今聚珍版本二十四卷不分前後集乃從永樂大典中鈔出者題曰絜齋集古潔字雖作絜然在今則不得不分和叔齋名本作潔淸之潔故其贈陸伯微絕句有云斗大書齋以潔名冰壺表裏要淸明如今塵土塡胸臆幸挽滄浪爲濯纓若作古字恐不知者疑其或取絜矩爲義則失之矣其詩不甚經意而文則條鬯明粹能達其意之所欲言其子甫作後序謂其行文不喜用難字夫好用難字此剽竊塗澤者之所爲耳文之古不在此吾讀所撰何夫人宣氏墓誌而歎女子有高識其言有足爲今之士風警者爲錄於此誌云科舉之士有得雋場屋又兼人以獲厚貲者頗自矜衒夫人曰士子當砥礪廉隅今嗜利無恥而不知其非又自以爲能他日苟得一官豈不重爲民害乎吾以夫人此言爲舉子作箴砭不知尙能發汗否耶第六卷策問功臣篇中云雲臺二十八將以鄧禹元功爲首自是而下亦宐以功之大小爲序弇之平齊恂之守河內彭之克延岑異之破赤睂皆其時卓然可稱者而序之於王梁杜茂傅俊堅鐔之下彼數子者功何有焉是何先後之失當耶案此但據俗本後漢書耳乃後人改寫致誤非本來之失也此載馬武傳後本作上下兩列先序上列竟而後及於下列之首此古法也如張守節史記正義所載周書謚法解亦是如此後人改兩列爲一列而以一上一下排寫其次序遂致舛互獨不觀論中所言乎云其外又有王常李通竇融卓茂合三十二人今此四人者亦皆雜廁於二十八將之中非其誤之灼然易見者乎以和叔之學而尙失於不考何況後人弟子金匱華紹言詩庭校抱經堂文集卷第十三
