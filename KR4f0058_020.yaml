body:
  text: 東里盧文弨紹弓書四與王懷祖念孫庶常論校正大戴禮記書庚子讀所校大戴禮記凡與諸書相出入者並折衷之以求其是足以破注家望文生義之陋然舊注之失誠不當依違但全棄之則又有可惜者若改定正文而與注絶不相應亦似未可不若且仍正文之舊而作案語繫於下使知他書之文固有勝於此之所傳者觀漢魏以上書每有一事至四五見而傳聞互異讀者皆當用此法以治之相形而不相掩斯善矣此書尚有管見所及欲請正者如夏小正五月初昏大火中種黍菽穈傳云大火者星家諱改也星中種黍菽穈時也竊意經於種黍句絶菽穈當作菽糜下所以云菽糜巳在經中又言之也其傳之菽糜當為衍文蓋星中可以種黍見於尚書考靈耀及尚書大傳等書所言相同若菽則非五月所種不可以種黍菽連讀而去糜字傳此處於菽糜蓋無釋也或云當作初昏大火中種黍大火者星也星中種黍之時也下以菽糜二字作經以記時也三字作傳亦可僃一説保傅篇工誦正諫正當如詩正大夫離居之正蓋大夫之長也故注於此句下先釋工誦即云大夫諫之以義後於瞽史並釋正諫也似不必依漢書白虎通改正諫為針諫及增大夫進諫一句古人作文亦知避就之法未必疊用兩諫字為句也又行雖有死不能相為漢書作行有雖死不能相為竊意此較漢書為勝蓋有死二字是成文左氏傳有死無二有死而巳此類不一作行雖有死語勢較健似不當反改從漢書也曾子事父母篇中有云諫而不用行之如由己足下疑此語有誤此不必致疑也行之者從之也從父母之過如己實為之而非出於父母之本意然所謂引慝也少間篇君曰足臣恐其不足君曰不足此下脫一句方本補臣恐其足四字竊所未安前者巳略論之矣蓋君曰足則有過於自信之意而臣之進辭也當婉故可以云恐也若君曰不足則但謙讓未皇而巳其臣之進辭也當決施恐字則為不當故注於上二句云未足而君謂足則臣恐未足告以不足也於下二句云實足可行而君曰不足則臣云足所謂可不也一有恐字一無恐字注可謂善體語意矣此愚向所以欲補以臣則云足四字也然不敢即入正文附見之而巳方本專輒改易古字古語多不可信注中引詩節南山但稱節左氏昭二年季武子賦節之卒章巳有此例矣若伏之與服本可通用本命篇婦人伏於人也即其證采地之采本作菜音注疏中多有作菜地者不可謂誤文王官人篇醉言悴也言疑是猶之誤少間篇注言有可同不可同也不可二字疑誤倒足下其為我更審之既觀足下所校本因並求官本觀之其中復有鄙意所未愜者以東原之博雅精細與衆人共事乃亦不能盡其長邪曩日曾共校此書其中是者亦棄而不録何邪今摘其當更定者數條於左與足下共商榷之夏小正來降燕乃睇傳云百鳥皆曰巢突穴又謂之室何也操泥而就家入人內也案語云突穴即燕之所為似穴而突出者也入人或作人入今從關本文弨案皆曰巢下本作室穴也與之室何也蓋經乃睇下必本有室字故傳作如是解今乃從別本作突穴而所釋者頗失之於鄙俚大不可解與之室作與字為古與猶許也不當改作謂下當作操泥而就家人句入內也家人猶今言常人家耳哀四年左傳公孫翩逐蔡昭侯而射之入于家人以卒漢書中類此者尢多云入內正以足與之室之義若作操泥而就家語頗不足既言家又言人參錯復疊亦不成文理似不當從關本竊疑室穴也亦當本是室內也與末句正相應穴與內形近致誤菽糜巳在經中又言之是何也時食矩關而記之案語云上初昏大火中説曰星家諱改中種黍菽糜時也謂種黍與菽糜二事皆以星中為候此民事之常記星中則二事自見故云巳在經中又言之非經重出此文也矩當為巨夏時以菽為糜乃時食之大關文弨案上文大火中下本有種黍菽糜四字或脫去耳今仍其脫而又曲為之説君子之於幽也不言審經文本無菽糜而鑿言之云巳在經中􅍘無是理以星中見種黍之候容可通以種黍必當在此月也以星中見菽糜之候將非此月即無菽糜者乎食矩本作食短關本作閔是月也舊穀行盡新穀未升農民於此時常苦食短故以菽為糜菽以佐食之不足非常食也何大之有記言啜菽飮水史言半菽不飽菽是穀之粗者故用以為況耳小正閔而記之故辭之重如此然則上文本有菽糜二字明甚下隕麋角亦再見若食巨關從未見他書有引用者於復舉之意亦不顯保傅篇有司齊肅案語云各本訛作參夙今據李彪傳改正文弨案參乃亝字之訛今即作齊亦無不可唯夙字􅍘不可改肅注云齊夙謂三月朝也夙訓為早與朝義合若齊肅而直訓為三月朝不太遠乎燕度地計衆案語云度各本訛作支今從方本文弨案度本作支故注云支猶計也後世尚有度支之官若正文本是度地則是常辭可不加注即注亦當以度量為義不當轉以計字相比況蓋計字之義不顯於度字故也此亦失之曾子制言中無忽忽于賤案語云忽忽各本訛作勿勿據立事篇君子終身守此勿勿注云勿勿猶勉勉今從方本文弨案立事篇君子終身守此悒悒君子終身守此憚憚與所舉勿勿凡三言此篇言君子無悒悒於貧無勿勿於賤無憚憚於不聞正與前三言其辭同其所指則異前則憂其所當憂勉其所當勉者故曰終身守之若貧賤則在天不聞則在人於君子何與而何所憂焉而何所勉焉今獨改勿勿為忽忽殊不可通曾子天圓篇龍非風不舉龜非火不形家諱改鳳非梧不棲麟非藪不止案語云各本脫此十字今從永樂大典本文弨案此好事者妄增入也本文龍非風不舉龜非火不形下即接云此皆陰陽之際也注云龜龍為陰風火為陽陰陽會也今以鳳麟梧藪間其中其於陰陽之義何所當乎此之謬妄顯然易見奈何信之武王踐阼篇王齊三日端冕奉書而入負屏而立案語云各本作王端冕師尚父亦端冕學記疏云師尚父亦端冕大戴禮無此文鄭所加也文弨案唐人所見大戴禮偶脫此一句遽􅍘以為鄭所加於文義全不考究竟似王奉書而入負屏而立與下言王下堂南面而立皆成齟齬果古本脫去而鄭增成之亦當從鄭況漢人所見本在前唐人所見本在後烏知鄭之時必無此一語乎曩時但以學記正義之説附於後於本文卻不敢遽刪不知何以不見從也以仁得之以不仁守之其量十世案語云各本以不仁得之以仁守之今從禮記疏文弨案以不仁得之以仁守之正所謂逆取而順守也若創業之君既能以仁得天下安有忽反而為不仁者如有之則始之仁也亦偽耳可曰以仁得之哉且未見夫開創不仁之主之可以待至十世者也不􅍘之以理而惟誤書之是信夫豈可哉衛將軍文子篇終日言不在尢之內注在尢之外案語云此四字各本訛作正文今從方本文弨案立事篇亦有此語無在尢之外四字今以為衍文可以為申殷勤亦可唯以為注則大不可鄉學究作此語以曉童蒙尚不爾況作注乎勸學篇於越戎貉之子文弨案舊本於越並作于越荀子作干越字形相近前不依荀子而仍作于越者以漢書貨殖傳云戎翟之與于越不相入孟康曰于越南方越名也師古曰于發語聲也于越猶句吳也皆作于字若荀子之作干越莊子淮南亦有之説者或以為漢餘汗等地是干亦音寒然則各仍其本文可矣今以春秋有於越入吳遂改于為於所謂知其一不知其二也凡舊本作於者官書普改為于獨此又改舊于字作於文王官人篇志殷而深注殷盛也深蓋深也文弨案舊本作志殷如深注蓋深字今檢字書無字或古有之而字書失載要為傳寫巳久故注有此語抑或校書者所加後來誤並入注中今既改正文作深字矣深與深有古今之分實則一字作注者寧此之不知而猶疑其辭曰深蓋深也邪竊以為當作案語云深舊本作注末有蓋深也四字戓校書者之辭斯為得之而與如古通用今並從方本改易矣他如四代篇睪然睪即皋字亦見莊列荀子今誤作睪朝事篇不補侯伯於中等子男於下等二語亦不加案皆不可曉偷墮懈墮即是惰字乃以為訛其他脫句武王踐阼脫於戶為銘焉脫字公冠立於席北脫北字及注中脫誤之處非本校者之失固可以共諒也與陳立三以綱上舍書辛丑去年來京師聞友朋間盛道足下之名即思得一見論著為快時足下方館於圻外今正始相晤於翁覃溪太史所歡然如舊相識會足下行急文弨亦俶裝將往山西所懷仍末由得遂別之明日足下惠然留一文以寵我行見豹一斑嘗鼎一臠縱未即大快夙願以視求一見一嘗而不可得者則固巳遠勝矣求益之云辭何謙也文弨少無強記之功老而遺忘更甚即欲效一得於吾子何有哉承示大戴記諸條凡所證引俱一一可桉不虛足下之於此書功良深矣然區區一隅所見亦不敢為足下隱謹條疏如左惟為我審正之以盡切磋之誼幸甚哀公問五義篇窮為匹夫而願富李善注文選引此作不願富楊慈湖從之足下遂謂當增不字文弨竊以為窮而不願富此少知自好者優為之何必賢人夫子之所謂賢人蓋進於士與君子之上者也顔子一簞食一瓢飮在陋巷之中可謂窮矣而以為邦問則知其有志於治天下之道此非願富乎孔子栖栖皇皇目營四海故其言曰苟有用我者期月而巳可也三年有成蓋聖賢當其不遇時則贍一身而猶不足然其具固在我實足以拯一世而有餘唐詩人杜子美亦似微見此意者故處破茅中而即有大庇天下寒士之想所謂願富似當作如此解若夫以多財為富此亦非賢者之所甚惡也富而得行其所欲為如之何不願孔子嘗謂顔淵使爾多財吾為爾宰至喪欲速貧則有為言之有道而貧賤方且以為恥故貴而不願富可言也即下所云貴為諸侯而無財是也窮為匹夫而不願富此正易所謂苦節不可貞者天下安賴若人為聖人亦安取若人為故愚竊以願富之為義更精也夏小正四月莠幽幽之為葽是巳莠之為秀與王萯莠之莠同與莠雚葦之例亦合此無可疑者足下不引豳風四月秀葽為確證而顧遠引廣雅莠葽戰國䇿幽莠以證莠葽是一物莠不可改作秀信若此則於四月之下但空舉一草名而巳毋乃太不辭乎盛德篇外水曰辟雍南蠻東夷北狄西戎太平御覽所引南上有列字今據此增之義自較顯然即不增而南則蠻也東則夷也北則狄也西則戎也此東西南北自從明堂生義與他處本其地以為稱者固當有別至公冠脫文當以家語博物記增補夏小正俊風之為東風據山海經以駁傳言南風為非是五月鴂不辜之時不字為衍文凡此所見皆極是易本命篇王懷祖太史亦以淮南參證與足下所見符同王太史所校是者極多而愚意不敢即據以更改此書者則以校書之與著書不同今足下既有意欲自下注則於正文審擇而從其是可耳何必拘拘就盧氏之範圍哉若但校盧注本惟可於注末略加辨證而於正文定當一仍盧本之舊又古書中有本來稱引訛錯者正復不少即如保傅篇以齊威王置簡公之前此或是本文之誤向疑威王為威公猶不過一字之異同耳若如他書引下句作而湣王以弒死於廟梁則迥非盧氏所見之本殆後人覺其誤而為之更定亦不可知觀其於弒字下又贅以死字文筆頗似不古念足下意惓惓不可不為報非敢強為説以求勝希亮察不僃與孔葓谷繼涵書庚子令姪叢伯所梓鄭志極佳在諸本中最有條理且點畫亦致不苟幾與相臺嶽氏所刻諸經相伯仲今欲奉求一本務為我致傾遲之意古書之流傳者稀矣全賴好古有力之士摹印流通嘉惠後學若復過於吹毛令人意怠非樂與為善者所可出此唯是古大儒傳注亦不能一無可訾而校書之難則又如掃落葉瑜多瑕少轉不妨略獻所疑如書中定之方中答問乃指左傳水昏正而栽兩言今以毛傳為緣起非本意矣常棣一詩趙商因魚麗之序而發問舜葬蒼梧之野張逸因堯典三危乃西裔而致疑此必須注乃明又如七月鳴鵙但云豳土晚寒亦晚溫義頗不亮其問之原委似亦不可不詳它本頗有以唐人正義之文羼入者此本巳多刪剃然如月令昏火中一段自如此言中以下亦是正義之文又脯非食殽內則正義所引唯此一語為鄭志餘者皆非也其沿注疏中訛字俗字如酒正轉寫益澄字耳益誤作盎喪服目其家之為宗者目誤作自泠剛之姓不當作冷陳鏗之名不當作鑑至如梁本從創今誤從刀厚字之首混與原同此當一並改正方全美也又書中疑相覺二字有誤案相覺即相校趙岐注孟子富歲子弟多賴章及中也養不中章春秋無義戰章皆有此語又宋書天文志云斗二十一井二十五南北相覺四十八度皆可證也白虎自見王會篇今本但缺黑文二字耳又昭三十一年左氏傳服虔云十一月日在星紀據下問答則十一月當是十二月餘尚有小增減處不盡詳也與丁小雅杰進士論校正方言書辛丑方言一書戴君疏證巳詳愚非敢掩以為已有也然疏證之與校正其詳略體例微當不同亦因其中尚有未盡者欲以愚見增成之故別鈔一編今不能即寄聊舉一二乞足下審正之大凡昔人援引古書不盡皆如本文故校正羣籍自當先從本書相傳舊本為定況未有雕板以前一書而所傳各異者殆不可以遍舉今或但據注書家所引之文便以為是疑未可也如卷一內延長也又云延永長也凡施於年者謂之延施於衆長謂之永案延長也巳見於上似可不必復出蓋此自為下文各見其義故先並舉之於上揆以文法􅍘當如是考之宋本亦無不同今或但據李善注稽康養生論引作延年長也便謂此書作延永長也為誤夫善此注特櫽括施於年者謂之延意耳爾雅疏始誤以為即方言本文此不可以稚年小也相比例夫使云延年長也下即當云永衆長也而後可不然兩句復杳於文義殊未安方言此語亦祗大判而言其實通用處正多也又卷二秦晉曰靡注靡細好也亦因李善注引作靡靡遂補一靡字不知善但順兩賦之成文耳長門賦夫靡靡而無窮魯靈光殿賦何宏麗之靡靡今必強此注以從彼拘矣且王逸注招魂云靡緻也李善注文賦引辥君韓詩章句曰靡好也皆以一字為訓而義正相同故凡此類皆不敢從正文如卷六掩索取也或曰狙注狙伺也宋本如此不誤俗本始誤作狚今因卷十有抯取也音柤黎遂移彼以易此不知狙伺而取正與掩取義同又閻笘開也因廣雅笘作苦遂從之夫苦之訓開他書未見竊疑當是苫字苫蓋雖皆所以覆屋而蓋亦可以為戶扇見荀子宥坐篇九蓋皆繼楊倞注又案説文蓋苫也周禮夏官圉師茨牆則翦闔康成注闔苫也然則苫與蓋闔義皆同而此則訓為開夫字固有反覆相訓者余以為與其從苦字之無義不若定從苫字此因形近致誤耳又厲卬為也亦從廣雅改卬為印夫印之訓為亦未經見而卬與昂通激昂正振作有為之意不可因曹憲音為於信反遽棄方言而從之也又卷十誺不知也誺音癡眩戴本改作䜉引玉篇䜉不知也丑脂丑利二切誺同上又力代切誤也戴謂以六書諧聲考之䜉從言漆聲可入脂至二韻誺從言來聲應入代韻不得入脂至韻作誺非也竊以為不然姑無論古讀來為梨常與思協即與癡同一部如素問云恬淡虛無真氣從之精神內守病安從來又漢柏梁臺詩武帝云日月星辰和四時梁王云驂駕駟馬從梁來又廣韻從來之字如􅘭庲徠皆與釐同紐並在之部今必謂從來得聲者應入代韻其可乎卷十一蠅東齊謂之羊俗本羊誤作芊案蠅似黽其聲蓋與閔相近楚姓之芈其聲亦相近故注以此類皆不宜別立名是也今若作牛羊之羊雖與蠅亦一聲之轉而究不若蠅羊之轉之尢切況蠅微蟲也羊家畜也皆有定名矣而云蠅亦可呼羊羊亦可呼蠅不亂名乎而反譏郭氏何也卷十二媯娗嫚也舊本嫚作乃俗僈字舊音薄丹反注云爛僈健狡也雖與今之爛漫義不相近而其音正同顧乃改僈作讀為斕斒有何據乎又蒔殖立也以殖為誤云當從曹毅之本作植案周語云以殖義方韋昭云殖立也與此訓正合即左氏襄卅年傳鄭輿人之誦殖與嗣協釋文殖是吏反與蒔聲亦相近何必植之為是而殖之為非乎至注中之字如卷三軫戾也注相了戾也案軫與紾同了有樛曲之義作了戾方切紾字義考酉陽雜俎云野牛高丈餘其頭似鹿其角了戾長一丈白毛尾似鹿出西域正與考工記老牛之角紾而昔義合又導引經云又手項上左右自了戾不息復三又字亦作繚戾劉向九歎云繚戾宛轉阻相薄兮詩魏風葛屨毛傳云糾糾猶繚繚朱子即以繚戾釋之於古義有合也今又因李善文選注之誤字而改作乖戾則與正文戾也之義殊遠並注中一相字亦賸矣楊倞注荀子修身篇云擊戾猶了戾也宋本世德堂本俱作了戾不誤元時本誤了為孑今俗間本亦改為乖戾矣卷九矛骹細如鴈脛者謂之鶴膝注今江東呼為鈴釘案説文鈴字下云令丁也方言俗本皆作鈐釘尚仍其誤卷十一姑䗐謂之強䖹注建平人呼羊子羊即䖹也足下謂強䖹當讀強羊良是乃俗間本並誤作芈即姓也爾雅疏又因誤本而改作芈楚姓也唯陳隅園方言類聚本作羊即䖹也且明其説云今吳會間通呼為羊子作即姓者誤是皆當改正也卷十三姚娧好也注謂妦悅也正與卷一好或曰妦注言妦容也合俗本誤作謂姅悅也夫姅變婦人汚也其誤甚顯不當猶仍之又憚怛惡也注怛懹亦惡難也俗本懹並誤懷案卷七憎懹憚也陳曰懹今據以改正至於舊來之音有出郭氏者亦有後人附益者其所音間與今世所讀不同如謾之有莫錢反凡兩見豈可刪乎抱婏耦也卷二俗誤作抱㛯音追萬反一作嬎又於耦也注下有音赴二字戴本乃移音赴於抱字下案抱一作菢同音暴後云房報反江東呼蓲乃音央富反則抱字本不音赴㛯字宋本作婏從女兔聲廣韻與赴同一紐乃玉篇音為孚萬切産婏也又出嬎字云同上案産免俗始加女作娩與婉娩之字混玉篇於娩字音無遠亡辨二切若從兔則與孚萬之音迥異只當音嬎下為得之故今少有更易又案正文耦也與抱婏義不近疑有錯簡或是敵耦也故注云耦亦匹互見其義耳抱婏下或有孚也字孚亦音赴故臆測如是然無左證未敢即以為然也又蠲有圭音詩吉蠲為饎三家詩作吉圭為饎是也舊本音涓下誤作又一圭反乃又一音圭之訛耳見卷三又蠎南楚之外謂之蟅蟒下宋本蟅音近詐亦呼虴蛨卷十一玉篇虴蛨蟅蟒蟲也正相合俗本方言誤作吒咟此必當改正又下舂黍謂之􅱁蝑注江東呼虴蛨舊本皆不誤廣韻虴字下云虴蛨蟲蛨字下亦同今必據詩釋文而改為虴蜢似可不必文弨又竊疑上蟒一條並不指食苗之蟲郭注云蟒即蝗也蓋即依爾雅蟒王蛇生義故於蟅蟒下云亦呼虴蛨加一亦字亦舂黍之呼虴蛨也於或謂之􅻭音滕而不音特意亦可見但於宋魏之間謂之蚮尚未有左證然舊亦音貸不音特蛇之文固有如玳瑁者當因此名之耳此須足下為更審正之又抒瘛解也卷十二舊本抒音抒井誤也宋本作抒考之廣韻抒泄水俗作汿則乃泄之誤字若抒井義甚僻詩大雅生民篇毛傳云揄抒曰也胡不引此為音故知亦必非抒井也至正文之義亦尚有可通者如卷十三魏能也案周書諡法解克威捷行曰魏克威惠禮曰魏此非魏訓為能之證乎又懼病也案凡人性怯者多苦畏非懼即病之訓乎且懼又可轉為癯亦病容也又攋隓壞也案太元經度之次三小度差差大櫴之階測曰小度之差大度傾也范望注云事之骩櫴故傾危也此非攋訓為壞之證乎但彼櫴字從木字書所無定傳寫誤耳又賦臧也臧當作古藏字訓賦斂所以為收藏也至於字畫亦有不可盡依説文者如娥嬴卷一説文嬴從女羸省聲遂據以改嬴作案羸乃力為切音不近或當是贏省説文於贏字云從貝聲字下云或曰獸名象形闕郎果切郎果之音本不出於許氏音訓本有闕或元有盈音未可知也故與其作不若徑從説文作嬴為猶愈矣又餳謂之餦餭卷十三説文止有餳字從食易聲徐盈切遂從之案劉熙釋名餳洋也煮米消爛洋洋然也此諧聲為釋不更出從易之餳字廣雅本亦然陸德明音周禮小師注云餳辭盈反李音唐是一字有兩讀今謂辭盈反者當從易音唐者當從昜於古未有聞也又如􅞳字不當改為古字少一字可兩三用漢書律志地理志字亦省作􅞳可證也􅜝字不當改作寂字不當改作齘漢人作隸巳不能如篆法之嚴此等字縱出自魏晉以下然相傳巳久在今日不猶有古意乎至郭注引書微與本文不同亦不可改也如引外傳余病􅡅矣本書􅡅作喙引漢書初陵之墲本書墲作撫此皆不改獨引左傳糊豫口於四方則改豫從本書作其字此或郭公偶爾誤記或因與昭七年傳饘於是鬻於是以糊余口文相涉致誤此類古人多所不免正不必為之镾縫也余又疑正文卷一碩沈巨濯訏敦夏于大也齊宋之間曰巨曰碩下便當接以陳鄭之間曰敦至于通語也止中間凡物盛多謂之寇四十九字當別是一條足下細審之以為然否戴君通人在日文弨敬之愛之情好甚摯今此書若無戴君理之於前使文弨專其事紕繆當益多決不止於此區區數條而巳今戴君巳沒寧忍為之吹毛索瘢乎然念古書流傳既久其考訂必非一人精力所能盡戴書之善者巳盡取之而著之矣安知他人所見不又有出於文弨所見之外者乎願足下先為吾􅍘其是非焉如有新得乞即録示是望弟子懷遠方紹董正誼校抱經堂文集卷第二十
