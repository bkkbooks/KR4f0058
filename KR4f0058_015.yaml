body:
  text: 東里盧文弨紹弓跋八漢衛尉衡方碑跋癸卯此碑近時所榻以校隸釋所有尚不及其半中有云階夷愍之貢經常伯之寮謂其以孝廉察舉而為郎中也夷謂伯夷愍謂閔子古閔愍通用如春秋諸侯之諡閔者亦作愍也碑中兩寮字金薤琳琅皆誤以為賓豈傳録之不審耶碑云感背人之凱風詩邶亦作鄁此並省去邑不虞不陽即不吳不揚參國起按本之齊語下本肇末上缺一字必竱字也寢暗苦􅒘下今缺一字而洪氏本則為仍字其下所注缺字今本則頗似字形碑云詔選賢良招先逸民君務在缺失順其文舉洪氏本如此余諦視碑則洪云缺者頗似寮字其失字上半剝泐實非失字乃英字也時詔書令選賢良務先逸民而衡君欲舉其寮之賢者又欲順詔書之文故下云巳從政者退就敕巾蓋令其棄官而就舉也隸釋於含澤戴仁下注云缺六字其實止缺二字此則都氏本不誤也翁覃溪得舊榻云是失字非英余疑非舊榻也後人就其損處妄開耳漢蕩陰令張遷表頌碑跋篆額兩行云漢故榖城長蕩陰令張君表頌其首云君諱遷字公方陳留巳吾人也下敘其先世則舉張仲張良張釋之張騫四人云爰暨於君蓋其繵縺暨字分作既且二字得毋書者不諳文義致有斯誤繵縺即蟬聯也敘其行履云治京氏易少為郡吏徵拜郎中除穀城長敘其政績云𧖟月之務不閉四門臘正之際休囚歸賀八月算民不煩於鄉隨就虛落隱恤高年路無拾遺黃巾初起燒平城市斯縣獨全下即以寬仁愷悌稱之又云流化八基遷蕩陰令吏民頡頏追送如雲周公東征西人怨思於是刊石豎表云云蓋穀城故吏所為立也此碑不見於歐趙洪鄭所録唯都氏金薤琳琅中載之但闕五字耳余今所得又闕八字然都氏所云闕者今皆可辨其一字都氏已知為郎字它如開畿宇開下闕一字碑作上似衆字頭下似之字又頗近於窆字而音義則不可曉揆其意則當為闢豈聲之轉遂可借用歟又燒平市平下闕一字今案是城字下截尚可辨又道區別上闕一字今尚有其字之形流化基化下闕一字今審是八字並不闕八基即八期蓋張君在穀城凡八年而後遷也碑以禽狩為禽獸以殯為賓以張是為張氏相係為相繼中謇為忠謇珮瑋為佩韋沛為蔽芾即羈字即𧖟字即際字即算字其紀立碑歲月在中平三年歲在攝提之二月蓋丙寅歲也若唐鄜州寶室寺鐘銘云大唐貞觀三年攝提在歲云云案是歲為己丑次年乃庚寅而亦云攝提何也此尚有碑陰紀出錢姓名余皆有之都氏不載疑並額皆未之見也文後忽贅詩云舊國其命惟新二語不曉所謂漢時風俗固不知有忌諱類如此漢博陵太守孔彪碑跋癸卯此碑隸釋作孔彪金薤琳琅作孔􅶷此字碑已模糊其形倣佛是􅶷實即彪之變體此碑在諸隸書中形獨小其結構頗與唐世碑版相近其文雖多用經語不可謂之善屬文也洪氏云彪後遷下邳相河東太守而碑額猶書其前官者以碑陰考之乃博陵人不忘甘棠之惠而為此碑也於此可見漢時風俗之厚降而後世所謂去思碑者大率在遷任將去之時樹於所經過之地使其得見之耳安有去官之後其人已沒而猶為此舉乎彼其政無可稱祇由吏胥感其私惠強率閭里之錢而為之者比比是也白香山詩云古石蒼苔字安知是愧詞噫其能免於愧者不亦罕乎漢倉頡廟碑跋癸卯是碑已全損惟倉頡天生德於大聖四目靈光數字可辨碑側有云有一字疑是衙令朔方臨戎孫羡缺從事永壽二年朔方太守上郡􅚁君察孝除郎中太原陽曲長延熹四年九月乙酉詔書遷衙令五年正月到官奉見劉明府立祠刊石表章大聖之遺靈以示來世又云下行自紀姓名此下書出錢者姓名及錢數有不甚泐者有守左尉萬年長沙瑗字君平萬年縣也長沙乃覆姓此稀姓亦所僅見余觀上所記則是倉頡廟乃劉府君所立碑中亦有劉府君三字而孫羡自敘其歷官之詳且云奉見劉明府立祠刊石則此文孫羡所為也余寓太原新修府志尚未得見不知陽曲職官中曾載此孫羡姓名否府志失載漢孔褒碑記癸卯碑云君諱褒字文禮孔子草世之孫泰山都尉之元子此碑首數字尚明了並其餘可辨識者共七十有二字而已褒乃宙之子融之兄也裴松之注魏志云山陽張儉為中常侍侯覽所忿疾刊章捕儉儉與褒有舊亡投褒遇褒出時融年十六因留舍藏之後事泄兄弟爭死詔書令褒坐焉碑有云元節所過元節即儉之字也又有云後會事覺臨難引質各爭授命蓋即敘此事而其下文已脫爛趙氏金石録洪氏隸釋皆不載此碑無從知其後事若何碑之立必在中平元年黨禁巳解之後故得直書其事而無所諱避也前云家業春秋以下似敘其所學又有爵固辭語上下文義皆不接續惜哉魏魯郡太守張猛龍碑跋癸卯此碑書甚古拙亦多別體猛龍字神字世人率未識也氏族作氏挨巉巖作巖張老作張沮渠作沮淭夙宵作霄風作蹈作耕作當南北朝多有世俗創造之字如顔氏家訓之所譏者此類􅍘不可以涉筆爾來士君子多知崇尚説文凡古書相傳之舊非許愼氏之所有者一切改令復古此又似未免矯枉過直也北魏汲縣齊太公廟碑跋癸卯先晉太康十年三月尚父裔孫范陽盧無忌來為汲令以縣嶓溪之下舊有太公壇場荒而不治乃依舊修造鐫石立表在今縣治西南隅此表吾未之見後北魏孝靜帝武定八年太公裔孫尚氏諸人以無忌置碑僻據山阜遂率親黨更營碑祠於博望亭平顯之所在今縣西北三十里請太守穆子容為文記之子容並為書無忌之表於前而乃以己作繫於後其結銜云通直散騎常侍聘梁使平東將軍中書侍郎恆州大中正修左史汲郡太守穆子容山行之文朱竹垞引李白詩朝歌屠叟辭棘津八十西來釣渭濱而韓詩外傳稱文王舉太公時公年七十二兩者不合無忌表曰康王六年齊太公望卒按尚書顧命有齊侯呂伋文則伋巳嗣公為侯非卒於康王時也竹垞之言云爾余案無忌明據竹書紀年之文非得之流傳也周公封魯太公封齊皆其子之國而身留京師故有三年報政之語周公在而有魯公伯禽寧太公在而不可有齊侯伋乎竹垞譏之非是善養老之義孟子具有明釋正不必文王自養其稱二公為二老亦頥文耳且老亦不專指年老家相稱老楚公子圍方娶而伯州犂稱為寡君老豈必拘於七十方稱老哉甲寅正月二十六日重閲記唐光祿大夫張琮碑跋癸卯書甚剝泐其文為于志寧所撰以前有黎陽公于四字尚隱約可辨也額篆書文正書不知為誰某矣中惟櫱下改木從兮驕旁易馬為女頗覺新異張琮字文瑾武威姑臧人除睦州刺史未到官而卒唐史無傳唐禮部尚書張碑跋癸卯此碑篆額尚完題云大唐故禮部尚書張府君之碑中有詔葬故金紫光祿大夫張裔諱改之語以唐書儒學傳考之即張後嗣也其云聊遵置薤之言俄喧伐枳之詠余初忘伐枳出何書孫詒榖語余出後漢書岑彭傳彭􅏏孫熙為魏郡太守輿人歌之曰我有枳棘岑君伐之碑即用此事唐汾陰獻公薛收碑跋癸卯額云唐故太常卿上柱國汾陰獻公薛府君碑篆尚完好碑文摧剝不完其可辨者亦多模糊唯對逸簡於嵩嶽多識比於廣微及飛魯連之箭草陳琳之書數句尚連屬云唐褒國公段志􅏏碑跋癸卯右碑篆額正書書撰人姓名皆不見據寶刻叢編所云則本無姓名也碑之下段今巳殘缺余但得其上段書法秀徑可愛間有數字作八分體關中金石記云唐書本傳云臨淄人此作鄒平傳云諡忠肅此作忠壯今余碑不見有鄒平人三字當是在下段中下段亦有數字可辨者榻工以其模糊太甚而竟棄之耳唐申文獻公高士廉碑跋癸卯此碑殘缺難讀首行大唐故關府儀同三司尚書右僕射上柱國字尚可辨其云大都督太宰假黃鉞淸河昭武王者乃其祖嶽也舊唐書以為太尉不言其諡又云父勱襲爵淸河王改封樂安舊書勱作勵當以碑為正云于九嵕山之南趾墓而不墳今碑在醴泉縣之劉洞村當即其地也集古録以為貞觀二十一年立許敬宗撰文趙模書丹案碑稱文皇帝又云太宗廟庭考士廉配享在高宗即位之初然則此碑之立亦在其時不得言貞觀明甚唐贈太常卿褚亮碑跋癸卯此褚登善之父也與瀛洲學士之列致仕後年八十八而終贈太常卿諡曰康碑殘闕許其中完整者二百四五十字而巳八分書書者與撰文者姓名皆不見亦無歲月亮卒於貞觀時碑云遂賢撫瞻霜露永懷罔極歲月綿遠淒涼荒壟則碑之立當更在其後也額曰大唐秩卿之碑篆書其秩字之左為一下木右旁作耆而省其中間之匕此字不見説文太常卿古之秩宗余初以意定為秩字後見錢詹事説乃褚字褚字是也昭陵石刻記疑是殷仲容書謂與馬周碑如出一手余諦視此書之點多圓如粟粒而馬碑似此者甚少其匡郭亦不全肖也銘有云纂禖承業昭鈞析宇不得其解當問之武周夏日遊石淙詩石刻跋癸卯武后以久視元年夏行幸嵩山賦石淙詩並序太子及羣臣和者共十有六人皆七言四韻薛曜正書刊於平樂澗之北崖十六人者皇太子顯相王旦梁王三思內史狄仁傑奉宸令張易之麟臺監張昌宗鸞臺侍郎李嶠鳳閣侍郎蘇味道夏官侍郎姚元崇給事中閻朝隱鳳閣舍人崔融奉宸大夫薛曜守給事中徐彥伯右玉鈐衛郎將楊敬述司封員外于季子通事舍人沈佺期也朱竹垞於康熙己卯跋此謂漫漶者僅三字惟張易之昌宗姓名為人擊去然猶可辨識今年乾隆癸卯余得榻本漫漶巳多除二張姓名外其全損者計四十有五字相去僅八十有五年便巳如此曜書如瘦藤其頓折處如腫節在書家又別一體其字率依武后所造竹垞謂此碑難榻兼睿宗及狄梁公之詩搜輯者均未之及今余晚歲猶獲見此未必非幸武周珍州榮德縣丞梁師亮墓志跋癸卯梁君名師亮字永徽先世自河汾遷於秦其云安定烏氏人乃其族望也唐人重族望作史者往往亦相沿襲稱王曰太原稱許曰高陽不知以地著為􅍘後之地理書志人物者更無從考核矣若梁君實安定人胡為先塋乃在終南山而梁君亦葬於其地乎其人由醫生起家軍興以輸粟功授上柱國修乾陵補隱陵署丞謫授綏州榮德縣丞秩滿言歸卒於益州蜀縣梁君官甚卑生平無所表見其家殆饒於資故能戶庭不出鞍甲匪疲而遂獲轉輸之賞及其殁也猶能乞工文善書者以貞諸石然書撰人皆不署名何也豈意有不屑耶唐初諸功臣將相豐碑巨刻迄於今摩滅過半而此志勒於武周時獨完然無恙何其幸也中多用武后新字以代年蓋取万万千千之義此万字省從上畫亦有中作力字者唯石淙詩中則作兩万字然亦省者多也又而代天埊代地乙代日代月石淙詩又作圀代國代聖代授亦作代初石淙詩作石淙詩代君􅖔代臣􅙷代人代星鄭樵六書略論變更中載武曌所改字傳寫多訛今以所見者正之如此唐紀國先妃陸氏跋癸卯妃河南洛陽人其諱與字碑皆空而不書父爽尚書庫部兵部二曹郎中隋書亦有陸爽非其人也貞觀十七年册為紀王妃麟德二年六月薨於澤州館舍靈輿還京陪葬昭陵碑文今不全然其可讀者甚華贍稱妃有七德云書法秀麗為明文待詔之所從出凡華字皆缺末筆豈即妃之諱與唐于惟則建陀羅尼經幢跋癸卯此建於唐宣宗大中二年正月者書法與小歐為近其模糊者巳太半矣後有記乃處士王鉉撰中有云于公稱惟則本河南人也家贍溫恭人稱英亮云云乃關中金石記誤以為惟則撰文則不應自譽如此蓋由其文剝泐難讀故失之不審耳又案文是幢本在長安縣城之艮隅今乃在西安府學學中似此者猥多余謂學乃孔氏之宮明皇孝經開成石經之在其地宜也彼二氏之言胡為乎亦置於此當以道流諸刻歸之道觀佛教諸刻歸之僧寺庶乎各得其所唐濟度寺尼惠源和上神空志銘跋癸卯惠源俗名蕭氏唐司空宋國公瑀之孫也瑀好浮屠法捨宅為沙門比邱尼法願其女也而惠源又繼之其曰神空者非塔也而又別於常人之墓故立為是稱也志述其遺命云於少陵原為空遷吾神也又云以某月日從事於空遵理命也空讀如匿空旁出之空此二字頗新異志銘楊休烈撰姪定書真行相雜頗有渾朴氣象開元二十五年九月二十有三日鐫中間空四字蓋言受戒於某寺尼也某寺下空二字尼下空二字不能審知故闕而不書捨此則無一字闕者甚可貴也唐王居士磚塔銘跋癸卯此銘一字不損蓋近時重摹者也居士姓王名公其人篤信釋氏但未出家耳其殁也遂從浮屠之法曰收骸起塔蓋火化也其文則上官靈芝所製敬客正書中間早標先覺於先覺上空二字不解何意磚字從敷誤又煩惱之惱作惚臆撰無理不可以誤後人唐義興周夫人墓志跋癸卯志云夫人義興人也漢真將軍勃之苗裔晉輔國大將軍處之孫皇明通之女姻不失媛當是援字之訛晉以匹刻作字秦適為太原王府君靜信之妻蓋其父與夫皆非顯者敘其夫亦舉遙遙華胄為言後云以兹吉晨赴杜城東郊之禮也余初疑句有脫字及觀大歷間光祿卿王訓墓志亦云遷厝萬年縣滻川鄉滻川原之禮也則當時自有此文法志不知何人作但有嶽也匪才忝為敘述之語嶽則其名也而不著姓銘亦甚率略此石舊在長安農家畢中丞云近為山西汾陽某氏攜去今此拓本模糊者僅三字不知是元刻抑翻本也唐顔魯公書東方曼倩畫贊跋癸卯魯公守平原時謁東方先生祠下見夏侯孝若所為畫贊乃開元八年刺史韓思復所刻歎其字形纖靡將四十年漸不可識魯公於是更作大字以貞諸石余得此本體勢嚴正風力凛然天寶十三載至今巳九百八十餘年而字皆完好魯公謂字大可久其信然邪乃廣川董彥遠在宋宣和日巳謂其石今已刓剝後世復為摹榻以傳乃書院待詔人所書耳即如是亦已歷五六百年而石何以不壞豈此又為近代所摹勒邪雖然優孟似叔敖虎賁似中郎要必尚有相近者近且令人起敬況其真乎此本尚是三十年前所榻上有陵縣之印是時國書猶未改篆體也其一二破損處乃為人釘壁之所致非本然也唐內侍李輔光墓志跋癸卯右碑崔元略撰巨雅書巨姓也後漢時有漢陽巨覽為梁商掾吏著名碑云門吏晉州司法參軍巨雅以元略長兄嘗賓於北府以元略又從事中都俱飽內侍之德將命録實見託為志是元略自言因巨雅之託而作也關中金石記乃云巨雅元略之弟巨雅曾為晉州司法元略又官於中都故撰書此志以記功德大誤碑文自明亦不待辨碑中用仕君子士仕古通用至宮掖作官掖筆之誤也局字戶下著勾訊字言旁作丸皆破體碑元和十年四月立今剝落者僅十六七字餘尚完然何其幸也唐淸淨智慧觀身經銘碑跋癸卯此唐美原縣永仙觀主田名德所撰並集晉王右軍行書文甚剝泐其標題尢不易辨識關中金石記名之曰永仙觀主田尊師碑蕭森文名德集書非也蕭森所撰乃永仙觀記亦集右軍書同在一碑森稱尊師集王羲之書勒淸淨智慧觀身經銘碑刻石實邁古今云云今以其言諦視碑之首行智慧觀身四字隱隱可辨其下云三皇內景弟子永仙觀主兼檢校奉先等縣威儀田名德集晉右軍王羲之書蓋名德即尊師之名也美原今為鎮屬富平縣又有一碑篆額曰大唐檢校兩縣威儀兼永仙觀主田尊師德行之碑惟光行書上一碑大歷六年十月立此碑先後相去殆亦不遠可知唐太常丞贈諫議大夫溫佶神道碑跋癸卯此碑字可辨者無幾其文牛僧孺所撰其署銜云淮南節度副大使知節度事管內營田觀察處置等使金紫光祿大夫檢校尚書右僕射同中書門下平章事兼揚州大都督府長史上柱國奇章郡開國公至姓名則巳磨泐矣書者裴潾銜及姓名尚全額未之見其銜名亦皆不可辨溫佶者溫造之父也舊唐書造傳載父輔國太常丞新唐書附造傳於溫大雅傳下載佶事為詳云佶字輔國以字行碑載依顔平原李臨淮而文多爛脫新書具詳之碑敘興元之亂李絳被害宰相泣於上前及遣造往誅叛卒文亦多􅍘續又云唐制位三品者父祖得以刻石記神道僧孺於尚書云云下闕敘中稱佶為諫議公銘中則稱先生後年月闕以舊書造傳及僧孺傳考之造為檢校戶部尚書東都留守判東都尚書省事在大和五年七月僧孺之出為揚州長史在六年十二月今文中稱造為尚書則碑之立當在大和七年冬以前以其年十一月造入為御史大夫其轉禮部尚書以九年五月逾月而造遂卒矣故知當在七年無疑也唐西平郡王李晟神道碑跋癸卯此近時所榻然字迹尚不甚模糊唯其間有為妄男子增益者如具以狀聞聞字上本空一格今本作具以狀以聞既無此文理而次以字全乏端重之容與前後以字無一相同者又唐文宗年號大和本是大小之大今本於大字內增一點作太與碑中所有太字相較其點略小亦後人妄加也魏明帝與北魏孝文帝年號是太和而文宗則是大和他碑版咸可據舊本新唐書亦然今人皆一例作太和矣安知不反執此碑以為左證乎宋穆庭秀穆伯初二墓表跋癸卯二穆父子也庭秀名賓其子伯初名端皆不仕本河南人徙居章印相繼在熙寧年間卒葬女郎山之陽至政和三年庭秀之曾孫涘乃請洛陽王壽卿為文兼為之篆以表之字大如杯嚴整有法殆鼎臣之流亞也文亦簡淨可觀壽卿字魯翁黃魯直稱其書法非章友直輩所能管攝抑其人品亦高嘗被召至京師使篆字説辭以與王氏之學異後以命李孝揚而壽卿終身布衣則其篤信古學不隨俗尚為可見矣宋龍泉山普濟禪院碑銘跋癸卯碑在汧陽知隴州閻仲卿撰文沙門善俊行書自署廣慈禪院文學沙門習王右軍書關中金石記云古有集書無稱習書者習書應是依仿為之筆畫雖近却甚拙陋如閻字作門內陷右軍時必無此體余案碑中訛字尚多如虔字似􅍥門右似岡迎字從邙猒字左胃右友奢字從􅎣範字從凡至冠絶作貫絶容可通用樊籠作煩籠殆不可通矣閻字內左作阜右作下日似陷字而亦非也元重立開化珤巖閣記跋癸卯石晉時劉知遠為北平王河東節度重修蒙山開化寺珤巖閣判官蘇禹圭為文記之支使蘇曉書丹篆額今碑乃元至正八年重立者後署御史郭方亨謄書字甚醜惡且多訛別文云謬塵郤桂獲廁庾蓮今作庚蓮元本當不如此蒙山在今太原縣西記云開化寺為北齊天保末所建唐高宗及晉王李克用皆重修文於前代帝王亦皆提行其用意頗近厚也元少中大夫梁天翔碑跋癸卯右題元故少中大夫西蜀四川道肅政廉訪使梁公神道碑銘李源道撰文趙孟俯真書元明善篆額少中名天翔字飛卿汾州平遙縣人世為武辨獨以文階起年十八即為本縣尹以民事詢邑老皆曰可而後行禱雨有應民為之勒石以頌後為禮部侍郎遣賑高麗餞還授少中大夫成都路總管未幾改授廉訪使命下疾革卒於都城年五十五至元癸巳年也夫以縣人為縣尹而年又最少元之用人可為奇矣乃能克自振勵詢於老成如子賤之治單父豈得以其少少之歟碑在今平遙縣城中其後裔所居之內厭椎拓之煩也為復壁以隱之必不獲已而始啓焉余今所得者乃昔所拓之餘也近刻隨姚恭公墓志跋癸卯此志真本不可得而見矣都氏金薤琳琅所載其缺文皆注缺若干字亦有不能定其缺幾字者此似見其真本矣然細案之亦是據翦裁黏貼之本非元榻也蓋其所不缺者亦多有不聯屬處其所注缺一字二字者就其文義必不僅止於是乃有妄人者即就其數而補之讀之多不可通都氏本有大象字周靜帝年號也則不能續因並去此二字其末諡曰恭公以下脫文必多今本補乃為之銘銘曰六字揆之文氣必不應爾且並不知銘之有韻也於逝川下補何既二字與徽猷永遠句不相叶其謬妄一至是但觀前署名兩行實都本所無一云內史侍郎虞世基撰文一云太常博士歐陽詢書丹又別有廩軍二字乃補篇中所誤遺者蓋篇中有莫不家實食句食上脫廩字又將之泉又竭句將下脫軍字都本則作食廩與將軍文並不缺而近人刻金薤琳琅者乃以廩軍置內史侍郎之首更大誤矣又近本銘後又別出祀掩二字蓋因篇中方陪祀嶽遽掩佳城二句祀誤作紀又掩字脫故補正之耳觀此則近本亦非竟全然無據者但不知闕疑而妄作以欺世為可恨耳唐太宗祭比干文近亦翻刻然其位置一仍其舊所缺幾何字可得而指數也使仿刻者盡如此又何譏乎然此書法實秀整不可謂不微有得於率更者余是以亦不棄焉弟子陽湖李兆洛紳琦校抱經堂文集卷第十五
