body:
  text: 東里盧文弨紹弓傳四四川安邉軍民府知府季章閻公家傳甲辰公諱文熛字孕華一字季章姓閻氏太原文水人先世自陜西延安來徒家至公十二傳矣曾祖慧中明工部員外郎祖雨霑父太和皆以公貴贈中憲大夫公少穎異為世大父中丞公所器與講聖賢實踐之學一言動莫不有規法為仇人所誣繫獄讀書不輟事白即以是年應順治十一年鄉試中式越十餘歲當揀選為縣令以母夫人楊年高辭不赴既十上春官不第母楊夫人已前卒公亦年逾五十矣乃謁選得四川敘州之珙縣蜀當流寇殘破之餘珙又處萬山之中戶僅百餘賦之以錢計者才十二三千親知咸為公憂之公恬然就道既抵成都值滇藩吳三桂作亂川西多為逆黨所據不能履任奉檄署江安王師之進勦者道必由此時秋水方盛江流浩溔當為橋以濟橋成為大雨所敗公自劾求罷大府知非人力所及留之既而赴本任邑未有城郭榛莽塞塗猿虎縱橫有公廨而無內宅公治事三年招徠安輯戶口漸增荒土漸闢民力有餘乃使之築城浚隍開通道路民未知學為遠購經書以教之而秀民漸知向學矣民不習為吏示之律令格式而願民漸解行文書矣猶有頑民未靖者為多方以誘之不聽然後加以鋤翦乃皆畏法唯命之從大府廉其能更試以富順隆昌南溪又再署江安一歲中歷四縣所至輒辦於是舉治行尢異擢敘州府分防建武同知所轄二州十縣綿亙五百餘里供賦之民止千餘戶此外皆屯兵公輯營伍恤驛站常騎一瘦馬隨兩三傔從往來巡閲治東南岡嶺重互姦民多嘯聚其中公直入其巢諭以禍福賊感其至誠投戈效順悉出歸農是時親王統大兵征川西餘孽又大帥之養馬於邉者經過駱驛守令皆儒吏常懼獲譴公從容應副民亦不苦征調大吏剡章入告授安邉軍民府知府舊制軍民府以土司為長官經張獻忠之亂土司殱焉以流官為之實自公始適奉令督採楠木入深履險與役人同其作息而役人皆忘其病有以蜀賦輕議增者公持不可乃止復開荒地成良田千餘頃茍有利於軍民者竭精力為之卒以此病康熙二十九年請告歸以四十六年六月三日終于家年七十有九凡三晉階至中憲大夫妻侯氏繼妻張氏薑氏咸以次受封子三直野殤直疆直郵皆附貢生孫九曾孫二十有七具著於譜云舊史氏曰士必安窮約習勞苦異日乃無不可處之境為能專一精神出其材智以稱上所任使而不曠厥職如其委質方始即計校缺之美惡有所畏忌惴惴然唯恐或得之不幸而竟得之神氣沮喪蹙然幾無以為生烏乎世豈少若人哉公所居官皆常人之所不能堪而治行乃彰彰若此彼但知求美官善地以逸其四支肥其身家者得不聞風而顏汗乎拔貢生注選直隸州判張公佩家傳甲辰今山東膠州知州張君玉樹始成進士時先府君即棄養進士唯恐懿媺之不克聞於後也汲汲求所以發揚之既得當代賢士大夫之文若表若志若傳若記皆僃矣而意猶未巳雖以走之不文跧伏里閭亦介以為請余久解史職立傳乃史官之任也意者傳諸家諜或可乎按狀君諱書紳字公佩乾州武功興城里人遠祖自光州固始再遷至今縣在前朝多以甲第顯考諱錫爵處士君幼即開敏受書若素習家貧不能具十艇幾欲廢業孰師愛而留之乃益自奮厲廩冬單襦布屨取筥盛稻秸歃兩足其中以禦寒或復繞屋蹀足行且行且誦經皆通更請師授詩文義法弱冠受知學使者為諸生試輒高等名譽日起君志在經世不欲但以文名與里中孫君景烈同學相切劘仿藍田呂氏鄉約行之多有應和者於後孫君入詞館而君顧久躓場屋乾隆十四年詔書令封疆大吏舉才品優長者制府尹文端公撫軍陳文恭公欲以君名上既復不果僅一主本邑講席多所成就學者即所自號稱誠齋先生嘗在榆林就見行二十四事復推廣善政十餘條時大學士高公方為榆林副使見而善之悉取施行三十年歲在乙酉當舉拔萃之典君於時年巳逾艾泊然無用世志矣學使海寧鍾公蘭枝擇諸士無出君右者乃特拔君充貢廷試注籍直隸州州判以歸子玉樹先巳登第買田鳳泉山莊以娛君君徜徉其間自號巽岡居士鄉人欽其行誼雖婦孺亦翕然丕變無有詬誶冶遊者君又時時以敕災分憂為己事三十五年春歲薦飢創率助米煮粥以食餓者所活無算事方竣而君病矣遺言訓玉樹以臨民之道曰為民父母當如吾之弗薄汝汝能使民亦弗薄汝始見汝之弗薄吾也以是年三月十日卒年五十有九君之事處士君也玉樹幼不能詳但見君事母耿孺人孝耿孺人一旦欲􅍘肉食君捧豆以進勸過苦致拂意君長跪竟日得釋乃起初娶楊繼娶喬又繼娶楊皆前卒子二長玉樹乾隆二十六年進士初知東昌淸平縣覃恩贈君文林郎前楊氏繼喬氏皆孺人調繁兗之嶧縣今任萊之膠州知州次寶樹拔貢生充四庫館謄録出為叔父後舊史氏曰余往來京師取道於嶧者數矣歲在庚子復由臺莊驛登陸過陰平見新樹豐碑五六皆在嶧之境漢之名臣若袁司徒蕭丞相輩皆大書深刻令過者伏軾發懷古之思焉時為令者即君之子也觀於此即知為政之綽有餘裕而能使民用命矣君懷藴經濟不一試而發抒於其子飮流溯源蔭枝尋本子之賢父之教也治命數言尢􅝴切深至居官者孰不有父母茍不忍人之怨詈詛祝其親也其其當服膺斯言周君坦之家傳丙午昔人常言出一傷元氣之達官不如出一培元氣之處士如吾表弟周君者能以孝友之德上承下啓雖未嘗以文學致身而迹其所為正足以愧彼祿利是營者今孤子載棻等來乞余為之傳傳者史官之職非余所敢任也若以載於家乘則凡門人故舊皆可以為之余又奚辭君諱世道字坦之又字復誠先世自會稽遷杭居仁和之東靑里至豹先公以仁惠周於宗黨至今猶嘖嘖人口君曾祖也父金門公諱兆鑭自金門公而上志行悉具於家乘君少英敏好學年十七因金門公以勞得疾所遺鹺業幾折閲又無可委託者不得巳以身肩之節嗇諸無名費於後始稍稍復振弟敬之殁時孤載章始周歲君撫愛教篤甚至年十九舉於鄉他若營先人窀穸修祠宇家乘等事罔不竭力以為諸子姓兄弟倡其訓子則曰居家以孝友為本處世以和平為先嗚呼君實允蹈斯言憶余弱冠時嘗得君家乘讀之大率以孝友著今君可無愧其先人矣二子載棻載嵩皆恂恂謹飭載嵩縣學生君以乾隆五十一年閏七月十三日卒年六十有五娶沈孺人論曰俗之衰也有以同氣而爭財鬩訟者即其所得業巳盈千纍萬足稱富翁乃以小有贏絀之故不憚匍匐公庭行賕於長吏致賂於要人市歡於羽黨要以蘄一勝而後快財一日不盡則訟一日不止彼貪吏之後更以此取禍者未嘗無也吾聞君臨財也廉故能不失其孝友之緒君之後必有達者苟能行君之行守君之酬又何傷元氣之為慮也哉瞰江山人傳丁未瞰江山人者常之江陰人也邑之東南有瞰江山距山人家二里而近故以為號焉父死三月山人乃生母劉孺人辛勤鞠養釁起家庭間幾有破卵毀室之患母內藏其明而外以柔道行之故屢瀕於危而卒獲免山人始就外傅便知好古學少長就老儒車質齋學其家多藏書縱山人博覽習舉子業者羣相與非笑之語聞於母母召而詰之則以如築室者必厚其基為對母日誠然任汝為之山人益得沈酣其中抵臘猶戀戀不肯歸一生學殖之厚實基於此補郡諸生其伯兄先入縣庠有文名常謂日吾異日終不如弟弟之文有根源故也山人素守母教律身以正待人以誠值窘乏益刻苦自厲雖通曉世事絶不肯為人居間排難唯忍飢閉户讀書曰吾懼此處一移足便終身落坑宑也同門友貢息甫令建平邀之往邑多地訟歲久不決一案之牘高幾盈尺山人不憚煩為之一一爬梳要領既得先以曲直之大判明示之而期日與質兩造往往各自輸服請無對簿而願寢息者過半矣諸欲為姦鬻獄者咸不便山人所為讒言繁興而終不得間於是建平之政聲為羣有司最經再期辭歸先是山人以故明殉難典史閻陳二公請於縣立專祠後令劉君復捐俸為之新廟貌贖祭田有年數矣無賴子乘山人之出逐守祠者奪其田而有之山人歸告於縣乞復其舊時凶焰張甚縣官頗右之山人以一身搘拄其間幾為所窘賴同里楊主事蒼育邢秀才象三咸相與維持之事乃得直還祠田召道士守之又邑之名宦鄉賢故有專祠教諭某私以其地卑學胥而遷其主於大成門左右更衣之所山人與教諭爭數四縣置若不聞終身以為恨事山人性剛直其所不可者終身不能強顏與之歡亦不樂與顯達交曩文弨之主講暨陽書院也山人居邑中不自表襮故名莫得聞逾年邢君袖其所作詩古文辭並要與俱來余一見傾倒遂為莫逆交余官罷主江寧之鍾山講席身自請山人佐余所不逮山人欣然許之余有所述作必取正於山人能貢直言無所隱凡余所蓄書數千卷山人校讎幾遍有求文並質疑者歡然應之無少靳余門下士咸知敬愛山人間有以私干者率峻拒之先後共朝夕凡九年供給至菲薄而山人不嫌也山人詩文集外著有讀書一得六十卷其體例與黃東發日抄相近注陶徵士集凡數易稿又注徐庾溫李羅昭諫等集並近代陸拒石四六各若干卷著桑梓見聞録八卷八十外復注顏氏家訓甫脫稿而疾作始辭余歸里中余今年寓書求其副本欲為傳之山人欣然許諾而力已不能自鈔矣以乾隆五十二年八月二日考終於家年八十有三山人姓趙氏初名大潤後易名肅字敬夫意欲自警其頽墮也晚復更名曦明考雨若處士余嘗為著家傳矣娶於吳生子二貴中庠生守中出為從兄後妻與子並前卒孫一人同華庠生贊曰先生有用才也雖不得位一施其利濟之具然巳為衆人之母多士之師有餘矣成人之美而不尸其功實浮乎名究有不可得而掩者先生之嫉惡若過於嚴然孔子稱惡不仁者之為仁不使不仁者加乎其身身既潔矣寧肯受物之汶汶乎所為詩若文沖瀜演迤不為震蕩險怪之音此又其養之足微者顧今而後誰相知定吾文乎我有不可誰余規乎分首無何頓失良友此所以涕泗漣洏不能巳於質亡之歎也族子天保縣知縣孚尹小傳丁未孚尹名鳳起一字翥堂仁和人族系詳譜中考諱夀朋字備三晚字息溟邑庠生贈文林郎贈公受學於吾祖書蒼公與先考敬甫公暨吾外舅桑韜甫先生同讀書三益堂交相得也性介潔寡所諧一館於淮上未半歲即辭歸終其身授徒里中先娶汪孺人生一女早夭繼娶李孺人有賢德能安貧贈公意有不可常婉順以承無少忤生四子一女孚尹行第二幼穎悟贈公自教之年十六試補縣學博士弟子員未幾丁母憂時贈公年將耆矣孚尹侍左右聚二三童子教之束修所入苦無幾贈公有僚壻朱君右璜任山西澤州府同知有書招之戀其父不欲行父強之及往郡之英俊咸樂訂交與今河東河道總督蘭公尢相契也鳳臺王明府聘為子師盧歸浙鄉試道遠不能復來為援例入太學就順天試再舉而後獲雋時乾隆二十四年也明年春闈不利即丁贈公憂回里服闋考授咸安宮官學教習三十三年欽取內閣中書未上以教習期滿選授廣西遷江縣知縣其地民􅍹雜處俗獷悍喜訟夙號難治下車察蠧吏去苛令視民所疾苦便安而興革之民用大和上林有逆匪滋事大府命往窮治兼攝其縣事僅三月悉砥定又令攝歸順州事復聘為鄉試同考官疾作不果入闈四十二年調天保邉地要區也治之一如遷江嘗有盜未獲伍伯執一人並贓物以獻其人至即自承察其色疑有冤更慮贓物失主間有妄認也因以已物雜廁之示失主失主皆曰非也乃研究得畏刑誣服狀立釋之退語人曰盜不獲去官是吾分也敢輕人命以規免考成乎吏議失盜降二級調用有級抵得不去官四十六年秩滿大府方將剡薦疾又作竟以是年六月一日卒於官年五十有一娶北通州金氏子一學敬國學生女一適國學生山西太平史克綱孫一纘武葬錢塘北四十里橫山系日五行之相生也各一其性以吾兄之介也而孚尹以和承其後和故入世無齟齬友于兄弟信于友獲于上仕駸駸顯矣顧僅以百里之效見於時而不獲大展其用豈非命乎乃其母李孺人之賢行吾稔知之亦將為之傳以繫於家乘焉姚君廣之家傳戊申君諱家勤字廣之姓姚氏國學生先世由休寧蓀溪遷杭州著籍錢塘本生曾祖首源公諱際恆邃經學富著述所交遊皆一時賢達與同里吳徵士慶百蕭山毛檢討大可尢相契弟公射公無子公篤於友愛命次子房仲公後焉君之祖也生二子仲為邑文學王言公君之考也沒時君年方十有一上有兄醇之母戴孺人在堂兄常客遊以為養既冠而憂家計之不支且不忍兄之獨任勞也乃輟讀書佐治生常廢著往來四明東甌間家幸漸饒而伯兄遽沒繼即居母喪伯兄兩子長子與其婦相次偕殁次子又蚤世數年之中疊遭大故君獨身仔肩僃極憂瘁一切殯葬咸如禮兄遺一女為擇對厚其奩贈而遣之一再省祖墓於新安漸夷者培葺而謹護之與族人敘輩行恤弱周貧極盡敦睦之誼姚先世多名人家藏法書名畫甚富中經世變遂致散逸君多方購求一日於肆中見蓀溪草堂圖為遠祖琴泉公物唐六如所贈者大喜亟豫多金攜歸寶藏之所居扁署率用先世舊題其不忘祖澤類如此娶汪孺人曉園少宗伯之女弟也君自奉儉而樂施豫孺人實有同德焉三子皆同生中淇國學生珄邑庠生中淮國學生孫四人成增祥森君體素強歲在丁未之季秋忽感疾他事無所繫懷惟悼伯兄之無後亟命以中淇子森為兄長子德喻嗣寢疾浹旬而卒是惟乾隆五十二年九月十一日也年六十有七一女適同邑桑韜甫先生之孫廪膳生桑庭橒舊史氏曰昔夫子見禾之穗垂而向根也滔滔然曰我其首禾乎至若范喬之泣硯鮑德之治笥魏謨之藏笏張湛守其先人避寇過江所攜之列子而為之注惟聖與賢其重本也咸若是迹君之行事與若人何多讓焉子聞之於桑文學者如此乃亟為之傳而發揚之世有聞其風者孝弟之思亦可以油然而動矣承文學應韶小傳己酉承姓之見於史者後漢時有承宮少孤八歲為人牧豕過經師舍因願留門下執苦勤學數年經明當明章朝拜侍中祭酒此古人所云經茍明取靑紫如拾地芥者其言誠可信也乃有孜孜好學而天不與之以年其姓氏與侍中同而不能同其遇相知者不能無深惜之江陰趙瞰江先生嚴氣正性人也嘗主於東鄉之承氏承氏有子日寶鏞字應韶生而恬靜嗜讀書其師王秉政亦端慤士也誨之學咸領解間習為詩賦亦苕發穎露趙先生美其才許其進而未已也聞書賈船至亟求佳本蓄之每一書必依次讀終卷不徒為插架美觀也書賈每載書來必先就承氏且為之語曰澄江江水澄揮錢買書誰著稱西鄉殷東鄉承入縣學為弟子員不一年病鼓脹不治歾於乾隆五十二年九月年僅二十有五遺一女以姪某為之後其師王秉政深慟之收拾其遺文請余審擇之且告余云是子有遠識而用情恕嘗宴某公家坐客甚盛有無賴子突入橫索錢主人固不與無賴子怒視而去歸而道其事謂某公今日真幸也設無賴子衆辱之將若何縱經官懲治所喪巳多且獨不慮後患乎有陰陽家勸於屋後樹一表以懸燈云可邀福祥勿為也其不惑於雜術小數類如此嗚呼是亦足以見其為人已趙先生後就余鍾山講舍每稱承氏主人之賢待我厚且言承氏有令子趙先生先應韶一月亡如及見其天也不知更若何為之痛惜已余案間叢雜尚無暇次比其文而先為是傳以表之毋使其沒沒焉以其所師友皆端人其言宜可信固非漫徇其請也使斯人而有年也安知不可踵侍中之美乎而胡為乎僅若是也不能不為承氏惜矣國子監生丁君體曾家傳己酉嗚呼今當登明選公之日而士猶有力學不遇者天又不與之年使成一家言以發聞於時茲豈非命也耶吾於丁君有慨焉因其孤之請而為之次其行誼知其克上承遺緒而將貽休於後人也君姓丁氏先世自潭之醴陵遷常之武進在宋與歐蘇同時者名寶臣弟兄同登第邑人榮之雙桂坊所由建也代有聞人詳於譜諜考通議公諱廷讓由進士起家歷官至江西按察使妣沈淑人生三子君其季也名汝驊字體曾自始生迄壯歲常隨通議公宦遊無須臾廢學為文振筆數千言立就先達昭文邵太史齊燾海陽胡方伯文伯咸深器之暨隨秋賦佹得之輒復失之年五十一乾隆五十三年十月二日以疾卒於所親之甌寧官舍君鋭精學業每夜漏未盡即披衣起雖旅次猶然常以是訓其子曰讀書欲得淸氣吾於平旦時覺有領會耳事大母父母色養僃至族叔祖母張早寡無子聞有奪其志者攜一女踉蹌來因養之終身為禮嫁其女伯兄將之官湖南適前喪其二子顏色甚戚君不忍遽離遂與偕行為佐治內外事逮以試事歸所親令閩中者又強邀之往值海寇鴟張羽書旁午督軍需甚急君勾稽擘畫悉中程逮事平而君竟以積勞促其生悲夫君從宦久深達治體初不欲以之自試也而事會所值亦顯利器材然文學致身之念未嘗一刻忘而竟不獲遂友朋知君者咸唶惜之君娶於瞿其家中微遺孤方七歲君撫之至成立且葬其三世又贖田以給之他義舉率類此子四人履泰拔貢生履益國學生履晉縣學生履恆亦好學從余遊孫一人延季論曰余主講常郡之龍城與君家鄰見君諸子咸雍容儒雅能文章君負才鬱鬱不得志以殁將收其報於後人昔管寧渡海遭風以一朝晏起為己過君一生常蚤起其乘白下舟過黃天蕩也值風濤大作舟人咸色駭而君執卷長哦神氣自若殆亦自信者有素也淸氣之訓吾將銘君言於坐右以警後生之不能蚤起者盧君靜夫家傳辛亥余宗人靜夫君寧波鄞之小江里人考溫州府學訓導敬亭府君諱垣祖考明村府君諱兆晨敬亭以父年高早辭官歸養余先贈公嘗館於鄞與敬亭敘宗誼甚相得也後余至鄞亦主君家君時年方壯耳與其兄皆待余甚謹暇即就余談諧無倦容別後久不見見君之子雲路於吳中亟問眠食無恙意甚慰後不能數數見既而雲路作縣鎮江之丹陽今秋調任蘇州之昭文過毗陵相見出其所撰尊人行述見示始知君已長逝不可作矣噫余將何以寄余情哉因揭其行事之媺而為之傳君名登秩字武成靜夫其別號也母周安人家世習儒叔父與其兄皆遊膠庠不能以家事紛其業君祖念門戶所寄以君有幹理才家政一以委之鉤稽擘畫悉中程度內外無間言逮司訓君乞終養歸君奉事重闈僃極誠孝弟兄羣處融融怡怡如也其訓子也嚴雲路始服官誨之曰官無小當一以濟人利物為念家幸有薄田足供饘粥勿為甘旨憂也雲路任上海日值府君周甲之辰迎養在署聞僚友欲製錦屛召樂人佐觴上壽者堅辭謝之未幾即歸里中時上海許穆堂侍御喬公子朴園皆在鄞素重君相與遊從無虛日盧氏在甬上族派繁衍君有志修譜牒建家廟以明敬宗收族之誼汲汲焉殫精力而為之靡顧其他逮次第蕆事而巳勞瘁不支矣其卜葬考妣與兄耐軒也猶自力相度督率衆工位置既定將遷匶值天大雨府君徒步不避泥潦衆皆以病體冒風雨非宜固請乘肩輿府君必不肯匍匐哀號感動行路及窀穸甫畢而病愈深矣彌留之際神氣湛然念諸子俱巳成立遺命析産且以書告雲路令服闋必弩力為好官方不虛吾生平教誨之意常日與雲路言汝在外遣信歸於諸弟宜各致一書亦友愛之一節蓋府君事無小大俱計周慮密如是是則可法也巳以乾隆五十年三月十一日卒距生之辰為雍正三年七月二十五日年六十有一候選州同知例封儒林郎兩娶皆范氏早卒又娶吳氏贈封咸如例子七人長即雲路次雲程雲龍雲林雲剛雲中雲逵女一適太學生黃定基孫五孫女七曾孫二名俱具譜牒中論曰以君之才不及施於國然觀其居鄉所施設唯以根本為先務君子以為得要道矣禮言五十不致毀六十不毁君之葬其親也不肯以權道拂禮經不肯借偏辭以自解免既老而猶為孺子之慕斯不亦古今所希覯者乎君懿行雖多即此一節業足以傳矣陳祇園先生家傳乙卯先生杭州錢塘人也名兆瑜字發奇晚自號祇園與文弨居相近也而未相識乾隆三年先生舉於鄉而文弨亦以是年舉順天鄉試為同歲生情親矣而事境齟齬亦不獲常會聚逮先生解組歸來僅得一二面文弨亦常年客授於外歲杪歸里叩先生之廬庶幾從容談宴一補從前之缺陷而先生巳躋大耋雙目失明閉關謝客久矣然文弨於先生蹤迹雖疏而於鄉里朋好之間頗深悉先生之為人蓋粹然篤行君子也乃今以乾隆六十年九月二十三日考終里舍享年八十有九先生初官湖州之歸安訓導勤於誘迪識拔丁杰於諸生中丁後成進士官寧波府學教授其人亦端人也頃在杭州於先生之沒也哀悼甚至思有以不朽先生者為具事實以來求文焉噫近世禮教衰學博士之於弟子員非能講師生之誼也諸生當其在庠序中且有因小忤而致喧競者一旦得志以去視學師如路人更有抗衡若平交者士習之敝甚矣然亦由為師者不能以師道自重故遂陵夷至此今丁君誠能行古道苟非先生克盡為師之職亦必不能入人之深如此以丁君所親被之教澤其言自無不可信也在歸安六年以本班當選知縣初得湖北之應山引見特調廣東之大埔慈祥化物從不輕責人甲午分校得士陳文耀等八人士論允服繼因目疾力辭歸里先生仕雖不顯而居其官即能舉其職大概可見矣庚子年南巡接駕蒙恩賜大緞一端先生內行修篤手足之誼甚摯里人稱焉敕授文林郎初娶畢繼娶施贈封咸如例子三人長元鑑次元鐘江西撫州府東鄉縣縣丞三元炳杭州府學生員孫四人汴肄業國子監生萬淸文瀚基皆業儒曾孫二人福齡昌齡弟子武進顧明子述校抱經堂文集卷第二十九終
