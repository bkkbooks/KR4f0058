body:
  text: 東里盧文弨紹弓序三皇朝武功紀盛序壬子本朝用師之盛如疾雷之破山驚風之卷籜當之者無不糜碎殲滅曠古以來罕有倫比世祖定鼎之初蕩流寇而除小腆出斯民水火之中登之衽席之上雖草野傳述不詳猶可於明史中得窺見一二崖略焉聖祖世宗咸以英明神武之姿端拱指揮凡叛逆者罔有不誅侵犯者罔有不創傳至我皇綏靖海內益務休養本未嘗有開邉拓境觀兵耀武之意而乃有蠢然自外於王化者誠不得巳而應之紀律明賞罰必發蹤指使人百其勇所至率冰解的破覲揚之烈實竝美於列聖焉自來武功告成咸有方略紀載而郡國人士多願見而不可得今皇上頒發四庫全書於江浙許學者得以縱覽而方略亦在其中欲知昭代武功之盛幸於此得見其全而不致惑於傳聞之誤顧卷袠浩繁逾旬朔閲之猶未能遍也陽湖趙觀察雲嵩夙具史才起家中書舍人入直軍機房旋以高第登館閣緬甸之役奉命赴滇參軍中幕畫既又揚歷封疆解官後大臣之勦臺灣者猶強挽之與俱其素來既博徵典故隨事紀載而近事尢親得之見聞頃來掌教揚州四庫全書之頒也其郡當謹藏於行宮內之文匯閣一切整齊次比實與其事故自聖祖之平定三逆以暨今上臺灣之役凡夫歲年月日以及山川道里與夫在事諸臣之功過得所徵信一一皆有據依於是以四卷之書括之其事則詳其文則約其顚末曲折無不朗若列睂使人一見之而驚歎神謨廟算為黃帝以來所未有向者見羣臣所上賦頌雖皆揚厲偉烈豐功之盛究未若斯編為能洞悉事之原委因得仰窺列聖之明睿果􅍘智炳幾先而神周萬里者一一彪炳於楮墨閒若揭日月而行誠足以昭示無極也夫善敘事者莫過於馬班要在舉其綱領而於糾紛蟠錯之處自無不條理秩如今是編也馭繁以簡舉重若輕深得史漢之義法而尢有不可及者其於兵勢地形之利害言之悉中窾要是不獨史才且將才也徒弄三寸毛錐子者能如是乎至若緬逆之難明將軍瑞盡節而死人知之而其功則未有言之者得是編為表章明將軍不死矣異日修國史者其必考信於是史記索隱校本序戊申始余初讀三家注史記本見索隱之說往往互岐首卷後既載索隱述贊矣又云右述贊之體深所未安余初疑後語不出於小司馬後得毛氏單行索隱本始知小司馬初意欲改史公體例自成一書後以此書傳世巳久忽加穿鑿難允物情遂輟不為而但為之注其欲改創之規模別見於後本不與注混趙宋時始合集解正義俱繫之史記正文下遂致有割截牽並之失今幸有單行本為正之然毛氏所梓亦有次第顚倒脫文訛字難可盡據則仍當以三家本正之余向以單行本記於三家本上猶未知擇善而從也今雖可為是正而年巳老矣且毛氏本行密字小不便增改其上於觀覽亦不適因令人略加展拓重鈔之稍序其先後辨其離合而於文字之閒尚未能以盡正不無望於後之人後之人因余書而復加以考訂之功亦庶乎其易為力矣乾隆五十三年十月既望序校定熊方後漢書年表序壬寅表者明也標明其事使著見也表而不明則有之庸愈於無乎史之有表也創於子長而沿於孟堅其體例亦不盡同史記功臣王子侯等表以帝之世統侯以侯之年繫帝或一帝之世而子孫繼承或一侯之身而年數離析此則典籍具在故紀載可詳漢書則以侯之子孫世次為序而承襲薨卒之年多略焉得母遭漢中絶文書散亡雖欲如史公之例不可得乎建武中興而後東觀史臣猶相祖述傳於今者乃獨有范氏之紀傳耳志猶賴司馬紹統之書可補其闕至於表則亡也久矣唐劉知幾著論以史之有表煩費無用讀者緘而不視嗚呼此其所以湮沒之易易與去之千載當宋南渡時有澧州參軍豐城熊方者以所為後漢書年表十卷進於朝未聞所以可否之者史家亦不著録鄭氏通志馬氏文獻通考皆不載吾友鮑君以文得宋梓本欲復開雕以裨補東漢史之遺闕既手自讎校又益以嘉定錢宮詹辛􅎝弟兄之覆審而復以示余余偕老友江陰趙君敬夫重加考核粗訖功攜之入燕又攜之入晉奪於他事此書置几案閒四閲歲矣今年正月兀坐精舍無應酬之煩自念此書若不及今整頓恐後精力益不支於是發憤為之位置高下排比疏密一一皆經手定宮詹之意重戒更張即余亦豈好為改作者然熊氏草創之勞固不可泯而其抵忤之失亦不能為之諱若復因循或轉致貽誤後人於是更定其尢甚者數條與夫未是而猶仍其舊者皆著說於下以俟後之人取衷焉且令其體例略仿孟堅分封徙封皆大書之庶有子孫承襲者不致混然無別舊異姓侯中有同姓四人今俱巳改正至建安中政由曹氏本不以漢宗之故疏恩凡舊置異姓者固可無庸別出熊氏本書惟據范史然亦尚有漏者至章懷注中所引若東觀記續漢書皆正史也又水經注一書酈氏就所沿歷詢訪遺封於年代亦不甚遼斯為可信故亦閒增一二其出於子孫譜諜若新唐書宰相世系表之類咸不濫收斯則余損益之大指也其或前後尚有未能畫一者則因不欲過損本書之故閲者當可以共諒焉夫馬班之表可以補紀傳之所未及故其所繫為尢重史通漫不加察從而致譏他人之緘而不視更復何責今此所補之表則但因范史之成文本不可與史漢竝然夫功狀事實豫奪拜罷之班班具列者一覽可知既觀紀傳又及此書提綱挈要於是乎在論世知人不勞而得不誣古人不誤後人此余之所以兢兢致愼遲之久而始得以報鮑君也熊氏字廣居靖康中舉於鄉嘗名所居堂曰補史進此書不得命又進狀於朝乞命儒臣續古今人表噫此則過矣夫班氏之區別九品訾謷者不獨一知幾尚可以效尢乎想爾時雖不深責定一笑置之耳巳乾隆四十七年歲在壬寅孟陬月下旬六日杭東里人盧某書於三立書院之須友堂錢晦之大昭後漢書補表序辛亥宋儒嘗言讀史易令人心粗夫史非能令人粗人自粗耳則雖以之讀經亦何能免於粗也宋儒又每以博聞多識比之玩物喪志故其於史也略識興亡之大綱用人行政之得失而巳自謂括其要矣其他典章制度因革損益之樊然具列者率無暇留意即有所撰述亦不能通貫曉析事事合符其病皆由於譾譾拘拘不能廣搜博考以求其左證而且專己自用不師古人其或時異勢殊有必不可以沿襲者而又不能得變通之宜此而謂之為粗其又奚辭向鮑子以文欲重雕宋熊方所補後漢書年表余為之佐校訂而其書之舛漏殆不可枚舉首載同姓王侯表冠以因子追封之齊武王縯魯哀王仲於史例即不合念校書與自著書不同如欲盡加更正既於熊氏之勤勤掇拾者大沒其創造之勞且改之亦必不能盡善何也其規模之巳定者不能易也勢不得不出於委曲遷就欲遂以為完書也其可得乎故當時但即因其書而略正之惟綴一二校語於下不相雜廁使人知為熊氏之書而巳私欲別為一書自愧力有未能也嘉定錢君晦之其學浩博無涯涘其思緒細密精議洞達治經而經通於周秦漢魏之書無不爬羅剔抉曩於都門欲請其所校書繕録之會君南歸巳僦潞河之舟不果未嘗不時往來於懷而思一覩之為快也頃獲其所撰後漢書補表讀之非若熊氏之僅取材於范書陳志也凡山經地志金石子集之有會於是書者罔不網羅綴緝而其體例一依班氏之舊諸侯王王子侯分為二表功臣侯與外戚恩澤侯亦分二表視熊氏之但以同異姓為別者較然明矣其不能不與班氏微異者班書百官公卿表前敘百官沿革若後漢則有司馬彪之續志百官巳詳無庸復出故但云公卿表此又變通之得其宜者也凡熊氏所漏脫者悉考而補之於是此書乃始完善而無少遺憾矣夫史莫重於表志而自漢東京以至於隋志尚閒見之表則全闕表也者標也標明其義類使綱舉而目張馬班之為是也亦兼以補紀傳之所未及今則年代懸隔古籍散亡如東觀記謝承華嶠之書皆不可復見唯即舊文之留傳者而薈萃之然亦未嘗不增益於范書之外俾夫善讀史者更得參互考證以資其聞見於凡政治之汚隆職官之賢否一開卷而瞭如指掌以之為津筏也可以之為龜鏡也可余之所謝不能者而錢君優為之見今版行諸史既以續漢書志繫范書之後亦當以此補表並繫之於以配馬班而始無不完不美之憾此豈讀書略觀大意者之所能乎哉錢君之於史事其精確也如是況於治經乎特是豫今雖欲盡發其所藏而巳自傷耄及非復前日之尚可讀矣摩挲此編有餘慕焉續漢書律歷志補注序乙巳律歷之源皆本於易自圖書出而天地自然之數以彰聖人既則之而為易其用至於不可勝窮於是審音制樂治歷明時相因俱起莫非聖人之所創造以為治天下之道用若此其重也逮其末流易且專以為卜筮之用而律則委之泠人歷則屬之天官家皆以為非儒者之要務嗚呼彼泠人天官家能習其數而巳能知其理乎能通今術而已能兼曉古法乎古來大儒若鄭康成若朱子若許文正皆宗聖人者也求聖於內亦不遺乎外其於道與藝殆一以貫之矣故以為非儒者之要務者皆怠與棄而又自文其不能者也始吾讀兩漢律歷志有意欲通之而苦於不能布算則就同館嘉定錢君莘􅎝而問焉錢君示我以乘除增減之術並以所校兩志卑余余得以正家本之誤焉然其推算之術終苦於思不屬而止今忽忽三十年矣華髮盈顚益難重理前緒頃復來主鍾山書院而莘􅎝之從子溉亭亦為郡博士於斯一見如故交裒然出其所著有補注續漢書律歷志在焉則校之余前所得於其從父者布算益加密辨證益加詳於前人說之未是者雖通人若蔡中郎其論開闢至獲麟之歲與馮光陳晃所言俱誤亦駁正之向所苦於難讀者以訛脫之字多耳今以晉宋志參校皆得補正朗若列睂瞭如指掌使後來學者皆得所從入之徑是書得此遂無復遺憾於此見儒者之功非藝人之業之所可幾也彼唐之一行其於歷學古今推以為精然不解太初甲寅之元而謬為之說又不明杜預所以為長歷之恉而輕相訾謷此徒知今者之不可與道古也必也合今古而會通之微儒者誰與歸溉亭父子真其人乎吾何幸而皆得交其人讀其書也翰苑羣書序甲午官有所由重朝廷之重是官必先思其可重者何在斯其遴選也不得不愼而其禮遇也不得不崇居是官者亦必有以自異於曲藝雜流之幸承恩澤者而官乃重也詞林之職古今以為榮選其於主眷之隆渥一言一事津津傳為美談然使在上者以為此吾之私人而故厚焉在下者亦惟是以得數望淸光效賡揚歌頌之美為幸則其事皆不足道也君以朝夕啓沃望其臣臣以隨事納忠效於君君臣一德歡然無閒其任不在職事之末而其所長亦並不在文字之閒是則上之所以重是官不為過而其臣之得此於上非幸也是編為宋洪景嚴氏所􅡔緝自唐以來事例略可考見誠有足動人歆羡者然不探其本而言之徒以遭遇好文章稽典故之主侍從雍容之外別無裨補其與夫曲藝雜流之幸承恩澤者何以異是官本重而其所以可重者曾未之思也將何以取重於其君而使庶司百職事羣羡以為淸華之選乎先余未有是書因借本録竟手自校對漫識數語於其端關帝事蹟徵信編序丙申古今來英魂毅魄不死而為神其祠廟或領於官或祀於其鄉而止未有靈威肸蠁千載如生自天子以至士庶婦女童孺罔敢不䖍自京邑以達於邉徼外裔無不為之廟貌以崇奉之如帝之盛者也帝為漢之漢壽亭侯其封帝也始於明神廟時我朝順治九年世祖章皇帝敕封忠義神武關聖大帝今上又加靈佑二字且因臣工所請而諱神之名易神之諡尊崇之典視前代更有加焉帝之事蹟見於陳夀所作本傳而亦有散見於同時諸人傳中者皆可取以參考其出於後世所述則容有增飾而未可以為依據者矣海昌周子耕崖武原崔子秋谷素嚴事神而懼流傳者之多訛也於是廣搜博采而務別白之自承祚道將而下以逮近人之著述凡有涉於神之生前身後軼事遺蹟顯靈助化之端者靡不薈稡緝綜焉其勤至矣乃其考辨之精議論之正則雖前人屢有綴輯者未能或之先也是書也出上以發揚國家尊崇之至意且可以作人忠義之氣而其福善禍淫之不爽者亦足以使一世之人皆聞而知警不至於貌承而中違則是書之有功於名教者大也余故樂為之敘其端云漢董孝子廟志序辛卯孝德之大也有是德而著聞於外海內歸之後世慕之名莫榮焉不藉有爵位而始為重也舜以克諧而為天子極尊富饗保之盛然亦無加於孝漢諸帝廟號必取孝以冠諡然則以帝王之尊尚非孝不足以章顯其名若實有是孝德而名隨之更奚必他有所藉以為重哉董君抑儒秉純新修其先世純德徵君廟志成八卷出以示豫純德徵君者即虞仲翔所稱孝子句章董黯者是也前明有為純德録者矣表章前哲風厲人倫誠甚盛舉特惜其捃托略僃而考核未精今抑儒鄞人實孝子之後裔其尊人鈍軒先生嘗有意補輯緒正未克就而殁抑儒踵而成之綜核聞見究析同異非唯家乘之或傅會者不肯輕徇即郡邑舊志與夫前輩名人之宏篇巨製有未確者必參互辨證去岐歸一謂句章實今之慈溪孝子故居與墓皆在焉其言鑿鑿皆有據依以昭祖烈以成父志世常言孝子之後必生孝子豈不信矣乎考徵君之稱以漢和帝曾以郎中召而不起也徵君之上又加以純德者則本諸宋開寶詔書之加封豫謂孝子之德實不藉區區一官以為重孝名之美更不藉駢號增諡以為榮在當時稱之曰董孝子後世亦稱之曰董孝子愚夫愚婦耳而熟之皆所共曉此於士大夫暨賢子孫之意亦復何嗛而必轉取諸後代之褒封始稱崇尚哉舊志所載漢東京二詔書全謝山先生固疑其未可信矣豫謂即實有之而徵君之稱諒不若孝子之稱之美也抑儒見識明達深服謝山之言載之於書其不膠守所見如是其於吾言儻亦有取爾乎則題此書當曰漢董孝子廟志可也此序據抑儒所為志為之後歲在壬寅見樓攻愧集有慈溪縣董孝子廟記云句章今之鄞縣也孝子之母嘗寢疾喜飲大隱溪水不以時得於是築室溪傍以便日汲厥疾用瘳溪在今縣南一舍故以慈名溪而又以溪名縣母反葬於鄞鄞為郡太守治所故州邑與其墓側皆世祠之城之祠宇即其故居先其母塑像在南郭草堂中康憲錢公億迎歸於廟鑰親訪其墓宰木猶在近在城南豈所謂草堂者邪至今鄉人猶稱董孝郎中廟唐大歷中刺史崔殷作碣徐浩書之云其徙居也庭出寒泉其執喪也林集祥烏無貽一日之憂終報共天之怨云云祥符元年冬真宗皇帝封岱禮畢詔賜純德徵君或云起於錢康憲之請據攻愧此記則孝子實鄞人而遷於今之慈溪其封純德徵君在宋真宗大中祥符元年非宋太祖開寶年也抑儒今見任廣西那地州判相去絶遠不能以此告之聊附識於此續高士傳序丁未續高士傳一冊補皇甫士安之書之所遺也凡一百八條墨胎二子亦録入焉以未嘗一日膺簪紱也其所取捨亦甚嚴矣是書乃明新安畢黼臣翁叔之所纂序中稱其父約所先生之廉孝隱居著述長吏皆式閭致敬而自恨不能樹立表揚先德因興感而作此書然不敢僭妄附諸録後冀後之高人為載筆焉今考江南通志徽州隱逸中無姓畢者而孝義傳中則有畢文燝畢陽二人事亦甚略無郡邑志可參考故無得而述焉仁和倪嘉樹一擎得其草本以示余中閒塗改甚多似出於其人之手定而訛字亦復不少每傳之後繫之以頌閒亦有與古今韻皆不叶者末四條頌全闕余不揣為補之而其他則不暇為之審定余嘉其言之婉且摯也恐世無別本故遂録而傳之新安汪氏增輯列女傳序己亥女教之重不後於男也家之興廢國之盛衰率由乎是故關雎葛覃著為風始家人之利則以女貞古聖賢之垂訓未嘗不惓惓三致意焉漢劉中壘之著列女傳也鑒於趙衛之屬起自微賤踰越禮制故採取古來宮闈閨閣之事可法則可鑒戒者為書八篇奏之天子而成帝終弗寤也其書代相沿襲祖述實多今之流布人閒者唯劉書為最廣有圖有頌勸懲瞭如人未有不望其女若婦之貞孝節義者固宜其家置一編幾同於菽粟布帛之不可離矣然更生之為學駁而不純輕於信古而不加持擇阿谷處女何以試之息媯之死不合左傳以及辰嬴南子濫廁簡編此何異於范史之登蔡琰所以明高皇后謂此書宜加討論儒臣承詔輯為三卷其書世罕得見今此十六卷者乃明新安汪某之所增輯其紀年至明之神廟而止其紀述近事則歙郡居多而一郡之中又汪氏程氏為獨多其稱引太函則汪氏之翹楚名道昆者是也於向之本書去其子之所為頌而繫以己所為說於劉氏之輕信者正焉其事則善矣而猶有未盡善者又復為之推論焉刪其所為孽嬖亂亡者而後傳授之閒不至赧赧然難以形於口其析義也精其敘事也確其繪畫也又極其工其為文辭亦幾幾乎與向為甚似焉剞劂既僃未及印行距今幾二百年無知之者有書賈得其版以示吾友鮑君以文鮑君固歙人重是鄉前輩之書為重價購焉其名則不知誰何所刊去亦嘗遍考之而卒未得也夫婦節之貞趙宋以後為尢盛於往代說者謂程朱之教明故中材皆知自勉而以再醮為恥況新安固朱子之闕里也其賢節之多固然無足怪著書者猶自謂特章一二而巳夫事近則見聞尢熟其於興起鼓舞也易為力設吾杭人而有斯志也則如戴烈婦之吞金孫秀姑之服滷亦當大書特書矣誰得謂其私於鄉人也哉抑吾更有愀然者先曾祖母朱氏當明季歸先曾祖建平丞譽長府君為簉室生吾祖書蒼府君而寡時年未三十也祖業蕩然母僃嘗荼苦刺繡紋摘馬齒莧以易米教育吾祖至成立而祖業始稍稍復嫡子無後吾祖以庶承祧暨吾父皆以文學有聞於時不才如文弨亦得蒙其餘蔭知其事者咸以為苦節之報乃以久遠未獲上聞故因敘是書而不能不有望於里中之君子一為闡幽而發濳也乾隆四十四年孟夏之吉東里盧某書於西湖書院越女表微録序庚子蕭山汪進士煥曾甫既以其母與其生母之節孝上聞於朝得旌表矣又推母之遺意以及同族中之節婦應旌格者如干人代為之請於所司既又念單門貧戶所居窮僻更或子嗣弱喪叔伯靡依銜荼茹蘗卒葆其貞其艱難辛苦視尋恆殆百倍鄰翁里媪未嘗不為之咨歎不幸或不得聞於士君子之耳無為之稱說傳播者數十年之後故老且盡遺蹟亦復就湮嗟乎地非秦粵之異分無霄壤之閒而猶或不能周知又安望其以狀言縣縣達之府府以申之大府大府以聞於朝廷也哉汪子惄然傷之於是加意訪求由己邑以及於同郡之七邑邑各有同斯志者以為之助意主於發潛闡幽故凡力足以自表見者不與更四年之久先就山陰會稽蕭山餘姚諸暨􅌘六邑所得具録事狀呈方伯國公乞檄縣旌門以為風化之勸其無人為主者縣為僃案俟異日修志時亦可以資采擇而上虞新昌二縣猶有需焉以踵為之請事既允行汪子又輯為越女表微録四卷曰録事曰類敘曰述譜曰外姻其體例各見於小序中列上之後復有聞見􅡔增一卷於後曰識軼上一字本不作識因家諱改之仁乎哉汪子其用意何若是之摯而達曲而盡也蓋嘗謂人者天地正氣之所生也人能完天地之正氣始成其為人忠孝節義其歸一也然聖賢豪傑之所為事皆炳炳著見於外美斯愛愛斯傳宜若無難焉唯婦人女子身處奧泄之地所執煩辱之事而早失所天誓不再偶內有寒餓之迫外有侵陵之患智竭於補苴力瘁於扞禦節之苦者在孤貧為尢甚要其人本不為名而名亦不之及譬猶空谷之蘭自榮自落於荒煙蔓草閒豈不深可慜悼也哉此一編出而後為造物弭不平之憾為風教助激勸之權昔日之淒風苦雨由後視之皆成景星慶雲山川若為之鮮潤閭里若為之輝光邑乘家志咸得有所徵以侈為美談是則汪子之有功於名教大也至節婦之後有寖昌寖大者有不克自振以至澌滅無聞者此不特非人所能主雖天亦無如何也人祇求自完其為人足矣他何知焉汪子示余此編適余將北上匆遽不能助為訪求而先為引其端如此庚子季夏六日書於吳江舟次桐鄉沈氏家乘序丙子桐鄉沈子陛揚嘗從家大人受業與余敦世好久不相見一旦聚糧走三千里訪余於京師植余方南還盡用其資孑然居旅店中忍困以待余來蓋近世朋友之所未有者也陛揚之來也他無所求於余閒出其所為家乘索為之序案譜始祖諱某在明嘉靖時從江南來始居於嘉興之桐鄉浙西之人謂浙東為江南蓋其先世乃會稽人云再傳而有三子咸讀書列學校今至於陛揚十二世矣其族日益蕃衍不可不為譜以繫之蓋嘗夷考沈之受氏爰有二宗其一本姒姓其一本姬姓昔金天氏有裔孫曰臺駘其封在汾川沈姒蓐黃實守其祀晉主汾而滅之此姒姓之沈也其姬姓者封國在汝南之平輿魯文公三年經書魯與五國伐沈杜預注云今平輿縣北有沈亭司馬彪郡國志平輿下云有沈亭故國姬姓其文甚明至定公四年而後為蔡所滅或者不察顧混而一之沈休文為宋書自序其先世巳不能辨其為姬為姒而況歐陽氏之世系表馬氏之封建考遞相沿襲其不能有所釐正也固宜今陛揚之為是譜也詳於桐鄉一支而凡一切依附之說咸削而不録其識不亦大過人乎夫沈氏族望盛推吳興而此譜不載此在近世者尚闕所疑設使秉筆而為國史其肯遠託華胄兼承二宗以自蹈誣祖之罪而取譏議於後世哉異時陛揚之子孫有踵而成之者愼毋以是譜為太簡而求多於其外可也三峯盧氏家志序丁酉吾族之在浙中者以東陽為最著前明宏治朝有名御史正夫先生格者以理學名嘗與其叔父本源甫輯家乘為六卷正夫之言曰忘祖非孝也冒祖亦非孝也世人往往棄厥真源妄冒他族以飾世德之美其何以免君子之嗤詆乎故凡舊所無者不敢妄有增加蓋其愼也今追而溯之歷二百七八十年矣解元信波潮生能繼斯志考定昭穆稽核事行搜羅藝文裒然成若干卷洵足以振正夫先生之垂緒而使人稱東陽盧氏之代有人矣余嘗慨夫氏族之學之多舛也其在單門寒族素無達人不能究其源流之所自固無足怪若夫歷官而至宰相位不為不崇族不為不大矣乃觀唐書宰相世系表所載往往皆鑿空傅會兩姓也而合為一姓一人也而分為二人子父顚錯燕粵混同蓋不可勝詰也彼皆高門右族豈無一二學人曾讀左氏世本三史者顧忽略不以為意一任其誤而莫之改革以此而為譜其愈於無譜幾何也夫譜之為法不在乎合異以為同而在乎審同以辨異浙中諸盧東陽而外有天台有剡有上虞有餘姚信波先人自東陽遷杭州吾家亦居杭州則自餘姚遷者也譜各本其所自如前人東眷西眷南祖北祖某枝某房之比詳於近而略於遠譜之善法也信波能知本源之為重搜訪而緝比之精力幾敝而不自惜也吾餘姚之為譜自明初以來始可徵信若唐宋以前其年代里居考之正史多不合吾向亦欲刊其可疑者而以明初為􅍘然無專功深愧不若信波此志之詳盡三峯者又東陽盧氏聚族而居之所也故因以題其篇江寧王墅孫氏族譜序甲辰孫氏傳以為衛康叔之後其在有周武顯於吳臏顯於齊炎漢之末有起自富春者據吳而有之與蜀魏鼎峙厥後吳中之孫為特盛在趙宋時編姓氏者首國姓次以吳越王姓而孫氏即繼之凡望族莫之先焉則其貴重於天下可知巳然源遠而流分數遭遷革不恆厥居其譜諜之不墜失者亦罕矣顧其遠者不可追而近者尚可溯失今不為何以示後是以昔之君子敬宗而收族必為譜以明之為譜之道在乎詳近而略遠此不易之至論也江寧王墅孫氏之二子祖瑞祖全嘗學於余承其先人之志修輯族譜咨於儒學之彥發凡起例井然有條凡四載乃克成編誠愼之也使來告我曰求先生一言以辨諸首余觀其譜而善之誠與昔人之持論相合遙遙華胄不肯妄為傅會而一主於傳信其推本王墅族姓之所自則以明初富十公為始遷之祖至其所由遷則故老皆無能言之者逮勝國之末年枝葉蕃衍春秋祀祖家廟至不能容於是舊祠之外又分二祠一曰西祠一曰塘沿祠今二子則始分塘沿珊公之後人也上距八世矣又推而上至始遷之祖為十有八世其譜亦隨祠而分故自八世以下此獨詳焉夫親親以三為五以五為九始也一體其終至於途人此勢之所不得不然者也然詩有之豈無他人不如我同姓如春秋時魯與衛世數亦遼遠矣然而論者尚推周公與康叔為相睦魯襄之冠也即在衛成公之廟於此見祠雖分而情誼之相浹要必有異於外人者二子之修譜也承先志也兄愛弟敬二子之所能也八世以下之子孫宜思篤於近也八世以上之子孫凡夫慶弔周恤之禮亦不可以廢也余於二子有一日之長故既嘉其所能而不欲其以此自囿也故又進斯言以為勖蘇州袁氏家譜序庚戌古者有姓有氏姓一而氏分其後即以氏為姓故龍門著史合而言之以為人所百世不變者也考袁氏之先出自有虞至周得封於陳子孫有以國為氏者又其後或為爰或為轅最後乃為袁袁既為陳別而爰與轅漢以後不甚著獨袁為盛陳又為田而袁則無二厥派有三汝南一望尢其盛代有聞人著於簡䇿宋之南也汝南之裔自汳來南因居平江至元海道萬戶名寧一而下世系乃可考次吳門袁氏之譜實始於此嗣是人材輩出復不減於洛京以前當勝國末年文文肅序其譜歷數某忠節某事功某孝友某文學不徒以科第仕宦為高門蓋文公居同里閈聞見真而品評自確人共信其無溢美矣然設非賢子孫排纂而􅡔輯之將所謂莫為之後雖盛寧渠傳乎抑非獨此也昭穆混殽遠近移易將敬宗收族之念亦於何寄此雖在寒門陋族且猶不可而況閥閲之焜耀一世者乎今自明季以來業巳三四屬稿然非授之剞􅕻氏則不能使子姓皆有其書共識夫淵源之所自以為觀感起發之助上舍又愷君於是躍然興日是固余先人之志也曷敢不承乃復詳審鉤討釐辨經緯首侈國恩末垂家範其他凡譜之所宜有者無不有也裒然十冊刻成示余請為引其端又愷之意美矣其勤著矣宜不待余言抑余所不能無言者則且為袁氏後起者正告曰先型在茲維是其式哉前光有述維是其迪哉繩繩繹繹以克紹乃祖烈而毋忘作是譜者之績哉夫望可三也亦可益也使宇內之稱袁氏者何必不曰平江之望亦其一哉甬東盧氏族譜序辛亥記曰尊祖故敬宗敬宗故收族夫親止於五世自袒免而外即為途人疏巳然繫之以姓而弗別雖子孫繁衍或散處於四方苟知其為同祖久離而乍合必藹然動水源木本之思焉昔范文正之於吳中之范族亦疏矣當文正之尚孩也族人不之恤而一聽其流離轉徙於外及其歸宗也又恐其欲分受祖産而相與拒之文正既貴乃為義田以贍其族明乎所自出之祖同也所祖同故雖有小忿不廢懿親服制有盡而親親之誼則無盡知本者必期久無替焉甚矣哉族譜之為重也有譜然後子孫皆能識其祖辨其宗而支分派衍凡為我之同族亦不至混殽而難辨於富且貴者無依附之恥於貧賤而顚連困苦者則當有賙恤之恩古宗子之法雖不行於今而收族之道人人皆所當勉則有譜以為之依據也家之有譜至達於朝廷登於國史唐書載宰相世系表吾盧氏亦與焉譜顧不重矣哉甬東盧氏自餘姚遷於鄞久遠不可知從宋南渡以來皆班班可徵至國朝而益盛族人多讀書明義理悼舊譜之將湮而近今數十年之生齒歷履亦不可以不續然仕宦者以職事為急行役四方者不能與族之父老子姓相參稽無力者又不足以舉其事於時有名登秩字武成者慨然亟起而圖之闕其渺茫不可知者不以增於舊譜之外而於近代則鄭重訪求核實而詳紀之絲連繩貫由合而分世次秩然尊卑有辨有家廟以妥先靈有祭田以奉蒸嘗有條約以訓子弟賢者書其懿行使後來有所勸亡者志其塋域使久遠猶可識凡有關於譜事者無或遺也譜成而族人無不欣然悅是舉也曰微武成之力不及此然武成於此心力亦交瘁矣未幾遂辭世其子雲路請余為之序不可以辭余族居杭州者亦從餘姚遷也餘姚故有譜向余在詞林日職淸無事亦思續纂成編功未及半而以提學至楚南其事不卒厥後失官南北奔馳遂不及重理前緒今覩是譜深嘉武成之績而因以訟余之愧真不能自解免矣補元和郡縣志序乙巳唐李吉甫撰元和郡縣圖志四十卷詳略得中記敘有法故隋唐志所載地理書多逸而此獨傳然圖在宋時已亡其書在者又闕六卷而第十八卷亦不全好古者彌加珍惜不因其不完而遂棄之也余曩見吳中汪退谷先生士鋐集中自言曾補其闕每思借鈔以成完書往來吳中訪求數十年而卒未一遇也今金陵嚴子子進承其家先生之學以其餘力因宏憲元書之體例採掇於通典新舊唐書以及通鑑通志通考復㫄涉於寰宇記太平御覽諸書整齊薈萃為補河北道下景幽涿瀛莫平媯檀薊營十州三十有九縣山南道下荆峽歸夔澧朗忠萬金集壁巴蓬通開閬果渠十八州九十有二縣淮南道下揚楚滁和舒壽廬七州三十有二縣劍南道下霸乾二州六縣嶺南道下春新雷羅高恩潘辨瀧勤崖瓊振儋萬安藤巖宜瀼籠田環古容牢白順繡鬱林黨竇禺廉義湯芝三十有六州百四十有六縣於是向之所闕皆完然具僃讀者乃快然而無餘憾夫充廣聞見牖迪智識後人實有賴於前人而振舉廢墜補綴闕遺前人亦重有賴於後人使人人皆如汪嚴二君之珍惜愛護則前人之書亦必不至於闕顧退谷既補之矣去今未久而仍失其傳以余求之之專且久願一見而不可得而今乃得此書以大慰我數十年之積想其為愈快何如也使不出而與世共之則又懼為汪書之續因亟慫恿其開雕焉他如九域志太平寰宇記亦復殘闕不完吾知世亦必有如嚴子者起而任其責矣夫新定元豐九域志序丁未宋王正仲元豐九域志十卷余於乾隆乙巳鈔得之逾年復得桐鄉馮太史集梧新雕本用相參校庶幾完善今年又從海寧吳槎客騫所借得新定元豐九域志卷帙無異唯其中兼載古跡為不同耳然亦無方輿紀要之詳至各縣下前書兼載山水而此不録前輩秀水朱錫鬯謂此乃民閒流行之本理或然也其去正仲時當不甚遠因並鈔之頗亦得以正前書之誤字且及於宋史地理志焉乾隆五十有二年孟夏既望東里盧弓父書於鍾山書院之須友堂為余傳録者小門生江寧王友仁也襄垣縣志序壬寅李鶴亭明府視事襄垣既先其所急者餘漸以次興舉歲三周而邑之舊志曠七十餘年不修者復庚續之裒然成完書請序於余余惟襄垣之名舊矣縣於秦一改於新莽未幾光武興仍易亭而縣以至於今未之有改也中閒或為郡治或為州治唐武德三年分置甲水縣六年割沁州之銅鞮來屬九年又省甲水入焉是則今之封域較兩漢為尢廣我朝列聖相承德洋恩溥羣生澍濡以蕃以育故生齒日益衆物産日益豐此亦官斯土者之厚幸也挽之以淳朴示之以德教使盛者得常保其盛夫非賢有司之責乎矧今三晉大吏竝皆體上德意廉公仁明一以拊循愛養為本則為令長者無掣肘之患束溼之虞於此而勉為循良當易易也歷代如龔黃卓魯之流垂名史冊可為後法者吾無暇疏舉即以襄邑言之是趙襄子之所築也襄子知罷民力者之不可以守也浚民膏者其民必不吾與也以尹鐸之為保障不為繭絲其民必和有急而往依之其知所取舍也若是則其政從可知矣若夫春秋時邑於銅鞮者是羊舌職之子而叔向之兄羊舌赤也孔子但稱其語默得宜其於政也雖不若叔向之卓然著見然而孔子又嘗惜之云伯華無死天下其有定矣使非實有善政及於民聖人其肯輕許乎且觀當時之稱之者即其字而繫之以邑曰銅鞮伯華夫大夫之有邑者多矣不能盡若是伯華之以銅鞮著也是即朱邑之桐鄉黃霸之潁川也然則興化致治端不外求即以此二人者為師法有餘矣余嘗與禮闈分校之役得鶴亭之文而善之久習其人知其為悃愊無華者也由此而為循良吏殆庶幾乎斯志也亦盡職之一端也既嘉其成且因以致吾期望之意鶴亭勉乎哉弟子武進臧鏞堂在東校抱經堂文集卷第四
