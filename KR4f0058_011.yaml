body:
  text: 東里盧文弨紹弓跋四書北夢瑣言後戊戌富春孫光憲爲荆南高氏從事著此書凡二十卷紀唐及五代近事自云博訪於人未敢孤信三復參校然始濡毫所紀疑皆實矣然如鄭畋崔雍之事皆不與正史符會前後複見處亦時有參差所謂耳聞不如目見雖未掩瑕要不當因而集矢也其中可喜可愕之事甚多敘次衮衮亦由藻飾之工在稗官中固自成一家言雅雨盧氏得葉石君鈔本刻之叢書中以爲優於前明商氏稗海中本余今始取商氏本相比對乃知商本亦大有佳者其不知當時語意而妄改者閒有之卽盧本亦不免也顧余十數年前偶繙太平廣記取以正此之脫誤更有出於兩本之外者倘有少年憙事者從而畢功更大妙也然就余所校巳賢於舊本遠甚前罷官在京師日偶爲亾兒衷是舉唐人鉏禾日當午一詩以爲聶夷中作兒憚余不敢請退而詢北堂宏農君曰昔聞是李公垂作人以此卜其必相者得母誤也余聞亦啞然不自憶前語之由來今觀此書實然余向者亦沿興公致誤也玉樹長埋瑤琴復絕不能竝起而吿之掩卷之下葢不勝其腹之悲已侯鯖錄跋辛丑前題聊復翁德麟則著書之人也德麟者宋宗室名令畤太祖子燕懿王德昭之五世孫也黄魯直爲宮敎德麟受業焉與蘇子瞻同官潁州故其所交多一時名士後從高宗南渡襲封安定郡王紹興四年薨貧至無以爲殮宋史有其傳此書分上下兩卷而明商氏梓於稗海中者則爲八卷與趙希弁讀書附志所載卷數合葢在當時外閒或有二本傳者不同而以之相校則此本爲勝商本第五一卷全載王性之辨會眞記事而演其事爲鼔子詞十二章全類俳優此書不載蓋本不當載也餘商本有而此本無者僅五條錄附於後商本譌舛甚多而舊鈔本亦復不免雖屢經校勘仍有一二脫誤不能強補者姑闕之然巳大異乎舊所傳鈔本矣其商本余亦爲補正云書麈史後丁酉此書宋安陸王得臣彥輔之所著也僅三卷記其本朝君臣事跡頗可以資考鏡彥輔初受學於鄭介夫又嘗執經於胡翼之其師友多賢者故此書在宋人說部中爲最醇特其首記藝祖朝有聲登聞鼓求亾豬者此則出於流傳之言欲以見當時天下無冤民而不知非事理所宐有不記可也其言人之仕宦爲貧者多往往以所入之厚薄分美惡所相吿語者輒以此噫宋當神哲朝其風氣巳如此乎余從人假得虞山毛黼季校本自言得三本參校而以何元朗所藏爲最善黼季校此書時爲康熙辛卯年七十有五矣彥輔自序此書在宋之政和乙未年八十而余之校錄此書計年正値始生之歲是爲今上皇帝乾隆四十二年丁酉也余方悼衰年巳屈而於諸子百家之書猶廣愛兼嗜不能輕有割捨乃昔之著是書與後之校是書者其年皆過於余一星巳上余用此自慰不復以空擲日力爲喈矣此書有作四卷者雖篇葉稍均然非其本來也故今所鈔仍依三卷之舊云書石林燕語後戊戌此書有正德元年河南淸軍御史楊宗文武所繡梓者余取以校稗海之本凡所缺且譌者皆相若也石林釋褐紹聖時有列於朝宣和五年致仕卜居湖州弁山之石林谷此所以爲號也而說者乃謂出自天問見陳振孫書錄解題夫焉有石林何獸能言之語雖至愚者不取以自寓而謂葉氏乃本諸此誠似不足辯然吾嘗推其所以致人之言者抑有由也其自序此書云孔子於虞仲夷逸日隱居放言而公明賈論公叔文子曰夫子時然後言人不厭其言子曰然夫言不言吾何敢議抑謂初無意於言而言則雖未免有言以余爲未嘗有言也可夫以孔子爲然公明賈之辭此猶爲讀書鹵莽之失若其自謂有言一如無言則儼然位己於時中之聖而忘其分量之所稱矣且其生平以黨姦斥正爲君子所不許故當世因其所自號又卽其序之言而用以爲譏不然人之號多矣不皆原其所自而僅見於石林又獨迷謬其辭以斯知有爲爲之也陳振孫亦湖人寧不知其鄕之有石林谷者又其自序陳亦必無不一寓目之理乃舍而從天問其微意可思也其書言國家朝章典故搢紳人物爲詳而汪玉山韓仲止之徒亦復指摘其誤然猶愈於草澤之傳聞矣據其自序所云則尙有滑稽諧謔之辭於今殊不一二見豈其子姓刪之歟謂東坡晚又號老泉以睂山先塋有老翁泉故名此則世人所未悉知者其言天下印書以杭州爲上此在今日猶然余於稗海中本補其目錄文有遺脫具註各條之下中有複重者不加削云乾隆著雍閹茂之歲孟冬二十有五日書書泊宅編後丁酉此宋方勺仁聲之所著也本浦江人嘗奉親居杭之淸波門外又嘗居烏程之泊宅村村以唐元眞子泊舟之所得名本亦婺人也仁聲慕同里之高躅故因以名其書其父方資嘉祐八年進士第由縣令擢鄧州敎授歸老於杭以卒今通志謂其知深州者誤也書十卷而稗海本止三卷雖非全書然亦有數條岀於十卷之外者其閒亦閒有異同余意欲會而爲一顧卒卒無暇以爲句友人江陰趙君敬夫乃欣然任其事交左易右移後從前據案疾鈔腕吿乏而意猶不止未浹日而巳竣遂完然無復有一之遺漏者矣余因其成書稍加檃栝復令人錄出如右金華志言其詩文雄深雅健追古作者此書自言元祐中應杭試有訟其戶貫不明者適蘇文忠爲帥送之獲薦遂得從公游則其文章必不在四君子後而今皆不傳僅此區區者猶不至盡爲灰燼然則士之欲修飾其辭以冀後有一日之名者其果足恃也歟哉趙君今年七十三余六十一實不知後之人位置余二人於何所而惟是遺編陳籍紙墨之未卽渝敝者必有人見之而憐余二人華髮盈顚猶勤勤役十指不少輟庶幾一生耽嗜之志尙有所託以自見歟此書所載治病方試之頗驗尢有益於世云游宦紀聞跋已亥此書商氏稗海中有刻本其第四卷中有顚錯他卷亦有脫文余得一舊鈔本考正乃始完善其言字書無褪字又韻中不載尖字葢褪古但作退尖古但作櫼也然廣韻自有尖字光叔未細檢耳又言饅頭當用䊡字見束晢餠賦今考束賦中自作曼字卽字書中亦不見有䊡字也又言正月因避始皇諱故讀正爲征此則未確如尙書音常星宿音秀自是當時所呼如是豈亦有諱邪且政本字尙不改音而獨改正月一音不可通矣書中使君作史君此本可通用見於碑刻非誤也卽李發先跋此書稱雲臺史君者乃光叔之父非謂史姓其人書中有以啟干闕語干闕猶求官也商刻乃改千闕作千冊古書之流傳者往往爲不學之人所竄改其可笑多類此如不見舊本又惡從而盡正之邪因有刻本而遂廢鈔本此大不可乾隆已亥十一月三日坐西軒書輟耕錄跋丙申南村在元時未嘗出仕而多知國朝之典故輯史乗者資焉至其援引證辨頗有益於學者下及細瑣諧謔之事亦可以廣見聞釋疑滯未至有傷雅道也孫大雅序謂其拾樹葉而書之夫樹葉非竹簡羊革比也其能容百名以上乎殆同戲論郞仁寶譏其剿廣客談以爲已說此自秦漢以來諸子之書巳有互相岀入者卽郞氏七脩類藳中不亦有閒取是書者乎然著書家誠能自抒新得不襲陳編更足貴也此書舊刻難得今所行多脫去數葉而書賈因倂其目亦刊除之後此益無由覩完書矣余所收亦近時坊本訪諸藏書家始得鈔錄以補其闕閱者尙珍惜之書七脩類藳後丙申此書初刻於閩中仁寶題目錄後云書者非人漏誤甚多貧賤未能更也近年吾鄕有周君俊倫者取而重雕之於舊本之誤多所刊正且益以續藳七卷但卷之三十五四十九皆有脫葉訪之郞氏子孫亦無善本可校補者矣仁寶讀書好古勤於纂輯而虛懷樂善甚望友朋之益題諸座閒以求規正其志不可謂不誠矣而一時相與游從之人曾未有爲之商搉而持擇之者使當日有人焉爲之約其精華刪其觕駁資其考鏡糾其舛譌卽卷軸不必如是之多而要可與賓退揮麈輟耕諸錄頡頏矣讀是書者能不慨然於直諒多聞之難遇哉周君乃庚戌狀元雨甘先生之孫能表章前哲刻成而以詒余余於鄕前輩之著述皆愛之重之是書多述吾杭事尢不敢不畱意刪訂之說在成書之時則可在後人又難以輕議爲也讎校旣訖爰書數語於後幷以復於周君庶不虛其雅意云書韓門綴學後戊戌韓門綴學五卷續編一卷錢塘汪抒懷先生撰先生名師韓韓門其別號也雍正十一年進士入翰林敎授皇子賜居圓明園側離家人所居僅一舍不能治其私其内子怒支婆而聽其居外御史以爲言遂罷官後主保定之蓮池書院最久晚歸里未幾卒此書仿佛顧氏日知錄之體例先經次史以及古今事始與雜辯證徵引詳洽而攷訂精覈爲近代說部之佳者其引呂汲公之言謂白香山詩所云退之服硫黃一病訖不痊乃衞中立其字與昌黎同耳又引唐語林言文公病將卒召羣僚曰吾不藥今將病死矣汝詳視吾手足肢體無誑人云此尢可爲確證一洗孔毅夫雜說陳后山詩話之誣而絳桃柳枝之名謂皆出於傅會其論甚快此外又有談書錄一卷詩學纂聞一卷談書錄與韓門綴學皆可入雜家纂聞卽詩話也當入文史類錄中自言命纏畢月以水爲命而水在箕度推命者多引韓蘇爲說又言歐陽公耳白於面名聞天下脣不貼齒無事得謗明道雜志又謂其鬚不掩齒今有人焉耳則白矣又無脣不貼鬚不掩之患而乃謗罵多出意外云云此則先生自寄其身世之慨矣丙寅丁卯閒余與友朋會文京邸呈先生蒙賞識丙戌提學湖南見先生於保陽錄所咏長沙古跡詩示余余所履實繼先生之後塵云先生人品無可疵議徒以家人詬誶爲累而一斥不復是可惜也乾隆四十三年十月二十七日里後生盧某書書楊武屛先生雜諍後庚辰人之爲學也其徑途各有所從入爲理學者宗程朱爲經學者師賈孔爲博綜之學者希踪貴與伯厚爲詞章之學者方軌子雲相如爲鈔撮之學者則漁獵乎初學記藝文類聚諸編爲校勘之學者則規橅乎刊誤考異諸作人之力固有所不能兼抑亦關乎性情審其近而從事焉將終身以之而後可以發名成業其能有所兼者尢足貴也余年十五六從人借書讀卽鈔之久之患諸書文字多謬誤頗有志於校勘然顏介不云乎必劉向揚雄方稱斯在深愧見聞不廣逡巡不敢爲至三十外見近所刊經史其改正從前之誤固大有功矣而用意太過則不能無穿鑿之失校者不一其人則不能無差互之病於是始因其考證而續成之漸㫄及乎諸子百家今余家所藏者太半經余手校者也本朝顧亭林閻百詩何義門諸先生皆善讀書余竊慕之江陰楊生象坤琮出其叔父武屛先生遺書示余乃知先生在日極好鈔書又善讎校有雜諍一編皆駁正舊文之誤者積塵宿穢霍然一淸讀之忘倦先生爲文定公從弟名名宁治縣有名古文有晉人風致閒有似漆園者詩工於言情此又其才之兼焉者巳集中有寄文定公書乃知校刻經史由文定公之請而其議則自先生發之惜乎不得置先生於館閣校勘之列以共成其事故書雖成尙不能無遺憾使先生及見之所當糾正者復不少矣楊生知寶貴先生之書凡零章􅍘簡亦必手鈔而部次之其好學亦有足多者幷附著之再書雜諍後乙未此書通作一編余釐之爲八卷重鈔之計前著跋語時隔十有六年矣歲在己丑余續昬先生之女孫其季也來爲余繼室甚好文事若男也必能收輯先生之遺書歸余僅四年而亾此書久在篋中慮或有損蝕重傷亾者意爲稍稍整理之乃今可傳諸學者先生過目成誦而識又高故能薈稡同異而處決其是非不少違爽凡所援引左證不資檢閱聞先生雜著總名碎錄此雜諍者特碎錄之一類耳余甚願得其全著述而傳之楊氏多佳子弟其名琮者字象坤有志掇拾墜簡而以飢驅客於外文定公冡孫日伯庸敦裕好考核之學不幸前一年死矣今其弟仲威敦厚亦能繼斯志余將就而謀之當必不虛所望也先生於經之注疏正史雜史諸子說部古今詩文咸􅎥錄手鈔細字廿餘厚冊余曾借觀此楊氏所當寶守者今歸之仲威有增訂亭林日知錄妻舅彥和以詒余今藏於余家山齋客譚跋丁酉余今年在杭州求景先生之文集不可得獨得其所爲山齋客譚八卷者於倪君嘉樹所雖小說家流然其中多有可資以警誡者非但以志傀異雜嘲弄而巳也第五卷記瓜山土神祠引先祖書蒼府君之言謂視碑所載神爲漢之禰正平葢吾杭土神往往皆漢唐以來著稱者卽如余家世居東里坊而土神乃漢之蕭酇侯相承巳久莫考其所自來類如斯矣吾先世遺有祀田在瓜山故吾祖時往來其地得見廟中之碑而邑志不載今碑之在亾亦不可考後之人當以吾祖之言爲據焉因是以推先生文集中必有與吾祖論議酬贈之作爲後人所當知者而竟無從得能無喟然而增慨乎鈔此書竟漫識數言於末書鄭芷畦先生傳記後辛丑人固有死而不亾者然子雲之書亦必待後世復有子雲而後重苟其臭味不相入則政所謂羊叔子自佳耳何與人事烏在其能曠世相感哉歸安丁孝廉小疋其嗜學也若飢渴之於飲食硏析異同訂正譌誤於古人未肎輕徇顧於其鄕前輩鄭芷畦先生惓然有餘慕焉爲捜集其遺聞墜事及當時諸老宿相與往還酬贈之作􅡔成一巨編匄名公爲之傳記以發揚之其勤􅝴之意幾如子孫之欲表章其父祖者然此何以故母亦行誼學術之相孚有不期然而然者歟先生名元慶字子餘以諸生貢太學生平著書甚富其最著者禮記集說參同八十卷行水金鑑百七十五卷湖錄百二十卷石柱記箋釋五卷今湖州府志實本之先生所居號小谷口晚年客遊山左卒於雍正年閒兩子早亾故其詳不可得聞然取重於毛西河朱竹垞張匠門李穆堂諸公今見於各家集中者咸班班可考殁後又有全謝山祖望翁覃溪方綱盛柚堂百二爲之志若傳稱道弗衰夫以一諸生而能致此此豈可幸得者乃丁君猶以其門戶凋零遺文散失恐後來者至不能舉其姓字引以爲大慼故亟亟求表章之唯恐其不至將所謂後世之子雲丁君居之無愧色哉然以示俗閒人必大笑爲迂緩不急之務殊不知古作者之精神命脈其代相嬗於千百世而未巳者如磁之引鍼琥珀之拾芥蓋實有不知其然而然者余雖不文感丁君之意因題數語於卷後而歸之非敢自以爲能發揚先生之盛美也書楊恭士撰先外祖墓表後壬子先外祖撫畢氏姨之兩孤女爲已女長歸太學生孫靑嶼名岱曾十才子中宇台先生其祖也次歸舉人山東樂陵縣知縣楊恭士名儐此墓表後所以自稱爲子壻也古文亦名家無後文多散失文弨曾見其集巳梓者數篇而巳先外祖集中有畢節婦邵氏傳節婦二十五而寡守節十四年而卒故外祖母視其女猶已女翼其長而嫁之親生女祇先母一人生之日先外祖有詩見樊中集余恐有昌黎兩壻之嫌故具著之外孫盧文弨謹識題劉烈母詩卷後丙子此寧鄕孝廉劉君有洪所得於四方士大夫之詩以表章其曾大母胡氏死烈之行者也母之夫曰肈之家於南塘去縣遠困徵發數復營室於邑城之東時往來居焉明巳亾流賊張獻忠餘黨尙轉掠湖湘閒肈之先歸南塘聞警遣人之城東迎妻子母與其二歲兒行中途賊巳至亟以兒授僕日此劉氏一脈汝速負之逸吾必不免異日收吾骨於此賊退肇之跡其處至所謂花橋者得其尸徧體刃傷而猶不壞遂收葬焉其後再娶皆無子而母所遺之二歲兒遂成立有後今曾元輩甚繁衍云向使母當危急時稍一濡忍愛其兒不能去諸其懷以冀幸賊之不至賊至矣卽能奮然不顧慷慨誓死其自爲如此亦可無憾然此懷中弱息亦必不免於凶人之鋒而因與之俱殲焉則劉氏之鬼其不爲若敖氏也者幾希今母之節旣皦然若此吾尢難其見義明而審幾決身死而劉氏賴以延以視夫提攜牽率相與入井蹈火而死者不更爲處變之盡善者乎若夫不忍其子以致不能自完其節不能自完其節而幷不能自完其子此皆可無論矣以是知母之所爲尢難能也余與孝廉友善其爲人端且厚故能益揚其先人之烈於士大夫之口母德之流衍其正未有艾巳弟子江陰湯裕岵瞻校抱經堂文集卷第十一
