  text: 抱經堂文集卷第二十六
  hash: sha256:baf0c321646f696fbf6870a255f006976794d146457cf7051287d1d253b7230f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0058_SBCK_026-1a}
body:
  text: 東里盧文弨紹弓傳一楊文定公家傳丙申楊公名名時字賓實常州江陰人也少嚴重有局度不為事物倉猝搖動以諸生應鄉試主司以性理書發䇿未之習也歸而求其書讀之朝夕尋繹由是得聖賢門徑所從入篤志實踐卒為完人康熙三十年成進士改庶吉士座主李文貞公理學為儒者宗門下士數百人獨深契公常以正學相期公每從質問所得日益進散館授檢討充明史纂修官聖祖特召對充日講官起居注旋命提督順天等處學政先是居此任者率宮坊以上大僚聖祖用文貞薦以公淸介有學術故特用公實異數也公每接諸生必開誘以立志居敬致知力行之道不專文詞見官屬一依儀制不肯少假借保定知府故違成例不録河閒左衛童子送試屢矣諭之不可劾罷之未期年士習丕變聖祖嘉之賜以宸翰擢侍講會有以蜚語上聞者謂公外釣公淸名實則與巡撫比巡撫信公言為黜陟故屬員競致賂遺於公是時直隸巡撫即李文貞也將代適有武生犯蹕事聖祖不深譴命往江南防河公喜去家近即迎親侍養總河張公鵬翮知公實廉貧唯委以往來稽察之事公盡瘁不辭連丁內外艱服除仍往河工效力五十二年召還入直南書房時令陳說經義修校御纂周易折中性理精義諸書逾年命充陜西鄉試正考宦公雖蒙召然未自陳吏部補官例不與開列此亦異數也甘肅寧夏地處邊士子試卷別編聿丁號取中是科佳卷多而限於額特疏請加中一名從之直內廷三載未請補官如故五十六年聖祖特用為直隸巡道諭日欲試爾民事也時直隸尚未設三司以巡道主刑獄兼驛傳案叢事猥吏因緣為姦公至釐革殆盡聖祖聞其政聲謂大臣曰楊名時不特是淸官實好官也五十八年遷貴州布政使明年冬擢授雲南巡撫值西藏用兵大師取道雲南留屯以待進止乃建屋百數十閒以處之民用不擾凡饋餫皆計里給直師還倍加優恤馬道死者兵當償為奏免之滇民輸兵糧有遠運之苦奏請兵少米多之處折銀徵解舊丁役久不均戶絶田去有歸並而無除減故或以一人而兼數丁名日子孫丁民不勝其纍多致逃亡又民納糧之外加派甚多名曰公件銀歲不下三四十萬數反倍於正額公請均丁於田而減公件歲入銀為十一萬有奇勒石曉諭民困大蘇滇地多産銀官收其課久之礦衰而課如故司事者以缺額罷官究追多視為畏途公以礦有王有衰請以道員一人總理各厰使盈詘得以相補若武定之獅子厰楚雄之廣運厰及臨安新開之華祝箐厰皆費多利少請封閉在任凡七年利民之事次第舉行民苗罔不悅服世宗嗣位之初賜以聖祖遺物且諭曰爾在官歷任有聲朕所稔悉復御書淸操夙著四字以賜且止其入覲雍正三年加兵部尚書復授雲貴總督四年進吏部尚書仍管雲南巡撫事先是有旨不許公摺子奏事既而諭公曰前因人有萋菲之言偶失於舒究耳今巳釋然矣令摺奏如初大理府洱海滇中巨川其尾為沙石壅積民數被水患奏請疏泄並立期五年一修費皆官出後人奉為式焉坐奏豁鹽課疏內敘入密諭削尚書職仍管雲南巡撫事六年有人奏公與臬司江芭通同欺蔽世宗命湖南布政使朱綱來代且遣刑部侍郎黃炳來會鞫綱又以徇隱廢弛劾罷公職訊鞫日士民洶洶數萬人集門外綱雖吹求百端亦終不敢加公以刑既訊無所得則以曾受鹽規銀五萬八千有奇擬罪絞其銀限一年全輸官此蓋公於元年即奏明取以給公用者也讞上世宗特從原宥公不敢遽歸留滇七年唯以研經講學為事今上初即位述先帝遺意召公乾隆元年二月公至京師授禮部尚書兼掌國子監祭酒事又命授皇子讀兼入直南書房此皆治化根本所在公生平志學於是得展五日一至太學升講堂就經傳中提綱挈領示諸生以為學之要謂學以希天也天德誠而無妄一仁之流行也故必純於仁斯謂之誠其功則在敬以直其內義以方其外蓋乾畫實誠之象也坤畫虛敬之象也敬以涵義義以敬行人本天而親地故體坤期有以合天其要必自暗然為己以為默契天載無聲無臭之基不易世不成名遁世不見是而無悶樂則行憂則違此天德之藏於密而聖學之所以成始而成終者也故易爻論語皆首發其義焉有聖學斯有王道乾元始萬物利天下而相忘於不言故論聖德以無名為至論從政以不貪為美公與諸生講論經義至多其大指不出乎此又薦經術之士莊亭陽秦蕙田等七人分主教事更請頒發經書俾士子得肄習監中舊所有經史版刻漫漶者俱請修補所奏多見施行雍正末年黔中苗亂殺掠內地民人連年用兵征之公深知其弊上疏陳綏定苗疆方略曰馭夷之道貴在羈縻服二之方務彰誠信從未有怨毒猜嫌而能長久寧帖者貴州一區多與苗疆接壤生苗在南漢人在北而熟苗居其中閒受顧直為漢人傭相安巳久若生苗則本在深山密箐之中有熟苗為之限隔常聲內地兵威以相禁戢故生苗亦絶不敢萌窺伺之端自開拓苗疆之議行於是生苗界上咸屯官兵欲漸據其土地干戈日尋而生苗始不得安其所官兵屯營之地多在高山水泉渴乏百物不通民運糧至山下官兵接運上山尚有二三十里之遙勞苦驚惶妻孥隔絶而官兵亦不得安其所百姓改折色為見糧又責令運送費用數倍終年不息且每被鈔劫而百姓益不得安其所至熟苗之苦更有甚焉無事則供挽運力役用兵則為嚮導前驅軍民待之如奴隸生苗疾之若寇讐官兵勝則坐苗乘閒鈔殺以泄忿生苗勝而官兵又混行屠戮以冒功此熟苗之所以愈不得安其所也竊念開拓苗疆本欲登斯民於袵席而竟致官兵百姓生熟苗民人人有赴湯蹈火之慘將何為乎其速禍激變約有兩端苗疆本未寧謐而地方官遽言人盡抒誠請加賞賜生苗得賞者二三不得賞者七八失其本望惡能無叛加以熟苗勞重纍深全無賞賚愈增怨憤因而勾結生苗作亂以至不可禁禦又從前開疆拓地止及古州淸江等處而台拱地方猶在化外自有司迎合邀功輒云台拱苗民願獻其地以為官兵安營立汛之所上官不察竟議駐兵而台拱生苗遂將官兵圍困經兩次遣兵救援悉皆覆沒遂至侵軼內地內地之兵太半奉調移駐苗界致使苗人得以乘虛而入無處不被蹂躪閒有就撫熟苗又被武臣慘戮賣其妻女以入私槖其脫逃者歸告徙黨賊志益堅人懷必死多手刃妻女然後抗拒官兵以致鋒不可當敗衄屢告百姓流離死徙不可勝計計今奏報者必以苗民殄滅幾盡難民復業過半苗疆不日砥定為辭然以臣計之蓋有未可全信者從來用兵之䇿不過曰剿日撫而巳今欲剿則山勢陡絶一線僅通一人據之百人難上即或乘其不備奪險而進而苗人本無屯積相率滚箐而走官兵熟視其去莫可誰何此剿之所以難也若欲撫之則苗民積怨巳深且謂如前見誘俱懷疑懼加以有險可恃非萬不得巳焉肯輕就籠絡此撫之所以難也為今日計唯有下愷切之詔布寬大之恩棄苗疆而不取將重兵還駐內地修垣築壘於要害處所俾民有可依兵有可守賊來則互相應援協力禽捕賊去則分兵撲滅勿事窮追再明懸賞格有能擒縛首惡投誠及所犯本輕而率衆歸順或鄰近苗人奮勇殺賊驗明首功者皆給豫土官世襲分管其地熟苗則加以撫綏勿使為生苗所劫掠為官兵所欺陵如此調劑生苗得所棲託熟苗又荷生全自當俯首帖耳抒誠向化若因循粉飾臣恐兵端不能遽息糜餉勞民終非柔遠寧邊之善䇿也疏上政府頗有異議上獨是公言時內廷翰林余棟丁母憂給假六月公奏請令其終喪以盡子道並言翰林梁詩正服尚未除亦應緩其行走又奏請增定順天及江南陜西三處解額其造辟陳奏者尚末由悉聞也凡考試衡校之事上皆以命公其教習庶吉士也命下於進士未選入館之前公手定教規排日至館訓迪不倦七月充纂修三禮副總裁時巳嬰疾矣入謝上覺公顏色憔悴諭加意調攝出猶詣太學遍歷六堂敦勉多士疾寖劇上遣醫視給參藥少閒口授遺疏以治化方新聖功惟健行不息聖德必日進無疆為言語不及私以乾隆二年九月丙戌朔薨年七十有七上聞軫悼賜白金千兩治喪遣官祭奠加贈太子太傅入祀賢良祠諡文定公孝友醇正其於聖學實能以身體之不徒見於辭說之閒故自承學之士以及武夫隸人苗童夷婦咸尊信悅服無異辭即劾奏中猶稱公為科甲中之領袖又云姁姁嫗嫗以取媚於民推問之下猶稱引詩書無異常日即此言亦可見公之為人也公於諸經皆有講義近詔求遺書其家始録以進門人嘗輯公說經之言為易義隨記八卷詩義記講四卷先已版行其詩文雜著尚未編輯公無子以弟之子應詢為後二品蔭生例當得部主事家居不謁選孫敦裕敦厚皆縣學生敦裕謹飭好學早卒舊史氏日公躬行實踐人也不以文辭名然義理充溢乎中凡所流露自成文章余嘗讀公序徐霞客遊記兩篇而歎大儒之言無在不引而之正為足以垂世而立教也誠為聖功之本周子切指之公從而演繹之迹其出入內外顯晦禍福無一非誠故能受三聖非常之知遇積久而道彌光今距公之殁巳四十年而所聞四方士大夫之口猶翕然同聲曰賢嗚呼此豈有絲毫假藉耶宋司馬公入相未久而殂公登朝亦未及㫷而殞乃其誠亦極相似然而公之學為較純矣候選主事蒼育楊府君家傳庚子君諱應詢字蒼育常州江陰人楊文定公之子也先世詳君考傳中文定公以進士起家揚歷中外誥授光祿大夫禮部尚書贈太子太傅豫諡入祀賢良鄉賢祠當世所推理學名臣也公艱於得子康熙五十五年聖祖仁皇帝垂問及之公奏云臣弟廩貢生楊名世今年可望舉子即以為臣後君果於是年生命名蓋以此也本生考聖翼府君後任泰興縣儒學訓導君幼即隨文定公宦滇南逮公閒居行館躬自訓講性理諸書與安溪李文貞公之所著述欲盡傳其學君一生行己處事實本於庭訓居多雍正元年覃恩授二品廕生時方七歲皇上御極召公入覲君奉母劉太夫人歸里公卒於位君終身以不及視含斂為恨乾隆四年服闋引見以部主事用因太夫人年高乞終養太夫人年隮大耊始卒君亦有小患訖未就選然君雖未服官其隱造福於鄉邦者事甚夥當歲在乙亥邑大饑明年春又大疫令周君鳯岐倡議振濟以其事屬之君君悉意籌畫凡平糶鬻粥施藥施槥皆井井有條所全活者甚衆督學李公因培振興文教以舊澄江書院狹隘於養士之道未僃以君衆望所屬與相商榷勸紳士有力者捐輸且擇老成者董其事於是增房舍厚廩餼購經史學者彬彬稱盛焉即今暨陽書院是也漕米倉舊在城內有圖改建以漁利者誑縣使移建南關外君聞之力爭謂倉建城內官易稽察近接水次船便轉般民居環護啓閉謹嚴四鄉輸納遠近適均官民相安歷百有餘載明季曾移城南旋即燬廢況地當潮汐之衝農船每遭撲撞於公私皆不便當事韙其言得不徙令蔡君澍以棲霞菴為明典史閻公應元殉節地於其所立祠並祀同時守城殉難之典史陳公明遇後令劉君新翰又置有祭田無賴子利其入欲毀祠仍為菴凶勢甚熾君激於義與邑生員趙曦明並力訟官幾為所陷而終得直復念祠中尚有佛像及今勿撤則二公若寄既非所以明虔且後患亦未可杜因井聞於官俾僧移去兼增祀訓導馮公厚敦額為三公祠皆同時殉節者也凡歷三政而後大僃於是祠之門庭堂寢換然翼然招道士守之每春秋二祭必躬造祠中敬謹將事其勇於為義始終不懈如此文定公研窮經籍凡有所得輒筆之然未有成書君廣為搜緝成易詩四書劄記講義程功録等上之録入四庫中其家庭庸行可無述也乾隆四十四年十二月六日卒年六十有四娶劉安人即太夫人姪也子二長敦裕邑庠生先卒次敦厚邑庠生女四長適太學生武進謝宸璐次適府學生無錫華廷模其二皆夭敦裕無子敦厚子玉衡為之後實承重云舊史氏曰暨陽書院之新建也余承學使鶴峯李公之聘來主講席見君之所規畫咸中法程君數過余厚余甚至後余續昏於君從兄之季女亦君所為慫恿成之者也君容貌溫溫至其析義利辨是非則侃侃鑿鑿不少依違一邑之正人皆倚以為重不愧文定公後人乃其冡嗣亦沈靖嗜學而先早折君之病亦以是悲夫古人嘗慨居其位不得行其道者多矣君雖不仕其所為實與古之循吏無異余之傳君亦庶幾無溢辭焉黃河同知蔣君家傳丁丑君蔣姓諱祈年字東郊奉天鑲藍旗人家世自有傳父諱國正鳳陽府知府有治績舉四子君第三鳳陽公卒官放散官錢不能償公弱冠獨身任其事留鳳陽五歲事竟乃得歸君素習吏事以資當為縣令乃請往河工自效歷三年以勤幹聞總河故大學士嵇公深器之初署山東管泉通判旋實授泇河通判又遷沂郯海贛同知防修禹王臺竹絡埧諸險工地處辟左少車馬運竹石不時至前任率以是敗去君訪知有小車裝私鹽夜來者且百數不可制制則出死力以拒鹽又往往苦乏君輒以便宜召其豪聽其輸鹽而藉其車以運又夫役有受顧而役不中程者君亦不急繩之於是利得錢來受役者益衆事遂集逾年換黃河同知河出曹單閒易潰決君積精誠以為民請命水之溢而出者疏成引河憲皇帝特命致祭河神答靈貺焉明年水大至民凶懼君禱神願以身殉立危隄上隄震動有聲水盛怒如有神物助持君踊身入河見者無不驚泣會救者衆乃免水亦頓却衆為立碑碑在今曹縣之望魯樓即當日之投身處也君行視隄厈之庳薄者與當水衝者亟令修築工訖而嵇公巳去後代者與君卻坐擅用官錢罷君於是時年三十有六貧不能償以故一斥終不復起而君亦絶不介意先是望魯館舍後有隙地切臨陂塘西接平蕪東環村落烟波雲樹參差掩映君樂之增築小室其上見者皆以為若舟之行水也因顏曰壺天一葉而自寓其號曰虛舟至是以官錢未償不能歸三年留之吟諷嘯傲不知身世之厄塞也君在鳳陽所交皆知名士年雖少已學為詩罷官後乃一意竟學嘗讀漢書至王尊傳與已事相類感而賦之君之誠心為民發於自然固非規規襲蹈古人之成迹於斯見之君後又僑居滄景閒卒於獻縣年五十在日官錢終未償所司以産絶告乃免有六子皆貧其名錦者為諸生從豫遊紀君事於倫常之閒亦多有可稱者論曰昔傅炎父子治縣竝著奇績人稱其有治譜君之父為慶都為永安為鳳陽所在著稱以此知君之稟承也有自然鳳陽治民而君則治河其事不盡同而君乃能使曹單之民久而戴君方解組時經單父城父老擁車爭問起居君亦自喜以為昔日車騎旌旄之迎不若也越二十年君之子過望魯老人述君事猶重大息曰公所為利於民不利於身然則職任雖殊其誠乎為民者未嘗少異不然何以得此於民哉弟子仁和韓文潮駕虹校録抱經堂文集卷第二十六
