  text: 抱經堂文集卷第一
  hash: sha256:df9556c80267064402440a3e87c35d7add31c39d14ba1d1a413b59876134ba14
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0058_SBCK_001-1a}
body:
  text: 東里盧文弨紹弓對䇿朝考卷散館卷應殿試䇿壬申制曰朕紹承大統撫御萬邦宵旰孜孜勤求治理所冀內外臣工靖共爾位閭閻黎庶共慶盈寧羣材之登進日隆邉境之敉寧益永庶幾海內臣民共登上理焉顧官方或未盡肅民食或未盡豐取士之術猶疏邉圉之防未僃將何以整綱飭紀以臻郅隆之治與國家設官分職所藉以熙績亮工宣上德而達下情也唐虞之世五臣四嶽九官十二牧師師濟濟一堂之上同寅協恭用能明良喜起成中天之盛治然雖有都俞不廢吁咈一時動色相戒者猶以叢脞為虞觀賡拜揚言愼乃憲屢省乃成其交相責者何至也朕日以修和之盛望之內外大小臣工顧因循瞻顧之私或猶有未盡化者官方之砥礪其道奚從農者天下之大本也德惟善政政在養民開其資財之道斯以蓄積多而僃先具周家穡事啓國爰興八百之基逮至西漢文帝蠲租勸農之詔屢下而皆以務本為兢兢豈非治要之所在與今幅員日廣民生日繁遊惰雜處其間雕文刻鏤傷農之事愈興俗尚奢靡罔知節儉朕勤求民瘼閭閻之疾苦纖悉周知偶有偏災賑恤立沛然裕民足食之道有不得不深為計者今欲重農事而務本計其道安在制科取士所以振淹滯儲任使也登明選公責在有司鑑空衡平言乎公則生明也比年以來加意釐剔宜人知畏法罔敢觸禁矣而不謂舞弊者之即生於察弊此雖千百人中僅亦一見抑或者處士虛聲恩門年誼習俗相沿流風未殄與司衡者秉校士之任當使寒畯無淪落之虞菲材絶覬覦之念斯無負闢門籲俊之盛典宜何如立法俾宿弊永蠲以光文治與國家文德既修武事必僃防邉固圉綢繆未然非以誇遠略也漢唐宋以來兵制迭更其間善否或亦有可採求者與有必勝之將無必勝之兵選將固在所重矣然將非兵莫與為用兵非將莫與為統聯屬之方嫻習於平時誠不可緩我國家全付所受士宇昄章亙古罕匹而將士之勇韜略之嫻訓練之精制勝之神皆遠過前代惟是承平日久或狃於逸樂易致廢弛則修明武僃以愼固邉圉所宜豫為籌論者也凡此者上自廟堂下周鄉國本保泰持盈之心籌制治保邦之要思皇多士久霑雅化其以素所藴蓄者詳著於篇朕將親覽焉臣對臣聞帝王之治天下也如治巨室然公卿者棟梁也百執事者茨蓋也民也者基址也士也者儲蓄也將帥者垣墉也甲兵者關鍵也是皆不可不朝念而夕思也天下至大百官兆民至衆與夫庠序之修明邉圉之鞏固其事皆萃於人主之一身而要其所以致治之具無他焉在愼守其紀綱而巳矣蓋信賞必罰者治天下之大柄也以正官方則忠藎自矢之臣必重其任而善遇之其背公營私者在所必斥也以裕民生則課農務本之吏必著其勞而優奬之其治理無狀者在所必罷也以端士習則上賢以崇德簡不肖以絀惡而因言亦當核其邪正之分以嚴武僃則選將必取其有謀練士必取其用命而有事更必明其功罪之實此所謂愼守其紀綱者也蓋雖聖王在上不能使朝盡無僉壬野盡無遊惰學校必無辱行之士四境必無竊發之虞而其所以卒成至治者道不越乎此欽惟皇帝陛下具淸明剛健之德又深以格致誠正之學敬存於宥密而事協於大中固巳知人善任而作其寅恭重農薄賦而足其生計尚經義崇實學以求有用之才勤訓練愼封疆以獲敉寧之效乃猶聖不自聖進臣等於廷而策以整飭官方之道僃裕民食之圖與夫作士防邉之善術臣之愚陋何足以知之然淸問所及不棄芻蕘臣敢不罄其愚衷以為拜獻之資乎伏讀制䇿有曰設官分職所藉以熙績亮工宣上德而達下情而因及乎砥礪之有其道臣惟王者所與共治天下內有輔弻之臣外有司牧之職皆所以承流而宣化也唐虞之世五臣九官所以治其內四嶽十二牧所以治其外師師濟濟稱極盛矣而君臣之間動色相戒其臣之所以進勉者必日無怠無荒其君之所以倚毗者必日豫違汝弻蓋皆以克艱為心而不敢一刻自暇逸也夫同寅協恭之義言君與臣同此敬畏之心也天命之難諶民情之難保雖當太平無事之日而持盈保泰彌凜日中之戒推其心豈不願有都俞而無吁咈哉然而不能巳者安危治亂之幾相為倚伏而惟恐失於不及覺故兢兢乎愼之又愼然後可以免叢脞之咎而常保此明良喜起之休風也惟其同此寅恭之心故和衷之美亦於斯而見焉非若以水濟水之謂苟君所謂可雖有否焉而亦曰可君所謂否雖有可焉而亦日否此則因循瞻顧之私非純臣之所宜居心也夫臣之所以事君但當衡之於道不當承望意旨以為迎合之計君之所以察臣亦惟􅍘之以道不當樂其將順以開諛悅之風則職事得以修舉而大小臣工自無不精白一心以期報稱矣制䇿又以養民必開其資財之道斯蓄積多而備先具而因籌其何以重農事而敦本計臣惟古者計口受田故其時無不耕之民而可以嚴遊惰之罰後世田既不可井授故間民之遨於城市者官不得而稽之此固勢之所無如何也然民不可稽而田則可稽其歲􅛮成熟者固無以議為矣至若汙萊無主之地皆當召民認佃給為永業而毋急於升科則庶幾無不耕之土矣臣觀七月之詩于耜舉趾而婦子往饁則田畯見其勤而喜之其著於雅者日攸介攸止蒸我耄士又曰禾易長畝終善且有曾孫不怒農夫克敏此可見耕雖民事而亦貴在上者有以勸之也漢世力田與孝弟並重凡朝廷有行慶施惠之典必首及焉其重農也如此今牧民之有司其亦有知此意者乎母亦簿書訟獄之務繁而有所不暇及也且漢時賈人不得宦為吏而七科謫中則雖大父母有市籍者亦不得免焉其賤賈人也至矣而言者猶病其奢侈令民有不勸耕之心後世更無此禁而奇技淫巧相競為侈靡之習者大率自賈人開之愚民慕效浸成風俗此其傷農事也實甚農事傷則飢之本故一值水旱之不時而匱絀立見然則為今計者當以課農勸儉之效責之有司而毋專以聽􅍘幹辦為殿最則耕九餘三之盛其復見乎制䇿又以制科取士所以振淹滯儲任使將令寒畯無淪落之虞菲材絶覬覦之念當如何立法以蠲其宿弊臣惟古者鄉舉里選之制既巳不可復行而九品中正亦行之不能以無弊惟試之文詞而定為糊名易書之制主司但擇其文理之優者取之無所牽制於毀譽之口無所熒惑於愛憎之情法至善也然考之唐時士品之卑汙甚矣呈身識面自衒自鬻之習恬然為之而不怪司文衡者初以專官主之故關防不密而要挾請託至於再三而不巳此則久於其任之弊也今主文之人初無一定其於防間之法可謂更精乃猶有弊習之未革者利祿之途人競艷之下以求知己上以植私門且見援引推薦之習古亦有之也乃遂不顧法禁而冒焉為之不知公則生明理實相因司文衡者果有為國得賢之心而鑑空衡平憑文取録雖不能盡無遺才之憾然才之為所得者亦應十收八九苟私其所愛而飾為憐才之論無論其所謂才者未必才而品之不可問巳較然矣此則􅍘無可寬假者也雖然貢舉者取士之法也而教之則在於平日誠使師儒之選得其人以充之使士皆知立品植學而不為利祿之誘則其未達也不急於求知其既達也亦自無徇私舞弊之失矣制䇿又以防邉固圉綢繆未然而因豫籌乎兵將之嫻習臣惟廟堂制勝之略莫重乎擇將將茍得人則訓練有方行陳整飭士卒皆服從其教懷其惠而畏其威如是雖使之蹈水火可也為將之道非唯核名數勤操演遂可以盡其責也凡山川之險易道途之紆直與夫器械之異宜人材之異適皆當熟悉於平時夫然故舉而用之真如臂指之相使矣至考古昔兵制漢時京師有南北軍皆郡國之士更番直上而郡國亦有材官騎士常以八月為都試之期至東漢罷之論者咸議其失唐初府兵本西魏北周之遺制也其後屢變而遂有養兵之費如宋之所謂長征兵者亦然平時虛糜物力而臨事訖不可用有急復主召募然亦何可恃耶今時無屯聚之兵無專輒之將內外相維文武協力此其所以遠軼前代也我皇上安不忘危靜而待動故將驕卒惰之失無有也黷武窮兵之失亦無有也然則禦邉之善術誠莫外乎此矣不輕遽以徼功不姑息以養禍將亦豈能舍是而為良哉凡此者臣以為風示磨厲之道皆在上也要皆由我皇上運健行不息之神而盡凝命敕幾之實故惟臣欽若而以成大法小廉之治惟民丕應而以還力本節用之風取士必得而碔砆不至濫收馭將有方而潢池不憂小警則我國家之治化自比隆於唐虞矣臣草茅新進罔識忌諱干冒宸嚴不勝戰栗隕越之至臣謹對朝考誠無為幾善惡論壬申誠者天道也天道無為聖人亦無為其未至乎聖者不能純任自然也其要必在從其發念之始而嚴辨之故言誠莫詳於中庸而其首章必先之以愼獨周子蓋有會於夫子之所言而因為之闡其旨日誠無為幾善惡斯豈周子之創見哉嘗試論之天道一誠而巳而其功用則有陰陽其在人也寂然不動之中衆理悉具渾然在中者誠也而其幾之動也則有善有惡善之念當引而伸之惡之念當銷而去之夫人莫不謂然然善固善矣而善之中有未盡善者焉亦猶之惡矣惡固惡矣而惡之中有實非惡者焉亦不失為善矣是尢在所當察也何以明之如欲為一善事而或有所為而為之此不已害於誠乎又如欲殺一人而實救衆人之命則剛􅍘者善而姑息者非善也故人之善惡亦如天道之有陰陽相對待而為用人能察幾則善惡皆可為吾用矣且誠之無為也亦有其致力者在戒愼乎其所不睹恐懼乎其所不聞此靜養之功也至發念之始在乎動靜之交唯己知之故謂之獨喫緊檢點全在此時過此以往則精神方馳騖於事為之未計校於成敗之間國人舉得議論其得失而在己反莫識其由來矣獨之不愼雖悔焉追顧欲察幾必先明理理不明則以善為惡以惡為善素未精審而當幾惡能辨之不爽也故中庸又言誠身必先明善苟不知此必有誠非其誠者大學之言知至而后意誠其亦此意也夫朝考擬察茂材異等詔王申非常之人不世出朕殊不謂然愛珠玉者珠玉至愛千里馬者馬亦至世未聞乏珠玉與千里馬也患公卿大夫無與佐朕旁求之念耳天下至大人民至衆朕一人豈能周知士豈無瑰瑋殊特而無由上聞者乎其令郡國察茂材異等可為將相及使絶國者朕且以觀在位者知人之明焉朝考時政疏王申臣謹奏臣惟恤吏所以安民而重內所以寧外夫張官置吏皆所以為民也以畿輔重地化導撫恤之政尢當加意庶編氓不致失所以厪聖懷乃臣竊見直隸一省差務殷繁自督臣以下惟知辦差為考成之要務而他皆有所未遑及今且州縣不足而及於教職矣夫厚其資給優其升擢以效力於公家亦誰不樂就者而臣竊聞道路之言頗以為畏途者何也母乃出納之際奏銷之例有未盡當其理者歟蓋銀之給於上者經易數四而後至於州縣則恐侵剋之弊未盡絶也小民之應上差役者必徵召於月餘之前聚集守候而後效用於一旦官但案其聽用之日給其廩直則恐賠墊之苦未盡免也當其任者希苟免於目前而彌縫於日後竊恐州縣帑藏所儲未能皆無借動也幸而太平無事故不見其利害耳然臣之愚竊不勝鰓鰓然抱無窮之慮也今我皇上深悉貪利侵漁之弊特嚴虧空之罰法出而必行人人曉然知上意矣如謂皆悍然不顧而甘蹈於法是豈人情殆亦勢有不能已者也夫法行當濟之以恩伏願我皇上軫念近畿之疾苦曲體官吏之隱情舊例之虛糜者可革也其實不足者似當酌增之庶官吏優裕而小民亦不致重困國帑亦不至空懸是在我皇上之特恩矣臣又案周官司徒均民之力征辨其車牛可任者是將齊其勞逸也今各州縣所辦其上下於吏胥之手者亦恐不免伏乞敕下督臣酌議盡善之法庶官與民皆仰戴仁恩於無既矣臣狂瞽之見不識忌諱干瀆宸嚴無所逃罪臣謹奏十月滌場詩一首另編散館責難賦以繩愆糾繆格其非心為韻甲戌古大臣之致主日勳華其可登維兢兢而業業若繼繼以承承苟一心之吻合將千古而代興即事陳詞初何憚於逆耳因機善導端有似乎引繩臣慷慨以效忠詎日恕己量主君殷勤以納諫寧謂吾力未能昔孟氏之垂訓明臣節之宜虔以難事而相責欲吾君之仔肩將以為主德之準必求夫君道之全如天地之幬載羣生高厚期於相配如日月之照臨萬物軌度寧可微愆不擇不辭思裨益於泰山河海曰吁曰咈勤啓迪於廣厦細旃蓋以臣乃股肱君實元首惟一人之天位獨尊豈百爾之立心可苟取法乎上詎降格以相從卑論無高即撫躬而多負是以當巨大而必爭探隱幽而致糾將順其美亦匡救之相參允執厥中知危微之待剖夫然故君心日以明主德日以茂身修言道範百世而無慙樂僃禮明考三王而不繆以人為鑒豈徒見其形容用汝作霖洵可置諸左右蓋不惟不苦其難而且欲亟資其成就也我皇上鑒成憲以無愆學古訓而有獲猶勤汝弻之思以勵交修之益置鞀設鐸覩五聲之在懸明目達聰喜四門之咸闢所其無逸時致惕於君難罔或不勤屢殷懷以自責此皆聖性之自然豈藉臣工之感格若乃有馮有翼汝明汝為進冰淵之危詞恍如臨而如履陳帝王之盛軌爰若驟以若馳巳治而憂其未治無師而善以為師思文武之規念孫謀之貽厥述堯舜之道儼祖武以繩其於斯時也何攖鱗之足戒何苦口之見揮何脂韋之可尚何骨鯁之羣非何仗馬寒蟬之可效何折檻補牘之難希以為易而難者旋至以為難而易者巳幾蓋觀夫在庭之謇謇諤諤彌足彰聖治之蕩蕩巍巍是用作千秋之金鏡成大寶之鴻針勤補衮以勿替愧撻市之難任慕汲黯之忠唯願拾遺補過守朱子之學敢忘誠意正心圖易在思艱寰宇煥珠囊之彩主聖則臣直朝陽聆威鳳之音樵夫笑士詩一首另編弟子大興黃景緯揆基校抱經堂文集卷第一
